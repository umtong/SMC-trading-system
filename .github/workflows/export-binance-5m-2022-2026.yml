name: Export Binance BTC ETH 5m 2022-2026

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install data dependencies
        run: python -m pip install pandas numpy
      - name: Download and normalize official Binance futures klines
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import csv
          from datetime import date
          import gzip
          import hashlib
          import io
          import json
          from pathlib import Path
          import urllib.error
          import urllib.request
          import zipfile
          import pandas as pd

          ROOT = "https://data.binance.vision/data/futures/um/monthly/klines"
          OUT = Path("/tmp/binance-5m")
          RAW = OUT / "raw"
          OUT.mkdir(parents=True, exist_ok=True)
          RAW.mkdir(parents=True, exist_ok=True)
          symbols = ("BTCUSDT", "ETHUSDT")
          start_year, start_month = 2022, 1
          end_year, end_month = 2026, 6
          columns = [
              "open_time", "open", "high", "low", "close", "volume",
              "close_time", "quote_volume", "trades", "taker_buy_base",
              "taker_buy_quote", "ignore",
          ]

          def months():
              y, m = start_year, start_month
              while (y, m) <= (end_year, end_month):
                  yield y, m
                  m += 1
                  if m == 13:
                      y += 1
                      m = 1

          def fetch(url: str, target: Path) -> bytes:
              if target.exists() and target.stat().st_size > 0:
                  return target.read_bytes()
              req = urllib.request.Request(url, headers={"User-Agent": "SMC-research/1.0"})
              with urllib.request.urlopen(req, timeout=120) as response:
                  data = response.read()
              target.write_bytes(data)
              return data

          manifest = {
              "source": ROOT,
              "market": "Binance USD-M futures",
              "interval": "5m",
              "range": ["2022-01-01T00:00:00Z", "2026-07-01T00:00:00Z"],
              "symbols": {},
              "archives": [],
          }
          frames = {symbol: [] for symbol in symbols}
          for symbol in symbols:
              for year, month in months():
                  stem = f"{symbol}-5m-{year:04d}-{month:02d}.zip"
                  url = f"{ROOT}/{symbol}/5m/{stem}"
                  zip_path = RAW / stem
                  blob = fetch(url, zip_path)
                  actual = hashlib.sha256(blob).hexdigest()
                  checksum_url = url + ".CHECKSUM"
                  checksum_ok = None
                  expected = None
                  try:
                      check_blob = fetch(checksum_url, RAW / (stem + ".CHECKSUM"))
                      expected = check_blob.decode("utf-8", errors="replace").strip().split()[0]
                      checksum_ok = expected.lower() == actual.lower()
                      if not checksum_ok:
                          raise RuntimeError(f"checksum mismatch for {stem}: {expected} != {actual}")
                  except urllib.error.HTTPError as exc:
                      if exc.code != 404:
                          raise
                  with zipfile.ZipFile(io.BytesIO(blob)) as archive:
                      csv_names = [n for n in archive.namelist() if n.lower().endswith(".csv")]
                      if len(csv_names) != 1:
                          raise RuntimeError(f"unexpected CSV members in {stem}: {csv_names}")
                      with archive.open(csv_names[0]) as handle:
                          frame = pd.read_csv(handle, header=None, names=columns)
                  numeric = ["open_time", "open", "high", "low", "close", "volume", "close_time", "quote_volume", "trades", "taker_buy_base", "taker_buy_quote"]
                  for col in numeric:
                      frame[col] = pd.to_numeric(frame[col], errors="raise")
                  raw_time = frame["open_time"].astype("int64")
                  unit = "us" if int(raw_time.abs().median()) >= 10**14 else "ms"
                  frame["open_time"] = pd.to_datetime(raw_time, unit=unit, utc=True)
                  frame = frame[["open_time", "open", "high", "low", "close", "volume", "quote_volume", "trades", "taker_buy_base", "taker_buy_quote"]]
                  frames[symbol].append(frame)
                  manifest["archives"].append({
                      "symbol": symbol,
                      "year": year,
                      "month": month,
                      "url": url,
                      "sha256": actual,
                      "checksum_expected": expected,
                      "checksum_ok": checksum_ok,
                      "rows": int(len(frame)),
                  })
                  print(symbol, year, month, len(frame), actual, flush=True)

          for symbol, chunks in frames.items():
              frame = pd.concat(chunks, ignore_index=True)
              frame = frame.drop_duplicates("open_time", keep="last").sort_values("open_time").reset_index(drop=True)
              mask = (frame.open_time >= pd.Timestamp("2022-01-01", tz="UTC")) & (frame.open_time < pd.Timestamp("2026-07-01", tz="UTC"))
              frame = frame.loc[mask].copy()
              delta = frame.open_time.diff().dropna()
              gaps = delta[delta != pd.Timedelta(minutes=5)]
              symbol_meta = {
                  "rows": int(len(frame)),
                  "first_open_time": frame.open_time.iloc[0].isoformat(),
                  "last_open_time": frame.open_time.iloc[-1].isoformat(),
                  "non_5m_gaps": int(len(gaps)),
                  "largest_gap_seconds": 0 if gaps.empty else float(gaps.max().total_seconds()),
              }
              manifest["symbols"][symbol] = symbol_meta
              for year in range(2022, 2027):
                  yearly = frame.loc[frame.open_time.dt.year == year].copy()
                  path = OUT / f"{symbol}_5m_{year}.csv.gz"
                  yearly.to_csv(path, index=False, compression="gzip", float_format="%.10g")
                  symbol_meta[f"{year}_rows"] = int(len(yearly))
                  symbol_meta[f"{year}_sha256"] = hashlib.sha256(path.read_bytes()).hexdigest()

          manifest_path = OUT / "manifest.json"
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding="utf-8")
          print(json.dumps(manifest["symbols"], ensure_ascii=False, indent=2))
          PY
      - name: Upload official normalized data
        uses: actions/upload-artifact@v4
        with:
          name: binance-btc-eth-5m-2022-2026-${{ github.run_id }}
          path: |
            /tmp/binance-5m/*.csv.gz
            /tmp/binance-5m/manifest.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
