name: v0.25A2 ARM causal context scout

on:
  push:
    branches:
      - research/v025a2-eventtime-20260723
    paths:
      - '.github/workflows/v025a2-context-scout-arm.yml'
      - 'research/v025a2/v025a2_locked_runner.tar.xz'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025a2-context-scout-arm-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  PLAN_FILE_SHA256: db40e4bddeab538a2f3acb2c58ceeffacc5d8c3d4e08c3e26137ba16665cd1cb
  PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  SOURCE_MANIFEST_SHA256: 4857b909b1928bfe11c32daa6eea35f37a30f7a83168891c2432fda41bee9eb0
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-context-arm
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'

jobs:
  scout:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact locked runner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v025a2 transport-evidence
          echo "${ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c -
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C v025a2
          (cd v025a2 && sha256sum -c SOURCE_SHA256SUMS.txt) | tee transport-evidence/source-sha256.txt
          echo "${PLAN_FILE_SHA256}  v025a2/research/v025/research_plan_locked.json" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  v025a2/artifacts/v0243/data_acquisition_plan.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v025a2/requirements-lock.txt

      - name: Verify preregistration and tests
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence "${WORKSPACE}"
          python - <<'PY' | tee ci-evidence/preregistration.json
          import hashlib, json, os
          from pathlib import Path
          def canonical(x): return hashlib.sha256(json.dumps(x,sort_keys=True,separators=(',',':'),ensure_ascii=False,allow_nan=False).encode()).hexdigest()
          p=json.loads(Path('research/v025/research_plan_locked.json').read_text())
          q=dict(p); declared=q.pop('plan_payload_sha256')
          assert p['study_id']=='smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert p['candidate_count']==64
          assert canonical(q)==declared==os.environ['PLAN_PAYLOAD_SHA256']
          assert p['source_tree_manifest_sha256']==os.environ['SOURCE_MANIFEST_SHA256']
          assert p['candidate_pnl_observed_before_plan'] is False
          assert p['terminal_holdout_opened_before_plan'] is False
          assert p['production_enabled'] is False
          print(json.dumps({'study_id':p['study_id'],'candidate_count':64,'candidate_pnl_observed':False,'terminal_holdout_opened':False,'production_enabled':False},sort_keys=True,indent=2))
          PY
          PYTHONPATH=research/v025 python -m pytest -q research/v025 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025 scripts smc_ict_quant

      - name: Restore official minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v1
          restore-keys: |
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Materialize official minute data and contexts
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python scripts/download_binance_um_parallel.py --request-plan artifacts/v0243/data_acquisition_plan.json --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context --data-root "${DATA_ROOT}" --data-plan artifacts/v0243/data_acquisition_plan.json --workspace "${WORKSPACE}" 2>&1 | tee ci-evidence/context-build.log
          test -s "${WORKSPACE}/contexts.csv"
          test -s "${WORKSPACE}/event_day_plan.json"

      - name: Probe official event archive envelope
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/event-size.log
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import json, os, re
          from pathlib import Path
          from urllib.request import Request, urlopen
          w=Path(os.environ['WORKSPACE']); plan=json.loads((w/'event_day_plan.json').read_text())
          assert plan['generated_from_candidate_pnl'] is False and plan['terminal_holdout_downloaded'] is False
          reqs=list(plan['requests']); assert all(str(x['date'])<'2025-10-01' for x in reqs)
          def probe(x):
              url=str(x['url']); headers={'User-Agent':'v025a2-arm-scout/1.0'}
              try:
                  with urlopen(Request(url,method='HEAD',headers=headers),timeout=60) as r: value=r.headers.get('Content-Length')
              except Exception:
                  h=dict(headers); h['Range']='bytes=0-0'
                  with urlopen(Request(url,headers=h),timeout=60) as r:
                      m=re.search(r'/(\d+)$',r.headers.get('Content-Range','')); value=m.group(1) if m else r.headers.get('Content-Length')
              if value is None: raise RuntimeError(url)
              return {'relative_path':x['relative_path'],'bytes':int(value)}
          records=[]
          with ThreadPoolExecutor(max_workers=24) as pool:
              futures=[pool.submit(probe,x) for x in reqs]
              for i,f in enumerate(as_completed(futures),1):
                  records.append(f.result())
                  if i%50==0 or i==len(futures): print(f'probed={i}/{len(futures)}',flush=True)
          sizes=sorted(x['bytes'] for x in records)
          payload={'schema_version':1,'study_id':plan['study_id'],'event_plan_payload_sha256':plan['payload_sha256'],'context_count':plan['context_count'],'request_count':len(records),'known_size_count':len(records),'failed_size_count':0,'total_compressed_bytes':sum(sizes),'max_compressed_bytes':max(sizes,default=0),'median_compressed_bytes':sizes[len(sizes)//2] if sizes else 0,'candidate_pnl_observed':False,'terminal_holdout_opened':False,'production_enabled':False}
          (w/'event_size_summary.json').write_text(json.dumps(payload,sort_keys=True,indent=2)+'\n')
          print(json.dumps(payload,sort_keys=True,indent=2))
          PY

      - name: Persist compact status
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          root='research/results/v025a2-context-scout'
          mkdir -p "$root"
          for name in context_summary.json event_size_summary.json; do
            if [ -f "${WORKSPACE}/${name}" ]; then cp "${WORKSPACE}/${name}" "$root/${name}"; fi
          done
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          r=Path('research/results/v025a2-context-scout')
          p={'schema_version':1,'workflow_run_id':os.environ.get('GITHUB_RUN_ID'),'head_sha':os.environ.get('GITHUB_SHA'),'job_status':os.environ.get('JOB_STATUS'),'context_summary_present':(r/'context_summary.json').exists(),'event_size_summary_present':(r/'event_size_summary.json').exists(),'candidate_pnl_observed':False,'terminal_holdout_opened':False,'production_enabled':False,'recorded_at_utc':datetime.now(timezone.utc).isoformat()}
          (r/'status.json').write_text(json.dumps(p,sort_keys=True,indent=2)+'\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$root"
          if ! git diff --cached --quiet; then git commit -m 'Record v0.25A2 ARM context scout'; git push origin "HEAD:${GITHUB_REF_NAME}"; fi

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025a2-arm-context-scout-${{ github.run_id }}
          path: |
            transport-evidence
            v025a2/ci-evidence
            .research-work/v025a2-context-arm/context_summary.json
            .research-work/v025a2-context-arm/event_day_plan.json
            .research-work/v025a2-context-arm/event_size_summary.json
            v025a2/research/v025/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
