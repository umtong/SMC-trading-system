name: V1.97 Strict Cross-Venue Lead-Lag

on:
  push:
    branches: [research/v197-crossvenue-strict-20260724]
    paths:
      - research/v196_crossvenue.py
      - research/v197_crossvenue_strict.py
      - research/CROSSVENUE_V197_STRICT_CONTRACT.md
      - .github/workflows/research-v197-crossvenue-strict.yml
  pull_request:
    branches: [main]
    paths:
      - research/v196_crossvenue.py
      - research/v197_crossvenue_strict.py
      - research/CROSSVENUE_V197_STRICT_CONTRACT.md
      - .github/workflows/research-v197-crossvenue-strict.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v197-crossvenue-strict-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day:
    runs-on: macos-14
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - {symbol: BTCUSDT, day: '2022-01-15'}
          - {symbol: ETHUSDT, day: '2022-01-15'}
          - {symbol: BTCUSDT, day: '2022-03-15'}
          - {symbol: ETHUSDT, day: '2022-03-15'}
          - {symbol: BTCUSDT, day: '2022-05-15'}
          - {symbol: ETHUSDT, day: '2022-05-15'}
          - {symbol: BTCUSDT, day: '2022-07-15'}
          - {symbol: ETHUSDT, day: '2022-07-15'}
          - {symbol: BTCUSDT, day: '2022-09-15'}
          - {symbol: ETHUSDT, day: '2022-09-15'}
          - {symbol: BTCUSDT, day: '2022-11-15'}
          - {symbol: ETHUSDT, day: '2022-11-15'}
          - {symbol: BTCUSDT, day: '2023-02-15'}
          - {symbol: ETHUSDT, day: '2023-02-15'}
          - {symbol: BTCUSDT, day: '2023-04-15'}
          - {symbol: ETHUSDT, day: '2023-04-15'}
          - {symbol: BTCUSDT, day: '2023-06-15'}
          - {symbol: ETHUSDT, day: '2023-06-15'}
          - {symbol: BTCUSDT, day: '2023-08-15'}
          - {symbol: ETHUSDT, day: '2023-08-15'}
          - {symbol: BTCUSDT, day: '2023-10-15'}
          - {symbol: ETHUSDT, day: '2023-10-15'}
          - {symbol: BTCUSDT, day: '2023-12-15'}
          - {symbol: ETHUSDT, day: '2023-12-15'}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - name: Materialize syntax-repaired frozen evaluator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v197-runtime
          cp research/v196_crossvenue.py v197-runtime/v196_crossvenue.py
          python - <<'PY'
          from pathlib import Path
          src=Path('research/v197_crossvenue_strict.py').read_text(encoding='utf-8')
          old="day_frame.groupby('day', sort=True).return.sum()"
          new="day_frame.groupby('day', sort=True)['return'].sum()"
          if src.count(old) != 1:
              raise SystemExit(f'expected exactly one syntax repair target, found {src.count(old)}')
          Path('v197-runtime/v197_crossvenue_strict.py').write_text(src.replace(old,new),encoding='utf-8')
          PY
          shasum -a 256 research/v197_crossvenue_strict.py v197-runtime/v197_crossvenue_strict.py | tee v197-runtime/SHA256SUMS.txt
          python -m py_compile v197-runtime/v196_crossvenue.py v197-runtime/v197_crossvenue_strict.py
      - name: Build one strict causal venue panel
        run: |
          python v197-runtime/v197_crossvenue_strict.py day \
            --symbol '${{ matrix.symbol }}' \
            --day '${{ matrix.day }}' \
            --out 'v197-days/${{ matrix.symbol }}-${{ matrix.day }}'
          cp v197-runtime/SHA256SUMS.txt 'v197-days/${{ matrix.symbol }}-${{ matrix.day }}/EVALUATOR_SHA256SUMS.txt'
      - uses: actions/upload-artifact@v4
        with:
          name: v197-day-${{ matrix.symbol }}-${{ matrix.day }}-${{ github.run_id }}
          path: v197-days/${{ matrix.symbol }}-${{ matrix.day }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  aggregate:
    needs: day
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - uses: actions/download-artifact@v4
        with:
          pattern: v197-day-*-${{ github.run_id }}
          path: v197-input
          merge-multiple: true
      - name: Materialize identical syntax-repaired evaluator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v197-runtime
          cp research/v196_crossvenue.py v197-runtime/v196_crossvenue.py
          python - <<'PY'
          from pathlib import Path
          src=Path('research/v197_crossvenue_strict.py').read_text(encoding='utf-8')
          old="day_frame.groupby('day', sort=True).return.sum()"
          new="day_frame.groupby('day', sort=True)['return'].sum()"
          if src.count(old) != 1:
              raise SystemExit(f'expected exactly one syntax repair target, found {src.count(old)}')
          Path('v197-runtime/v197_crossvenue_strict.py').write_text(src.replace(old,new),encoding='utf-8')
          PY
          shasum -a 256 research/v197_crossvenue_strict.py v197-runtime/v197_crossvenue_strict.py | tee v197-runtime/SHA256SUMS.txt
          python -m py_compile v197-runtime/v196_crossvenue.py v197-runtime/v197_crossvenue_strict.py
      - name: Require identical evaluator provenance across all panels
        shell: bash
        run: |
          expected=$(tail -n 1 v197-runtime/SHA256SUMS.txt | awk '{print $1}')
          found=0
          while IFS= read -r f; do
            found=$((found+1))
            test "$(tail -n 1 "$f" | awk '{print $1}')" = "$expected"
          done < <(find v197-input -name EVALUATOR_SHA256SUMS.txt -type f -print)
          test "$found" -eq 24
      - name: Run frozen 2022 development and 2023 validation screen
        run: python v197-runtime/v197_crossvenue_strict.py aggregate --input v197-input --out v197-results
      - uses: actions/upload-artifact@v4
        with:
          name: v197-crossvenue-strict-results-${{ github.run_id }}
          path: v197-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
