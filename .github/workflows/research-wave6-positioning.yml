name: Research Wave 6 Positioning Data

on:
  push:
    branches:
      - agent/research-snapshot-and-oos
  workflow_dispatch:

permissions:
  contents: read

jobs:
  positioning-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download checksum-verified USD-M metrics archives
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import datetime as dt
          import hashlib
          import json
          import re
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path

          ROOT = "https://data.binance.vision/data/futures/um/daily/metrics"
          OUT = Path("data/wave6_positioning_raw")
          CHECKSUM = re.compile(r"\b([0-9a-fA-F]{64})\b")
          START = dt.date(2020, 12, 1)
          END = dt.date(2025, 7, 31)

          def dates():
              current = START
              while current <= END:
                  yield current.isoformat()
                  current += dt.timedelta(days=1)

          def get(url: str, attempts: int = 7) -> bytes:
              request = urllib.request.Request(url, headers={"User-Agent": "smc-ict-wave6/1.0"})
              error = None
              for attempt in range(attempts):
                  try:
                      with urllib.request.urlopen(request, timeout=120) as response:
                          return response.read()
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404:
                          raise
                      error = exc
                  except Exception as exc:
                      error = exc
                  if attempt + 1 < attempts:
                      time.sleep(min(2 ** attempt, 15))
              raise RuntimeError(f"failed {url}: {error}")

          specs = []
          for symbol in ("BTCUSDT", "ETHUSDT"):
              for date in dates():
                  name = f"{symbol}-metrics-{date}.zip"
                  url = f"{ROOT}/{symbol}/{name}"
                  specs.append((symbol, date, url, OUT / symbol / name))

          def fetch(spec):
              symbol, date, url, path = spec
              try:
                  checksum_payload = get(url + ".CHECKSUM")
                  match = CHECKSUM.search(checksum_payload.decode("utf-8", errors="strict"))
                  if match is None:
                      raise ValueError(f"no SHA-256 in {url}.CHECKSUM")
                  expected = match.group(1).lower()
                  payload = get(url)
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return {"symbol": symbol, "date": date, "status": "missing", "url": url}
                  raise
              actual = hashlib.sha256(payload).hexdigest()
              if actual != expected:
                  raise ValueError(f"checksum mismatch {url}: {actual} != {expected}")
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(payload)
              path.with_suffix(path.suffix + ".CHECKSUM").write_bytes(checksum_payload)
              return {
                  "symbol": symbol,
                  "date": date,
                  "status": "downloaded",
                  "url": url,
                  "sha256": actual,
                  "bytes": len(payload),
                  "relative_path": str(path.relative_to(OUT)),
              }

          records = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=16) as pool:
              futures = {pool.submit(fetch, spec): spec for spec in specs}
              for number, future in enumerate(concurrent.futures.as_completed(futures), start=1):
                  record = future.result()
                  records.append(record)
                  if number % 100 == 0 or record["status"] != "downloaded":
                      print(number, record["symbol"], record["date"], record["status"], flush=True)

          records.sort(key=lambda item: (item["symbol"], item["date"]))
          downloaded = [item for item in records if item["status"] == "downloaded"]
          missing = [item for item in records if item["status"] == "missing"]
          manifest = {
              "source": "Binance Vision USD-M daily metrics archives",
              "start_date": START.isoformat(),
              "end_date": END.isoformat(),
              "sealed_oos_excluded_from": "2025-08-01T00:00:00+00:00",
              "requested_count": len(records),
              "downloaded_count": len(downloaded),
              "missing_count": len(missing),
              "total_bytes": sum(item["bytes"] for item in downloaded),
              "records": records,
          }
          OUT.mkdir(parents=True, exist_ok=True)
          (OUT / "raw_manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          print(json.dumps({key: manifest[key] for key in ("requested_count", "downloaded_count", "missing_count", "total_bytes")}, indent=2))
          PY

      - name: Upload Wave 6 positioning archive snapshot
        uses: actions/upload-artifact@v4
        with:
          name: wave6-binance-positioning-2020-12_2025-07-${{ github.sha }}
          path: data/wave6_positioning_raw
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
