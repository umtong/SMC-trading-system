name: v0.25C3 frozen initiative-continuation evaluation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025c3-evaluate-${{ github.ref }}
  cancel-in-progress: false

env:
  A2_ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  A2_PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  C3_ARCHIVE_SHA256: 4529d09c17d1ac7a980db53ebd7a3d5b64406add08281821f7c50abbe2cfc626
  C3_PLAN_FILE_SHA256: 4c0a9d6b9bfc8332d25ffc0508206d1b519386470aa6692ffda05691bbd78921
  C3_PLAN_PAYLOAD_SHA256: 198a1d433e28089537468b3648227677de2a21034f189b05c41630ffc5463d84
  C3_SOURCE_MANIFEST_SHA256: 715bbbc1e5db80b9f22e1d8c056cf376d9c28428f68dcdb2408925f15eb526d5
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  EVENT_ROOT: ${{ github.workspace }}/.research-data/v025a2-event
  A2_WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-for-c3
  C3_WORKSPACE: ${{ github.workspace }}/.research-work/v025c3
  C3_OUTPUT: ${{ github.workspace }}/.research-results/v025c3
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  evaluate:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact A2 base and C3 overlay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p c3 transport-evidence
          echo "${A2_ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c -
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C c3
          python - <<'PY' | tee transport-evidence/c3-transport.json
          import base64, hashlib, json
          from pathlib import Path
          root=Path('research/v025c3')
          manifest=json.loads((root/'TRANSPORT_MANIFEST.json').read_text())
          chunks=[]; evidence=[]
          for item in manifest['parts']:
              raw=(root/item['name']).read_bytes()
              assert len(raw)==item['chars']
              assert hashlib.sha256(raw).hexdigest()==item['sha256']
              chunks.append(raw)
              evidence.append({'name':item['name'],'chars':len(raw),'sha256':hashlib.sha256(raw).hexdigest()})
          encoded=b''.join(chunks)
          assert len(encoded)==manifest['source_chars']
          assert hashlib.sha256(encoded).hexdigest()==manifest['source_sha256']
          archive=base64.b64decode(encoded, validate=True)
          assert hashlib.sha256(archive).hexdigest()==manifest['archive_sha256']
          Path('/tmp/v025c3_overlay.tar.xz').write_bytes(archive)
          print(json.dumps({'parts':evidence,'encoded_sha256':manifest['source_sha256'],'archive_sha256':manifest['archive_sha256']},sort_keys=True,indent=2))
          PY
          echo "${C3_ARCHIVE_SHA256}  /tmp/v025c3_overlay.tar.xz" | sha256sum -c -
          xz -t /tmp/v025c3_overlay.tar.xz
          tar -xJf /tmp/v025c3_overlay.tar.xz -C c3
          echo "${C3_PLAN_FILE_SHA256}  c3/research/v025c3/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: c3/requirements-lock.txt

      - name: Verify C3 preregistration, source identity, and tests
        shell: bash
        working-directory: c3
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence "${A2_WORKSPACE}" "${C3_WORKSPACE}" "${C3_OUTPUT}" "${EVENT_ROOT}"
          python - <<'PY' | tee ci-evidence/preregistration.json
          import hashlib, json, os
          from pathlib import Path
          def digest(p): return hashlib.sha256(Path(p).read_bytes()).hexdigest()
          def canonical(x): return hashlib.sha256(json.dumps(x,sort_keys=True,separators=(',',':'),ensure_ascii=False,allow_nan=False).encode()).hexdigest()
          plan=json.loads(Path('research/v025c3/research_plan_locked.json').read_text())
          payload=dict(plan); declared=payload.pop('plan_payload_sha256')
          assert plan['study_id']=='smc_event_time_initiative_continuation_v0_25_c3'
          assert plan['candidate_count']==64
          assert canonical(payload)==declared==os.environ['C3_PLAN_PAYLOAD_SHA256']
          assert plan['source_tree_manifest_sha256']==os.environ['C3_SOURCE_MANIFEST_SHA256']
          assert canonical(plan['source_files'])==plan['source_tree_manifest_sha256']
          for path, expected in plan['source_files'].items(): assert digest(path)==expected, path
          assert plan['a2_event_cache_reuse']['source_plan_payload_sha256']==os.environ['A2_PLAN_PAYLOAD_SHA256']
          assert plan['a2_event_cache_reuse']['candidate_pnl_from_A2_consumed'] is False
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert plan['production_enabled'] is False
          print(json.dumps({'study_id':plan['study_id'],'candidate_count':64,'A2_performance_consumed':False,'terminal_holdout_opened':False,'production_enabled':False},sort_keys=True,indent=2))
          PY
          PYTHONPATH=research/v025c3:research/v025 python -m pytest -q research/v025c3 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025c3 research/v025

      - name: Restore official minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v2
          restore-keys: |
            v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Restore performance-independent A2 event cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-event
          key: v025a2-binance-usdm-event-${{ env.A2_PLAN_PAYLOAD_SHA256 }}-v2
          restore-keys: |
            v025a2-binance-usdm-event-${{ env.A2_PLAN_PAYLOAD_SHA256 }}-

      - name: Rebuild A2 context and verify scout identity
        shell: bash
        working-directory: c3
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/scout-gate.json
          import json
          from pathlib import Path
          root=Path('../research/results/v025a2-context-scout')
          status=json.loads((root/'status.json').read_text()); size=json.loads((root/'event_size_summary.json').read_text())
          assert status['candidate_pnl_observed'] is False and status['terminal_holdout_opened'] is False
          assert size['candidate_pnl_observed'] is False and size['terminal_holdout_opened'] is False
          assert int(size['total_compressed_bytes']) <= 80_000_000_000
          print(json.dumps({'request_count':size['request_count'],'compressed_bytes':size['total_compressed_bytes'],'candidate_pnl_observed':False},sort_keys=True,indent=2))
          PY
          python scripts/download_binance_um_parallel.py --request-plan artifacts/v0243/data_acquisition_plan.json --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context --data-root "${DATA_ROOT}" --data-plan artifacts/v0243/data_acquisition_plan.json --workspace "${A2_WORKSPACE}" 2>&1 | tee ci-evidence/a2-context.log
          python - <<'PY'
          import json, os
          from pathlib import Path
          branch=json.loads(Path('../research/results/v025a2-context-scout/context_summary.json').read_text())
          current=json.loads((Path(os.environ['A2_WORKSPACE'])/'context_summary.json').read_text())
          assert branch==current
          plan=json.loads((Path(os.environ['A2_WORKSPACE'])/'event_day_plan.json').read_text())
          assert plan['generated_from_candidate_pnl'] is False and plan['terminal_holdout_downloaded'] is False
          PY

      - name: Verify exact filtered A2 event cache
        shell: bash
        working-directory: c3
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py events --event-plan "${A2_WORKSPACE}/event_day_plan.json" --output "${EVENT_ROOT}" --workers 4 2>&1 | tee ci-evidence/event-cache.log

      - name: Build strict-subset C3 signals and evaluate
        shell: bash
        working-directory: c3
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025c3:research/v025 python research/v025c3/v025c3_pipeline.py context --a2-workspace "${A2_WORKSPACE}" --a2-event-plan "${A2_WORKSPACE}/event_day_plan.json" --workspace "${C3_WORKSPACE}" 2>&1 | tee ci-evidence/c3-context.log
          PYTHONPATH=research/v025c3:research/v025 python research/v025c3/v025c3_pipeline.py signals --workspace "${C3_WORKSPACE}" --a2-event-root "${EVENT_ROOT}" 2>&1 | tee ci-evidence/c3-signals.log
          python - <<'PY' | tee ci-evidence/signal-audit.json
          import json, os
          from pathlib import Path
          import pandas as pd
          w=Path(os.environ['C3_WORKSPACE']); s=pd.read_csv(w/'signals.csv')
          if len(s):
              for c in ('signal_time','context_available_time','entry_time'): s[c]=pd.to_datetime(s[c],utc=True)
              assert (s['entry_time']>s[['signal_time','context_available_time']].max(axis=1)).all()
              assert (s['entry_time']<pd.Timestamp('2025-10-01T00:00:00Z')).all()
          summary=json.loads((w/'context_summary.json').read_text())
          assert summary['study_id']=='smc_event_time_initiative_continuation_v0_25_c3'
          assert summary['coverage_mode']=='strict_subset_of_performance_independent_A2_windows'
          print(json.dumps({'signals':int(len(s)),'strict_subset_coverage':True,'terminal_signal':False},sort_keys=True,indent=2))
          PY
          set +e
          /usr/bin/time -v env PYTHONPATH=research/v025c3:research/v025 python research/v025c3/v025c3_pipeline.py evaluate --workspace "${C3_WORKSPACE}" --output "${C3_OUTPUT}" 2>&1 | tee ci-evidence/evaluation.log
          code=${PIPESTATUS[0]}
          set -e
          test "$code" -eq 0 -o "$code" -eq 1
          printf '%s\n' "$code" > ci-evidence/scientific-exit-code.txt

      - name: Persist compact C3 result
        shell: bash
        run: |
          set -euo pipefail
          root='research/results/v025c3-evaluation'
          mkdir -p "$root"
          for n in study_results.json selected_candidate.json research_gate.json development_leaderboard.csv; do
            if [ -f "${C3_OUTPUT}/${n}" ]; then cp "${C3_OUTPUT}/${n}" "$root/${n}"; fi
          done
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          root=Path('research/results/v025c3-evaluation'); result=json.loads((root/'study_results.json').read_text())
          assert result['terminal_holdout_opened'] is False and result['production_enabled'] is False
          status={'schema_version':1,'study_id':result['study_id'],'scientific_run_completed':True,'target_met':bool(result['target_met']),'A2_performance_consumed':False,'terminal_holdout_opened':False,'production_enabled':False,'recorded_at_utc':datetime.now(timezone.utc).isoformat()}
          (root/'status.json').write_text(json.dumps(status,sort_keys=True,indent=2)+'\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin research/v025a2-eventtime-20260723
          git add "$root"
          if ! git diff --cached --quiet; then git commit -m 'Record v0.25C3 frozen preholdout result'; git push origin HEAD:research/v025a2-eventtime-20260723; fi

      - name: Upload compact C3 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025c3-evaluation-${{ github.run_id }}
          path: |
            transport-evidence
            c3/ci-evidence
            .research-work/v025c3/context_summary.json
            .research-work/v025c3/signals.csv
            .research-results/v025c3
            c3/research/v025c3/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
