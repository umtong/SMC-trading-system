name: Export Binance USD-M Monthly Funding Research Data

on:
  push:
    branches:
      - agent/binance-data-export-20260724
    paths:
      - ".github/workflows/export-binance-funding-monthly.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-funding-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download, checksum, normalize monthly fundingRate archives
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import csv, hashlib, io, json, urllib.request, zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          SYMBOLS=("BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT")
          START=(2025,1); END=(2026,6)
          BASE="https://data.binance.vision/data/futures/um/monthly/fundingRate"
          OUT=Path("research_data/binance_um_funding_monthly")
          OUT.mkdir(parents=True,exist_ok=True)

          def months():
              y,m=START
              while (y,m)<=END:
                  yield f"{y:04d}-{m:02d}"
                  m+=1
                  if m==13: y+=1; m=1
          def get(url:str)->bytes:
              req=urllib.request.Request(url,headers={"User-Agent":"smc-monthly-funding/1.0"})
              with urllib.request.urlopen(req,timeout=120) as r: return r.read()
          def pick(row, names):
              low={str(k).lower():v for k,v in row.items()}
              for n in names:
                  if n.lower() in low: return low[n.lower()]
              return None

          manifest={"generated_at_utc":datetime.now(timezone.utc).isoformat(),"source":"Binance public USD-M monthly fundingRate","symbols":{},"failures":[]}
          for symbol in SYMBOLS:
              normalized=[]; sources=[]
              for month in months():
                  fn=f"{symbol}-fundingRate-{month}.zip"
                  url=f"{BASE}/{symbol}/{fn}"
                  archive=get(url)
                  checksum=get(url+".CHECKSUM").decode("utf-8").strip().split()[0].lower()
                  actual=hashlib.sha256(archive).hexdigest()
                  if actual!=checksum: raise RuntimeError(f"checksum mismatch {fn}")
                  with zipfile.ZipFile(io.BytesIO(archive)) as zf:
                      names=[n for n in zf.namelist() if not n.endswith('/')]
                      if len(names)!=1: raise RuntimeError(f"unexpected members {fn}: {names}")
                      text=io.TextIOWrapper(zf.open(names[0]),encoding="utf-8-sig",newline="")
                      rows=list(csv.DictReader(text))
                      for row in rows:
                          t=pick(row,["funding_time","fundingTime","calc_time","time","timestamp"])
                          rate=pick(row,["funding_rate","fundingRate","last_funding_rate","rate"])
                          mark=pick(row,["mark_price","markPrice"])
                          if t is None or rate is None: continue
                          ti=int(float(t)); ti=ti*1000 if ti<10_000_000_000 else ti
                          normalized.append((ti,float(rate),float(mark) if mark not in (None,"") else ""))
                  sources.append({"month":month,"url":url,"official_sha256":checksum,"archive_bytes":len(archive),"rows":len(rows)})
              normalized=sorted(set(normalized))
              path=OUT/f"{symbol}_funding_2025-01_2026-06.csv"
              with path.open("w",newline="",encoding="utf-8") as f:
                  w=csv.writer(f); w.writerow(("symbol","funding_time","funding_rate","mark_price"))
                  for row in normalized: w.writerow((symbol,*row))
              manifest["symbols"][symbol]={"rows":len(normalized),"first_time":normalized[0][0] if normalized else None,"last_time":normalized[-1][0] if normalized else None,"output":path.as_posix(),"sha256":hashlib.sha256(path.read_bytes()).hexdigest(),"sources":sources}
          (OUT/"manifest.json").write_text(json.dumps(manifest,indent=2,sort_keys=True),encoding="utf-8")
          PY
      - name: Upload funding artifact
        uses: actions/upload-artifact@v4
        with:
          name: binance-um-funding-monthly-2025-01_2026-06
          path: research_data/binance_um_funding_monthly
          if-no-files-found: error
          retention-days: 2
