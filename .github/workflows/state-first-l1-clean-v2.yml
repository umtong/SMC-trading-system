name: State-First L1 Clean V2

on:
  push:
    branches: [research/state-first-l1-clean-v2-20260724]
    paths:
      - '.github/workflows/state-first-l1-clean-v2.yml'
      - 'research_tools/state_first_l1_clean_v2/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/state-first-l1-clean-v2.yml'
      - 'research_tools/state_first_l1_clean_v2/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-l1-clean-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    runs-on: macos-14
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed research environment
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - name: Record frozen source provenance
        shell: bash
        run: |
          mkdir -p state-first-evidence/${{ matrix.symbol }}
          shasum -a 256 \
            research_tools/state_first_l1_clean_v2/PREREGISTRATION_KO.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_001_TRAIN_ONLY_THRESHOLD.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_002_DATA_AVAILABILITY_DATES.md \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/run_available_dates.py \
            | tee state-first-evidence/${{ matrix.symbol }}/SOURCE_SHA256_${{ matrix.symbol }}.txt
          python -m py_compile \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/run_available_dates.py
      - name: Build checksum-verified causal panel
        run: |
          python research_tools/state_first_l1_clean_v2/run_available_dates.py panel \
            --symbol '${{ matrix.symbol }}' \
            --data-dir 'state-first-cache/${{ matrix.symbol }}' \
            --output-dir 'state-first-panel/${{ matrix.symbol }}'
      - name: Fail closed on unresolved BBO entries
        shell: bash
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          p=next(Path('state-first-panel/${{ matrix.symbol }}').glob('*_state_first_l1_v2.csv.gz'))
          d=pd.read_csv(p,usecols=['entry_time_ms'])
          assert (d.entry_time_ms >= 0).all()
          print({'rows':len(d),'invalid_entries':int((d.entry_time_ms<0).sum())})
          PY
      - name: Audit panel
        shell: bash
        run: |
          cp state-first-evidence/${{ matrix.symbol }}/SOURCE_SHA256_${{ matrix.symbol }}.txt state-first-panel/${{ matrix.symbol }}/SOURCE_SHA256_${{ matrix.symbol }}.txt
          python -m json.tool state-first-panel/${{ matrix.symbol }}/${{ matrix.symbol }}_manifest.json
          shasum -a 256 state-first-panel/${{ matrix.symbol }}/*
          du -h state-first-panel/${{ matrix.symbol }}/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-clean-v2-${{ matrix.symbol }}-${{ github.run_id }}
          path: state-first-panel/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  evaluate:
    needs: panel
    runs-on: macos-14
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed research environment
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - uses: actions/download-artifact@v4
        with:
          pattern: state-first-l1-clean-v2-*-${{ github.run_id }}
          path: state-first-input
          merge-multiple: true
      - name: Require identical frozen source provenance
        shell: bash
        run: |
          shasum -a 256 \
            research_tools/state_first_l1_clean_v2/PREREGISTRATION_KO.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_001_TRAIN_ONLY_THRESHOLD.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_002_DATA_AVAILABILITY_DATES.md \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/run_available_dates.py \
            > expected.txt
          found=0
          while IFS= read -r p; do
            diff -u expected.txt "$p"
            found=$((found+1))
          done < <(find state-first-input -name 'SOURCE_SHA256_*.txt' -type f -print)
          test "$found" -eq 2
      - name: Run gated selection, validation, and conditional one-shot test
        run: |
          python research_tools/state_first_l1_clean_v2/run_available_dates.py evaluate \
            --input-dir state-first-input \
            --output-dir state-first-results
      - name: Audit results
        shell: bash
        run: |
          cp expected.txt state-first-results/SOURCE_SHA256.txt
          python -m json.tool state-first-results/summary.json
          shasum -a 256 state-first-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-clean-v2-results-${{ github.run_id }}
          path: state-first-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
