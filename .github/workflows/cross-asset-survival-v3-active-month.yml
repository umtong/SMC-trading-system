name: Cross-asset stop-survival V3 active-month confirmation

on:
  pull_request:
    branches: [main]
    paths:
      - "research/remote/cross_asset_survival_v2.py.gz.b64.part*"
      - "research/remote/cross_asset_wfv_v3.py.b64.part*"
      - "research/cross_asset_survival_20260724/v3_active_month_patch.py"
      - "research/cross_asset_survival_20260724/preregistration_v3_active_month.json"
      - "research/cross_asset_survival_20260724/test_experiment_v3_active_month.py"
      - ".github/workflows/cross-asset-survival-v3-active-month.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cross-asset-survival-v3-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  confirm:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf_cache_survival_v3
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "300"
      ROOT: ${{ github.workspace }}/research_runs/cross_asset_survival_v3_active_month_20260724
      BASE_SCRIPT: ${{ github.workspace }}/research_runs/cross_asset_survival_v3_active_month_20260724/locked_base_wfv.py
      EXPERIMENT: ${{ github.workspace }}/research/remote/cross_asset_survival_v2.py
      CHECKPOINT: ${{ github.workspace }}/research_runs/cross_asset_survival_v3_active_month_20260724/development_frozen.json
      PREREG: ${{ github.workspace }}/research/cross_asset_survival_20260724/preregistration_v3_active_month.json
      PATCHER: ${{ github.workspace }}/research/cross_asset_survival_20260724/v3_active_month_patch.py
      TEST_SCRIPT: ${{ github.workspace }}/research/cross_asset_survival_20260724/test_experiment_v3_active_month.py
      EXPECTED_BASE_SHA256: 66b08521a6136ce26fe1c586dcd915877e874228692b03e312fa834afe9554af
      EXPECTED_EXPERIMENT_GZ_SHA256: bdf367b2c4244090c11a1df3ed096470d1569cd3dd74d2f83903980b9affa229
      EXPECTED_EXPERIMENT_SHA256: 8fd640512981ac81f9842a4e63390400b2629b8360dd9e921636ff338c44ad03
      EXPECTED_CHECKPOINT_GZ_SHA256: 7bbdc52089c56ab570b5cff54ea0ee3035c6dfb006d4946e5d1e30c8004f1313
      EXPECTED_CHECKPOINT_SHA256: 884015977d01118526227447467960c098a7dae93dd16cfda65b388e7ecccc93
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/cross-asset-survival-v3-active-month-20260724
          fetch-depth: 1

      - name: Reconstruct V2 inputs and apply the single preregistered V3 amendment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ROOT"
          cat research/remote/cross_asset_wfv_v3.py.b64.part{00..06} > /tmp/base_wfv.py.b64
          base64 --decode /tmp/base_wfv.py.b64 > "$BASE_SCRIPT"
          python research/remote/repair_cross_asset_wfv_v3_transfer.py "$BASE_SCRIPT" 2>&1 | tee "$ROOT/base_repair.log"
          printf '%s  %s\n' "$EXPECTED_BASE_SHA256" "$BASE_SCRIPT" | sha256sum --check --strict

          cat research/remote/cross_asset_survival_v2.py.gz.b64.part{00..01} > /tmp/cross_asset_survival.py.gz.b64
          base64 --decode /tmp/cross_asset_survival.py.gz.b64 > /tmp/cross_asset_survival.py.gz
          printf '%s  %s\n' "$EXPECTED_EXPERIMENT_GZ_SHA256" /tmp/cross_asset_survival.py.gz | sha256sum --check --strict
          gzip --decompress --stdout /tmp/cross_asset_survival.py.gz > "$EXPERIMENT"
          printf '%s  %s\n' "$EXPECTED_EXPERIMENT_SHA256" "$EXPERIMENT" | sha256sum --check --strict

          base64 --decode research/cross_asset_survival_20260724/development_frozen.json.gz.b64 > /tmp/development_frozen.json.gz
          printf '%s  %s\n' "$EXPECTED_CHECKPOINT_GZ_SHA256" /tmp/development_frozen.json.gz | sha256sum --check --strict
          gzip --decompress --stdout /tmp/development_frozen.json.gz > "$CHECKPOINT"
          printf '%s  %s\n' "$EXPECTED_CHECKPOINT_SHA256" "$CHECKPOINT" | sha256sum --check --strict

          sha256sum "$PREREG" "$PATCHER" "$TEST_SCRIPT" | tee "$ROOT/v3_input_sha256.txt"
          cp "$EXPERIMENT" "$ROOT/v2_locked_experiment.py"
          python "$PATCHER" "$EXPERIMENT" "$ROOT/v3_patch_manifest.json"
          python -m py_compile "$BASE_SCRIPT" "$EXPERIMENT" "$PATCHER" "$TEST_SCRIPT"
          cp "$EXPERIMENT" "$ROOT/v3_locked_experiment.py"
          cp "$PREREG" "$ROOT/preregistration_v3_active_month.json"

      - name: Install fixed research environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "scikit-learn==1.6.1" \
            "huggingface_hub==0.27.1" \
            "hf_xet==1.1.10" \
            "pytest==8.3.4"

      - name: Run inherited causality tests and V3 active-month gate tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q "$TEST_SCRIPT" 2>&1 | tee "$ROOT/unit_tests.log"

      - name: Recompute the fixed 2024 gate and open 2025 exactly once if it passes
        id: research
        shell: bash
        run: |
          set +e
          set -o pipefail
          python "$EXPERIMENT" \
            --base-script "$BASE_SCRIPT" \
            --development-checkpoint "$CHECKPOINT" \
            --preregistration "$PREREG" \
            --work-dir "$ROOT" \
            --cache-dir "$HF_HOME" \
            2>&1 | tee "$ROOT/research.log"
          rc=${PIPESTATUS[0]}
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build immutable result status and PR report
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root=Path('research_runs/cross_asset_survival_v3_active_month_20260724')
          payload={
              'experiment_rc':int(os.environ.get('EXIT_CODE') or -999),
              'orders_submitted':False,'paper_or_live_started':False,'2026_opened':False,
              'research_id':'BTC_ETH_CROSS_ASSET_STOP_SURVIVAL_CONFIRMATION_V3_ACTIVE_MONTH_20260724',
          }
          lines=['## Cross-asset stop-survival V3 active-month one-shot','']
          dev=root/'survival_model_frozen.json'
          if dev.exists():
              d=json.loads(dev.read_text())
              payload['2024_gate']=bool(d.get('gate_passed',False))
              payload['2024_base']=d.get('results',{}).get('base')
              lines += [f"- 2024 gate: `{payload['2024_gate']}`", f"- 2024 base: `{json.dumps(payload['2024_base'],sort_keys=True)}`"]
          conf=root/'confirmation_frozen.json'
          if conf.exists():
              c=json.loads(conf.read_text())
              payload['2025_opened']=True
              payload['confirmation_gate']=bool(c.get('confirmation_gate',False))
              payload['target_gate_1pct_daily']=bool(c.get('target_gate_1pct_daily',False))
              payload['2025_results']=c.get('results')
              lines += [f"- 2025 confirmation gate: `{payload['confirmation_gate']}`", f"- target 1% geometric daily: `{payload['target_gate_1pct_daily']}`", '', '```json', json.dumps(payload['2025_results'],indent=2), '```']
          else:
              payload['2025_opened']=False
              payload['target_gate_1pct_daily']=False
              not_opened=root/'confirmation_not_opened.json'
              if not_opened.exists():
                  payload['confirmation_not_opened']=json.loads(not_opened.read_text())
                  lines += [f"- 2025 opened: `false`", f"- reason: `{payload['confirmation_not_opened']}`"]
          (root/'wrapper_status_v3.json').write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n')
          lines += ['', '_Research-only. 2026 remains sealed; no paper/live/order authority._']
          (root/'pr-comment.md').write_text('\n'.join(lines))
          print(json.dumps(payload,sort_keys=True))
          PY

      - name: Publish result to draft PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file "$ROOT/pr-comment.md" --edit-last --create-if-none

      - name: Record all output hashes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "$ROOT" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$ROOT/OUTPUT_SHA256SUMS.txt"

      - name: Upload complete one-shot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-asset-survival-v3-${{ github.run_id }}
          path: research_runs/cross_asset_survival_v3_active_month_20260724
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Preserve experiment failure status
        if: always() && steps.research.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        run: |
          echo "V3 experiment failed with exit code ${EXIT_CODE}"
          exit 1
