name: v0.25A2 frozen official event-time evaluation v2

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025a2-evaluate-v2-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  PLAN_FILE_SHA256: db40e4bddeab538a2f3acb2c58ceeffacc5d8c3d4e08c3e26137ba16665cd1cb
  PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  SOURCE_MANIFEST_SHA256: 4857b909b1928bfe11c32daa6eea35f37a30f7a83168891c2432fda41bee9eb0
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  EVENT_ROOT: ${{ github.workspace }}/.research-data/v025a2-event
  WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-v2
  OUTPUT: ${{ github.workspace }}/.research-results/v025a2-v2
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  evaluate:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact locked A2 runner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p a2 transport-evidence
          echo "${ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c -
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C a2
          (cd a2 && sha256sum -c SOURCE_SHA256SUMS.txt) | tee transport-evidence/source-sha256.txt
          echo "${PLAN_FILE_SHA256}  a2/research/v025/research_plan_locked.json" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  a2/artifacts/v0243/data_acquisition_plan.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: a2/requirements-lock.txt

      - name: Verify preregistration and regression gates
        shell: bash
        working-directory: a2
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence "${WORKSPACE}" "${OUTPUT}" "${EVENT_ROOT}"
          python - <<'PY' | tee ci-evidence/preregistration.json
          import hashlib, json, os
          from pathlib import Path
          def canonical(x):
              return hashlib.sha256(json.dumps(x, sort_keys=True, separators=(',', ':'), ensure_ascii=False, allow_nan=False).encode()).hexdigest()
          plan=json.loads(Path('research/v025/research_plan_locked.json').read_text())
          payload=dict(plan); declared=payload.pop('plan_payload_sha256')
          assert plan['study_id']=='smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert plan['candidate_count']==64
          assert canonical(payload)==declared==os.environ['PLAN_PAYLOAD_SHA256']
          assert plan['source_tree_manifest_sha256']==os.environ['SOURCE_MANIFEST_SHA256']
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert plan['periods']['terminal_holdout_locked'] is True
          assert plan['production_enabled'] is False
          print(json.dumps({'study_id':plan['study_id'],'candidate_count':64,'candidate_pnl_observed_before_plan':False,'terminal_holdout_opened':False,'production_enabled':False},sort_keys=True,indent=2))
          PY
          PYTHONPATH=research/v025 python -m pytest -q research/v025 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025 scripts smc_ict_quant

      - name: Restore checksum-verified minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v2
          restore-keys: |
            v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Restore performance-independent filtered event cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-event
          key: v025a2-binance-usdm-event-${{ env.PLAN_PAYLOAD_SHA256 }}-v2
          restore-keys: |
            v025a2-binance-usdm-event-${{ env.PLAN_PAYLOAD_SHA256 }}-

      - name: Verify scout boundary and build identical causal context
        shell: bash
        working-directory: a2
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/scout-gate.json
          import json
          from pathlib import Path
          root=Path('../research/results/v025a2-context-scout')
          status=json.loads((root/'status.json').read_text())
          size=json.loads((root/'event_size_summary.json').read_text())
          assert status['candidate_pnl_observed'] is False
          assert status['terminal_holdout_opened'] is False
          assert status['production_enabled'] is False
          assert size['candidate_pnl_observed'] is False
          assert size['terminal_holdout_opened'] is False
          assert int(size['total_compressed_bytes']) <= 80_000_000_000
          print(json.dumps({'event_request_count':size['request_count'],'event_compressed_bytes':size['total_compressed_bytes'],'candidate_pnl_observed':False,'terminal_holdout_opened':False},sort_keys=True,indent=2))
          PY
          python scripts/download_binance_um_parallel.py --request-plan artifacts/v0243/data_acquisition_plan.json --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context --data-root "${DATA_ROOT}" --data-plan artifacts/v0243/data_acquisition_plan.json --workspace "${WORKSPACE}" 2>&1 | tee ci-evidence/context-build.log
          python - <<'PY' | tee ci-evidence/context-identity.json
          import hashlib, json, os
          from pathlib import Path
          branch=Path('../research/results/v025a2-context-scout')
          current=Path(os.environ['WORKSPACE'])
          a=json.loads((branch/'context_summary.json').read_text())
          b=json.loads((current/'context_summary.json').read_text())
          assert a==b
          size=json.loads((branch/'event_size_summary.json').read_text())
          plan=json.loads((current/'event_day_plan.json').read_text())
          assert size['event_plan_payload_sha256']==plan['payload_sha256']
          assert plan['generated_from_candidate_pnl'] is False
          assert plan['terminal_holdout_downloaded'] is False
          print(json.dumps({'context_summary_sha256':hashlib.sha256((current/'context_summary.json').read_bytes()).hexdigest(),'event_plan_payload_sha256':plan['payload_sha256']},sort_keys=True,indent=2))
          PY

      - name: Materialize official filtered event cache
        shell: bash
        working-directory: a2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py events --event-plan "${WORKSPACE}/event_day_plan.json" --output "${EVENT_ROOT}" --workers 4 2>&1 | tee ci-evidence/event-cache.log
          du -sh "${EVENT_ROOT}" | tee ci-evidence/event-filtered-size.txt

      - name: Generate frozen A2 signals and evaluate
        shell: bash
        working-directory: a2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py signals --workspace "${WORKSPACE}" --event-root "${EVENT_ROOT}" 2>&1 | tee ci-evidence/signals.log
          python - <<'PY' | tee ci-evidence/signal-audit.json
          import json, os
          from pathlib import Path
          import pandas as pd
          f=pd.read_csv(Path(os.environ['WORKSPACE'])/'signals.csv')
          if len(f):
              for c in ('signal_time','context_available_time','entry_time'): f[c]=pd.to_datetime(f[c],utc=True)
              assert (f['entry_time']>f[['signal_time','context_available_time']].max(axis=1)).all()
              assert (f['entry_time']<pd.Timestamp('2025-10-01T00:00:00Z')).all()
          print(json.dumps({'signals':int(len(f)),'candidate_count':int(f.candidate_id.nunique()) if len(f) else 0,'terminal_signal':False},sort_keys=True,indent=2))
          PY
          set +e
          /usr/bin/time -v env PYTHONPATH=research/v025 python research/v025/v025_pipeline.py evaluate --workspace "${WORKSPACE}" --output "${OUTPUT}" 2>&1 | tee ci-evidence/evaluation.log
          code=${PIPESTATUS[0]}
          set -e
          test "$code" -eq 0 -o "$code" -eq 1
          printf '%s\n' "$code" > ci-evidence/scientific-exit-code.txt

      - name: Persist compact A2 result
        shell: bash
        run: |
          set -euo pipefail
          root='research/results/v025a2-evaluation-v2'
          mkdir -p "$root"
          for n in study_results.json selected_candidate.json research_gate.json development_leaderboard.csv; do
            if [ -f "${OUTPUT}/${n}" ]; then cp "${OUTPUT}/${n}" "$root/${n}"; fi
          done
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path
          root=Path('research/results/v025a2-evaluation-v2')
          result=json.loads((root/'study_results.json').read_text())
          assert result['scientific_run_completed'] is True
          assert result['terminal_holdout_opened'] is False
          assert result['production_enabled'] is False
          status={'schema_version':1,'study_id':result['study_id'],'scientific_run_completed':True,'target_met':bool(result['target_met']),'terminal_holdout_opened':False,'production_enabled':False,'recorded_at_utc':datetime.now(timezone.utc).isoformat()}
          (root/'status.json').write_text(json.dumps(status,sort_keys=True,indent=2)+'\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin research/v025a2-eventtime-20260723
          git add "$root"
          if ! git diff --cached --quiet; then git commit -m 'Record v0.25A2 v2 frozen preholdout result'; git push origin HEAD:research/v025a2-eventtime-20260723; fi

      - name: Upload compact scientific evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025a2-evaluation-v2-${{ github.run_id }}
          path: |
            transport-evidence
            a2/ci-evidence
            .research-work/v025a2-v2/context_summary.json
            .research-work/v025a2-v2/event_day_plan.json
            .research-work/v025a2-v2/signals.csv
            .research-results/v025a2-v2
            a2/research/v025/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
