name: Acquire market breadth 5m context v2

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/acquire-market-breadth-5m-v2.yml'

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --disable-pip-version-check numpy pandas
      - name: Acquire official context bars
        shell: bash
        run: |
          cat > /tmp/acquire.py <<'PY'
          import hashlib, io, json, time, urllib.error, urllib.request, zipfile
          from pathlib import Path
          import numpy as np
          import pandas as pd

          BASE='https://data.binance.vision/data/futures/um/monthly/klines'
          SYMBOLS=('BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT')
          MONTHS=pd.period_range('2020-01','2026-06',freq='M')
          OUT=Path('market-breadth-5m-v2');OUT.mkdir(exist_ok=True)

          def fetch(url):
              last=None
              for attempt in range(5):
                  try:
                      req=urllib.request.Request(url,headers={'User-Agent':'smc-market-breadth-research/2.0'})
                      with urllib.request.urlopen(req,timeout=120) as response:return response.read()
                  except urllib.error.HTTPError as exc:
                      if exc.code==404:return None
                      last=exc
                  except Exception as exc:last=exc
                  time.sleep(min(20,2**attempt))
              raise RuntimeError(f'download failed {url}') from last

          def frame_from(raw,name):
              with zipfile.ZipFile(io.BytesIO(raw)) as archive:
                  csvs=[x for x in archive.namelist() if x.lower().endswith('.csv')]
                  if len(csvs)!=1:raise RuntimeError(f'{name}: {csvs}')
                  frame=pd.read_csv(io.BytesIO(archive.read(csvs[0])),header=None,low_memory=False)
              first=str(frame.iat[0,0]).strip().lower()
              if first in {'open_time','open time'} or not first.lstrip('+-').isdigit():frame=frame.iloc[1:].reset_index(drop=True)
              frame=frame.iloc[:,:6].copy();frame.columns=['open_time','open','high','low','close','volume']
              for column in frame.columns:frame[column]=pd.to_numeric(frame[column],errors='raise')
              timestamp=frame.open_time.to_numpy(np.int64)
              if np.median(timestamp)>10**14:timestamp//=1000
              frame['open_time']=timestamp
              return frame

          manifest=[]
          for symbol in SYMBOLS:
              chunks=[];verified=[];missing=[]
              for month in MONTHS:
                  stamp=str(month);name=f'{symbol}-5m-{stamp}.zip';url=f'{BASE}/{symbol}/5m/{name}'
                  raw=fetch(url)
                  if raw is None:missing.append(stamp);continue
                  checksum=fetch(url+'.CHECKSUM')
                  if checksum is None:raise RuntimeError(f'missing checksum {url}')
                  expected=checksum.decode().strip().split()[0].lower();actual=hashlib.sha256(raw).hexdigest()
                  if actual!=expected:raise RuntimeError(f'checksum mismatch {name}')
                  chunks.append(frame_from(raw,name));verified.append(stamp);print(symbol,stamp,'verified',flush=True)
              if not chunks:raise RuntimeError(f'no archives {symbol}')
              frame=pd.concat(chunks,ignore_index=True).sort_values('open_time').drop_duplicates('open_time',keep='last').reset_index(drop=True)
              ts=frame.open_time.to_numpy(np.int64);diff=np.diff(ts);gap_idx=np.flatnonzero(diff!=300_000)
              o=frame.open.to_numpy(float);h=frame.high.to_numpy(float);l=frame.low.to_numpy(float);c=frame.close.to_numpy(float)
              if np.any(h<np.maximum.reduce([o,l,c])) or np.any(l>np.minimum.reduce([o,h,c])):raise RuntimeError(f'invalid OHLC {symbol}')
              target=OUT/f'{symbol}_5m.npz'
              np.savez_compressed(target,ts_ns=ts*1_000_000,open=o.astype(np.float32),high=h.astype(np.float32),low=l.astype(np.float32),close=c.astype(np.float32),volume=frame.volume.to_numpy(np.float32))
              manifest.append({'symbol':symbol,'verified_months':verified,'missing_months':missing,'rows':len(frame),'start_utc':pd.to_datetime(ts[0],unit='ms',utc=True).isoformat(),'end_utc':pd.to_datetime(ts[-1],unit='ms',utc=True).isoformat(),'gap_count':int(len(gap_idx)),'maximum_gap_minutes':None if not len(gap_idx) else float(diff[gap_idx].max()/60_000),'first_gap_utc':None if not len(gap_idx) else pd.to_datetime(ts[int(gap_idx[0])],unit='ms',utc=True).isoformat(),'npz_sha256':hashlib.sha256(target.read_bytes()).hexdigest()})
          (OUT/'manifest.json').write_text(json.dumps(manifest,indent=2));print(json.dumps(manifest,indent=2),flush=True)
          PY
          python /tmp/acquire.py
      - uses: actions/upload-artifact@v4
        with:
          name: official-binance-market-breadth-5m-v2-2020-2026
          path: market-breadth-5m-v2/
          if-no-files-found: error
          retention-days: 30
