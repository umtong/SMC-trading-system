name: V0.9 Scene Inventory Sample

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v09-scene-sample-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download checksum-verified BTC and ETH 5m warm-up sample
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.download_binance_um_5m_range \
            --symbols BTCUSDT ETHUSDT \
            --start 2020-12-04 \
            --end 2021-02-01 \
            --output-dir data/v09_sample \
            2>&1 | tee v09-sample-data.log

      - name: Upload continuous 5m sample
        uses: actions/upload-artifact@v4
        with:
          name: v09-scene-sample-data-${{ github.run_id }}
          path: |
            data/v09_sample/BTCUSDT_5m.csv
            data/v09_sample/ETHUSDT_5m.csv
            data/v09_sample/v09_5m_data_manifest.json
            v09-sample-data.log
          if-no-files-found: error
          retention-days: 14

  prepare:
    needs: data
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        symbol:
          - BTCUSDT
          - ETHUSDT
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download continuous 5m sample
        uses: actions/download-artifact@v4
        with:
          name: v09-scene-sample-data-${{ github.run_id }}
          path: sample-bundle

      - name: Normalize data paths
        shell: bash
        run: |
          mkdir -p data/v09_sample
          find sample-bundle -type f -name 'BTCUSDT_5m.csv' -exec cp '{}' data/v09_sample/BTCUSDT_5m.csv \;
          find sample-bundle -type f -name 'ETHUSDT_5m.csv' -exec cp '{}' data/v09_sample/ETHUSDT_5m.csv \;
          test -s data/v09_sample/${{ matrix.symbol }}_5m.csv

      - name: Build one outcome-blind January 2021 scene checkpoint
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.prepare_easychart_v09_scene_month \
            --symbol '${{ matrix.symbol }}' \
            --month 2021-01 \
            --data-dir data/v09_sample \
            --output-dir prepared \
            2>&1 | tee 'v09-scene-${{ matrix.symbol }}.log'

      - name: Upload scene checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v09-scene-sample-${{ matrix.symbol }}-${{ github.run_id }}
          path: |
            prepared/${{ matrix.symbol }}_2021-01.json
            v09-scene-${{ matrix.symbol }}.log
          if-no-files-found: error
          retention-days: 14

  summarize:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download both scene checkpoints
        uses: actions/download-artifact@v4
        with:
          pattern: v09-scene-sample-*-${{ github.run_id }}
          path: sample-checkpoints
          merge-multiple: true

      - name: Summarize outcome-blind sample
        shell: bash
        run: |
          python - <<'PY' 2>&1 | tee v09-scene-sample-summary.log
          import json
          from collections import Counter
          from pathlib import Path

          records = []
          diagnostics = []
          for path in sorted(Path('sample-checkpoints').rglob('*_2021-01.json')):
              payload = json.loads(path.read_text(encoding='utf-8'))
              records.extend(payload['records'])
              diagnostics.append({
                  'symbol': payload['symbol'],
                  **payload['diagnostics'],
              })
          if len(diagnostics) != 2:
              raise SystemExit(f'expected two symbol checkpoints, found {len(diagnostics)}')
          summary = {
              'contract': 'v09_outcome_blind_january_2021_sample',
              'scene_records': len(records),
              'by_symbol': dict(Counter(row['symbol'] for row in records)),
              'by_family': dict(Counter(row['source_scene_family'] for row in records)),
              'by_side': dict(Counter(row['side'] for row in records)),
              'required_archive_days': sum(
                  len(set(day for row in records if row['symbol'] == symbol for day in row['required_utc_dates']))
                  for symbol in ('BTCUSDT', 'ETHUSDT')
              ),
              'diagnostics': diagnostics,
          }
          Path('v09-scene-sample-summary.json').write_text(
              json.dumps(summary, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

      - name: Upload sample summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v09-scene-sample-summary-${{ github.run_id }}
          path: |
            v09-scene-sample-summary.json
            v09-scene-sample-summary.log
            sample-checkpoints
          if-no-files-found: warn
          retention-days: 14
