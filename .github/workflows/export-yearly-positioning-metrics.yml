name: Export yearly Binance positioning metrics

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-yearly-positioning-metrics.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        year: [2020, 2021, 2022, 2023, 2024, 2025, 2026]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download checksum-verified daily metrics
        env:
          SYMBOL: ${{ matrix.symbol }}
          YEAR: ${{ matrix.year }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import concurrent.futures
          import csv
          import gzip
          import hashlib
          import io
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          import zipfile
          from datetime import date,timedelta
          from pathlib import Path

          symbol=os.environ['SYMBOL']; year=int(os.environ['YEAR'])
          end=date(year,12,31)
          if year==2026:end=date(2026,6,30)
          start=date(year,1,1); count=(end-start).days+1
          root=Path('metrics-output');root.mkdir(exist_ok=True)
          base='https://data.binance.vision/data/futures/um/daily/metrics'
          ua={'User-Agent':'easychart-causal-research/1.0'}
          def get(url,missing=False):
              err=None
              for attempt in range(8):
                  try:
                      with urllib.request.urlopen(urllib.request.Request(url,headers=ua),timeout=90) as r:return r.read()
                  except urllib.error.HTTPError as exc:
                      if missing and exc.code==404:return None
                      err=exc
                  except Exception as exc:err=exc
                  time.sleep(min(45,2**attempt))
              raise RuntimeError(f'download failed {url}: {err}')
          def work(day):
              stamp=day.isoformat();name=f'{symbol}-metrics-{stamp}.zip';url=f'{base}/{symbol}/{name}'
              payload=get(url,True)
              if payload is None:return day,None,url
              checksum=get(url+'.CHECKSUM')
              expected=checksum.decode().split()[0].lower();actual=hashlib.sha256(payload).hexdigest()
              if actual!=expected:raise RuntimeError(f'checksum mismatch {url}: {expected}!={actual}')
              return day,(payload,actual),url
          days=[start+timedelta(days=i) for i in range(count)]
          found={}
          with concurrent.futures.ThreadPoolExecutor(max_workers=4) as ex:
              for day,result,url in ex.map(work,days):found[day]=(result,url)
          output=root/f'{symbol}_metrics_{year}.csv.gz';manifest=[];missing=[];rows=0;header=None;previous=None
          with gzip.open(output,'wt',encoding='utf-8',newline='') as dst:
              writer=csv.writer(dst)
              for day in days:
                  result,url=found[day]
                  if result is None:missing.append(day.isoformat());continue
                  payload,digest=result
                  with zipfile.ZipFile(io.BytesIO(payload)) as z:
                      member=[x for x in z.namelist() if not x.endswith('/')][0]
                      reader=csv.reader(io.TextIOWrapper(z.open(member),encoding='utf-8',newline=''))
                      current=next(reader)
                      if header is None:header=current;writer.writerow(header)
                      elif current!=header:raise RuntimeError(f'schema drift {symbol} {day}: {current}')
                      for row in reader:
                          if previous is not None and row[0]<=previous:raise RuntimeError(f'non-increasing timestamp {previous}->{row[0]}')
                          previous=row[0];writer.writerow(row);rows+=1
                  manifest.append({'symbol':symbol,'date':day.isoformat(),'url':url,'sha256':digest})
          meta={'source':'Binance Public Data USD-M daily metrics','symbol':symbol,'year':year,'rows':rows,'missing_dates':missing,'columns':header,'normalized_sha256':hashlib.sha256(output.read_bytes()).hexdigest(),'archives':manifest}
          (root/f'{symbol}_metrics_{year}.manifest.json').write_text(json.dumps(meta,indent=2),encoding='utf-8')
          print(json.dumps({k:v for k,v in meta.items() if k!='archives'},indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.symbol }}-${{ matrix.year }}
          path: |
            metrics-output/${{ matrix.symbol }}_metrics_${{ matrix.year }}.csv.gz
            metrics-output/${{ matrix.symbol }}_metrics_${{ matrix.year }}.manifest.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
