name: Wave95 L2 Provenance Probe

on:
  pull_request:
    branches: [main]
    paths:
      - 'research/wave95_l2_provenance_probe.py'
      - '.github/workflows/wave95-l2-provenance-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wave95-l2-provenance-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: macos-14
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: '1'
      HF_HOME: ${{ github.workspace }}/.wave95-hf
      HF_HUB_DISABLE_TELEMETRY: '1'
      HF_HUB_ETAG_TIMEOUT: '120'
      HF_HUB_DOWNLOAD_TIMEOUT: '600'
      CACHE: ${{ github.workspace }}/.wave95-cache
      OUTPUT: ${{ github.workspace }}/wave95-l2-provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave95-l2-provenance-probe-20260724
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/cache@v4
        with:
          path: |
            .wave95-hf
            .wave95-cache
          key: wave95-l2-provenance-public-inputs-v1

      - name: Install fixed provenance environment
        run: |
          python -m pip install --upgrade 'pip==25.1.1'
          python -m pip install \
            'numpy==2.1.3' \
            'pandas==2.2.3' \
            'pyarrow==18.1.0' \
            'huggingface_hub==0.27.1' \
            'hf_xet==1.1.10'
          python -m py_compile research/wave95_l2_provenance_probe.py

      - name: Compare pinned depth20 state to official Binance BBO
        run: |
          mkdir -p "$OUTPUT"
          python research/wave95_l2_provenance_probe.py \
            --cache "$CACHE" \
            --output "$OUTPUT" \
            2>&1 | tee "$OUTPUT/research.log"

      - name: Preserve provenance evidence only
        if: always()
        run: |
          mkdir -p "$OUTPUT"
          cp research/wave95_l2_provenance_probe.py "$OUTPUT/"
          python - <<'PY'
          import hashlib
          from pathlib import Path
          root=Path('wave95-l2-provenance')
          lines=[]
          for path in sorted(p for p in root.rglob('*') if p.is_file() and p.name not in {'OUTPUT_SHA256SUMS.txt','SHA256SUMS.txt'}):
              h=hashlib.sha256()
              with path.open('rb') as fh:
                  for block in iter(lambda:fh.read(1<<20),b''):h.update(block)
              lines.append(f'{h.hexdigest()}  {path.relative_to(root)}')
          (root/'OUTPUT_SHA256SUMS.txt').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wave95-l2-provenance-${{ github.run_id }}
          path: wave95-l2-provenance
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
