name: Materialize EasyChart V2 Seed

on:
  push:
    branches:
      - agent/easychart-v2-end-to-end
    paths:
      - ".github/v1-bundle/**"
      - ".github/workflows/materialize-v2-seed.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-easychart-v2-seed
  cancel-in-progress: false

jobs:
  materialize:
    if: github.ref_name == 'agent/easychart-v2-end-to-end'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout seed branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/easychart-v2-end-to-end

      - name: Decode and validate source archive
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t parts < <(find .github/v1-bundle -maxdepth 1 -type f -name 'part-*' | sort)
          test "${#parts[@]}" -eq 4
          cat "${parts[@]}" > /tmp/easychart-v1.tar.gz.b64
          base64 --decode /tmp/easychart-v1.tar.gz.b64 > /tmp/easychart-v1.tar.gz
          gzip -t /tmp/easychart-v1.tar.gz
          sha256sum /tmp/easychart-v1.tar.gz | tee /tmp/easychart-v1.sha256
          tar -tzf /tmp/easychart-v1.tar.gz > /tmp/easychart-v1-files.txt
          python - <<'PY'
          from pathlib import PurePosixPath
          names = [line.strip() for line in open('/tmp/easychart-v1-files.txt', encoding='utf-8') if line.strip()]
          if not names:
              raise SystemExit('archive is empty')
          for name in names:
              path = PurePosixPath(name)
              if path.is_absolute() or '..' in path.parts:
                  raise SystemExit(f'unsafe archive path: {name}')
          required = {
              'src/ictbt/easychart_v1/strategy.py',
              'src/ictbt/easychart_v1/backtest.py',
              'src/ictbt/easychart_v1/validation.py',
              'tests/easychart_v1/test_backtest.py',
          }
          missing = sorted(required.difference(names))
          if missing:
              raise SystemExit(f'missing required files: {missing}')
          PY
          tar -xzf /tmp/easychart-v1.tar.gz

      - name: Test materialized source
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e ".[dev]"
          python -m pytest tests/easychart_v0 tests/easychart_v1 -q
          python -m ictbt.easychart_v1 required-edge --trades 141 280
          easychart-v1 --help >/dev/null

      - name: Commit materialized source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf .github/v1-bundle
          rm -f .github/workflows/materialize-v1.yml .github/workflows/materialize-v2-seed.yml
          git add -A
          git diff --cached --check
          git commit -m "Materialize EasyChart V2 end-to-end seed"
          git push origin HEAD:agent/easychart-v2-end-to-end
