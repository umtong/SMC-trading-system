name: Official state-first V7 source audit

on:
  pull_request:
    branches: [main]
    paths:
      - "research/official_state_first_model_20260724/official_state_first_v7_bundle.tar.gz.b64.part*"
      - ".github/workflows/official-state-first-v7-source-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: official-state-first-v7-source-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PART00_SHA256: e6908c4207324d8887063477e77c34c316a2fd72611e5950f9c24c4d2a3e3d43
  PART01_SHA256: 23dfde5b993cbeede11ad7d77d0fec52b756719c6090f5bd1d1869633ca259e3
  PART02_SHA256: a03cab1465db71bc1f682ee09d33d2194824e8a52c50b536dbad25b32eecffe2
  PART03_SHA256: 659e9068595ce9407b64d0ac81605668baa24a10203947c0d7d0d5b4c3ba5b5f
  COMBINED_B64_SHA256: 4578a193cd149079025e67902f1fc5f652a62d325ceda4f94ff2c1dffcf7f085
  BUNDLE_GZ_SHA256: e602d0c76cb665b79c2037afb5e0b402a86eee0ca99fd6381127a26dc3cbb87b
  SCRIPT_SHA256: 6baac7066c599b01880ec1fef006dccb5635c75c1e0bea54a660056c61c9a866
  TEST_SHA256: 19d0966ad14ac1e249ae95575209532f4ee5485f1e3e09abedb4d55c9da3ec0e
  PREREG_SHA256: 8ca8e84aeed2073d10757a403ec82997b8ef5c8968e59dab7d0ba59d336895a2
  MANIFEST_SHA256: 853fe473aa3d09426eb351ac5d027f61ef98aa710bb12a6a634147b635b4c88e

jobs:
  audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/official-state-first-model-20260724
          fetch-depth: 1

      - name: Reconstruct and freeze immutable V7 research source
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/official_state_first_v7_source_audit"
          mkdir -p "$root"
          pfx=research/official_state_first_model_20260724/official_state_first_v7_bundle.tar.gz.b64.part
          printf '%s  %s\n' "$PART00_SHA256" "${pfx}00" | sha256sum --check --strict
          printf '%s  %s\n' "$PART01_SHA256" "${pfx}01" | sha256sum --check --strict
          printf '%s  %s\n' "$PART02_SHA256" "${pfx}02" | sha256sum --check --strict
          printf '%s  %s\n' "$PART03_SHA256" "${pfx}03" | sha256sum --check --strict
          cat "${pfx}00" "${pfx}01" "${pfx}02" "${pfx}03" > /tmp/official_state_first_v7.tar.gz.b64
          printf '%s  %s\n' "$COMBINED_B64_SHA256" /tmp/official_state_first_v7.tar.gz.b64 | sha256sum --check --strict
          base64 --decode /tmp/official_state_first_v7.tar.gz.b64 > /tmp/official_state_first_v7.tar.gz
          printf '%s  %s\n' "$BUNDLE_GZ_SHA256" /tmp/official_state_first_v7.tar.gz | sha256sum --check --strict
          tar -xzf /tmp/official_state_first_v7.tar.gz -C "$root"
          src="$root/official_state_first_model_v7_bundle"
          printf '%s  %s\n' "$SCRIPT_SHA256" "$src/official_state_first.py" | sha256sum --check --strict
          printf '%s  %s\n' "$TEST_SHA256" "$src/test_official_state_first.py" | sha256sum --check --strict
          printf '%s  %s\n' "$PREREG_SHA256" "$src/state_first_hazard_direction_preregistration_v3.json" | sha256sum --check --strict
          printf '%s  %s\n' "$MANIFEST_SHA256" "$src/SOURCE_MANIFEST.json" | sha256sum --check --strict
          python -m py_compile "$src/official_state_first.py" "$src/test_official_state_first.py"
          sha256sum "${pfx}00" "${pfx}01" "${pfx}02" "${pfx}03" > "$root/input_part_sha256.txt"

      - name: Install fixed research environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "requests==2.32.4" \
            "scikit-learn==1.6.1" \
            "pytest==8.3.4"

      - name: Run causal, accounting, source-health and sparse-metrics tests
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/official_state_first_v7_source_audit"
          src="$root/official_state_first_model_v7_bundle"
          cd "$src"
          pytest -q test_official_state_first.py 2>&1 | tee "$root/unit_tests.log"

      - name: Enforce research-only V7 contract
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/official_state_first_v7_source_audit"
          src="$root/official_state_first_model_v7_bundle"
          python - "$src" "$root/source_contract.json" <<'PY'
          import ast,hashlib,json,sys
          from pathlib import Path
          src=Path(sys.argv[1])
          out=Path(sys.argv[2])
          script=(src/'official_state_first.py').read_text(encoding='utf-8')
          prereg_path=src/'state_first_hazard_direction_preregistration_v3.json'
          prereg=json.loads(prereg_path.read_text(encoding='utf-8'))
          tree=ast.parse(script)
          assert 'official_state_v7_monthly_masked_source_and_metric_health' in script
          assert 'metric_source_reconciled' in script
          assert 'add_indicator=False' in script
          assert prereg['model_contract']['missingness_policy']['add_indicator'] is False
          assert prereg['model_contract']['missingness_policy']['source_health_flags_in_features'] is False
          assert prereg['model_contract']['missingness_policy']['metric_source_reconciled_in_features'] is False
          assert prereg['amendment']['target_return_used_for_change'] is False
          assert prereg['amendment']['later_period_outcomes_observed_for_change'] is False
          payload={
              'ast_valid':isinstance(tree,ast.Module),
              'script_sha256':hashlib.sha256(script.encode()).hexdigest(),
              'preregistration_sha256':hashlib.sha256(prereg_path.read_bytes()).hexdigest(),
              'quality_flags_predictors':False,
              'missingness_indicators_enabled':False,
              'metric_source_forward_filled':False,
              'strategy_executed':False,'candidate_pnl_observed':False,
              '2024_opened':False,'2025_opened':False,'2026_opened':False,
              'orders_submitted':False,'paper_or_live_started':False,
              'deployment_bundle':False,
          }
          out.write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n',encoding='utf-8')
          print(json.dumps(payload,sort_keys=True))
          PY

      - name: Record immutable output checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/official_state_first_v7_source_audit"
          find "$root" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$root/OUTPUT_SHA256SUMS.txt"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: official-state-first-v7-source-audit-${{ github.sha }}
          path: research_runs/official_state_first_v7_source_audit
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
