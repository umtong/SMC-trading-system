name: Export official BTC ETH market data

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/market-data-trigger-*"
      - ".github/workflows/export-official-market-data.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    if: github.event_name != 'pull_request' || github.head_ref == 'agent/easychart-v1-robust-growth-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/easychart-v1-robust-growth-gate
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install data dependencies
        run: python -m pip install pandas pyarrow
      - name: Download and normalize official Binance Vision data
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/export_market_data.py <<'PY'
          from __future__ import annotations
          import hashlib
          import io
          import json
          from pathlib import Path
          import urllib.error
          import urllib.request
          import zipfile
          import pandas as pd

          OUT = Path('/tmp/official-market-data')
          OUT.mkdir(parents=True, exist_ok=True)
          BASE = 'https://data.binance.vision/data/futures/um/monthly'
          SYMBOLS = ('BTCUSDT', 'ETHUSDT')
          TYPES = ('klines', 'markPriceKlines')
          MONTHS = [f'{year:04d}-{month:02d}' for year in range(2022, 2027) for month in range(1, 13) if (year, month) <= (2026, 6)]
          COLS = ['open_time','open','high','low','close','volume','close_time','quote_volume','trades','taker_buy_base','taker_buy_quote','ignore']
          manifest: dict[str, object] = {'source': 'Binance Vision USD-M monthly', 'symbols': list(SYMBOLS), 'timeframe': '5m', 'months': MONTHS, 'files': [], 'outputs': {}}

          def fetch(url: str) -> bytes:
              req = urllib.request.Request(url, headers={'User-Agent': 'SMC-research/1.0'})
              with urllib.request.urlopen(req, timeout=120) as response:
                  return response.read()

          for data_type in TYPES:
              for symbol in SYMBOLS:
                  frames: list[pd.DataFrame] = []
                  for ym in MONTHS:
                      name = f'{symbol}-5m-{ym}.zip'
                      url = f'{BASE}/{data_type}/{symbol}/5m/{name}'
                      try:
                          payload = fetch(url)
                      except urllib.error.HTTPError as exc:
                          if exc.code == 404:
                              raise RuntimeError(f'missing required official file: {url}') from exc
                          raise
                      digest = hashlib.sha256(payload).hexdigest()
                      with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                          bad = archive.testzip()
                          if bad is not None:
                              raise RuntimeError(f'zip CRC failure {name}: {bad}')
                          csv_names = [n for n in archive.namelist() if n.lower().endswith('.csv')]
                          if len(csv_names) != 1:
                              raise RuntimeError(f'unexpected CSV members in {name}: {csv_names}')
                          raw = archive.read(csv_names[0])
                      frame = pd.read_csv(io.BytesIO(raw), header=None, names=COLS)
                      numeric_open = pd.to_numeric(frame['open_time'], errors='coerce')
                      frame = frame.loc[numeric_open.notna()].copy()
                      frame['open_time'] = numeric_open.loc[numeric_open.notna()].astype('int64')
                      for col in ('open','high','low','close','volume','quote_volume','taker_buy_base','taker_buy_quote'):
                          frame[col] = pd.to_numeric(frame[col], errors='raise').astype('float64')
                      for col in ('close_time','trades'):
                          frame[col] = pd.to_numeric(frame[col], errors='raise').astype('int64')
                      frame['timestamp'] = pd.to_datetime(frame['open_time'], unit='ms', utc=True)
                      frame['symbol'] = symbol
                      frame['source_month'] = ym
                      frames.append(frame[['timestamp','symbol','open','high','low','close','volume','quote_volume','trades','taker_buy_base','taker_buy_quote','open_time','close_time','source_month']])
                      manifest['files'].append({'type': data_type, 'symbol': symbol, 'month': ym, 'url': url, 'sha256': digest, 'bytes': len(payload), 'rows': int(len(frame))})
                      print(data_type, symbol, ym, len(frame), digest[:12], flush=True)
                  merged = pd.concat(frames, ignore_index=True).sort_values('timestamp').drop_duplicates('timestamp', keep='last').reset_index(drop=True)
                  expected = pd.date_range(merged['timestamp'].iloc[0], merged['timestamp'].iloc[-1], freq='5min', tz='UTC')
                  missing = expected.difference(pd.DatetimeIndex(merged['timestamp']))
                  if len(missing):
                      raise RuntimeError(f'{data_type} {symbol} has {len(missing)} missing 5m bars; first={missing[0]}')
                  if not merged['timestamp'].is_monotonic_increasing or merged['timestamp'].duplicated().any():
                      raise RuntimeError(f'{data_type} {symbol} timestamp integrity failure')
                  out = OUT / f'{symbol}_{data_type}_5m_2022-01_2026-06.parquet'
                  merged.to_parquet(out, index=False, compression='zstd')
                  manifest['outputs'][out.name] = {'sha256': hashlib.sha256(out.read_bytes()).hexdigest(), 'bytes': out.stat().st_size, 'rows': int(len(merged)), 'start': merged['timestamp'].iloc[0].isoformat(), 'end': merged['timestamp'].iloc[-1].isoformat()}

          manifest_path = OUT / 'manifest.json'
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding='utf-8')
          (OUT / 'MANIFEST_SHA256').write_text(hashlib.sha256(manifest_path.read_bytes()).hexdigest() + '  manifest.json\n', encoding='utf-8')
          print(json.dumps(manifest['outputs'], indent=2), flush=True)
          PY
          python /tmp/export_market_data.py
      - uses: actions/upload-artifact@v4
        with:
          name: official-btc-eth-5m-2022-2026-${{ github.run_id }}
          path: /tmp/official-market-data
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
