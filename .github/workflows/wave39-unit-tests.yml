name: Wave39 causal engine tests

on:
  pull_request:
    paths:
      - ".github/workflows/wave39-unit-tests.yml"
      - "research/wave39/wave39_engine.py"
      - "research/wave39/run_wave39_development.py"
      - "research/wave39/run_wave39_development_v2.py"
      - "research/wave39/test_wave39_engine.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install "numpy==2.1.3" "pandas==2.2.3" "numba==0.61.2" "pytest==8.3.5"
      - run: python -m pytest research/wave39/test_wave39_engine.py -q
      - run: python -m compileall -q research/wave39
