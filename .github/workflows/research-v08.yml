name: V0.8 Target Ownership Research

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v08-target-ownership-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run full strategy tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/easychart_v0 -q 2>&1 | tee v08-pytest.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v08-pytest-${{ github.run_id }}
          path: v08-pytest.log
          if-no-files-found: error
          retention-days: 14

  data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download and verify locked Binance windows with warm-up
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee v08-download.log
          import sys
          import pandas as pd
          from scripts import download_binance_um_5m_windows as downloader
          from scripts.v08_windows import ALL_WINDOWS, WARMUP_DAYS

          downloader.ALL_WINDOWS = tuple(
              (
                  symbol,
                  environment,
                  (pd.Timestamp(start) - pd.Timedelta(days=WARMUP_DAYS)).strftime("%Y-%m-%d"),
                  end,
                  tick_size,
              )
              for symbol, environment, start, end, tick_size in ALL_WINDOWS
          )
          sys.argv = [
              "download_binance_um_5m_windows",
              "--output-dir",
              "data/s4_continuous_2021_2026",
          ]
          raise SystemExit(downloader.main())
          PY

      - name: Upload checksum-verified data
        uses: actions/upload-artifact@v4
        with:
          name: v08-data-${{ github.run_id }}
          path: |
            data/s4_continuous_2021_2026/BTCUSDT_5m.csv
            data/s4_continuous_2021_2026/ETHUSDT_5m.csv
            data/s4_continuous_2021_2026/v08_data_manifest.json
            v08-download.log
          if-no-files-found: error
          retention-days: 14

  prepare:
    needs: data
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 14
      matrix:
        include:
          - split: development
            index: 0
          - split: development
            index: 1
          - split: development
            index: 2
          - split: development
            index: 3
          - split: development
            index: 4
          - split: development
            index: 5
          - split: holdout
            index: 0
          - split: holdout
            index: 1
          - split: holdout
            index: 2
          - split: holdout
            index: 3
          - split: holdout
            index: 4
          - split: holdout
            index: 5
          - split: holdout
            index: 6
          - split: holdout
            index: 7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download checksum-verified data
        uses: actions/download-artifact@v4
        with:
          name: v08-data-${{ github.run_id }}
          path: downloaded-data

      - name: Normalize downloaded data paths
        shell: bash
        run: |
          mkdir -p data/s4_continuous_2021_2026
          find downloaded-data -type f -name 'BTCUSDT_5m.csv' -exec cp '{}' data/s4_continuous_2021_2026/BTCUSDT_5m.csv \;
          find downloaded-data -type f -name 'ETHUSDT_5m.csv' -exec cp '{}' data/s4_continuous_2021_2026/ETHUSDT_5m.csv \;
          test -s data/s4_continuous_2021_2026/BTCUSDT_5m.csv
          test -s data/s4_continuous_2021_2026/ETHUSDT_5m.csv

      - name: Prepare one causal feature and authority window
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.prepare_easychart_v08_window \
            --split '${{ matrix.split }}' \
            --window-index '${{ matrix.index }}' \
            --data-dir data/s4_continuous_2021_2026 \
            --output-dir prepared \
            2>&1 | tee 'v08-prepare-${{ matrix.split }}-${{ matrix.index }}.log'

      - name: Upload prepared window checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v08-prepared-${{ matrix.split }}-${{ matrix.index }}-${{ github.run_id }}
          path: |
            prepared
            v08-prepare-${{ matrix.split }}-${{ matrix.index }}.log
          if-no-files-found: error
          retention-days: 14

  aggregate:
    needs:
      - tests
      - prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download all prepared windows
        uses: actions/download-artifact@v4
        with:
          pattern: v08-prepared-*-${{ github.run_id }}
          path: prepared-bundle
          merge-multiple: true

      - name: Normalize prepared checkpoint paths
        shell: bash
        run: |
          mkdir -p prepared
          find prepared-bundle -type f -name '*.pkl.gz' -exec cp '{}' prepared/ \;
          find prepared-bundle -type f -name '*.pkl.json' -exec cp '{}' prepared/ \;
          test "$(find prepared -maxdepth 1 -type f -name '*.pkl.gz' | wc -l)" -eq 14
          find prepared -maxdepth 1 -type f -print | sort

      - name: Aggregate chronological shared-equity and shared-slot results
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.aggregate_easychart_v08_prepared \
            --prepared-dir prepared \
            --output-dir results/easychart_v08_target_ownership \
            --initial-equity 10000 \
            --risk-fraction 0.03 \
            2>&1 | tee v08-research.log

      - name: Download data manifest for final provenance bundle
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: v08-data-${{ github.run_id }}
          path: data-provenance

      - name: Upload final V0.8 research artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v08-target-ownership-${{ github.run_id }}
          path: |
            v08-research.log
            data-provenance
            prepared/*.pkl.json
            results/easychart_v08_target_ownership
          if-no-files-found: warn
          retention-days: 14
