name: V12 Funding Premium Multi-Arm

on:
  push:
    branches:
      - "research/v12-funding-premium-20260724"
    paths:
      - "research/v12_funding_premium_multiarm.py.gz.b64"
      - "research/v12_restore.py"
      - ".github/workflows/v12-funding-premium.yml"
  pull_request:
    branches:
      - main
    paths:
      - "research/v12_funding_premium_multiarm.py.gz.b64"
      - "research/v12_restore.py"
      - ".github/workflows/v12-funding-premium.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install research dependencies
        run: python -m pip install --upgrade pip "numpy<3" "pandas<3" requests

      - name: Restore and syntax-check source
        run: |
          mkdir -p artifacts/v12-funding-premium
          python research/v12_restore.py research/v12_funding_premium_multiarm.py.gz.b64 /tmp/v12_funding_premium_multiarm.py | tee artifacts/v12-funding-premium/restore.log
          python /tmp/v12_funding_premium_multiarm.py --synthetic-test | tee artifacts/v12-funding-premium/synthetic-test.json

      - name: Restore official Binance archive cache
        uses: actions/cache@v4
        with:
          path: .cache/xsmc-v12
          key: xsmc-v12-binance-funding-premium-15m-2020-2026-v1

      - name: Run funding and premium multi-arm research
        shell: bash
        run: |
          set -o pipefail
          python /tmp/v12_funding_premium_multiarm.py \
            --start-month 2020-01 \
            --end-month 2026-06 \
            --validation-start 2023-01 \
            --validation-end 2023-12 \
            --oos-start 2024-01 \
            --oos-end 2026-06 \
            --symbols BTCUSDT ETHUSDT SOLUSDT XRPUSDT \
            --interval 15m \
            --download-workers 12 \
            --cache-dir .cache/xsmc-v12 \
            --output-dir artifacts/v12-funding-premium \
            2>&1 | tee artifacts/v12-funding-premium/run.log

      - name: Build concise report
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          out = Path('artifacts/v12-funding-premium')
          summary = out / 'summary.json'
          lines = ['# V12 funding-premium rule multi-arm', '']
          if summary.exists():
              s = json.loads(summary.read_text())
              lines += [
                  f"- status: `{s.get('status')}`",
                  f"- target 1% daily met: `{s.get('target_1pct_daily_met')}`",
                  f"- events: `{s.get('events')}`",
                  f"- arms: `{len(s.get('arms', []))}`",
                  '',
                  '## OOS portfolios', '',
              ]
              for row in s.get('oos_portfolios', []):
                  lines.append(
                      f"- `{row.get('portfolio')}`: trades={row.get('base_trades')}, "
                      f"multiple={row.get('base_final_multiple')}, daily={row.get('base_geo_daily')}, "
                      f"DD={row.get('base_max_drawdown')}, stress_multiple={row.get('stress_final_multiple')}"
                  )
          else:
              lines += ['- status: `FAILED_BEFORE_SUMMARY`']
              log = out / 'run.log'
              if log.exists():
                  lines += ['', '```text', '\n'.join(log.read_text(errors='replace').splitlines()[-180:]), '```']
          (out / 'REPORT.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v12-funding-premium-${{ github.run_id }}
          path: artifacts/v12-funding-premium
          if-no-files-found: error
          retention-days: 14
