name: Research official Binance USD-M 5m and funding bundle

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/research-binance-um-5m-funding.yml"
      - "research_tools/binance_um_5m_funding_bundle.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-binance-um-5m-funding-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-data-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build checksum-verified public research data
        run: |
          python research_tools/binance_um_5m_funding_bundle.py \
            --symbols BTCUSDT ETHUSDT \
            --start-month 2023-01 \
            --end-month 2026-06 \
            --output-dir research_artifact/binance_um_5m_funding
      - name: Inspect manifest
        run: |
          python -m json.tool research_artifact/binance_um_5m_funding/manifest.json | tail -n 160
          sha256sum research_artifact/binance_um_5m_funding/*
          du -h research_artifact/binance_um_5m_funding/*
      - uses: actions/upload-artifact@v4
        with:
          name: binance-um-5m-funding-2023-01_2026-06
          path: research_artifact/binance_um_5m_funding
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
