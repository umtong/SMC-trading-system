name: State-first official monthly panel pilot

on:
  pull_request:
    branches: [main]
    paths:
      - "research/state_first_monthly_panel_20260724/**"
      - ".github/workflows/state-first-monthly-panel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-monthly-panel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXPECTED_V2_BUNDLE_GZ_SHA256: 294d99940f8988ab8214db735aac06ab0d4ce17862f612c73ddb2e2682f752e9
  EXPECTED_PATCH_V3_SHA256: 80d0d00e6944856e6a1509794691c15537997da528cce3f558ca5a4b058ff4a2
  EXPECTED_PATCH_V4_SHA256: e1c35db1b9742775c177c4d585c57e8a8b5c58c5eb121c7dcc145a83aaf02186
  EXPECTED_V4_SHA256: 92e5dd743d94c0e687a0b72d4b947ae4808ac58bda0ea7131a42498d46e656b4
  EXPECTED_V4_TEST_SHA256: 29933d9166345c4337912aa35f8b666d20c596d241d81434bcfba1eae97449d5
  EXPECTED_MONTH_B64_SHA256: 852115c5dc8e907b114ef3295e4d53ae8f69b146c86ae9dae83b150195801d9a
  EXPECTED_MONTH_GZ_SHA256: 93c7970226899fb7477909437f6e431f908ad542ae5581dbde9a7e2fb46c536a
  EXPECTED_MONTH_SHA256: 0cc30bde04cf519210d0e7598c3ad5a5b54a4c3cb2e55a5396b992d31e06afce
  EXPECTED_MONTH_TEST_SHA256: 0cabbc0c74aa72a484749fd53ea8e1251c1a72fbfd1248eb41b163b2ebd00ec0
  EXPECTED_PREREG_SHA256: a71b38c9a436e65d147caceea571be0a44a196ef9d54f995061f0ca44c83e942

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/state-first-monthly-panel-20260724
          fetch-depth: 1

      - name: Reconstruct V4 and immutable monthly builder bundle
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/state_first_monthly_panel_20260724/${{ matrix.symbol }}"
          src="$root/source"
          mkdir -p "$src" "$root/output"

          base64 --decode research/state_first_raw_provenance_20260724/official_builder_v2_bundle.tar.gz.b64 > /tmp/official_builder_v2_bundle.tar.gz
          printf '%s  %s\n' "$EXPECTED_V2_BUNDLE_GZ_SHA256" /tmp/official_builder_v2_bundle.tar.gz | sha256sum --check --strict
          tar -xzf /tmp/official_builder_v2_bundle.tar.gz -C "$src"
          printf '%s  %s\n' "$EXPECTED_PATCH_V3_SHA256" research/state_first_raw_provenance_20260724/patch_official_builder_v3.py | sha256sum --check --strict
          python research/state_first_raw_provenance_20260724/patch_official_builder_v3.py "$src"
          printf '%s  %s\n' "$EXPECTED_PATCH_V4_SHA256" research/state_first_raw_provenance_20260724/patch_official_builder_v4.py | sha256sum --check --strict
          python research/state_first_raw_provenance_20260724/patch_official_builder_v4.py "$src"
          printf '%s  %s\n' "$EXPECTED_V4_SHA256" "$src/build_official_state_v4.py" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_V4_TEST_SHA256" "$src/test_official_state_v4.py" | sha256sum --check --strict

          printf '%s  %s\n' "$EXPECTED_MONTH_B64_SHA256" research/state_first_monthly_panel_20260724/bundle.tar.gz.b64 | sha256sum --check --strict
          base64 --decode research/state_first_monthly_panel_20260724/bundle.tar.gz.b64 > /tmp/state_month_only_bundle.tar.gz
          printf '%s  %s\n' "$EXPECTED_MONTH_GZ_SHA256" /tmp/state_month_only_bundle.tar.gz | sha256sum --check --strict
          tar -xzf /tmp/state_month_only_bundle.tar.gz -C "$src"
          printf '%s  %s\n' "$EXPECTED_MONTH_SHA256" "$src/build_official_state_month.py" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_MONTH_TEST_SHA256" "$src/test_build_official_state_month.py" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_PREREG_SHA256" "$src/monthly_panel_preregistration.json" | sha256sum --check --strict
          python -m py_compile "$src"/*.py
          sha256sum \
            research/state_first_raw_provenance_20260724/official_builder_v2_bundle.tar.gz.b64 \
            research/state_first_raw_provenance_20260724/patch_official_builder_v3.py \
            research/state_first_raw_provenance_20260724/patch_official_builder_v4.py \
            research/state_first_monthly_panel_20260724/bundle.tar.gz.b64 \
            > "$root/input_sha256.txt"
          cp "$src/monthly_panel_preregistration.json" "$root/preregistration.json"

      - name: Install fixed builder environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "requests==2.32.4" \
            "pytest==8.3.4"
          python - <<'PY'
          import json,platform,sys,numpy,pandas,pyarrow,requests,pytest
          from pathlib import Path
          root=Path('research_runs/state_first_monthly_panel_20260724')/'${{ matrix.symbol }}'
          payload={
            'python':sys.version,'platform':platform.platform(),'machine':platform.machine(),
            'numpy':numpy.__version__,'pandas':pandas.__version__,'pyarrow':pyarrow.__version__,
            'requests':requests.__version__,'pytest':pytest.__version__,
            'strategy_executed':False,'candidate_pnl_observed':False,
            '2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          (root/'environment.json').write_text(json.dumps(payload,indent=2,sort_keys=True),encoding='utf-8')
          PY

      - name: Run V4 and monthly causality tests
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/state_first_monthly_panel_20260724/${{ matrix.symbol }}"
          PYTHONPATH="$root/source" pytest -q \
            "$root/source/test_official_state_v4.py" \
            "$root/source/test_build_official_state_month.py" \
            2>&1 | tee "$root/unit_tests.log"

      - name: Build checksum-verified July 2023 monthly panel
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/state_first_monthly_panel_20260724/${{ matrix.symbol }}"
          python "$root/source/build_official_state_month.py" \
            --symbol "${{ matrix.symbol }}" \
            --month 2023-07 \
            --warmup-days 7 \
            --v4-source "$root/source/build_official_state_v4.py" \
            --output "$root/output" \
            2>&1 | tee "$root/build.log"
          python - "$root/output/${{ matrix.symbol }}_2023-07_official_state_v4_manifest.json" <<'PY'
          import json,sys
          obj=json.load(open(sys.argv[1],encoding='utf-8'))
          assert obj['rows']==8928
          assert obj['audits']['complete_5m_grid'] is True
          assert obj['audits']['future_depth_rows']==0
          assert obj['audits']['future_metric_rows']==0
          assert obj['audits']['forbidden_outcome_columns']==[]
          assert obj['strategy_executed'] is False and obj['candidate_pnl_observed'] is False
          assert obj['2024_opened'] is False and obj['2025_opened'] is False and obj['2026_opened'] is False
          assert obj['orders_submitted'] is False and obj['paper_or_live_started'] is False
          print(json.dumps({'symbol':obj['symbol'],'month':obj['month'],'rows':obj['rows'],'panel_sha256':obj['panel_sha256']},sort_keys=True))
          PY

      - name: Record immutable output checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/state_first_monthly_panel_20260724/${{ matrix.symbol }}"
          find "$root" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$root/OUTPUT_SHA256SUMS.txt"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: state-first-monthly-panel-${{ matrix.symbol }}-${{ github.sha }}
          path: research_runs/state_first_monthly_panel_20260724/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
