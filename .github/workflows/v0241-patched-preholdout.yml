name: v0.24.1 patched exact preholdout research

on:
  pull_request:
    paths:
      - 'research/v024_bundle_v4/**'
      - '.github/workflows/v0241-patched-preholdout.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v0241-patched-exact-${{ github.ref }}
  cancel-in-progress: false

env:
  RUNNER_ARCHIVE_SHA256: cd9424d230bc5095bd8b867f5e30c05ff05b26cdc6c4f65b49a99551b3c0d2d8
  PLAN_FILE_SHA256: dc7b24fe72f9d98373ff765e0bae7698cf78b01cbcfc90560ed5eccb613154bf
  PLAN_PAYLOAD_SHA256: e424afcf20ac04673b6d4f7de24042545c581a753e9cee18f46543b367593094
  SOURCE_MANIFEST_SHA256: 683735f7c13f20fb457c2f137a23012660999168b0f53ede100b85294addb92d
  DATA_PLAN_FILE_SHA256: 156e9755446f4cd737f9b987ad46f50e38a0fd4a19b9e226f40b6bf6bfd51ad1
  DATA_PLAN_PAYLOAD_SHA256: 12e4c72b4a05c3719d2c2cbc7b7ca06563ad3829f5460277f1655d2a483d43a6
  DATA_ROOT: ${{ github.workspace }}/.research-data/v0241-binance-public
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  preholdout:
    name: Patched transport, official data, chronological evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Apply locked transport correction and reconstruct runner
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/v0241-parts
          mkdir -p /tmp/v0241-parts transport-evidence
          cp research/v024_bundle_v4/part-000.b64 /tmp/v0241-parts/
          cp research/v024_bundle_v4/part-001a.b64 /tmp/v0241-parts/
          cp research/v024_bundle_v4/part-001b.b64 /tmp/v0241-parts/
          cp research/v024_bundle_v4/part-00{2,3,4,5,6,7}.b64 /tmp/v0241-parts/
          python - <<'PY' | tee transport-evidence/patch-audit.json
          import hashlib, json
          from pathlib import Path

          manifest = json.loads(Path('research/v024_bundle_v4/transport_patch.json').read_text())
          records = []
          for patch in manifest['patches']:
              name = Path(patch['path']).name
              path = Path('/tmp/v0241-parts') / name
              data = bytearray(path.read_bytes())
              before = hashlib.sha256(data).hexdigest()
              assert before == patch['unpatched_sha256'], (name, before)
              offset = int(patch['offset_zero_based'])
              observed = chr(data[offset])
              assert observed == patch['observed_ascii'], (name, offset, observed)
              data[offset] = ord(patch['replacement_ascii'])
              path.write_bytes(data)
              after = hashlib.sha256(data).hexdigest()
              assert after == patch['patched_sha256'], (name, after)
              records.append({'path': name, 'offset_zero_based': offset, 'observed_ascii': observed, 'replacement_ascii': patch['replacement_ascii'], 'unpatched_sha256': before, 'patched_sha256': after})
          print(json.dumps({'candidate_pnl_observed_before_patch': manifest['candidate_pnl_observed_before_patch'], 'terminal_holdout_opened_before_patch': manifest['terminal_holdout_opened_before_patch'], 'target_archive_sha256': manifest['target_archive_sha256'], 'patches': records}, sort_keys=True, indent=2))
          PY
          parts=(
            /tmp/v0241-parts/part-000.b64
            /tmp/v0241-parts/part-001a.b64
            /tmp/v0241-parts/part-001b.b64
            /tmp/v0241-parts/part-002.b64
            /tmp/v0241-parts/part-003.b64
            /tmp/v0241-parts/part-004.b64
            /tmp/v0241-parts/part-005.b64
            /tmp/v0241-parts/part-006.b64
            /tmp/v0241-parts/part-007.b64
          )
          cat "${parts[@]}" | base64 -d > /tmp/v0241_locked_runner.tar.xz
          echo "${RUNNER_ARCHIVE_SHA256}  /tmp/v0241_locked_runner.tar.xz" | sha256sum -c - | tee transport-evidence/archive-sha256.txt
          xz -t /tmp/v0241_locked_runner.tar.xz
          tar -xJf /tmp/v0241_locked_runner.tar.xz
          echo "${PLAN_FILE_SHA256}  v024/artifacts/microstructure_liquidity_v0_24/research_plan_locked.json" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  v024/artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v024/requirements-lock.txt

      - name: Verify locked code and preregistration
        working-directory: v024
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci_evidence
          python -m pytest -q | tee ci_evidence/pytest.txt
          python -m compileall -q smc_ict_quant scripts tests
          python - <<'PY' | tee ci_evidence/preregistration-audit.json
          import json, os
          from pathlib import Path
          p = json.loads(Path('artifacts/microstructure_liquidity_v0_24/research_plan_locked.json').read_text())
          d = json.loads(Path('artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json').read_text())
          assert p['study_id'] == 'derivatives_microstructure_conditioned_smc_v0_24_1'
          assert p['plan_payload_sha256'] == os.environ['PLAN_PAYLOAD_SHA256']
          assert p['source_tree_manifest_sha256'] == os.environ['SOURCE_MANIFEST_SHA256']
          assert p['candidate_count'] == 64
          assert p['evaluation_period']['start_inclusive'] == '2021-12-02T00:00:00+00:00'
          assert p['evaluation_period']['preholdout_end_exclusive'] == '2025-10-01T00:00:00+00:00'
          assert p['evaluation_period']['terminal_holdout_locked'] is True
          assert p['production_enabled'] is False
          assert d['payload_sha256'] == os.environ['DATA_PLAN_PAYLOAD_SHA256']
          assert d['request_count'] == 3272 == len(d['requests'])
          assert d['terminal_holdout_download_prohibited_by_default'] is True
          print(json.dumps({'study_id': p['study_id'], 'plan_payload_sha256': p['plan_payload_sha256'], 'source_manifest_sha256': p['source_tree_manifest_sha256'], 'data_plan_payload_sha256': d['payload_sha256'], 'request_count': d['request_count'], 'terminal_holdout_locked': True, 'production_enabled': False}, sort_keys=True, indent=2))
          PY

      - name: Restore official preholdout archive cache
        uses: actions/cache@v4
        with:
          path: .research-data/v0241-binance-public
          key: v0241-patched-binance-usdm-${{ env.DATA_PLAN_PAYLOAD_SHA256 }}-v1

      - name: Download exact checksum-verified request set
        working-directory: v024
        shell: bash
        run: |
          set -euo pipefail
          python scripts/download_binance_um_parallel.py \
            --request-plan artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json \
            --output "${DATA_ROOT}" --workers 12 2>&1 | tee ci_evidence/download.log

      - name: Audit archive identity and terminal isolation
        working-directory: v024
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci_evidence/acquisition-audit.json
          import hashlib, json, os
          from pathlib import Path
          root = Path(os.environ['DATA_ROOT'])
          request_plan = json.loads(Path('artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json').read_text())
          manifests = sorted((root/'manifests').glob('download_2021-11-01_2025-09-30_*.json'))
          assert manifests
          path = manifests[-1]
          run = json.loads(path.read_text())
          assert run['request_plan_payload_sha256'] == os.environ['DATA_PLAN_PAYLOAD_SHA256']
          assert run['completed'] == 3272 and run['missing'] == [] and run['failures'] == []
          expected = {str(x['relative_path']) for x in request_plan['requests']}
          observed = {str(dict(x['request'])['relative_path']) for x in run['records']}
          assert observed == expected
          assert not any(any(t in p for t in ('2025-10','2025-11','2025-12','2026-')) for p in observed)
          assert sum(1 for _ in root.rglob('*.zip')) == 3272
          assert sum(1 for _ in root.rglob('*.zip.CHECKSUM')) == 3272
          print(json.dumps({'manifest_sha256': hashlib.sha256(path.read_bytes()).hexdigest(), 'completed': 3272, 'missing': 0, 'failures': 0, 'exact_request_set_match': True, 'terminal_partition_requested': False}, sort_keys=True, indent=2))
          PY

      - name: Run point-in-time readiness gate
        working-directory: v024
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_microstructure_liquidity_v0_24.py --data-root "${DATA_ROOT}" --readiness-only 2>&1 | tee ci_evidence/readiness.log

      - name: Run locked chronological preholdout research
        working-directory: v024
        shell: bash
        run: |
          set -uo pipefail
          set +e
          /usr/bin/time -v python scripts/run_microstructure_liquidity_v0_24.py --data-root "${DATA_ROOT}" 2>&1 | tee ci_evidence/preholdout-research.log
          status=${PIPESTATUS[0]}
          printf '%s\n' "$status" | tee ci_evidence/research-exit-code.txt
          python - "$status" <<'PY' | tee ci_evidence/research-execution-status.json
          import json, sys
          status = int(sys.argv[1])
          print(json.dumps({'exit_code': status, 'scientific_run_completed': status in (0,1), 'preholdout_gate_passed': status == 0, 'terminal_holdout_requested': False, 'production_enabled': False}, sort_keys=True, indent=2))
          PY
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then exit "$status"; fi

      - name: Build compact evidence package
        if: always()
        working-directory: v024
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci_evidence
          free -h > ci_evidence/memory-final.txt
          df -h > ci_evidence/disk-final.txt
          python - <<'PY'
          import json, tarfile
          from pathlib import Path
          out = Path('artifacts/microstructure_liquidity_v0_24')
          ev = Path('ci_evidence')
          files = sorted(str(p) for root in (out, ev) if root.exists() for p in root.rglob('*') if p.is_file())
          (ev/'output-files.json').write_text(json.dumps(files, indent=2)+'\n')
          with tarfile.open('v0241-patched-preholdout-results.tar.gz','w:gz') as archive:
              if out.exists(): archive.add(out, arcname=str(out))
              archive.add(ev, arcname='ci_evidence')
          PY
          sha256sum v0241-patched-preholdout-results.tar.gz > ci_evidence/results-archive.sha256

      - name: Upload evidence without raw market archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0241-patched-preholdout-${{ github.run_id }}
          path: |
            v024/v0241-patched-preholdout-results.tar.gz
            v024/ci_evidence
            v024/artifacts/microstructure_liquidity_v0_24
            transport-evidence
          if-no-files-found: warn
          retention-days: 30
