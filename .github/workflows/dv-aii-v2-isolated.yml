name: DV-AII V2 Isolated Preholdout Data

on:
  push:
    branches: [research/dv-aii-v2-isolated-20260725]
    paths: ['.github/workflows/dv-aii-v2-isolated.yml']
  pull_request:
    branches: [main]
    paths: ['.github/workflows/dv-aii-v2-isolated.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dv-aii-v2-isolated-preholdout
  cancel-in-progress: false

env:
  PINNED_SOURCE_COMMIT: 0951ef581b4d298fc8106257281fc1ede33860ec
  BUILDER_SHA256: 9c7decfc405a468c22102d5049fe72c24be662cb0e7919f77539d24c7d410bde
  MARK_COLLECTOR_SHA256: c725a42726bb148a8a1b7c87563f1f2fb64c975d6e00bb7a7e6b9c92f9ba2762
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        symbol: [ETHUSDT, SOLUSDT]
        year: [2021, 2022, 2023, 2024]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Recover exact pinned research programs
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${PINNED_SOURCE_COMMIT}"
          mkdir -p runtime
          git show "${PINNED_SOURCE_COMMIT}:research/full_aggtrade_dollar_bars/build_ultrafast_v2.py" > runtime/build.py
          git show "${PINNED_SOURCE_COMMIT}:research/full_aggtrade_dollar_bars/collect_mark_1m.py" > runtime/mark.py
          echo "${BUILDER_SHA256}  runtime/build.py" | sha256sum -c -
          echo "${MARK_COLLECTOR_SHA256}  runtime/mark.py" | sha256sum -c -
          python -m py_compile runtime/build.py runtime/mark.py
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed isolated environment
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'pyarrow==18.1.0' 'requests==2.32.3'
      - name: Synthetic pre-outcome audit
        run: python runtime/build.py --self-test
      - name: Build official checksum-verified bars and mark prices
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output cache
          /usr/bin/time -v python runtime/build.py \
            --symbol '${{ matrix.symbol }}' --year '${{ matrix.year }}' \
            --output output --cache cache 2>&1 | tee output/build.log
          python runtime/mark.py \
            --symbol '${{ matrix.symbol }}' --year '${{ matrix.year }}' \
            --output output --cache cache/mark 2>&1 | tee output/mark.log
      - name: Audit identity, completeness, and terminal isolation
        shell: bash
        run: |
          set -euo pipefail
          test '${{ matrix.year }}' -le 2024
          test -s 'output/${{ matrix.symbol }}_${{ matrix.year }}_manifest.json'
          test -s 'output/${{ matrix.symbol }}_${{ matrix.year }}_mark_manifest.json'
          test -s 'output/${{ matrix.symbol }}_${{ matrix.year }}_1m.parquet'
          test -s 'output/${{ matrix.symbol }}_${{ matrix.year }}_mark_1m.parquet'
          test -s 'output/${{ matrix.symbol }}_${{ matrix.year }}_funding.parquet'
          test "$(find output -name '${{ matrix.symbol }}_${{ matrix.year }}_bpd*_cap*s.parquet' | wc -l | tr -d ' ')" -eq 4
          python - <<'PY'
          import json
          from pathlib import Path
          symbol='${{ matrix.symbol }}'; year=int('${{ matrix.year }}')
          x=json.loads((Path('output')/f'{symbol}_{year}_manifest.json').read_text())
          m=json.loads((Path('output')/f'{symbol}_{year}_mark_manifest.json').read_text())
          assert x['symbol']==m['symbol']==symbol and int(x['year'])==int(m['year'])==year
          assert x['candidate_pnl_observed'] is False and m['candidate_pnl_observed'] is False
          assert x['orders_submitted'] is False and m['orders_submitted'] is False
          assert len(x['outputs'])==4
          assert all(int(r['entry_missing'])>=0 for r in x['outputs'])
          print(json.dumps({'symbol':symbol,'year':year,'bar_rows':[r['rows'] for r in x['outputs']],'mark_rows':m['rows'],'terminal_2025_requested':False},indent=2))
          PY
          cp runtime/build.py runtime/mark.py output/
          find output -type f -print0 | sort -z | xargs -0 sha256sum > output/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dv-aii-v2-${{ matrix.symbol }}-${{ matrix.year }}-${{ github.run_id }}
          path: output
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
