name: Phase26 Strict Liquidation Depth Research

on:
  push:
    branches:
      - research/phase26-liquidation-depth
    paths:
      - "research/phase26_microbar/**"
      - ".github/workflows/phase26-liquidation-depth.yml"
  pull_request:
    paths:
      - "research/phase26_microbar/**"
      - ".github/workflows/phase26-liquidation-depth.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase26-strict-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: research/phase26-liquidation-depth

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install frozen research environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            'numpy==2.1.3' \
            'pandas==2.2.3' \
            'pyarrow==19.0.1' \
            'huggingface_hub==0.31.4'

      - name: Lock source provenance before outcome evaluation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research/phase26_microbar/evidence
          sha256sum \
            research/phase26_microbar/liquidation_depth_research_strict.py \
            research/phase26_microbar/run_strict.py \
            research/phase26_microbar/AMENDMENT_001_STRICT_ONE_SHOT.md \
            | tee research/phase26_microbar/evidence/SOURCE_SHA256.txt
          python -m py_compile \
            research/phase26_microbar/liquidation_depth_research_strict.py \
            research/phase26_microbar/run_strict.py

      - name: Run strict causal one-shot screen
        env:
          HF_HOME: ${{ runner.temp }}/hf
        run: |
          set -euo pipefail
          rm -rf research/phase26_microbar/results
          python research/phase26_microbar/run_strict.py \
            --out research/phase26_microbar/results \
            | tee research/phase26_microbar/evidence/run.log

      - name: Audit result contract
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -s research/phase26_microbar/results/SUMMARY.json
          python -m json.tool research/phase26_microbar/results/SUMMARY.json
          sha256sum research/phase26_microbar/results/* \
            | tee research/phase26_microbar/evidence/RESULT_SHA256.txt

      - name: Upload scientific evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase26-strict-liquidation-depth-${{ github.run_id }}
          path: |
            research/phase26_microbar/results
            research/phase26_microbar/evidence
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
