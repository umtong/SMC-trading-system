name: Phase21 Hyperliquid informed-wallet flow research

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/phase21-hyperliquid-wallet-flow.yml'

permissions:
  contents: read

jobs:
  extract:
    name: ${{ matrix.day }}-${{ matrix.hour }}UTC
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        day: ['2025-07-28', '2025-08-01', '2025-08-08', '2025-08-15', '2025-08-22', '2025-09-01', '2025-09-15', '2025-10-01']
        hour: ['00', '06', '12', '18']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install research dependencies
        run: pip install --disable-pip-version-check duckdb==1.3.2 pandas==2.2.3 pyarrow==19.0.1 requests==2.32.4
      - name: Extract wallet fills and official Binance reference trades
        env:
          DAY: ${{ matrix.day }}
          HOUR: ${{ matrix.hour }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out raw
          cat > /tmp/extract.py <<'PY'
          import hashlib
          import io
          import json
          import os
          import zipfile
          from pathlib import Path

          import duckdb
          import numpy as np
          import pandas as pd
          import requests

          day = os.environ['DAY']
          hour = int(os.environ['HOUR'])
          day_compact = day.replace('-', '')
          src = f'node_fills_by_block/hourly/{day_compact}/{hour:02d}.lz4'
          out = Path('out')
          raw = Path('raw')

          meta_url = 'https://datasets-server.huggingface.co/parquet?dataset=gionuibk%2Fhyperliquid-node-fills-by-block'
          meta = requests.get(meta_url, timeout=120)
          meta.raise_for_status()
          parquet_urls = [x['url'] for x in meta.json()['parquet_files'] if x['split'] == 'train']
          if not parquet_urls:
              raise RuntimeError('no Hugging Face parquet shards')

          con = duckdb.connect()
          con.execute('INSTALL httpfs')
          con.execute('LOAD httpfs')
          # Predicate and projection pushdown prevent downloading the 141M-row dataset.
          escaped_urls = '[' + ','.join("'" + u.replace("'", "''") + "'" for u in parquet_urls) + ']'
          escaped_src = src.replace("'", "''")
          hl_blocks = out / 'hyperliquid_blocks.parquet'
          con.execute(
              f"COPY (SELECT local_time, block_time, block_number, events, _src "
              f"FROM read_parquet({escaped_urls}, union_by_name=true) "
              f"WHERE _src='{escaped_src}') TO '{hl_blocks}' (FORMAT PARQUET, COMPRESSION ZSTD)"
          )
          blocks = pd.read_parquet(hl_blocks)
          if blocks.empty:
              raise RuntimeError(f'no Hyperliquid blocks for {src}')

          fills = []
          for row in blocks.itertuples(index=False):
              payload = row.events
              events = json.loads(payload) if isinstance(payload, str) else payload
              for item in events or []:
                  if not isinstance(item, (list, tuple)) or len(item) != 2:
                      continue
                  wallet, fill = item
                  coin = str(fill.get('coin', ''))
                  if coin not in {'BTC', 'ETH'}:
                      continue
                  px = float(fill['px'])
                  sz = float(fill['sz'])
                  side = str(fill['side'])
                  fills.append({
                      'wallet': str(wallet).lower(),
                      'coin': coin,
                      'time_ms': int(fill['time']),
                      'side': side,
                      'signed_quote': (1.0 if side == 'B' else -1.0) * px * sz,
                      'quote': px * sz,
                      'price': px,
                      'size': sz,
                      'crossed': bool(fill.get('crossed', False)),
                      'direction': str(fill.get('dir', '')),
                      'start_position': float(fill.get('startPosition') or 0.0),
                      'closed_pnl': float(fill.get('closedPnl') or 0.0),
                      'fee': float(fill.get('fee') or 0.0),
                      'trade_id': int(fill.get('tid') or -1),
                      'order_id': int(fill.get('oid') or -1),
                      'block_number': int(row.block_number),
                      'block_time': row.block_time,
                      'local_time': row.local_time,
                  })
          fills = pd.DataFrame(fills)
          if fills.empty:
              raise RuntimeError('no BTC/ETH wallet fills in selected hour')
          fills = fills.sort_values(['time_ms', 'block_number', 'wallet', 'trade_id'])
          fills.to_parquet(out / 'hyperliquid_wallet_fills.parquet', index=False, compression='zstd')

          start_ms = int(pd.Timestamp(day, tz='UTC').value // 1_000_000) + hour * 3_600_000
          end_ms = start_ms + 3_600_000
          binance_frames = []
          source_hashes = {}
          for symbol in ('BTCUSDT', 'ETHUSDT'):
              name = f'{symbol}-aggTrades-{day}.zip'
              url = f'https://data.binance.vision/data/futures/um/daily/aggTrades/{symbol}/{name}'
              zpath = raw / name
              cpath = raw / (name + '.CHECKSUM')
              for target, target_url in ((zpath, url), (cpath, url + '.CHECKSUM')):
                  response = requests.get(target_url, timeout=180)
                  response.raise_for_status()
                  target.write_bytes(response.content)
              expected = cpath.read_text().split()[0]
              actual = hashlib.sha256(zpath.read_bytes()).hexdigest()
              if expected != actual:
                  raise RuntimeError(f'checksum mismatch {name}')
              source_hashes[name] = actual
              with zipfile.ZipFile(zpath) as zf:
                  names = [n for n in zf.namelist() if n.endswith('.csv')]
                  if len(names) != 1:
                      raise RuntimeError(names)
                  payload = zf.read(names[0])
              first = payload.splitlines()[0].decode('utf-8-sig').split(',')[0].strip()
              has_header = not first.lstrip('-').isdigit()
              frame = pd.read_csv(io.BytesIO(payload), header=0 if has_header else None)
              if not has_header:
                  frame.columns = ['agg_trade_id', 'price', 'quantity', 'first_trade_id', 'last_trade_id', 'transact_time', 'is_buyer_maker']
              else:
                  frame = frame.rename(columns={
                      'transact_time': 'transact_time', 'price': 'price', 'quantity': 'quantity',
                      'is_buyer_maker': 'is_buyer_maker', 'agg_trade_id': 'agg_trade_id'
                  })
              for col in ('price', 'quantity', 'transact_time'):
                  frame[col] = pd.to_numeric(frame[col], errors='coerce')
              if frame.transact_time.median() > 1e14:
                  frame['transact_time'] = (frame.transact_time // 1000).astype('int64')
              frame = frame[(frame.transact_time >= start_ms) & (frame.transact_time < end_ms)].copy()
              maker = frame.is_buyer_maker.astype(str).str.lower().isin(['true', '1'])
              frame['symbol'] = symbol
              frame['quote'] = frame.price * frame.quantity
              frame['signed_quote'] = np.where(maker, -frame.quote, frame.quote)
              frame['time_ms'] = frame.transact_time.astype('int64')
              binance_frames.append(frame[['symbol', 'time_ms', 'price', 'quantity', 'quote', 'signed_quote']])
          binance = pd.concat(binance_frames, ignore_index=True).sort_values(['time_ms', 'symbol'])
          if binance.empty:
              raise RuntimeError('no Binance reference trades')
          binance.to_parquet(out / 'binance_aggtrades.parquet', index=False, compression='zstd')

          manifest = {
              'day': day,
              'hour_utc': hour,
              'source_path': src,
              'hyperliquid_block_rows': int(len(blocks)),
              'hyperliquid_fill_rows': int(len(fills)),
              'hyperliquid_wallets': int(fills.wallet.nunique()),
              'binance_trade_rows': int(len(binance)),
              'source_sha256': source_hashes,
              'output_sha256': {
                  p.name: hashlib.sha256(p.read_bytes()).hexdigest()
                  for p in (out / 'hyperliquid_wallet_fills.parquet', out / 'binance_aggtrades.parquet')
              },
              'availability_rule': 'Hyperliquid block_time/fill time and Binance transact_time; any strategy must enter strictly after the completed causal bucket',
          }
          (out / 'MANIFEST.json').write_text(json.dumps(manifest, indent=2, sort_keys=True) + '\n')
          print(json.dumps(manifest, indent=2))
          PY
          python /tmp/extract.py
      - uses: actions/upload-artifact@v4
        with:
          name: phase21-hl-wallet-${{ matrix.day }}-${{ matrix.hour }}
          path: out/
          retention-days: 7
          compression-level: 6
