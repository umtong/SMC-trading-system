name: Export Binance USD-M 1m Research Data

on:
  push:
    branches:
      - agent/binance-data-export-20260724
    paths:
      - ".github/workflows/export-binance-um-1m.yml"
  pull_request:
    paths:
      - ".github/workflows/export-binance-um-1m.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download, verify, normalize
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import csv
          import gzip
          import hashlib
          import io
          import json
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          SYMBOLS = ("BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT")
          START = (2025, 1)
          END = (2026, 6)
          BASE = "https://data.binance.vision/data/futures/um/monthly/klines"
          OUT = Path("research_data/binance_um_1m")
          OUT.mkdir(parents=True, exist_ok=True)

          def months(start: tuple[int, int], end: tuple[int, int]):
              y, m = start
              while (y, m) <= end:
                  yield f"{y:04d}-{m:02d}"
                  m += 1
                  if m == 13:
                      y += 1
                      m = 1

          def get(url: str) -> bytes:
              req = urllib.request.Request(url, headers={"User-Agent": "smc-research-data-export/1.0"})
              with urllib.request.urlopen(req, timeout=120) as response:
                  return response.read()

          def sha256_bytes(data: bytes) -> str:
              return hashlib.sha256(data).hexdigest()

          manifest: dict[str, object] = {
              "generated_at_utc": datetime.now(timezone.utc).isoformat(),
              "source": "Binance public USD-M futures monthly klines",
              "interval": "1m",
              "start_month": "2025-01",
              "end_month": "2026-06",
              "symbols": {},
          }

          for symbol in SYMBOLS:
              out_path = OUT / f"{symbol}_1m_2025-01_2026-06.csv.gz"
              row_count = 0
              first_open = None
              last_open = None
              prior_open = None
              source_rows: list[dict[str, object]] = []

              with gzip.open(out_path, "wt", newline="", encoding="utf-8") as gz:
                  writer = csv.writer(gz)
                  writer.writerow(("open_time", "open", "high", "low", "close", "volume", "close_time"))

                  for month in months(START, END):
                      filename = f"{symbol}-1m-{month}.zip"
                      url = f"{BASE}/{symbol}/1m/{filename}"
                      checksum_url = url + ".CHECKSUM"
                      archive = get(url)
                      checksum_text = get(checksum_url).decode("utf-8").strip()
                      official_sha = checksum_text.split()[0].lower()
                      actual_sha = sha256_bytes(archive)
                      if actual_sha != official_sha:
                          raise RuntimeError(f"checksum mismatch for {filename}: {actual_sha} != {official_sha}")

                      month_rows = 0
                      with zipfile.ZipFile(io.BytesIO(archive)) as zf:
                          members = [n for n in zf.namelist() if not n.endswith("/")]
                          if len(members) != 1:
                              raise RuntimeError(f"unexpected ZIP members for {filename}: {members}")
                          with zf.open(members[0]) as raw:
                              text = io.TextIOWrapper(raw, encoding="utf-8", newline="")
                              reader = csv.reader(text)
                              for fields in reader:
                                  if not fields:
                                      continue
                                  if not fields[0].lstrip("-").isdigit():
                                      continue
                                  if len(fields) < 7:
                                      raise RuntimeError(f"short row in {filename}: {fields}")
                                  open_time = int(fields[0])
                                  close_time = int(fields[6])
                                  if prior_open is not None and open_time != prior_open + 60_000:
                                      raise RuntimeError(
                                          f"non-contiguous minute for {symbol}: {prior_open} -> {open_time}"
                                      )
                                  if close_time != open_time + 59_999:
                                      raise RuntimeError(f"bad close_time for {symbol}: {open_time}, {close_time}")
                                  writer.writerow((open_time, fields[1], fields[2], fields[3], fields[4], fields[5], close_time))
                                  prior_open = open_time
                                  first_open = open_time if first_open is None else first_open
                                  last_open = open_time
                                  row_count += 1
                                  month_rows += 1

                      source_rows.append(
                          {
                              "month": month,
                              "url": url,
                              "checksum_url": checksum_url,
                              "official_sha256": official_sha,
                              "archive_bytes": len(archive),
                              "rows": month_rows,
                          }
                      )

              output_sha = hashlib.sha256(out_path.read_bytes()).hexdigest()
              manifest["symbols"][symbol] = {
                  "rows": row_count,
                  "first_open_time": first_open,
                  "last_open_time": last_open,
                  "output": out_path.as_posix(),
                  "output_sha256": output_sha,
                  "sources": source_rows,
              }
              print(symbol, row_count, first_open, last_open, output_sha, flush=True)

          manifest_path = OUT / "manifest.json"
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True), encoding="utf-8")
          print(manifest_path.read_text(encoding="utf-8"))
          PY

      - name: Upload verified research data
        uses: actions/upload-artifact@v4
        with:
          name: binance-um-1m-2025-01_2026-06
          path: research_data/binance_um_1m
          if-no-files-found: error
          compression-level: 0
          retention-days: 1
