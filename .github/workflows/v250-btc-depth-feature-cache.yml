name: V2.50 BTC Depth Feature Cache

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v250-btc-depth-feature-cache.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v250-btc-depth-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install isolated dependencies
        run: python -m pip install --upgrade huggingface_hub pyarrow pandas
      - name: Download and validate public derived feature panel
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          from pathlib import Path
          import hashlib, json
          import pandas as pd
          import pyarrow as pa
          import pyarrow.parquet as pq
          from huggingface_hub import snapshot_download

          out=Path('v250-output');out.mkdir(exist_ok=True)
          local=snapshot_download(
              repo_id='ibrahimdaud/binance-btcusdt',
              repo_type='dataset',
              allow_patterns=['features/BTCUSDT/*.parquet','README.md'],
              local_dir='v250-hf',
              local_dir_use_symlinks=False,
          )
          files=sorted((Path(local)/'features'/'BTCUSDT').glob('*.parquet'))
          if not files: raise SystemExit('no feature files')
          tables=[];records=[]
          for p in files:
              day=pd.Timestamp(p.stem,tz='UTC')
              if day < pd.Timestamp('2023-01-01',tz='UTC') or day >= pd.Timestamp('2026-06-01',tz='UTC'):
                  continue
              t=pq.read_table(p)
              if t.num_rows != 288: raise ValueError(f'{p}: rows={t.num_rows}')
              tables.append(t)
              records.append({'file':str(p.relative_to(local)),'rows':t.num_rows,'sha256':hashlib.sha256(p.read_bytes()).hexdigest()})
          table=pa.concat_tables(tables,promote_options='default')
          df=table.to_pandas().sort_values('bar_time_ms').reset_index(drop=True)
          ts=pd.to_datetime(df.bar_time_ms,unit='ms',utc=True)
          if ts.duplicated().any(): raise ValueError('duplicate timestamp')
          gaps=ts.diff().dropna().ne(pd.Timedelta(minutes=5))
          if gaps.any(): raise ValueError(f'5m gaps={int(gaps.sum())}')
          required=['depth_imbalance_1pct','vpin_50','vpin_bucket_imbalance','hawkes_buy_intensity','hawkes_sell_intensity','hawkes_net','oi_btc','oi_change_1h','ls_count_ratio','taker_ls_vol_ratio']
          missing=[c for c in required if c not in df]
          if missing: raise ValueError(f'missing columns {missing}')
          path=out/'BTCUSDT_depth_flow_2023_2026-05.parquet'
          df.to_parquet(path,index=False,compression='zstd')
          manifest={
            'source_repo':'ibrahimdaud/binance-btcusdt',
            'source_description':'derived feature files documented as deterministically built from Binance public archives',
            'research_only':True,
            'start':str(ts.min()),'end':str(ts.max()),'rows':len(df),'columns':list(df.columns),
            'source_files':len(records),'depth_non_null':int(df.depth_imbalance_1pct.notna().sum()),
            'output_sha256':hashlib.sha256(path.read_bytes()).hexdigest(),'records':records,
            'forward_columns_are_labels_only':['fwd_ret_5m','fwd_ret_15m','fwd_ret_60m','fwd_direction_5m'],
          }
          (out/'MANIFEST.json').write_text(json.dumps(manifest,indent=2),encoding='utf-8')
          print(json.dumps({k:v for k,v in manifest.items() if k!='records'},indent=2))
          PY
      - name: Upload immutable feature panel
        uses: actions/upload-artifact@v4
        with:
          name: v250-btc-depth-feature-panel-${{ github.run_id }}
          path: v250-output
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
