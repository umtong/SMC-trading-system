name: V2.50 BTC Depth Feature Cache

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v250-btc-depth-feature-cache.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v250-btc-depth-${{ github.ref }}
  cancel-in-progress: false

env:
  HF_HUB_DISABLE_TELEMETRY: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install isolated dependencies
        run: python -m pip install --upgrade 'pandas==2.2.3' 'pyarrow==18.1.0'
      - name: Enumerate the actual dataset tree and stream only listed parquet files
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          from urllib.parse import quote
          import hashlib, json, re, time, urllib.request
          import pandas as pd
          import pyarrow as pa
          import pyarrow.parquet as pq

          REPO='ibrahimdaud/binance-btcusdt'
          PREFIX='features/BTCUSDT'
          API=f'https://huggingface.co/api/datasets/{REPO}/tree/main/{PREFIX}'
          START=pd.Timestamp('2023-01-01',tz='UTC')
          END=pd.Timestamp('2026-06-01',tz='UTC')
          OUT=Path('v250-output'); RAW=Path('v250-raw')
          OUT.mkdir(exist_ok=True); RAW.mkdir(exist_ok=True)
          date_re=re.compile(r'(20\d{2}-\d{2}-\d{2})')

          def request(url:str, attempts:int=8)->bytes:
              last=None
              for i in range(attempts):
                  try:
                      req=urllib.request.Request(url,headers={'User-Agent':'smc-v250-depth/3.0'})
                      with urllib.request.urlopen(req,timeout=300) as r:
                          return r.read()
                  except Exception as exc:
                      last=exc
                      if i+1<attempts: time.sleep(min(2**i,30))
              raise RuntimeError(f'{url}: {last!r}')

          # The tree endpoint returns the concrete file paths. Follow Link-style
          # pagination by increasing offset; stop only on a short page.
          entries=[]; offset=0; limit=1000
          while True:
              url=f'{API}?recursive=true&expand=false&limit={limit}&offset={offset}'
              page=json.loads(request(url))
              if not isinstance(page,list):
                  raise ValueError(f'unexpected tree payload at offset {offset}: {type(page)}')
              entries.extend(page)
              if len(page)<limit: break
              offset += len(page)
              if offset>100000: raise ValueError('tree pagination runaway')

          files=[]
          for item in entries:
              path=str(item.get('path',''))
              if item.get('type')!='file' or not path.endswith('.parquet'): continue
              m=date_re.search(Path(path).stem)
              if not m: continue
              day=pd.Timestamp(m.group(1),tz='UTC')
              if START<=day<END: files.append((day,path,item))
          files=sorted({p:(d,p,i) for d,p,i in files}.values())
          if not files:
              raise SystemExit(f'no parquet files found; tree entries={len(entries)}')

          required=['bar_time_ms','depth_imbalance_1pct','vpin_50','vpin_bucket_imbalance',
                    'hawkes_buy_intensity','hawkes_sell_intensity','hawkes_net','oi_btc',
                    'oi_change_1h','ls_count_ratio','taker_ls_vol_ratio']
          forward_prefixes=('fwd_','future_','label_','target_')

          def download(item):
              day,path,meta=item
              url=f'https://huggingface.co/datasets/{REPO}/resolve/main/{quote(path,safe="/")}?download=true'
              payload=request(url)
              local=RAW/f'{day.date()}.parquet'; local.write_bytes(payload)
              table=pq.read_table(local)
              if table.num_rows!=288:
                  raise ValueError(f'{path}: rows={table.num_rows}')
              missing=[c for c in required if c not in table.column_names]
              if missing: raise ValueError(f'{path}: missing={missing}')
              return {'day':str(day.date()),'path':path,'url':url,'bytes':len(payload),
                      'sha256':hashlib.sha256(payload).hexdigest(),'local':str(local),
                      'columns':table.column_names}

          records=[]
          with ThreadPoolExecutor(max_workers=12) as pool:
              futures={pool.submit(download,x):x for x in files}
              for n,fut in enumerate(as_completed(futures),1):
                  records.append(fut.result())
                  if n%100==0: print(f'downloaded {n}/{len(files)}',flush=True)
          records=sorted(records,key=lambda r:r['day'])

          tables=[]; dropped=set()
          for rec in records:
              table=pq.read_table(rec['local'])
              drop=[c for c in table.column_names if c.lower().startswith(forward_prefixes)]
              dropped.update(drop)
              keep=[c for c in table.column_names if c not in drop]
              tables.append(table.select(keep))
          table=pa.concat_tables(tables,promote_options='default')
          df=table.to_pandas().sort_values('bar_time_ms',kind='mergesort').reset_index(drop=True)
          ts=pd.to_datetime(df.bar_time_ms,unit='ms',utc=True)
          if ts.duplicated().any(): raise ValueError('duplicate timestamp')
          delta=ts.to_series(index=range(len(ts))).diff()
          segment=(delta.ne(pd.Timedelta(minutes=5)) & delta.notna()).cumsum().astype('int32')
          df['segment_id']=segment.to_numpy()
          # Never bridge missing dates. Gaps are explicit in the manifest and
          # every rolling model must restart by segment_id.
          gap_rows=[]
          for i in range(1,len(ts)):
              if ts[i]-ts[i-1]!=pd.Timedelta(minutes=5):
                  gap_rows.append({'previous':str(ts[i-1]),'next':str(ts[i]),'delta':str(ts[i]-ts[i-1])})
          if any(c.lower().startswith(forward_prefixes) for c in df.columns):
              raise ValueError('future/label column survived physical drop')
          if not df.depth_imbalance_1pct.notna().any():
              raise ValueError('depth column is entirely null')

          path=OUT/'BTCUSDT_depth_flow_future_free_2023_2026-05.parquet'
          df.to_parquet(path,index=False,compression='zstd')
          manifest={
            'source_repo':REPO,'source_prefix':PREFIX,'research_only':True,
            'tree_entries':len(entries),'selected_files':len(records),
            'start':str(ts.min()),'end':str(ts.max()),'rows':len(df),
            'segments':int(df.segment_id.nunique()),'gaps':gap_rows,
            'columns':list(df.columns),'physically_dropped_forward_columns':sorted(dropped),
            'depth_non_null':int(df.depth_imbalance_1pct.notna().sum()),
            'output_sha256':hashlib.sha256(path.read_bytes()).hexdigest(),
            'source_records':records,
            'causality_contract':{
              'bar_time_ms':'source 5m bar timestamp; runtime known_at must be bar_time_ms + 5 minutes',
              'oi_and_positioning':'must receive one additional completed-bar delay before use',
              'forward_columns':'physically absent from feature artifact',
              'gap_policy':'no forward fill across segment_id',
              'promotion_allowed':False,
            },
          }
          (OUT/'MANIFEST.json').write_text(json.dumps(manifest,indent=2),encoding='utf-8')
          print(json.dumps({k:v for k,v in manifest.items() if k not in ('source_records','columns','gaps')},indent=2))
          PY
      - name: Upload immutable future-free feature panel
        uses: actions/upload-artifact@v4
        with:
          name: v250-btc-depth-feature-panel-${{ github.run_id }}
          path: v250-output
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
