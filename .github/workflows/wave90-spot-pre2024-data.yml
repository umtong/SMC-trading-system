name: Wave90 Spot Pre-2024 Data

on:
  pull_request:
    branches: [main]
    paths:
      - 'research/wave90_spot_pre2024_data.py'
      - '.github/workflows/wave90-spot-pre2024-data.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wave90-spot-pre2024-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      PYTHONUNBUFFERED: '1'
      OUTPUT: ${{ github.workspace }}/wave90-spot-pre2024
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave90-spot-perp-pre2024-data-20260724
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install fixed data environment
        run: |
          python -m pip install --upgrade 'pip==25.1.1'
          python -m pip install 'numpy==2.1.3' 'pandas==2.2.3' 'pyarrow==18.1.0'
      - name: Build checksum-verified official spot panel
        run: |
          python research/wave90_spot_pre2024_data.py --output "$OUTPUT" 2>&1 | tee "$OUTPUT.log"
          python -m py_compile research/wave90_spot_pre2024_data.py
      - name: Upload research data only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave90-spot-pre2024-${{ github.run_id }}
          path: |
            wave90-spot-pre2024
            wave90-spot-pre2024.log
            research/wave90_spot_pre2024_data.py
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
