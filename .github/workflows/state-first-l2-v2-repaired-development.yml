name: State-first L2 V2 repaired development

on:
  pull_request:
    branches: [main]
    paths:
      - "research/remote/state_first_l2_v2.py.gz.b64.part*"
      - "research/remote/state_first_l2_v2_test.py.gz.b64.part*"
      - "research/state_first_l2_20260724/preregistration.json"
      - ".github/workflows/state-first-l2-v2-repaired-development.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: state-first-l2-v2-repaired-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  development:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf_cache_state_first_v2_repaired
      HF_HUB_DISABLE_TELEMETRY: "1"
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "300"
      ROOT: ${{ github.workspace }}/research_runs/state_first_l2_v2_repaired_20260724
      SCRIPT: ${{ github.workspace }}/research_runs/state_first_l2_v2_repaired_20260724/state_first_l2.py
      TEST_SCRIPT: ${{ github.workspace }}/research_runs/state_first_l2_v2_repaired_20260724/test_state_first_l2.py
      PREREG: ${{ github.workspace }}/research/state_first_l2_20260724/preregistration.json
      EXPECTED_SCRIPT_SHA256: 3cae9ff1e0a9bc2de4e663c8c308ed3f3c247d45eb829f86b2d4d44fb284797d
      EXPECTED_TEST_SHA256: a3939ccac2ac3af834ce07fc1a732bfdb06721e032a26736ef880aa5973b5319
      EXPECTED_PREREG_SHA256: b223ae70bd7e1fb9b7b2cc5b23ddb6d608b0a78e6a48db9f07d35dfd1195ed7e
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/state-first-l2-v2-repaired-20260724
          fetch-depth: 1

      - name: Reconstruct and verify the static-audited V2 source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ROOT"
          sha256sum \
            research/remote/state_first_l2_v2.py.gz.b64.part{00..05} \
            research/remote/state_first_l2_v2_test.py.gz.b64.part{00..01} \
            "$PREREG" > "$ROOT/input_part_sha256.txt"
          cat research/remote/state_first_l2_v2.py.gz.b64.part{00..05} > /tmp/state_first_l2.py.gz.b64
          cat research/remote/state_first_l2_v2_test.py.gz.b64.part{00..01} > /tmp/test_state_first_l2.py.gz.b64
          base64 --decode /tmp/state_first_l2.py.gz.b64 > /tmp/state_first_l2.py.gz
          base64 --decode /tmp/test_state_first_l2.py.gz.b64 > /tmp/test_state_first_l2.py.gz
          gzip --decompress --stdout /tmp/state_first_l2.py.gz > "$SCRIPT"
          gzip --decompress --stdout /tmp/test_state_first_l2.py.gz > "$TEST_SCRIPT"
          printf '%s  %s\n' "$EXPECTED_SCRIPT_SHA256" "$SCRIPT" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_TEST_SHA256" "$TEST_SCRIPT" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_PREREG_SHA256" "$PREREG" | sha256sum --check --strict
          python -m py_compile "$SCRIPT" "$TEST_SCRIPT"
          cp "$PREREG" "$ROOT/preregistration.json"

      - name: Install fixed research environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "scikit-learn==1.6.1" \
            "huggingface_hub==0.27.1" \
            "hf_xet==1.1.10" \
            "pytest==8.3.4"
          python - <<'PY'
          import json, platform, sys
          import numpy, pandas, pyarrow, sklearn, huggingface_hub
          from pathlib import Path
          root=Path('research_runs/state_first_l2_v2_repaired_20260724')
          payload={
            'python':sys.version,'platform':platform.platform(),'machine':platform.machine(),
            'numpy':numpy.__version__,'pandas':pandas.__version__,'pyarrow':pyarrow.__version__,
            'scikit_learn':sklearn.__version__,'huggingface_hub':huggingface_hub.__version__,
            'stage':'development','2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          (root/'environment.json').write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n')
          PY

      - name: Run causal and accounting regression tests
        shell: bash
        run: |
          set -euo pipefail
          cd "$ROOT"
          pytest -q "$TEST_SCRIPT" 2>&1 | tee unit_tests.log

      - name: Run development stage only
        id: research
        shell: bash
        run: |
          set +e
          set -o pipefail
          python "$SCRIPT" \
            --stage development \
            --work-dir "$ROOT/development" \
            --cache-dir "$HF_HOME" \
            --preregistration "$PREREG" \
            2>&1 | tee "$ROOT/development.log"
          rc=${PIPESTATUS[0]}
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build immutable status and PR report
        if: always()
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root=Path('research_runs/state_first_l2_v2_repaired_20260724')
          checkpoint=root/'development'/'development_frozen.json'
          payload={
            'experiment_rc':int(os.environ.get('EXIT_CODE') or -999),
            'stage':'development','2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          lines=['## State-first L2 V2 repaired development','']
          if checkpoint.exists():
              d=json.loads(checkpoint.read_text())
              payload['screen_gate_count']=int(d.get('screen_gate_count',0))
              payload['realistic_gate_count']=int(d.get('realistic_gate_count',0))
              payload['representatives']=d.get('representatives',[])
              payload['content_digest']=d.get('content_digest')
              lines += [
                f"- process rc: `{payload['experiment_rc']}`",
                f"- screen gate count: `{payload['screen_gate_count']}`",
                f"- realistic gate count: `{payload['realistic_gate_count']}`",
                f"- 2024 selection opened: `false`",
                '', '```json', json.dumps(payload['representatives'][:12],indent=2), '```',
              ]
          else:
              payload['screen_gate_count']=0
              payload['realistic_gate_count']=0
              lines += [f"- process rc: `{payload['experiment_rc']}`", '- status: `FAILED_BEFORE_DEVELOPMENT_CHECKPOINT`']
              log=root/'development.log'
              if log.exists(): lines += ['', '```text', '\n'.join(log.read_text(errors='replace').splitlines()[-160:]), '```']
          (root/'run_status.json').write_text(json.dumps(payload,indent=2,sort_keys=True)+'\n')
          lines += ['', '_Development only. 2024/2025/2026 remain unopened; no order authority._']
          (root/'pr-comment.md').write_text('\n'.join(lines))
          print(json.dumps(payload,sort_keys=True))
          PY

      - name: Publish report to draft PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file "$ROOT/pr-comment.md" --edit-last --create-if-none

      - name: Record output hashes
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find "$ROOT" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$ROOT/OUTPUT_SHA256SUMS.txt"

      - name: Upload complete development evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-first-l2-v2-repaired-${{ github.run_id }}
          path: research_runs/state_first_l2_v2_repaired_20260724
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Preserve failed experiment status
        if: always() && steps.research.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        run: |
          echo "State-first L2 V2 repaired development failed with exit code ${EXIT_CODE}"
          exit 1
