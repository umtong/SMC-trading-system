name: Research V24 Frozen Source Audit Bridge

on:
  pull_request:
    paths:
      - ".github/workflows/research-v24-source-audit-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout frozen V24 base
        uses: actions/checkout@v4
        with:
          ref: research/v24-base-20260723
          fetch-depth: 1
      - name: Locate immutable candidate and evaluator sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research_artifact/matches research_artifact/context
          candidate=117a8c8d3ab465785dac0c715531618d9b75f8c597d86a57d98d50aedb293c68
          evaluator=9cb80ea1fe72aad8710d553408763c313ae9e0fb4cead00a1f2a13c3c764f2d1
          find . -type f -not -path './.git/*' -print0 | sort -z | xargs -0 shasum -a 256 > research_artifact/all_files.sha256
          awk -v c="$candidate" -v e="$evaluator" '$1==c || $1==e {print}' research_artifact/all_files.sha256 | tee research_artifact/hash_matches.txt
          while read -r digest path; do
            [ -n "$path" ] || continue
            clean=${path#./}
            mkdir -p "research_artifact/matches/$(dirname "$clean")"
            cp "$path" "research_artifact/matches/$clean"
          done < research_artifact/hash_matches.txt
          grep -RIl --exclude-dir=.git -E 'C_basis|v24_cross_market_ensemble_v1|basis reversion|basis_z|117a8c8d3ab465785dac0c715531618d9b75f8c597d86a57d98d50aedb293c68|9cb80ea1fe72aad8710d553408763c313ae9e0fb4cead00a1f2a13c3c764f2d1' . \
            | sort | tee research_artifact/context_paths.txt || true
          while read -r path; do
            [ -n "$path" ] || continue
            clean=${path#./}
            case "$clean" in
              *.py|*.json|*.md|*.yml|*.yaml|*.txt)
                mkdir -p "research_artifact/context/$(dirname "$clean")"
                cp "$path" "research_artifact/context/$clean" ;;
            esac
          done < research_artifact/context_paths.txt
          find . -type f -not -path './.git/*' -maxdepth 4 | sort > research_artifact/file_paths.txt
          git rev-parse HEAD > research_artifact/checked_out_commit.txt
          python - <<'PY'
          import json
          from pathlib import Path
          out=Path('research_artifact')
          record={
            'direct_file_hash_matches':len((out/'hash_matches.txt').read_text().splitlines()),
            'context_files':len((out/'context_paths.txt').read_text().splitlines()),
            'candidate_hash':'117a8c8d3ab465785dac0c715531618d9b75f8c597d86a57d98d50aedb293c68',
            'evaluator_hash':'9cb80ea1fe72aad8710d553408763c313ae9e0fb4cead00a1f2a13c3c764f2d1',
            'note':'A zero direct-file match means the registered digest applies to canonical or transported content; context evidence is still preserved without modifying it.',
          }
          (out/'summary.json').write_text(json.dumps(record,indent=2)+'\n')
          print(json.dumps(record,indent=2))
          PY
      - name: Upload immutable source evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v24-frozen-source-audit-${{ github.run_id }}
          path: research_artifact
          if-no-files-found: error
          retention-days: 14
