name: Research official Binance 5m spot-perp basis bundle

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/research-binance-basis-data.yml"
      - "research_tools/binance_basis_bundle.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-binance-basis-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-data-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build checksum-verified basis research bundle
        run: |
          python research_tools/binance_basis_bundle.py \
            --symbols BTCUSDT ETHUSDT \
            --start-month 2023-01 \
            --end-month 2026-06 \
            --output-dir research_artifact/binance_basis_5m
      - name: Inspect outputs
        run: |
          python -m json.tool research_artifact/binance_basis_5m/manifest.json | tail -n 180
          sha256sum research_artifact/binance_basis_5m/*
          du -h research_artifact/binance_basis_5m/*
      - uses: actions/upload-artifact@v4
        with:
          name: binance-basis-5m-2023-01_2026-06
          path: research_artifact/binance_basis_5m
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
