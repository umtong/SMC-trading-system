name: Phase20 maker calibration data

on:
  push:
    branches:
      - research/phase20-maker-calibration-20260723
    paths:
      - '.github/workflows/phase20-maker-calibration.yml'
  pull_request:
    paths:
      - '.github/workflows/phase20-maker-calibration.yml'
      - 'research/phase20-maker-calibration.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase20-maker-calibration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4

      - name: Download checksum-verified bookTicker and aggTrades dates
        shell: bash
        env:
          SYMBOL: ${{ matrix.symbol }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv
          import hashlib
          import io
          import json
          import os
          import urllib.request
          import zipfile
          from pathlib import Path

          symbol = os.environ['SYMBOL']
          # USD-M bookTicker public archives are available only over a limited historical span.
          # Use separated days within that span; this workflow records missing dates as a hard failure.
          days = ['2023-05-16', '2023-06-10', '2023-08-18', '2023-11-09']
          root = Path('artifacts/phase20-maker-calibration') / symbol
          root.mkdir(parents=True, exist_ok=True)
          manifest = {
              'schema_version': 1,
              'symbol': symbol,
              'days': days,
              'sources': [],
              'credentials_used': False,
              'orders_submitted': False,
              'purpose': 'research-only top-of-book queue and post-fill markout calibration',
          }

          def request(url):
              return urllib.request.Request(url, headers={'User-Agent':'smc-phase20-maker-calibration/1.0'})

          for day in days:
              for dtype in ('bookTicker', 'aggTrades'):
                  filename = f'{symbol}-{dtype}-{day}.zip'
                  url = f'https://data.binance.vision/data/futures/um/daily/{dtype}/{symbol}/{filename}'
                  with urllib.request.urlopen(request(url + '.CHECKSUM'), timeout=180) as response:
                      expected = response.read().decode('utf-8-sig').strip().split()[0].lower()
                  with urllib.request.urlopen(request(url), timeout=900) as response:
                      payload = response.read()
                  actual = hashlib.sha256(payload).hexdigest()
                  if actual != expected:
                      raise SystemExit(f'{filename}: checksum mismatch {actual} != {expected}')
                  path = root / filename
                  path.write_bytes(payload)
                  (root / (filename + '.CHECKSUM')).write_text(f'{actual}  {filename}\n', encoding='utf-8')
                  with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                      members = [x for x in archive.namelist() if x.lower().endswith('.csv')]
                      if len(members) != 1:
                          raise SystemExit(f'{filename}: expected one CSV, got {members}')
                      info = archive.getinfo(members[0])
                      with archive.open(members[0]) as fh:
                          reader = csv.reader(io.TextIOWrapper(fh, encoding='utf-8-sig', newline=''))
                          header = next(reader)
                          first_data = next(reader, None)
                  manifest['sources'].append({
                      'day': day,
                      'dtype': dtype,
                      'url': url,
                      'sha256': actual,
                      'archive_bytes': len(payload),
                      'uncompressed_bytes': info.file_size,
                      'member': members[0],
                      'header': header,
                      'first_data': first_data,
                  })
          raw = json.dumps(manifest, ensure_ascii=False, indent=2, sort_keys=True)
          (root / 'MANIFEST.json').write_text(raw + '\n', encoding='utf-8')
          (root / 'MANIFEST.sha256').write_text(hashlib.sha256((raw + '\n').encode()).hexdigest() + '  MANIFEST.json\n')
          print(raw)
          PY

      - name: Upload immutable calibration inputs
        uses: actions/upload-artifact@v4
        with:
          name: phase20-maker-calibration-${{ matrix.symbol }}-${{ github.run_id }}
          path: artifacts/phase20-maker-calibration/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
