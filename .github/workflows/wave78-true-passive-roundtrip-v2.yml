name: Wave78 True Passive Round Trip V2

on:
  pull_request:
    branches: [main]
    paths:
      - 'research/wave78_true_passive_v2/**'
      - '.github/workflows/wave78-true-passive-roundtrip-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wave78-true-passive-v2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONHASHSEED: '0'
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
      CACHE: ${{ github.workspace }}/.wave78-true-passive-cache
      OUTPUT: ${{ github.workspace }}/wave78-true-passive-results
      ROOT: ${{ github.workspace }}/research/wave78_true_passive_v2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave78-true-passive-roundtrip-v2-20260724
          fetch-depth: 1

      - name: Apply deterministic pre-outcome transport repair
        run: |
          set -euo pipefail
          python "$ROOT/repair_transport_boolean_literals.py" "$ROOT/wave78_true_spread_capture_v2.py"
          python -m py_compile "$ROOT/wave78_single_slot_passive.py" "$ROOT/wave78_true_spread_capture_v2.py" "$ROOT/test_true_passive_v2.py"
          git hash-object "$ROOT/wave78_single_slot_passive.py" "$ROOT/wave78_true_spread_capture_v2.py" "$ROOT/AMENDMENT_BEFORE_OUTCOMES.json" | tee wave78-source-blobs.txt

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/cache@v4
        with:
          path: .wave78-true-passive-cache
          key: wave78-true-passive-v2-public-inputs

      - name: Install fixed research environment
        run: |
          python -m pip install --upgrade 'pip==25.1.1'
          python -m pip install \
            'numpy==2.1.3' \
            'pandas==2.2.3' \
            'pyarrow==18.1.0' \
            'scikit-learn==1.6.1' \
            'pytest==8.3.4'

      - name: Run causal queue and partial-fill regression tests
        run: |
          cd "$ROOT"
          pytest -q test_true_passive_v2.py | tee "$GITHUB_WORKSPACE/wave78-tests.log"

      - name: Run pretest chronology without opening conditional 2024 dates
        run: |
          mkdir -p "$OUTPUT"
          python "$ROOT/wave78_true_spread_capture_v2.py" \
            --cache "$CACHE" \
            --output "$OUTPUT" \
            2>&1 | tee "$OUTPUT/research.log"

      - name: Record immutable evidence checksums
        if: always()
        run: |
          mkdir -p "$OUTPUT"
          cp "$ROOT/AMENDMENT_BEFORE_OUTCOMES.json" "$OUTPUT/"
          cp "$ROOT/wave78_single_slot_passive.py" "$OUTPUT/"
          cp "$ROOT/wave78_true_spread_capture_v2.py" "$OUTPUT/"
          cp wave78-source-blobs.txt "$OUTPUT/" || true
          cp wave78-tests.log "$OUTPUT/" || true
          find "$OUTPUT" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$OUTPUT/OUTPUT_SHA256SUMS.txt"

      - name: Upload research evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave78-true-passive-v2-${{ github.run_id }}
          path: wave78-true-passive-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
