name: V18 BTC L2 and OI state research

on:
  pull_request:
    paths:
      - "research/v18_btc_l2_research.py"
      - ".github/workflows/v18-btc-l2-state.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: v18-btc-l2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache public BTC feature dataset
        uses: actions/cache@v4
        with:
          path: .cache/v18-btc-l2
          key: v18-btc-l2-features-2020-2026-v1

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pyarrow scikit-learn lightgbm huggingface_hub hf_xet tabulate

      - name: Compile research runner
        run: python -m py_compile research/v18_btc_l2_research.py

      - name: Run causal feature ablation and chronological evaluation
        id: research
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p artifacts/v18-btc-l2
          python research/v18_btc_l2_research.py \
            --cache .cache/v18-btc-l2 \
            --output artifacts/v18-btc-l2 \
            2>&1 | tee artifacts/v18-btc-l2/run.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build research report
        if: always()
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          import pandas as pd

          root = Path('artifacts/v18-btc-l2')
          lines = ['## V18 BTC L2/OI chronological research', '', f"- process exit code: `{os.environ.get('EXIT_CODE', 'unknown')}`"]
          summary = root / 'summary.json'
          if summary.exists():
              data = json.loads(summary.read_text())
              lines += [
                  f"- target met at 20bp: `{data.get('target_met_20bp')}`",
                  f"- candidate algorithms: `{data.get('candidate_count')}`",
                  f"- eligible before 2025: `{data.get('eligible_pre2025_count')}`",
                  '',
              ]
              terminal = root / 'terminal_fixed.csv'
              if terminal.exists():
                  frame = pd.read_csv(terminal)
                  cols = [c for c in [
                      'candidate_id','cost_bps','final_multiple__calib_2023H2','final_multiple__2024',
                      'final_multiple__2025','final_multiple__2026H1','geo_daily__2025','geo_daily__2026H1',
                      'max_drawdown__2025','max_drawdown__2026H1','trades__2025','trades__2026H1'
                  ] if c in frame.columns]
                  lines += ['### Fixed terminal candidates', '', frame[cols].head(20).to_markdown(index=False), '']
              ablation = root / 'feature_ablation.csv'
              if ablation.exists():
                  frame = pd.read_csv(ablation)
                  cols = [c for c in [
                      'feature_set','candidate_id','final_multiple__calib_2023H2','final_multiple__2024',
                      'final_multiple__2025','final_multiple__2026H1','geo_daily__2025','geo_daily__2026H1'
                  ] if c in frame.columns]
                  lines += ['### Price/flow vs L2 vs full derivatives ablation', '', frame[cols].to_markdown(index=False), '']
          else:
              lines += ['- status: `RUN_FAILED_BEFORE_SUMMARY`', '']
              failure = root / 'failure.txt'
              log = failure if failure.exists() else root / 'run.log'
              if log.exists():
                  lines += ['```text', '\n'.join(log.read_text(errors='replace').splitlines()[-120:]), '```']
          lines += ['', '_Research-only. No paper/live/order/sizing permission._']
          (root / 'pr-comment.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Publish report to draft PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file artifacts/v18-btc-l2/pr-comment.md --edit-last --create-if-none

      - name: Upload complete research evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v18-btc-l2-${{ github.run_id }}
          path: artifacts/v18-btc-l2
          if-no-files-found: error
          retention-days: 30

      - name: Preserve research failure status
        if: always() && steps.research.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.research.outputs.exit_code }}
        run: |
          echo "V18 research failed with exit code ${EXIT_CODE}"
          exit 1
