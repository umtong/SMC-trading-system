name: Liquidation L1 State V1

on:
  push:
    branches: [research/liquidation-l1-state-v1-20260724]
    paths:
      - research_tools/cm_liquidation_tick/**
      - research_tools/liquidation_l1_state_v1/**
      - .github/workflows/liquidation-l1-state-v1.yml
  pull_request:
    branches: [main]
    paths:
      - research_tools/cm_liquidation_tick/**
      - research_tools/liquidation_l1_state_v1/**
      - .github/workflows/liquidation-l1-state-v1.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: liquidation-l1-state-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract:
    runs-on: macos-14
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        month: [2023-06, 2023-07, 2023-08, 2023-09, 2023-10, 2023-11, 2023-12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - name: Reconstruct and verify canonical frozen liquidation windows
        shell: bash
        run: |
          set -euo pipefail
          find research_tools/cm_liquidation_tick -maxdepth 1 -type f -name 'windows.part*' -print | LC_ALL=C sort > /tmp/chunk_order.txt
          test "$(wc -l < /tmp/chunk_order.txt | tr -d ' ')" -gt 0
          while IFS= read -r p; do cat "$p"; done < /tmp/chunk_order.txt > /tmp/windows.transmitted.csv.gz.b64
          python - <<'PY'
          import base64,csv,gzip,hashlib,io,json
          from pathlib import Path
          transmitted=Path('/tmp/windows.transmitted.csv.gz.b64')
          encoded=''.join(transmitted.read_text(encoding='utf-8').split())
          repaired=encoded[:3011]+'t'+encoded[3011:]
          repaired=repaired[:8273]+'k'+repaired[8274:]
          canonical=Path('/tmp/merged_windows_2023.csv.gz.b64')
          canonical.write_text(repaired+'\n',encoding='utf-8')
          packed=base64.b64decode(repaired,validate=True)
          raw=gzip.decompress(packed)
          rows=list(csv.DictReader(io.StringIO(raw.decode('utf-8'))))
          evidence={
            'rows':len(rows),
            'fieldnames':list(rows[0]) if rows else [],
            'canonical_payload_sha256':hashlib.sha256(canonical.read_bytes()).hexdigest(),
            'canonical_gzip_sha256':hashlib.sha256(packed).hexdigest(),
            'canonical_raw_csv_sha256':hashlib.sha256(raw).hexdigest(),
            'orders_submitted':False,
          }
          print(json.dumps(evidence,indent=2))
          assert evidence['canonical_payload_sha256']=='e8db31f2abe9758b09181da74af76a59c164f4a38b886ee3b48ae2265116a72e'
          assert evidence['canonical_gzip_sha256']=='f2f563ec9253db980d8d57241c47bf4c2ba708a4bd2802d0299d65c5aa1852e4'
          assert evidence['canonical_raw_csv_sha256']=='045856c798b5d4b82d48f202ed0238763792f4f8926ca63e60f3cbe9bb93a105'
          assert len(rows)==2964
          assert {'symbol','start_ms','end_ms'} <= set(rows[0])
          PY
      - name: Reconstruct and verify frozen L1 extractor
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p l1-runtime
          python - <<'PY'
          import base64
          from pathlib import Path
          parts=sorted(Path('research_tools/liquidation_l1_state_v1').glob('script.part[0-9][0-9]'))
          if len(parts)!=3: raise SystemExit(f'expected 3 parts, found {len(parts)}')
          encoded=''.join(p.read_text(encoding='utf-8').split() for p in parts)
          Path('l1-runtime/liquidation_l1_state_extract_v1.py').write_bytes(base64.b64decode(encoded,validate=True))
          PY
          echo '7b59b8ffc4d278a7d99a2ef04ba958cfab28be2796554fdb36b17d2a068ba988  l1-runtime/liquidation_l1_state_extract_v1.py' | shasum -a 256 -c -
          python -m py_compile l1-runtime/liquidation_l1_state_extract_v1.py
      - name: Extract checksum-verified event-window L1 states
        run: |
          python l1-runtime/liquidation_l1_state_extract_v1.py \
            --symbol '${{ matrix.symbol }}' \
            --month '${{ matrix.month }}' \
            --windows-b64 /tmp/merged_windows_2023.csv.gz.b64 \
            --output-dir 'liquidation-l1/${{ matrix.symbol }}/${{ matrix.month }}'
      - name: Audit output
        run: |
          python -m json.tool 'liquidation-l1/${{ matrix.symbol }}/${{ matrix.month }}/${{ matrix.symbol }}_${{ matrix.month }}_manifest.json'
          shasum -a 256 liquidation-l1/${{ matrix.symbol }}/${{ matrix.month }}/*
      - uses: actions/upload-artifact@v4
        with:
          name: liquidation-l1-state-v1-${{ matrix.symbol }}-${{ matrix.month }}-${{ github.run_id }}
          path: liquidation-l1/${{ matrix.symbol }}/${{ matrix.month }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
