name: Research Catch-Up Frozen Data Bridge

on:
  pull_request:
    paths:
      - ".github/workflows/research-catchup-hf-data-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install fixed public-data client
        run: python -m pip install huggingface_hub==0.30.2 hf_xet==1.1.10
      - name: Download exact-revision frozen catch-up inputs
        env:
          HF_HOME: ${{ runner.temp }}/hf
          HF_HUB_DOWNLOAD_TIMEOUT: "180"
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json, shutil
          from pathlib import Path
          from huggingface_hub import HfApi, hf_hub_download

          repo_id = "linxy/USDT-M_Perpetual_Futures"
          revision = "0113be29cdcb7e977037d192c1055c01cf0d369e"
          files = [
              f"{symbol}/{symbol}_{suffix}.parquet"
              for symbol in ("BTCUSDT", "ETHUSDT")
              for suffix in ("5m", "metrics", "fundingRate")
          ]
          info = HfApi().dataset_info(repo_id, revision=revision)
          if info.sha != revision:
              raise RuntimeError((info.sha, revision))
          out = Path("research_artifact")
          out.mkdir(exist_ok=True)
          records = []
          for repo_path in files:
              local = Path(hf_hub_download(
                  repo_id=repo_id,
                  filename=repo_path,
                  repo_type="dataset",
                  revision=revision,
              ))
              dest = out / repo_path.replace("/", "__")
              shutil.copyfile(local, dest)
              h = hashlib.sha256(dest.read_bytes()).hexdigest()
              records.append({
                  "repo_path": repo_path,
                  "local_name": dest.name,
                  "bytes": dest.stat().st_size,
                  "sha256": h,
              })
          manifest = {
              "repo_id": repo_id,
              "revision": revision,
              "records": records,
              "credentials": False,
              "orders": False,
              "paper_live": False,
          }
          (out / "manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          print(json.dumps(manifest, indent=2))
          PY
      - name: Upload immutable frozen inputs
        uses: actions/upload-artifact@v4
        with:
          name: catchup-frozen-hf-inputs-${{ github.run_id }}
          path: research_artifact
          if-no-files-found: error
          retention-days: 14
