name: Bybit Linear Cross-Venue 1m Data

on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/download_bybit_public_archive_1m.py
      - .github/workflows/bybit-linear-crossvenue-1m.yml
  push:
    branches:
      - agent/bybit-crossvenue-research
    paths:
      - scripts/download_bybit_public_archive_1m.py
      - .github/workflows/bybit-linear-crossvenue-1m.yml

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install "requests>=2.32"
      - name: Compile collector
        run: python -m py_compile scripts/download_bybit_public_archive_1m.py
      - name: Download gzip-validated Bybit public monthly archives
        run: |
          python scripts/download_bybit_public_archive_1m.py \
            --symbols BTCUSDT ETHUSDT \
            --start-month 2022-01 \
            --end-month 2024-11 \
            --workers 10 \
            --output artifacts/bybit_linear_crossvenue_1m
      - name: Validate immutable snapshot
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('artifacts/bybit_linear_crossvenue_1m')
          manifest=json.loads((root/'manifest.json').read_text())
          if manifest['errors'] or manifest['missing_archives']:
              raise SystemExit(f"incomplete snapshot: {manifest['errors']} {manifest['missing_archives'][:3]}")
          if len(manifest['datasets']) != 70:
              raise SystemExit(f"expected 70 monthly datasets, found {len(manifest['datasets'])}")
          for key, info in manifest['datasets'].items():
              path=root/info['path']
              if not path.exists() or path.stat().st_size <= 0 or info['line_count'] <= 0:
                  raise SystemExit(f'invalid dataset: {key}')
          print(json.dumps({'datasets':len(manifest['datasets']),'requested':manifest['requested']},indent=2))
          PY
      - name: Upload immutable research snapshot
        uses: actions/upload-artifact@v4
        with:
          name: bybit-linear-crossvenue-1m-archive-${{ github.sha }}
          path: artifacts/bybit_linear_crossvenue_1m
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
