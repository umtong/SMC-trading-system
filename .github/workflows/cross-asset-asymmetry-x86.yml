name: Cross-asset asymmetric routing x86 research

on:
  pull_request:
    branches: [main]
    paths:
      - "research/remote/cross_asset_asymmetry.py.gz.b64.part*"
      - "research/cross_asset_asymmetry_20260724/preregistration.json"
      - ".github/workflows/cross-asset-asymmetry-x86.yml"

permissions:
  contents: read

concurrency:
  group: cross-asset-asymmetry-x86-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  research-asymmetry-x86:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf_cache_asymmetry_x86
      HF_HUB_DISABLE_TELEMETRY: "1"
      WORK_DIR: ${{ github.workspace }}/research_runs/cross_asset_asymmetry_x86_20260724
      BASE_SCRIPT: ${{ github.workspace }}/research_runs/cross_asset_asymmetry_x86_20260724/locked_base_wfv.py
      EXPERIMENT_SCRIPT: ${{ github.workspace }}/research_runs/cross_asset_asymmetry_x86_20260724/locked_experiment.py
      PREREGISTRATION: ${{ github.workspace }}/research/cross_asset_asymmetry_20260724/preregistration.json
      EXPECTED_BASE_SHA256: 66b08521a6136ce26fe1c586dcd915877e874228692b03e312fa834afe9554af
      EXPECTED_EXPERIMENT_SHA256: 5b2eb13d43ddf50fe766a0456b24e256a57823539433a43c761490b52cc883c8
      EXPECTED_COMPRESSED_SHA256: 758b23b28df17b1c76490af445071495a29a193c940a70a8c8637b5362aaefa3
      EXPECTED_PREREG_SHA256: f395a2a390614ad93d709a14b6d2aa781e5cbdedee9d84d3c493a66139bfae4e
    steps:
      - name: Checkout isolated research branch
        uses: actions/checkout@v4
        with:
          ref: research/cross-asset-wfv-20260723
          fetch-depth: 1

      - name: Verify immutable research inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          cat research/remote/cross_asset_wfv_v3.py.b64.part{00..06} > /tmp/base_wfv.py.b64
          base64 --decode /tmp/base_wfv.py.b64 > "$BASE_SCRIPT"
          python research/remote/repair_cross_asset_wfv_v3_transfer.py "$BASE_SCRIPT" \
            2>&1 | tee "$WORK_DIR/base_repair.log"
          cat research/remote/cross_asset_asymmetry.py.gz.b64.part{00..01} > /tmp/cross_asset_asymmetry.py.gz.b64
          base64 --decode /tmp/cross_asset_asymmetry.py.gz.b64 > /tmp/cross_asset_asymmetry.py.gz
          printf '%s  %s\n' "$EXPECTED_COMPRESSED_SHA256" /tmp/cross_asset_asymmetry.py.gz | sha256sum --check --strict
          gzip --decompress --stdout /tmp/cross_asset_asymmetry.py.gz > "$EXPERIMENT_SCRIPT"
          printf '%s  %s\n' "$EXPECTED_BASE_SHA256" "$BASE_SCRIPT" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_EXPERIMENT_SHA256" "$EXPERIMENT_SCRIPT" | sha256sum --check --strict
          printf '%s  %s\n' "$EXPECTED_PREREG_SHA256" "$PREREGISTRATION" | sha256sum --check --strict
          python -m py_compile "$BASE_SCRIPT" "$EXPERIMENT_SCRIPT"
          cp "$PREREGISTRATION" "$WORK_DIR/preregistration.json"

      - name: Install fixed research dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "huggingface_hub==0.27.1" \
            "hf_xet==1.1.10"
          python - <<'PY'
          import json, platform, sys, numpy, pandas, pyarrow, huggingface_hub
          from pathlib import Path
          root=Path("research_runs/cross_asset_asymmetry_x86_20260724")
          payload={
              "python":sys.version,
              "platform":platform.platform(),
              "machine":platform.machine(),
              "numpy":numpy.__version__,
              "pandas":pandas.__version__,
              "pyarrow":pyarrow.__version__,
              "huggingface_hub":huggingface_hub.__version__,
              "orders_submitted":False,
              "paper_or_live_started":False,
              "2026_opened":False,
          }
          (root/"environment.json").write_text(json.dumps(payload,indent=2,sort_keys=True),encoding="utf-8")
          print(json.dumps(payload,sort_keys=True))
          PY

      - name: Run 2022-2024 development and causally gated 2025 holdout
        shell: bash
        run: |
          set -uo pipefail
          rc=0
          python "$EXPERIMENT_SCRIPT" \
            --base-script "$BASE_SCRIPT" \
            --preregistration "$PREREGISTRATION" \
            --work-dir "$WORK_DIR" \
            --cache-dir "$HF_HOME" \
            2>&1 | tee "$WORK_DIR/research.log" || rc=$?
          python - "$WORK_DIR/wrapper_status.json" "$rc" <<'PY'
          import json, pathlib, sys
          path=pathlib.Path(sys.argv[1])
          payload={
              "experiment_rc":int(sys.argv[2]),
              "orders_submitted":False,
              "paper_or_live_started":False,
              "2026_opened":False,
          }
          run_status=path.parent/"run_status.json"
          if run_status.exists():
              payload["run_status"]=json.loads(run_status.read_text(encoding="utf-8"))
          path.write_text(json.dumps(payload,indent=2,sort_keys=True),encoding="utf-8")
          print(json.dumps(payload,sort_keys=True))
          PY
          exit 0

      - name: Record checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          find "$WORK_DIR" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$WORK_DIR/OUTPUT_SHA256SUMS.txt"

      - name: Upload research evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-asset-asymmetry-x86-${{ github.sha }}
          path: research_runs/cross_asset_asymmetry_x86_20260724
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
