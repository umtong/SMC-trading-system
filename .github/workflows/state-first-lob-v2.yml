name: State-First L1 Trade-Flow V2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/state-first-lob-v2.yml'
      - 'research/state_first_lob_v2.py'
  push:
    branches: [research/state-first-lob-v1-20260724]
    paths:
      - '.github/workflows/state-first-lob-v2.yml'
      - 'research/state_first_lob_v2.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-lob-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    runs-on: macos-14
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - name: Compile evaluator
        run: python -m py_compile research/state_first_lob_v2.py
      - name: Build checksum-verified causal panel
        run: python research/state_first_lob_v2.py panel --symbol '${{ matrix.symbol }}' --output-dir 'state-first-panel/${{ matrix.symbol }}'
      - name: Audit panel
        run: |
          python -m json.tool 'state-first-panel/${{ matrix.symbol }}/${{ matrix.symbol }}_manifest.json' | tail -n 220
          shasum -a 256 state-first-panel/${{ matrix.symbol }}/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-lob-v2-panel-${{ matrix.symbol }}-${{ github.run_id }}
          path: state-first-panel/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  evaluate:
    needs: panel
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - uses: actions/download-artifact@v4
        with:
          pattern: state-first-lob-v2-panel-*-${{ github.run_id }}
          path: state-first-input
          merge-multiple: true
      - name: Evaluate train, selection, validation, and final date once
        run: python research/state_first_lob_v2.py evaluate --input-dir state-first-input --output-dir state-first-results
      - name: Inspect evidence
        run: |
          python -m json.tool state-first-results/summary.json
          shasum -a 256 state-first-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-lob-v2-results-${{ github.run_id }}
          path: state-first-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
