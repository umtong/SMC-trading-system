name: Build Causal Microstructure Bundle

on:
  push:
    branches:
      - "research/data-microstructure-bundle-20260724"
    paths:
      - "research/build_causal_microstructure_bundle.py"
      - ".github/workflows/build-causal-microstructure-bundle.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-causal-microstructure-bundle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/data-microstructure-bundle-20260724
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip "pandas<3" pyarrow huggingface_hub

      - name: Build future-column-free bundle
        env:
          HF_HUB_DOWNLOAD_TIMEOUT: "120"
        run: |
          rm -rf research/microstructure_bundle
          python research/build_causal_microstructure_bundle.py \
            --start 2023-01-01 \
            --end 2026-05-31 \
            --out research/microstructure_bundle \
            2>&1 | tee research/microstructure_bundle_build.log

      - name: Audit forbidden columns and outputs
        run: |
          test -s research/microstructure_bundle/COMPLETE
          python - <<'PY'
          import json, re
          from pathlib import Path
          manifest = json.loads(Path('research/microstructure_bundle/manifest.json').read_text())
          forbidden = re.compile(manifest['forbidden_pattern'], re.I)
          assert len(manifest['outputs']) >= 4
          assert sum(item['rows'] for item in manifest['outputs']) > 250000
          for item in manifest['outputs']:
              assert not [column for column in item['columns'] if forbidden.search(column)]
              assert item['bytes'] < 95_000_000
          print(json.dumps(manifest['outputs'], indent=2))
          PY

      - name: Commit immutable bundle
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f research/microstructure_bundle research/microstructure_bundle_build.log
          if git diff --cached --quiet; then
            echo "No bundle change"
          else
            git commit -m "Persist causal BTC microstructure research bundle"
            git push origin HEAD:research/data-microstructure-bundle-20260724
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: causal-microstructure-bundle-${{ github.run_id }}
          path: |
            research/microstructure_bundle
            research/microstructure_bundle_build.log
          if-no-files-found: error
          retention-days: 30
