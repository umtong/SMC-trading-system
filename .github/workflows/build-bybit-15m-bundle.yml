name: Build Bybit External 15m Bundle

on:
  push:
    branches:
      - "research/data-bybit-15m-bundle-20260724"
    paths:
      - "research/build_bybit_15m_bundle.py"
      - ".github/workflows/build-bybit-15m-bundle.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-bybit-15m-bundle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/data-bybit-15m-bundle-20260724
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip "pandas<3" pyarrow requests

      - name: Build Bybit external bundle
        run: |
          rm -rf research/bybit_data_bundle
          python research/build_bybit_15m_bundle.py \
            --start 2023-01-01 \
            --end 2026-07-24 \
            --symbols BTCUSDT ETHUSDT \
            --out research/bybit_data_bundle \
            2>&1 | tee research/bybit_data_bundle_build.log

      - name: Audit bundle
        run: |
          test -s research/bybit_data_bundle/COMPLETE
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('research/bybit_data_bundle/manifest.json').read_text())
          assert len(manifest['outputs']) >= 4
          assert sum(item['rows'] for item in manifest['outputs']) > 200000
          for symbol in ['BTCUSDT', 'ETHUSDT']:
              q = manifest['quality'][symbol]
              assert q['duplicates'] == 0
              assert q['ohlc_invalid'] == 0
          for item in manifest['outputs']:
              assert item['bytes'] < 95_000_000
          print(json.dumps(manifest['quality'], indent=2))
          PY

      - name: Commit immutable external bundle
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f research/bybit_data_bundle research/bybit_data_bundle_build.log
          if git diff --cached --quiet; then
            echo "No bundle change"
          else
            git commit -m "Persist Bybit external 15m validation bundle"
            git push origin HEAD:research/data-bybit-15m-bundle-20260724
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bybit-external-15m-bundle-${{ github.run_id }}
          path: |
            research/bybit_data_bundle
            research/bybit_data_bundle_build.log
          if-no-files-found: error
          retention-days: 30
