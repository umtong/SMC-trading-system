name: Queue-Aware Passive L1 V1

on:
  push:
    branches: [research/queue-aware-passive-l1-v1-20260724]
    paths:
      - '.github/workflows/queue-aware-passive-l1-v1.yml'
      - 'research/queue_aware_passive_l1_v1/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/queue-aware-passive-l1-v1.yml'
      - 'research/queue_aware_passive_l1_v1/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: queue-aware-passive-l1-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - name: Verify frozen source and execution-gap correction
        shell: bash
        run: |
          python -m py_compile \
            research/queue_aware_passive_l1_v1/queue_aware_passive_l1_v1.py \
            research/queue_aware_passive_l1_v1/queue_aware_passive_l1_v1_v2.py
          mkdir -p queue-passive-results
          shasum -a 256 \
            research/queue_aware_passive_l1_v1/PREREGISTRATION_KO.md \
            research/queue_aware_passive_l1_v1/queue_aware_passive_l1_v1.py \
            research/queue_aware_passive_l1_v1/queue_aware_passive_l1_v1_v2.py \
            | tee queue-passive-results/SOURCE_SHA256.txt
      - name: Run train-only threshold, selection, validation, and conditional test
        shell: bash
        run: |
          python research/queue_aware_passive_l1_v1/queue_aware_passive_l1_v1_v2.py \
            --cache queue-passive-cache \
            --out queue-passive-results \
            2>&1 | tee queue-passive-results/run.log
      - name: Audit evidence
        if: always()
        shell: bash
        run: |
          find queue-passive-results -maxdepth 1 -type f -print -exec shasum -a 256 {} \;
          test -s queue-passive-results/pretest_summary.json
          python -m json.tool queue-passive-results/pretest_summary.json
          if [ -s queue-passive-results/test_summary.json ]; then python -m json.tool queue-passive-results/test_summary.json; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: queue-aware-passive-l1-v1-${{ github.run_id }}
          path: queue-passive-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
