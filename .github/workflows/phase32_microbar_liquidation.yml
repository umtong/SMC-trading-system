name: Phase32 microbar liquidation-depth research

on:
  push:
    branches:
      - research/phase32-microbar-liquidation
    paths:
      - '.github/workflows/phase32_microbar_liquidation.yml'
      - 'research/phase32_microbar_liquidation/**'
  pull_request:
    paths:
      - '.github/workflows/phase32_microbar_liquidation.yml'
      - 'research/phase32_microbar_liquidation/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas polars pyarrow huggingface_hub
      - name: Reconstruct research script
        run: cat research/phase32_microbar_liquidation/chunks/*.part > ${{ runner.temp }}/phase32_liquidation_depth_state.py
      - name: Compile research script
        run: python -m py_compile ${{ runner.temp }}/phase32_liquidation_depth_state.py
      - name: Run causal liquidation-depth study
        env:
          HF_HOME: ${{ runner.temp }}/hf
        run: |
          set -o pipefail
          python ${{ runner.temp }}/phase32_liquidation_depth_state.py | tee research/phase32_microbar_liquidation/run.log
      - name: Upload compact results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase32-microbar-liquidation-${{ github.run_id }}
          path: |
            research/phase32_microbar_liquidation/results
            research/phase32_microbar_liquidation/run.log
          if-no-files-found: error
          retention-days: 7
