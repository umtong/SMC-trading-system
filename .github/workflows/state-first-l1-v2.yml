name: State-First L1 V2

on:
  push:
    branches: [research/state-first-l1-v2-20260724]
    paths:
      - research/state_first_l1_v2.py
      - research/STATE_FIRST_L1_V2_CONTRACT.md
      - .github/workflows/state-first-l1-v2.yml
  pull_request:
    branches: [main]
    paths:
      - research/state_first_l1_v2.py
      - research/STATE_FIRST_L1_V2_CONTRACT.md
      - .github/workflows/state-first-l1-v2.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-l1-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        day:
          - '2023-06-15'
          - '2023-07-15'
          - '2023-08-15'
          - '2023-09-15'
          - '2023-10-15'
          - '2023-11-15'
          - '2024-06-15'
          - '2024-07-15'
          - '2024-08-15'
          - '2024-09-15'
          - '2024-10-15'
          - '2024-11-15'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - name: Compile frozen evaluator
        run: |
          python -m py_compile research/state_first_l1_v2.py
          sha256sum research/state_first_l1_v2.py research/STATE_FIRST_L1_V2_CONTRACT.md
      - name: Build one checksum-verified causal day panel
        run: |
          python research/state_first_l1_v2.py day \
            --symbol '${{ matrix.symbol }}' \
            --day '${{ matrix.day }}' \
            --cache 'state-first-cache/${{ matrix.symbol }}-${{ matrix.day }}' \
            --out 'state-first-days/${{ matrix.symbol }}-${{ matrix.day }}'
      - name: Audit causal clocks and native BBO execution
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          symbol='${{ matrix.symbol }}';day='${{ matrix.day }}'
          root=Path(f'state-first-days/{symbol}-{day}')
          p=root/f'{symbol}_{day}_l1.csv.gz'
          d=pd.read_csv(p)
          assert len(d)>0
          assert (d.entry_time_ms>d.signal_end_ms).all()
          assert (d.entry_ask>=d.entry_bid).all()
          for h in (3,10,30,60):
              assert (d[f'exit_time_{h}']>=d.entry_time_ms+h*1000).all()
          m=json.loads((root/f'{symbol}_{day}_manifest.json').read_text())
          assert m['rows']==len(d) and not m['orders_submitted']
          print({'rows':len(d),'min_entry_delay_ms':int((d.entry_time_ms-d.signal_end_ms).min())})
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-v2-${{ matrix.symbol }}-${{ matrix.day }}-${{ github.run_id }}
          path: state-first-days/${{ matrix.symbol }}-${{ matrix.day }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  aggregate:
    needs: day
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - uses: actions/download-artifact@v4
        with:
          pattern: state-first-l1-v2-*-${{ github.run_id }}
          path: state-first-input
          merge-multiple: true
      - name: Verify exact panel count and provenance
        run: |
          test "$(find state-first-input -name '*_l1.csv.gz' -type f | wc -l | tr -d ' ')" = 24
          python -m py_compile research/state_first_l1_v2.py
          sha256sum research/state_first_l1_v2.py research/STATE_FIRST_L1_V2_CONTRACT.md
      - name: Run frozen train-calibration-validation screen
        run: python research/state_first_l1_v2.py aggregate --input state-first-input --out state-first-results
      - name: Inspect result
        run: |
          python -m json.tool state-first-results/summary.json
          sha256sum state-first-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-v2-results-${{ github.run_id }}
          path: state-first-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
