name: State-First L1 Trade-Flow V1

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/state-first-lob-v1.yml'
      - 'research_tools/state_first_lob_v1/**'
      - 'registrations/state_first_lob_v1_ko.md'
  push:
    branches: [research/state-first-lob-v1-20260724]
    paths:
      - '.github/workflows/state-first-lob-v1.yml'
      - 'research_tools/state_first_lob_v1/**'
      - 'registrations/state_first_lob_v1_ko.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-lob-v1-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPECTED_EVALUATOR_SHA256: 2d622016999346eca02e98474b5b92e5911fad108e8f88645a5afdc8f9b66afb

jobs:
  panel:
    runs-on: macos-14
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - name: Reconstruct and diagnose frozen evaluator
        id: reconstruct
        shell: bash
        run: |
          mkdir -p state-first-runtime
          set +e
          python - <<'PY' > state-first-runtime/reconstruct.log 2>&1
          import base64, hashlib, pathlib, traceback
          try:
              parts=sorted(pathlib.Path('research_tools/state_first_lob_v1').glob('script.part[0-9][0-9]'))
              if not parts: raise SystemExit('no frozen script chunks')
              encoded=''.join(p.read_text(encoding='utf-8').split() for p in parts)
              padded=encoded + ('=' * (-len(encoded) % 4))
              payload=base64.b64decode(padded, validate=False)
              actual=hashlib.sha256(payload).hexdigest()
              expected='2d622016999346eca02e98474b5b92e5911fad108e8f88645a5afdc8f9b66afb'
              print('parts', [p.name for p in parts])
              print('encoded_chars', len(encoded), 'mod4', len(encoded)%4)
              print('decoded_bytes', len(payload))
              print('actual_sha256', actual)
              print('expected_sha256', expected)
              if actual != expected:
                  raise ValueError(f'frozen evaluator SHA mismatch: {actual} != {expected}')
              pathlib.Path('state-first-runtime/state_first_lob_v1.py').write_bytes(payload)
          except BaseException:
              traceback.print_exc()
              raise
          PY
          decode_code=$?
          compile_code=99
          if [ -f state-first-runtime/state_first_lob_v1.py ]; then
            shasum -a 256 state-first-runtime/state_first_lob_v1.py | tee state-first-runtime/ACTUAL_SHA256.txt
            python -m py_compile state-first-runtime/state_first_lob_v1.py > state-first-runtime/compile.log 2>&1
            compile_code=$?
          else
            printf 'reconstructed evaluator missing\n' > state-first-runtime/compile.log
          fi
          printf '%s\n' "$decode_code" > state-first-runtime/decode.exit_code
          printf '%s\n' "$compile_code" > state-first-runtime/compile.exit_code
          if [ "$decode_code" -eq 0 ] && [ "$compile_code" -eq 0 ]; then ok=true; else ok=false; fi
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
          cat state-first-runtime/reconstruct.log
          cat state-first-runtime/compile.log
          exit 0
      - name: Upload reconstruction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-first-lob-reconstruction-${{ matrix.symbol }}-${{ github.run_id }}
          path: state-first-runtime
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
      - name: Build checksum-verified causal panel
        if: steps.reconstruct.outputs.ok == 'true'
        run: |
          python state-first-runtime/state_first_lob_v1.py panel \
            --symbol '${{ matrix.symbol }}' \
            --cache-dir state-first-cache \
            --output-dir 'state-first-panel/${{ matrix.symbol }}'
      - name: Audit panel
        if: steps.reconstruct.outputs.ok == 'true'
        run: |
          cp state-first-runtime/ACTUAL_SHA256.txt 'state-first-panel/${{ matrix.symbol }}/ACTUAL_EVALUATOR_SHA256.txt'
          python -m json.tool 'state-first-panel/${{ matrix.symbol }}/${{ matrix.symbol }}_manifest.json' | tail -n 220
          shasum -a 256 state-first-panel/${{ matrix.symbol }}/*
          du -h state-first-panel/${{ matrix.symbol }}/*
      - uses: actions/upload-artifact@v4
        if: steps.reconstruct.outputs.ok == 'true'
        with:
          name: state-first-lob-panel-${{ matrix.symbol }}-${{ github.run_id }}
          path: state-first-panel/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
      - name: Fail after preserving reconstruction diagnostics
        if: steps.reconstruct.outputs.ok != 'true'
        run: exit 1

  evaluate:
    needs: panel
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - uses: actions/download-artifact@v4
        with:
          pattern: state-first-lob-panel-*-${{ github.run_id }}
          path: state-first-input
          merge-multiple: true
      - name: Reconstruct, verify and compile evaluator
        shell: bash
        run: |
          mkdir -p state-first-runtime
          python - <<'PY'
          import base64, hashlib, pathlib
          parts=sorted(pathlib.Path('research_tools/state_first_lob_v1').glob('script.part[0-9][0-9]'))
          if not parts: raise SystemExit('no frozen script chunks')
          encoded=''.join(p.read_text(encoding='utf-8').split() for p in parts)
          payload=base64.b64decode(encoded + ('=' * (-len(encoded) % 4)), validate=False)
          actual=hashlib.sha256(payload).hexdigest()
          expected='2d622016999346eca02e98474b5b92e5911fad108e8f88645a5afdc8f9b66afb'
          if actual != expected: raise SystemExit(f'evaluator SHA mismatch: {actual} != {expected}')
          pathlib.Path('state-first-runtime/state_first_lob_v1.py').write_bytes(payload)
          PY
          shasum -a 256 state-first-runtime/state_first_lob_v1.py | tee state-first-runtime/ACTUAL_SHA256.txt
          python -m py_compile state-first-runtime/state_first_lob_v1.py
      - name: Require identical evaluator provenance across panels
        shell: bash
        run: |
          expected=$(awk '{print $1}' state-first-runtime/ACTUAL_SHA256.txt)
          found=0
          while IFS= read -r p; do
            found=$((found+1))
            test "$(awk '{print $1}' "$p")" = "$expected"
          done < <(find state-first-input -name ACTUAL_EVALUATOR_SHA256.txt -type f -print)
          test "$found" -eq 2
      - name: Run train, selection, validation and conditionally open final date once
        run: |
          python state-first-runtime/state_first_lob_v1.py evaluate \
            --input-dir state-first-input \
            --output-dir state-first-results
      - name: Inspect evidence
        run: |
          cp state-first-runtime/ACTUAL_SHA256.txt state-first-results/ACTUAL_EVALUATOR_SHA256.txt
          python -m json.tool state-first-results/summary.json
          shasum -a 256 state-first-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-lob-results-${{ github.run_id }}
          path: state-first-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
