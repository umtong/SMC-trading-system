name: v0.27.1 canonical transport scout diagnostic

on:
  pull_request:
    paths:
      - 'research/v0271_bundle/**'
      - '.github/workflows/v0271-scout-pr2.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ARCHIVE_SHA256: e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9
  PLAN_FILE_SHA256: 723245a408b66808b588be329a1a2cb2f563aaedad260455f4d6626f01f559b1
  PLAN_PAYLOAD_SHA256: c0cf8dacfdcc5474fd58f7570bb18a875481371658ed02ade3e2c0a5d2815f8f
  SOURCE_MANIFEST_SHA256: 9de4136de0c0bb74c8bc3d5cdf7ab235040a56e5e81568e3fee1ffd3a4968a11

jobs:
  scout:
    runs-on: ubuntu-slim
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Canonically reconstruct and verify full archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v0271 evidence
          python - <<'PY' | tee evidence/reconstruction.json
          import base64, hashlib, json
          from pathlib import Path
          root=Path('research/v0271_bundle')
          m=json.loads((root/'TRANSPORT_MANIFEST.json').read_text())
          assert m['candidate_pnl_observed'] is False and m['terminal_holdout_opened'] is False and m['production_enabled'] is False
          encoded=[]; parts=[]
          for item in m['parts']:
              raw=(root/item['name']).read_bytes()
              text=''.join(raw.decode('ascii').split())
              encoded.append(text)
              parts.append({'name':item['name'],'stored_bytes':len(raw),'stored_sha256':hashlib.sha256(raw).hexdigest(),'canonical_characters':len(text)})
          archive=base64.b64decode(''.join(encoded),validate=True)
          sha=hashlib.sha256(archive).hexdigest()
          assert sha==m['archive_sha256']== 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          assert len(archive)==m['archive_bytes']==25084
          Path('/tmp/v0271.tar.xz').write_bytes(archive)
          print(json.dumps({'archive_sha256':sha,'archive_bytes':len(archive),'parts':parts},sort_keys=True,indent=2))
          PY
          echo "${ARCHIVE_SHA256}  /tmp/v0271.tar.xz" | sha256sum -c -
          xz -t /tmp/v0271.tar.xz
          tar -xJf /tmp/v0271.tar.xz -C v0271
          echo "${PLAN_FILE_SHA256}  v0271/artifacts/v027/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v0271/requirements-lock.txt

      - name: Verify frozen source and run official scout
        shell: bash
        working-directory: v0271
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p evidence
          python - <<'PY' | tee evidence/preregistration.json
          import hashlib,json,os
          from pathlib import Path
          def canonical(x): return hashlib.sha256(json.dumps(x,sort_keys=True,separators=(',',':'),ensure_ascii=False,allow_nan=False).encode()).hexdigest()
          def digest(p): return hashlib.sha256(Path(p).read_bytes()).hexdigest()
          p=json.loads(Path('artifacts/v027/research_plan_locked.json').read_text()); q=dict(p); declared=q.pop('plan_payload_sha256')
          assert p['study_id']=='quarter_hour_component_rotation_v0_27_1' and p['candidate_count']==192
          assert canonical(q)==declared==os.environ['PLAN_PAYLOAD_SHA256']
          assert canonical(p['source_files'])==p['source_tree_manifest_sha256']==os.environ['SOURCE_MANIFEST_SHA256']
          for name,expected in p['source_files'].items(): assert digest(name)==expected,name
          assert p['candidate_pnl_observed_before_plan'] is False and p['terminal_holdout_opened_before_plan'] is False and p['production_enabled'] is False
          print(json.dumps({'study_id':p['study_id'],'candidate_count':192,'plan_payload_sha256':declared,'source_manifest_sha256':p['source_tree_manifest_sha256']},sort_keys=True,indent=2))
          PY
          python -m pytest -q | tee evidence/pytest.txt
          python -m compileall -q research scripts tests
          python -m research.v027.qh_pipeline scout --output evidence/scout.json --symbols BTCUSDT ETHUSDT SOLUSDT XRPUSDT 2>&1 | tee evidence/scout.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v0271-canonical-scout-${{ github.run_id }}
          path: |
            evidence
            v0271/evidence
            v0271/artifacts/v027/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
