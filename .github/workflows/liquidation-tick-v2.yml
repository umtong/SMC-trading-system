name: Liquidation Tick V2 Data
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/liquidation-tick-v2.yml'
      - 'research_tools/liquidation_tick_v2/**'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: liquidation-tick-v2-${{ github.ref }}
  cancel-in-progress: true
jobs:
  extract:
    runs-on: macos-14
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        month: [2023-06, 2023-07, 2023-08, 2023-09, 2023-10, 2023-11, 2023-12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify frozen window content and canonicalize transport
        shell: bash
        run: |
          set -euo pipefail
          cat research_tools/liquidation_tick_v2/windows.part* | tr -d '[:space:]' > /tmp/windows.b64
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          import pathlib

          path = pathlib.Path('/tmp/windows.b64')
          encoded = path.read_text()
          compressed = base64.b64decode(encoded, validate=True)
          decoded = gzip.decompress(compressed)
          observed = {
              'encoded_text': hashlib.sha256(encoded.encode()).hexdigest(),
              'gzip_bytes': hashlib.sha256(compressed).hexdigest(),
              'decoded_csv': hashlib.sha256(decoded).hexdigest(),
          }
          expected_decoded = '045856c798b5d4b82d48f202ed0238763792f4f8926ca63e60f3cbe9bb93a105'
          print(observed)
          if observed['decoded_csv'] != expected_decoded:
              raise SystemExit(
                  f"frozen-window content mismatch: observed={observed['decoded_csv']} "
                  f"expected={expected_decoded}"
              )
          PY
      - name: Extract official windows
        run: |
          python research_tools/liquidation_tick_v2/extract.py \
            --symbol '${{ matrix.symbol }}' --month '${{ matrix.month }}' \
            --windows /tmp/windows.b64 \
            --out 'artifact/${{ matrix.symbol }}/${{ matrix.month }}'
      - uses: actions/upload-artifact@v4
        with:
          name: liquidation-v2-${{ matrix.symbol }}-${{ matrix.month }}-${{ github.run_id }}
          path: artifact/${{ matrix.symbol }}/${{ matrix.month }}
          retention-days: 7
          compression-level: 6
          if-no-files-found: error
