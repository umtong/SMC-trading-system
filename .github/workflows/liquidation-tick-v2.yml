name: Liquidation Tick V2 Data
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/liquidation-tick-v2.yml'
      - 'research_tools/liquidation_tick_v2/**'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: liquidation-tick-v2-${{ github.ref }}
  cancel-in-progress: true
jobs:
  extract:
    runs-on: macos-14
    timeout-minutes: 300
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        month: [2023-06, 2023-07, 2023-08, 2023-09, 2023-10, 2023-11, 2023-12]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Diagnose and verify frozen windows
        id: frozen
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p frozen-window-diagnostics
          cat research_tools/liquidation_tick_v2/windows.part* > /tmp/windows.b64
          python - <<'PY'
          import base64
          import csv
          import gzip
          import hashlib
          import io
          import json
          import pathlib

          p = pathlib.Path('/tmp/windows.b64')
          encoded = ''.join(p.read_text().split())
          compressed = base64.b64decode(encoded, validate=True)
          decoded = gzip.decompress(compressed)
          rows = list(csv.DictReader(io.StringIO(decoded.decode())))
          observed = {
              'canonical_base64': hashlib.sha256(encoded.encode()).hexdigest(),
              'gzip_bytes': hashlib.sha256(compressed).hexdigest(),
              'decoded_csv': hashlib.sha256(decoded).hexdigest(),
              'decoded_rows': len(rows),
              'symbols': sorted({str(r.get('symbol')) for r in rows}),
              'first_row': rows[0] if rows else None,
              'last_row': rows[-1] if rows else None,
          }
          expected_content = {
              'gzip_bytes': 'f2f563ec9253db980d8d57241c47bf4c2ba708a4bd2802d0299d65c5aa1852e4',
              'decoded_csv': '045856c798b5d4b82d48f202ed0238763792f4f8926ca63e60f3cbe9bb93a105',
          }
          observed['expected_content'] = expected_content
          observed['content_match'] = all(observed[k] == v for k, v in expected_content.items())
          pathlib.Path('frozen-window-diagnostics/manifest.json').write_text(json.dumps(observed, indent=2, sort_keys=True) + '\n')
          print(json.dumps(observed, indent=2, sort_keys=True))
          if not observed['content_match']:
              raise SystemExit('frozen-window content digest mismatch; extraction remains fail-closed')
          PY
      - name: Upload frozen-window diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: liquidation-v2-window-diagnostics-${{ matrix.symbol }}-${{ matrix.month }}-${{ github.run_id }}
          path: frozen-window-diagnostics
          retention-days: 7
          if-no-files-found: error
      - name: Enforce frozen-window verification
        if: steps.frozen.outcome != 'success'
        run: exit 1
      - name: Extract official windows
        if: steps.frozen.outcome == 'success'
        run: |
          python research_tools/liquidation_tick_v2/extract.py \
            --symbol '${{ matrix.symbol }}' --month '${{ matrix.month }}' \
            --windows /tmp/windows.b64 \
            --out 'artifact/${{ matrix.symbol }}/${{ matrix.month }}'
      - uses: actions/upload-artifact@v4
        if: steps.frozen.outcome == 'success'
        with:
          name: liquidation-v2-${{ matrix.symbol }}-${{ matrix.month }}-${{ github.run_id }}
          path: artifact/${{ matrix.symbol }}/${{ matrix.month }}
          retention-days: 7
          compression-level: 6
          if-no-files-found: error
