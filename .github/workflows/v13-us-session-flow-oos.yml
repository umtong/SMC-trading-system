name: V13 US Session Flow 2024 OOS

on:
  pull_request:
    paths:
      - 'research/v13_us_session_flow_candidate_v1.json'
      - 'research/v13_us_session_flow.py.gz.b64'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  frozen-2024-oos:
    if: github.event_name == 'pull_request' && github.head_ref == 'research/v12-run-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Restore and verify causal data core
        shell: bash
        run: |
          set -euo pipefail
          source_url="https://raw.githubusercontent.com/umtong/SMC-trading-system/f12718079bd05965d9e12e8829e6e7b66a9d9dbd/research/v12_liquidity_shock_bundle.tgz.b64"
          curl --fail --location --retry 5 --retry-all-errors "$source_url" -o /tmp/v12.tgz.b64
          base64 --decode /tmp/v12.tgz.b64 > /tmp/v12.tgz
          echo '746509929aeee1bcf1f2f1881a380895fa670d7eab93146e5e57f105966c1d89  /tmp/v12.tgz' | sha256sum --check --strict
          tar -xzf /tmp/v12.tgz
          patch --batch --forward -p1 < research/v12_gap_segments.patch

      - name: Restore and verify frozen V13 evaluator
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode research/v13_us_session_flow.py.gz.b64 | gzip -d > /tmp/v13_us_session_flow.py
          echo 'b19cfc0e3b54e0126a24afe62073b0ac83b933d8075a08467cf473c6d72d814b  /tmp/v13_us_session_flow.py' | sha256sum --check --strict
          python -m py_compile /tmp/v13_us_session_flow.py

      - name: Mark frozen OOS started
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V13 frozen 2024 OOS\n\n- status: \`RUN_STARTED\`\n- run_id: \`${GITHUB_RUN_ID}\`\n- candidate: \`v13_us_session_flow_v1\`\n- period: \`2024-01-01 through 2025-01-01 UTC\`\n\n_No 2024-driven parameter changes are permitted._" --edit-last --create-if-none

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pandas requests tabulate

      - name: Restore checksum-verified Binance 2024 cache
        uses: actions/cache@v4
        with:
          path: .cache/v13_binance_2024
          key: v13-binance-um-contract-mark-1m-2024-btc-eth-v1

      - name: Run frozen 2024 OOS once
        id: oos
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf artifacts/v13-us-session-flow-2024-oos
          python /tmp/v13_us_session_flow.py \
            --candidate research/v13_us_session_flow_candidate_v1.json \
            --start 2024-01-01 \
            --end 2025-01-01 \
            --cache .cache/v13_binance_2024 \
            --source-dir research/v12_liquidity_shock \
            --output artifacts/v13-us-session-flow-2024-oos \
            2>&1 | tee artifacts-v13-oos.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build OOS PR summary
        if: always()
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import pandas as pd

          out = Path('artifacts/v13-us-session-flow-2024-oos')
          comment = Path('artifacts/v13-oos-pr-comment.md')
          lines = [
              '## V13 frozen 2024 OOS', '',
              f"- run_id: `{os.environ.get('RUN_ID')}`",
              f"- process exit code: `{os.environ.get('OOS_EXIT_CODE', 'unknown')}`",
          ]
          verdict_path = out / 'verdict.json'
          if verdict_path.exists():
              verdict = json.loads(verdict_path.read_text())
              lines += [
                  f"- status: `{verdict.get('status')}`",
                  f"- promote: `{verdict.get('promote')}`",
                  f"- next step: `{verdict.get('next_step')}`", '',
              ]
              metrics_path = out / 'scenario_metrics.csv'
              if metrics_path.exists():
                  metrics = pd.read_csv(metrics_path)
                  cols = ['cost_bps','trades','trades_per_calendar_day','net_r','expectancy_r','profit_factor','terminal_multiple_at_reporting_risk','max_drawdown_at_reporting_risk','positive_month_ratio']
                  lines += ['### Cost scenarios', '', metrics[cols].to_markdown(index=False), '']
              symbol_path = out / 'symbol_metrics.csv'
              if symbol_path.exists():
                  symbol = pd.read_csv(symbol_path)
                  lines += ['### Symbol contribution', '', symbol.to_markdown(index=False), '']
          else:
              lines += ['- status: `RUN_FAILED_BEFORE_VERDICT`', '']
              log = Path('artifacts-v13-oos.log')
              if log.exists():
                  tail = '\n'.join(log.read_text(errors='replace').splitlines()[-160:])
                  lines += ['```text', tail, '```', '']
          lines += ['', '_Research-only. Funding is not yet booked exactly; the 30 bp scenario is a reserve._']
          comment.parent.mkdir(parents=True, exist_ok=True)
          comment.write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload OOS evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v13-us-session-flow-2024-oos-${{ github.run_id }}
          path: |
            artifacts/v13-us-session-flow-2024-oos
            artifacts-v13-oos.log
            artifacts/v13-oos-pr-comment.md
            research/v13_us_session_flow_candidate_v1.json
            research/v13_us_session_flow.py.gz.b64
          if-no-files-found: warn
          retention-days: 30

      - name: Publish OOS summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: gh pr comment "$PR_NUMBER" --body-file artifacts/v13-oos-pr-comment.md --edit-last --create-if-none

      - name: Preserve OOS process failure
        if: always() && steps.oos.outputs.exit_code != '0'
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
        shell: bash
        run: |
          echo "V13 OOS process failed with exit code ${OOS_EXIT_CODE}"
          exit 1
