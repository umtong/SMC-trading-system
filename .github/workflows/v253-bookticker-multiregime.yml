name: V2.53 BookTicker Multi-Regime Cache

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v253-bookticker-multiregime.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v253-bookticker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        day: ['2023-05-16','2023-07-15','2023-09-15','2023-11-15','2024-01-15','2024-03-15']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download and verify official bookTicker and aggTrades
        shell: bash
        env:
          SYMBOL: ${{ matrix.symbol }}
          DAY: ${{ matrix.day }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import csv, hashlib, io, json, os, time, urllib.request, zipfile
          symbol=os.environ['SYMBOL'];day=os.environ['DAY'];out=Path('v253-output')/symbol/day;out.mkdir(parents=True,exist_ok=True)
          root='https://data.binance.vision/data/futures/um/daily'
          report={'symbol':symbol,'day':day,'sources':{}}
          def get(url,timeout=600):
              err=None
              for a in range(6):
                  try:
                      req=urllib.request.Request(url,headers={'User-Agent':'smc-v253-bookticker/1.0'})
                      with urllib.request.urlopen(req,timeout=timeout) as r:return r.read()
                  except Exception as exc:
                      err=exc
                      if a+1<6:time.sleep(min(2**a,20))
              raise RuntimeError(f'{url}: {err!r}')
          for kind in ('bookTicker','aggTrades'):
              name=f'{symbol}-{kind}-{day}.zip';url=f'{root}/{kind}/{symbol}/{name}'
              expected=get(url+'.CHECKSUM',120).decode('utf-8-sig').strip().split()[0].lower();payload=get(url);actual=hashlib.sha256(payload).hexdigest()
              if actual!=expected:raise ValueError(f'{kind} checksum {actual} != {expected}')
              path=out/name;path.write_bytes(payload);(out/(name+'.CHECKSUM')).write_text(f'{actual}  {name}\n')
              with zipfile.ZipFile(io.BytesIO(payload)) as z:
                  members=[n for n in z.namelist() if n.lower().endswith('.csv')]
                  if len(members)!=1:raise ValueError(f'{kind} members {members}')
                  info=z.getinfo(members[0]);rows=0;first=None;last=None
                  with io.TextIOWrapper(z.open(members[0]),encoding='utf-8-sig',newline='') as fh:
                      reader=csv.reader(fh)
                      for row in reader:
                          if not row:continue
                          rows+=1
                          if first is None:first=row
                          last=row
              report['sources'][kind]={'url':url,'sha256':actual,'archive_bytes':len(payload),'member':members[0],'uncompressed_bytes':info.file_size,'rows_including_possible_header':rows,'first_row':first,'last_row':last}
          (out/'manifest.json').write_text(json.dumps(report,indent=2),encoding='utf-8');print(json.dumps(report,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: v253-${{ matrix.symbol }}-${{ matrix.day }}-${{ github.run_id }}
          path: v253-output/${{ matrix.symbol }}/${{ matrix.day }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
