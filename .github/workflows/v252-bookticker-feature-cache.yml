name: V2.52 BTC BookTicker Feature Cache

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/v252-bookticker-feature-cache.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install isolated dependencies
        run: python -m pip install --upgrade pandas pyarrow requests
      - name: Download and validate derived one-minute bookTicker features
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import hashlib, json
          import pandas as pd
          import requests

          url='https://huggingface.co/datasets/Mindbyte-89/btcusdt_perp_bookticker_features_1m_05_2023_to_03_2024/resolve/main/data/train-00000-of-00001.parquet?download=true'
          out=Path('v252-output');out.mkdir(exist_ok=True)
          r=requests.get(url,timeout=300,headers={'User-Agent':'smc-v252-bookticker/1.0'});r.raise_for_status()
          raw=out/'BTCUSDT_bookticker_features_1m.parquet';raw.write_bytes(r.content)
          df=pd.read_parquet(raw).sort_values('timestamp').reset_index(drop=True)
          ts=pd.to_datetime(df.timestamp,utc=True)
          if ts.duplicated().any(): raise ValueError('duplicate timestamps')
          expected=pd.date_range(ts.min(),ts.max(),freq='1min')
          missing=len(expected.difference(pd.DatetimeIndex(ts)))
          required=['bt_spread_bps_close','bt_spread_bps_twap','bt_bid_qty_close','bt_ask_qty_close','bt_imbalance_close','bt_imbalance_twap','bt_microprice_close','bt_microprice_premium_close','bt_update_rate']
          absent=[c for c in required if c not in df.columns]
          if absent: raise ValueError(f'missing {absent}')
          manifest={'source_url':url,'source_sha256':hashlib.sha256(r.content).hexdigest(),'rows':len(df),'columns':list(df.columns),'start':str(ts.min()),'end':str(ts.max()),'missing_minutes':missing,'derived_research_only':True,'production_evidence':False}
          (out/'MANIFEST.json').write_text(json.dumps(manifest,indent=2),encoding='utf-8')
          print(json.dumps(manifest,indent=2))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: v252-bookticker-features-${{ github.run_id }}
          path: v252-output
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
