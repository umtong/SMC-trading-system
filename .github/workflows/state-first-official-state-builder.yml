name: State-first official raw feature builder audit

on:
  pull_request:
    branches: [main]
    paths:
      - "research/state_first_raw_provenance_20260724/build_official_state.py"
      - "research/state_first_raw_provenance_20260724/diagnose_reconciliation.py"
      - "research/state_first_raw_provenance_20260724/builder_preregistration.json"
      - ".github/workflows/state-first-official-state-builder.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-official-builder-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-audit:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    env:
      ROOT: ${{ github.workspace }}/research_runs/state_first_official_builder_20260724
      SCRIPT: ${{ github.workspace }}/research/state_first_raw_provenance_20260724/build_official_state.py
      DIAGNOSTIC: ${{ github.workspace }}/research/state_first_raw_provenance_20260724/diagnose_reconciliation.py
      PREREG: ${{ github.workspace }}/research/state_first_raw_provenance_20260724/builder_preregistration.json
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/state-first-raw-provenance-20260724
          fetch-depth: 1

      - name: Freeze exact source identity before network access
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ROOT"
          python - <<'PY'
          import hashlib,json,os
          from pathlib import Path
          root=Path(os.environ['ROOT'])
          files=[Path(os.environ['SCRIPT']),Path(os.environ['DIAGNOSTIC']),Path(os.environ['PREREG'])]
          payload={
            'git_commit':os.environ.get('GITHUB_SHA'),
            'files':{str(p):{'bytes':p.stat().st_size,'sha256':hashlib.sha256(p.read_bytes()).hexdigest()} for p in files},
            'strategy_executed':False,'candidate_pnl_observed':False,
            '2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          (root/'input_identity.json').write_text(json.dumps(payload,indent=2,sort_keys=True),encoding='utf-8')
          print(json.dumps(payload,indent=2,sort_keys=True))
          PY
          python -m py_compile "$SCRIPT" "$DIAGNOSTIC"
          cp "$SCRIPT" "$ROOT/locked_builder.py"
          cp "$DIAGNOSTIC" "$ROOT/locked_reconciliation_diagnostic.py"
          cp "$PREREG" "$ROOT/builder_preregistration.json"

      - name: Install fixed builder environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "requests==2.32.4"
          python - <<'PY'
          import json,platform,sys,numpy,pandas,pyarrow,requests
          from pathlib import Path
          payload={
            'python':sys.version,'platform':platform.platform(),'machine':platform.machine(),
            'numpy':numpy.__version__,'pandas':pandas.__version__,'pyarrow':pyarrow.__version__,'requests':requests.__version__,
            'strategy_executed':False,'candidate_pnl_observed':False,'2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          root=Path('research_runs/state_first_official_builder_20260724')
          (root/'environment.json').write_text(json.dumps(payload,indent=2,sort_keys=True),encoding='utf-8')
          PY

      - name: Diagnose official aggTrade and kline reconciliation
        shell: bash
        run: |
          set -euo pipefail
          python "$DIAGNOSTIC" --builder "$SCRIPT" --output "$ROOT" 2>&1 | tee "$ROOT/reconciliation.log"

      - name: Reconstruct one-day state features and run point-in-time audits
        shell: bash
        run: |
          set -uo pipefail
          rc=0
          python "$SCRIPT" --output "$ROOT" 2>&1 | tee "$ROOT/builder.log" || rc=$?
          python - "$ROOT/builder_status.json" "$rc" <<'PY'
          import json,pathlib,sys
          path=pathlib.Path(sys.argv[1])
          payload={
            'builder_rc':int(sys.argv[2]),
            'feature_file_exists':(path.parent/'official_state_features_2023-07-03.parquet').exists(),
            'manifest_exists':(path.parent/'official_state_builder_manifest.json').exists(),
            'strategy_executed':False,'candidate_pnl_observed':False,
            '2024_opened':False,'2025_opened':False,'2026_opened':False,
            'orders_submitted':False,'paper_or_live_started':False,
          }
          path.write_text(json.dumps(payload,indent=2,sort_keys=True),encoding='utf-8')
          print(json.dumps(payload,sort_keys=True))
          PY
          exit 0

      - name: Record immutable output checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ROOT"
          find "$ROOT" -type f ! -name OUTPUT_SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$ROOT/OUTPUT_SHA256SUMS.txt"

      - name: Upload compact derived features and audit only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-first-official-builder-${{ github.sha }}
          path: research_runs/state_first_official_builder_20260724
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
