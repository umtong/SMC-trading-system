name: State-First L1 Streaming V3

on:
  push:
    branches: [research/state-first-l1-streaming-v3b-20260724]
    paths:
      - '.github/workflows/state-first-l1-streaming-v3.yml'
      - 'research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/state-first-l1-streaming-v3.yml'
      - 'research_tools/state_first_l1_clean_v2/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: state-first-l1-streaming-v3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  panel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed research environment
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - name: Verify streaming source and synthetic query resolver
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py
          python research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py selftest
          mkdir -p state-first-evidence/${{ matrix.symbol }}
          sha256sum \
            research_tools/state_first_l1_clean_v2/PREREGISTRATION_KO.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_001_TRAIN_ONLY_THRESHOLD.md \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py \
            | tee state-first-evidence/${{ matrix.symbol }}/SOURCE_SHA256.txt
      - name: Build checksum-verified causal panel with bounded memory
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/time -v python research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py panel \
            --symbol '${{ matrix.symbol }}' \
            --data-dir 'state-first-cache/${{ matrix.symbol }}' \
            --output-dir 'state-first-panel/${{ matrix.symbol }}'
      - name: Fail closed on unresolved entries and audit output
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pandas as pd
          from pathlib import Path
          root=Path('state-first-panel/${{ matrix.symbol }}')
          p=next(root.glob('*_state_first_l1_v2.csv.gz'))
          d=pd.read_csv(p,usecols=['entry_time_ms','entry_bid','entry_ask'])
          assert len(d)>0
          assert (d.entry_time_ms>=0).all()
          assert (d.entry_ask>d.entry_bid).all()
          print({'rows':len(d),'invalid_entries':int((d.entry_time_ms<0).sum())})
          PY
          cp state-first-evidence/${{ matrix.symbol }}/SOURCE_SHA256.txt state-first-panel/${{ matrix.symbol }}/SOURCE_SHA256.txt
          python -m json.tool state-first-panel/${{ matrix.symbol }}/${{ matrix.symbol }}_manifest.json
          sha256sum state-first-panel/${{ matrix.symbol }}/*
          rm -rf state-first-cache/${{ matrix.symbol }}
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-streaming-v3-${{ matrix.symbol }}-${{ github.run_id }}
          path: state-first-panel/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  evaluate:
    needs: panel
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed research environment
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'scikit-learn==1.6.1'
      - uses: actions/download-artifact@v4
        with:
          pattern: state-first-l1-streaming-v3-*-${{ github.run_id }}
          path: state-first-input
          merge-multiple: true
      - name: Require identical frozen source provenance
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            research_tools/state_first_l1_clean_v2/PREREGISTRATION_KO.md \
            research_tools/state_first_l1_clean_v2/AMENDMENT_001_TRAIN_ONLY_THRESHOLD.md \
            research_tools/state_first_l1_clean_v2/state_first_l1_clean_v2.py \
            research_tools/state_first_l1_clean_v2/run_fixed.py \
            research_tools/state_first_l1_clean_v2/state_first_l1_streaming_v3.py \
            > expected.txt
          found=0
          while IFS= read -r p; do diff -u expected.txt "$p"; found=$((found+1)); done < <(find state-first-input -name SOURCE_SHA256.txt -type f -print)
          test "$found" -eq 2
      - name: Run train-threshold-locked selection, validation and conditional test
        shell: bash
        run: |
          set -euo pipefail
          python research_tools/state_first_l1_clean_v2/run_fixed.py evaluate \
            --input-dir state-first-input \
            --output-dir state-first-results
      - name: Audit and upload scientific evidence
        shell: bash
        run: |
          set -euo pipefail
          cp expected.txt state-first-results/SOURCE_SHA256.txt
          python -m json.tool state-first-results/summary.json
          sha256sum state-first-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: state-first-l1-streaming-v3-results-${{ github.run_id }}
          path: state-first-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
