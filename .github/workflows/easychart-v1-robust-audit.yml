name: EasyChart V1 official-data robust audit

on:
  push:
    branches:
      - agent/easychart-v1-robust-growth-gate
    paths:
      - "src/ictbt/easychart_v1/**"
      - "tests/easychart_v1/**"
      - "scripts/download_binance_vision_5m.py"
      - "scripts/run_easychart_v1_random_validation.py"
      - "scripts/optimize_easychart_v1_until_promotion.py"
      - "configs/easychart_v1/**"
      - ".github/workflows/easychart-v1-robust-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: easychart-v1-official-data-robust-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: agent/easychart-v1-robust-growth-gate

      - name: Detect materialized V1 source
        id: ready
        shell: bash
        run: |
          if test -f src/ictbt/easychart_v1/strategy.py \
             && test -f scripts/download_binance_vision_5m.py \
             && test -f scripts/run_easychart_v1_random_validation.py; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "V1 source is not materialized yet; the verified materializer will trigger this workflow again."
          fi

      - name: Set up Python
        if: steps.ready.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install candidate
        if: steps.ready.outputs.ready == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Run V0 and V1 regression tests
        if: steps.ready.outputs.ready == 'true'
        run: python -m pytest tests/easychart_v0 tests/easychart_v1 -q

      - name: Record command contracts
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          mkdir -p results/easychart_v1_official_audit
          python scripts/download_binance_vision_5m.py --help \
            > results/easychart_v1_official_audit/download-help.txt
          python scripts/run_easychart_v1_random_validation.py --help \
            > results/easychart_v1_official_audit/validation-help.txt
          python scripts/optimize_easychart_v1_until_promotion.py --help \
            > results/easychart_v1_official_audit/optimizer-help.txt

      - name: Acquire official Binance Vision contract, mark and funding data
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/download_binance_vision_5m.py 2>&1 \
            | tee results/easychart_v1_official_audit/download.log
          df -h | tee results/easychart_v1_official_audit/disk-after-download.txt
          find data -maxdepth 4 -type f -printf '%s %p\n' \
            | sort -k2 \
            > results/easychart_v1_official_audit/data-files.txt

      - name: Run the sealed 1,000-sample 2022-2026 audit
        if: steps.ready.outputs.ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/run_easychart_v1_random_validation.py 2>&1 \
            | tee results/easychart_v1_official_audit/validation.log

      - name: Preserve official-data audit evidence
        if: always() && steps.ready.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: easychart-v1-official-audit-${{ github.run_id }}
          path: |
            results/easychart_v1_official_audit/**
            results/easychart_v1*/**
            artifacts/strategy_composition_2026_07_20/**
            data/**/*manifest*
            data/**/*.sha256
            data/**/*.json
          if-no-files-found: warn
          retention-days: 30
