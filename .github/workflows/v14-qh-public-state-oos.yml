name: V14 Quarter-Hour Public-State 2024 OOS

on:
  pull_request:
    paths:
      - 'research/v14_qh_public_state_model.py.gz.b64'
      - 'research/v14_oos_2024_trigger.json'
      - '.github/workflows/v14-qh-public-state-oos.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  frozen-2024-oos:
    if: github.event_name == 'pull_request' && github.head_ref == 'research/v12-run-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Restore and verify frozen model and exact-flow extractor
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p artifacts
          python - <<'PY' > artifacts/v14-restore.log 2>&1
          import base64, gzip, hashlib
          from pathlib import Path
          files = [
              ('research/v14_quarter_hour_aggtrade.py.gz.b64', '/tmp/v14_quarter_hour_aggtrade.py', '4bcea85958ad0bb387a3686e9e4fc15b31f9adda522a8af05db4474eec941e8f'),
              ('research/v14_qh_public_state_model.py.gz.b64', '/tmp/v14_qh_public_state_model.py', 'ee55026ef55d126fc8347a6641c3c9833dee5e89e152664cea9dadfc898636c6'),
          ]
          for source, destination, expected in files:
              encoded = ''.join(Path(source).read_text(encoding='ascii').split())
              if source.endswith('v14_qh_public_state_model.py.gz.b64'):
                  encoded = encoded.replace(
                      'i/da2OBKc8icf07hcdPlhcnXiderPQjQG3aE21LEJldxxEmMO3PCnwiABrly',
                      'i/da2OBKc8icf07hcdPlhcnXid+rMQjUF3qA11bEIldxxEmMO3PCnwiABrly',
                  )
              decoded = gzip.decompress(base64.b64decode(encoded, validate=True))
              actual = hashlib.sha256(decoded).hexdigest()
              print(source, 'bytes=', len(decoded), 'sha256=', actual, flush=True)
              if actual != expected:
                  raise SystemExit(f'hash mismatch for {source}: expected {expected}, got {actual}')
              Path(destination).write_bytes(decoded)
          PY
          status=$?
          if [ "$status" -eq 0 ]; then
            python -m py_compile /tmp/v14_quarter_hour_aggtrade.py /tmp/v14_qh_public_state_model.py >> artifacts/v14-restore.log 2>&1
            status=$?
          fi
          cat artifacts/v14-restore.log
          exit 0

      - name: Mark frozen OOS started
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V14 frozen 2024 OOS\n\n- status: \`RUN_STARTED\`\n- run_id: \`${GITHUB_RUN_ID}\`\n- train history: \`2023 plus rolling prior 180 days\`\n- evaluation: \`2024-01-01 through 2025-01-01 UTC\`\n- model hash: \`ee55026ef55d126fc8347a6641c3c9833dee5e89e152664cea9dadfc898636c6\`\n\n_One-shot research-only OOS. No refit on 2024._" --edit-last --create-if-none

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pandas requests scikit-learn tabulate

      - name: Restore 2023 public-data cache
        uses: actions/cache@v4
        with:
          path: .cache/v12_binance
          key: v12-binance-um-2023-btc-eth-v2

      - name: Restore 2024 public-data cache
        uses: actions/cache@v4
        with:
          path: .cache/v12_binance_2024
          key: v14-public-2024-btc-eth-v1

      - name: Restore 2023 aggTrade cache
        uses: actions/cache@v4
        with:
          path: .cache/v14_aggtrades_2023
          key: v14-binance-usdm-aggtrades-2023-btc-eth-v1

      - name: Restore 2024 aggTrade cache
        uses: actions/cache@v4
        with:
          path: .cache/v14_aggtrades_2024
          key: v14-binance-usdm-aggtrades-2024-btc-eth-v1

      - name: Build checksum-verified 2023 and 2024 public minute frames
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          import hashlib, json, zipfile
          import pandas as pd
          import requests

          BASE = 'https://data.binance.vision/data/futures/um/monthly'
          symbols = ['BTCUSDT', 'ETHUSDT']
          session = requests.Session()

          def checksum(path: Path) -> str:
              h=hashlib.sha256()
              with path.open('rb') as f:
                  for chunk in iter(lambda:f.read(1024*1024),b''): h.update(chunk)
              return h.hexdigest()

          def download_one(cache: Path, kind: str, symbol: str, month: str) -> Path:
              directory = 'klines' if kind == 'klines' else 'markPriceKlines'
              name=f'{symbol}-1m-{month}.zip'
              url=f'{BASE}/{directory}/{symbol}/1m/{name}'
              out=cache/directory/symbol/'1m'/name
              out.parent.mkdir(parents=True,exist_ok=True)
              expected_path=out.with_suffix(out.suffix+'.CHECKSUM')
              if not expected_path.exists():
                  r=session.get(url+'.CHECKSUM',timeout=60); r.raise_for_status(); expected_path.write_bytes(r.content)
              expected=expected_path.read_text().split()[0].lower()
              if not out.exists() or checksum(out)!=expected:
                  tmp=out.with_suffix('.tmp')
                  r=session.get(url,timeout=180); r.raise_for_status(); tmp.write_bytes(r.content)
                  actual=checksum(tmp)
                  if actual!=expected: raise ValueError(f'checksum mismatch {url}: {actual} != {expected}')
                  tmp.replace(out)
              return out

          def read_kline(path: Path, mark: bool=False) -> pd.DataFrame:
              with zipfile.ZipFile(path) as zf:
                  names=[n for n in zf.namelist() if not n.endswith('/')]
                  if len(names)!=1: raise ValueError(f'unexpected archive members: {path}')
                  raw=pd.read_csv(zf.open(names[0]),header=None)
              if raw.shape[1] < 11: raise ValueError(f'bad kline schema: {path}')
              if mark:
                  x=raw.iloc[:,[0,4]].copy(); x.columns=['open_time','mark_close']
              else:
                  x=raw.iloc[:,[0,1,2,3,4,7,8,10]].copy()
                  x.columns=['open_time','open','high','low','close','quote_volume','trades','taker_buy_quote']
              x['open_time']=pd.to_datetime(x.open_time.astype('int64'),unit='ms',utc=True)
              for c in x.columns[1:]: x[c]=pd.to_numeric(x[c],errors='raise')
              return x

          for year, cache in [(2023,Path('.cache/v12_binance')),(2024,Path('.cache/v12_binance_2024'))]:
              months=[f'{year}-{m:02d}' for m in range(1,13)]
              tasks=[]
              with ThreadPoolExecutor(max_workers=8) as ex:
                  for symbol in symbols:
                      for month in months:
                          for kind in ('klines','mark'):
                              tasks.append(ex.submit(download_one,cache,kind,symbol,month))
                  for fut in as_completed(tasks): fut.result()
              out=Path(f'artifacts/v14-public/{year}'); out.mkdir(parents=True,exist_ok=True)
              summary=[]
              for symbol in symbols:
                  pieces=[]
                  for month in months:
                      trade=read_kline(cache/'klines'/symbol/'1m'/f'{symbol}-1m-{month}.zip')
                      mark=read_kline(cache/'markPriceKlines'/symbol/'1m'/f'{symbol}-1m-{month}.zip',mark=True)
                      merged=trade.merge(mark,on='open_time',how='left',validate='one_to_one')
                      merged=merged.loc[merged.mark_close.notna()].copy()
                      pieces.append(merged)
                  frame=pd.concat(pieces,ignore_index=True).sort_values('open_time',kind='mergesort').drop_duplicates('open_time').reset_index(drop=True)
                  diffs=frame.open_time.diff(); frame['segment_id']=(diffs.isna()|diffs.ne(pd.Timedelta(minutes=1))).cumsum().astype('int64')-1
                  path=out/f'{symbol}_causal_features.csv.gz'
                  frame.to_csv(path,index=False,compression={'method':'gzip','compresslevel':6,'mtime':0})
                  summary.append({'symbol':symbol,'rows':len(frame),'segments':int(frame.segment_id.nunique()),'first_open_time':str(frame.open_time.min()),'last_open_time':str(frame.open_time.max()),'sha256':checksum(path)})
              (out/'summary.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY

      - name: Extract exact first-10-second quarter-hour data for 2023
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/v14-exact/2023
          python /tmp/v14_quarter_hour_aggtrade.py \
            --start 2023-01-01 --end 2024-01-01 \
            --symbols BTCUSDT ETHUSDT \
            --cache .cache/v14_aggtrades_2023 \
            --output artifacts/v14-exact/2023 \
            --workers 4

      - name: Extract exact first-10-second quarter-hour data for 2024
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/v14-exact/2024
          python /tmp/v14_quarter_hour_aggtrade.py \
            --start 2024-01-01 --end 2025-01-01 \
            --symbols BTCUSDT ETHUSDT \
            --cache .cache/v14_aggtrades_2024 \
            --output artifacts/v14-exact/2024 \
            --workers 4

      - name: Run frozen 2024 OOS once
        id: oos
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf artifacts/v14-oos-2024
          python /tmp/v14_qh_public_state_model.py \
            --public-dir artifacts/v14-public/2023 \
            --public-dir artifacts/v14-public/2024 \
            --exact-dir artifacts/v14-exact/2023 \
            --exact-dir artifacts/v14-exact/2024 \
            --evaluation-start 2024-01-01 \
            --evaluation-end 2025-01-01 \
            --output artifacts/v14-oos-2024 \
            2>&1 | tee artifacts-v14-oos.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build OOS summary
        if: always()
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          import pandas as pd
          out = Path('artifacts/v14-oos-2024')
          lines = [
              '## V14 frozen 2024 OOS', '',
              f"- run_id: `{os.environ.get('RUN_ID')}`",
              f"- process exit code: `{os.environ.get('OOS_EXIT_CODE', 'unknown')}`",
          ]
          verdict_path = out / 'verdict.json'
          if verdict_path.exists():
              verdict = json.loads(verdict_path.read_text())
              lines += [
                  f"- status: `{verdict.get('status')}`",
                  f"- promote: `{verdict.get('promote')}`",
                  f"- next step: `{verdict.get('next_step')}`", '',
              ]
              metrics = pd.read_csv(out / 'scenario_metrics.csv')
              lines += ['### Cost scenarios', '', metrics.to_markdown(index=False), '']
              symbols = pd.read_csv(out / 'symbol_metrics.csv')
              lines += ['### Symbol contribution', '', symbols.to_markdown(index=False), '']
          else:
              lines += ['- status: `FAILED_BEFORE_VERDICT`', '']
              for label, log in [('Restore log', Path('artifacts/v14-restore.log')), ('OOS log', Path('artifacts-v14-oos.log'))]:
                  if log.exists():
                      lines += [f'### {label}', '', '```text', '\n'.join(log.read_text(errors='replace').splitlines()[-160:]), '```', '']
          lines += ['', '_Frozen one-shot OOS. A passing screen still requires exact candidate-day protective-stop replay._']
          comment = Path('artifacts/v14-oos-pr-comment.md')
          comment.parent.mkdir(parents=True, exist_ok=True)
          comment.write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload OOS evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-qh-public-state-2024-oos-${{ github.run_id }}
          path: |
            artifacts/v14-oos-2024
            artifacts/v14-public
            artifacts/v14-exact
            artifacts-v14-oos.log
            artifacts/v14-restore.log
            artifacts/v14-oos-pr-comment.md
            research/v14_qh_public_state_model.py.gz.b64
          if-no-files-found: warn
          retention-days: 30

      - name: Publish OOS summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file artifacts/v14-oos-pr-comment.md --edit-last --create-if-none

      - name: Preserve OOS process failure
        if: always() && steps.oos.outputs.exit_code != '0'
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
        run: |
          echo "V14 OOS process failed with exit code ${OOS_EXIT_CODE}"
          exit 1
