name: V14 Quarter-Hour Public-State 2024 OOS

on:
  pull_request:
    paths:
      - 'research/v14_qh_public_state_model.py.gz.b64'
      - 'research/v14_oos_2024_trigger.json'
      - '.github/workflows/v14-qh-public-state-oos.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  frozen-2024-oos:
    if: github.event_name == 'pull_request' && github.head_ref == 'research/v12-run-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Restore and verify frozen model and exact-flow extractor
        shell: bash
        run: |
          set -euxo pipefail
          base64 --decode research/v14_quarter_hour_aggtrade.py.gz.b64 | gzip -d > /tmp/v14_quarter_hour_aggtrade.py
          echo '4bcea85958ad0bb387a3686e9e4fc15b31f9adda522a8af05db4474eec941e8f  /tmp/v14_quarter_hour_aggtrade.py' | sha256sum --check --strict
          base64 --decode research/v14_qh_public_state_model.py.gz.b64 | gzip -d > /tmp/v14_qh_public_state_model.py
          echo '6394c6eaae5c46768f95d775935e43b6c91b3fac56e6de2beec189051fdd1a9e  /tmp/v14_qh_public_state_model.py' | sha256sum --check --strict
          python -m py_compile /tmp/v14_quarter_hour_aggtrade.py /tmp/v14_qh_public_state_model.py

      - name: Mark frozen OOS started
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V14 frozen 2024 OOS\n\n- status: \`RUN_STARTED\`\n- run_id: \`${GITHUB_RUN_ID}\`\n- train history: \`2023 plus rolling prior 180 days\`\n- evaluation: \`2024-01-01 through 2025-01-01 UTC\`\n- model hash: \`6394c6eaae5c46768f95d775935e43b6c91b3fac56e6de2beec189051fdd1a9e\`\n\n_One-shot research-only OOS. No refit on 2024._" --edit-last --create-if-none

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pandas requests scikit-learn tabulate

      - name: Restore 2023 public-data cache
        uses: actions/cache@v4
        with:
          path: .cache/v12_binance
          key: v12-binance-um-2023-btc-eth-v2

      - name: Restore 2024 public-data cache
        uses: actions/cache@v4
        with:
          path: .cache/v12_binance_2024
          key: v14-public-2024-btc-eth-v1

      - name: Restore 2023 aggTrade cache
        uses: actions/cache@v4
        with:
          path: .cache/v14_aggtrades_2023
          key: v14-binance-usdm-aggtrades-2023-btc-eth-v1

      - name: Restore 2024 aggTrade cache
        uses: actions/cache@v4
        with:
          path: .cache/v14_aggtrades_2024
          key: v14-binance-usdm-aggtrades-2024-btc-eth-v1

      - name: Build checksum-verified 2023 and 2024 public minute frames
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          import hashlib
          import io
          import json
          import re
          import zipfile
          import numpy as np
          import pandas as pd
          import requests

          BASE = 'https://data.binance.vision/data/futures/um/monthly'
          SESSION = requests.Session()
          SYMBOLS = ['BTCUSDT', 'ETHUSDT']

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open('rb') as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b''):
                      digest.update(chunk)
              return digest.hexdigest()

          def get(url: str) -> bytes:
              for attempt in range(6):
                  response = SESSION.get(url, timeout=180)
                  if response.status_code == 200:
                      return response.content
                  if response.status_code == 404:
                      raise FileNotFoundError(url)
                  if attempt == 5:
                      response.raise_for_status()
              raise RuntimeError(url)

          def ensure_archive(cache: Path, kind: str, symbol: str, month: str) -> dict:
              folder = cache / symbol / kind / '1m'
              folder.mkdir(parents=True, exist_ok=True)
              name = f'{symbol}-1m-{month}.zip'
              path = folder / name
              url = f'{BASE}/{kind}/{symbol}/1m/{name}'
              checksum_url = url + '.CHECKSUM'
              checksum_bytes = get(checksum_url)
              expected = re.search(rb'([0-9a-fA-F]{64})', checksum_bytes).group(1).decode().lower()
              if not path.exists() or sha256(path) != expected:
                  path.write_bytes(get(url))
              actual = sha256(path)
              if actual != expected:
                  raise ValueError(f'checksum mismatch: {path}')
              return {'kind': kind, 'symbol': symbol, 'month': month, 'path': str(path), 'sha256': actual, 'url': url}

          def read_kline(path: Path) -> pd.DataFrame:
              with zipfile.ZipFile(path) as archive:
                  names = [name for name in archive.namelist() if not name.endswith('/')]
                  if len(names) != 1:
                      raise ValueError(f'unexpected ZIP members: {path}')
                  raw = pd.read_csv(archive.open(names[0]), header=None)
              if raw.shape[1] < 11:
                  raise ValueError(f'bad kline schema: {path}')
              raw = raw.iloc[:, :12].copy()
              raw.columns = ['open_time_ms','open','high','low','close','volume','close_time_ms','quote_volume','trades','taker_buy_base','taker_buy_quote','ignore']
              for col in ['open','high','low','close','quote_volume','taker_buy_quote']:
                  raw[col] = pd.to_numeric(raw[col], errors='raise')
              raw['trades'] = pd.to_numeric(raw['trades'], errors='raise').astype('int64')
              raw['open_time'] = pd.to_datetime(pd.to_numeric(raw['open_time_ms'], errors='raise'), unit='ms', utc=True)
              return raw[['open_time','open','high','low','close','quote_volume','trades','taker_buy_quote']]

          def month_keys(year: int) -> list[str]:
              return [f'{year}-{month:02d}' for month in range(1, 13)]

          for year, cache in [(2023, Path('.cache/v12_binance')), (2024, Path('.cache/v12_binance_2024'))]:
              jobs = [(kind, symbol, month) for symbol in SYMBOLS for month in month_keys(year) for kind in ['klines','markPriceKlines']]
              manifest = []
              with ThreadPoolExecutor(max_workers=8) as pool:
                  futures = {pool.submit(ensure_archive, cache, *job): job for job in jobs}
                  for future in as_completed(futures):
                      manifest.append(future.result())
              out = Path(f'artifacts/v14-public/{year}')
              out.mkdir(parents=True, exist_ok=True)
              pd.DataFrame(manifest).sort_values(['symbol','month','kind']).to_csv(out / 'input_manifest.csv', index=False)
              summary = []
              for symbol in SYMBOLS:
                  pieces = []
                  for month in month_keys(year):
                      trade = read_kline(cache / symbol / 'klines' / '1m' / f'{symbol}-1m-{month}.zip')
                      mark = read_kline(cache / symbol / 'markPriceKlines' / '1m' / f'{symbol}-1m-{month}.zip')[['open_time','close']].rename(columns={'close':'mark_close'})
                      merged = trade.merge(mark, on='open_time', how='left', validate='one_to_one')
                      merged = merged.loc[merged.mark_close.notna()].copy()
                      if merged.empty:
                          raise ValueError(f'no contract/mark overlap {symbol} {month}')
                      pieces.append(merged)
                  frame = pd.concat(pieces, ignore_index=True).sort_values('open_time', kind='mergesort').reset_index(drop=True)
                  if frame.open_time.duplicated().any():
                      raise ValueError(f'{symbol}: duplicate minute')
                  diffs = frame.open_time.diff()
                  frame['segment_id'] = (diffs.isna() | diffs.ne(pd.Timedelta(minutes=1))).cumsum().astype('int64') - 1
                  frame['symbol'] = symbol
                  path = out / f'{symbol}_causal_features.csv.gz'
                  frame.to_csv(path, index=False, compression={'method':'gzip','compresslevel':6,'mtime':0})
                  summary.append({
                      'symbol': symbol,
                      'rows': len(frame),
                      'segments': int(frame.segment_id.nunique()),
                      'first_open_time': str(frame.open_time.min()),
                      'last_open_time': str(frame.open_time.max()),
                      'sha256': sha256(path),
                  })
              (out / 'summary.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          PY

      - name: Extract exact first-10-second quarter-hour data for 2023
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/v14-exact/2023
          python /tmp/v14_quarter_hour_aggtrade.py \
            --start 2023-01-01 --end 2024-01-01 \
            --symbols BTCUSDT ETHUSDT \
            --cache .cache/v14_aggtrades_2023 \
            --output artifacts/v14-exact/2023 \
            --workers 4

      - name: Extract exact first-10-second quarter-hour data for 2024
        shell: bash
        run: |
          set -euo pipefail
          rm -rf artifacts/v14-exact/2024
          python /tmp/v14_quarter_hour_aggtrade.py \
            --start 2024-01-01 --end 2025-01-01 \
            --symbols BTCUSDT ETHUSDT \
            --cache .cache/v14_aggtrades_2024 \
            --output artifacts/v14-exact/2024 \
            --workers 4

      - name: Run frozen 2024 OOS once
        id: oos
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf artifacts/v14-oos-2024
          python /tmp/v14_qh_public_state_model.py \
            --public-dir artifacts/v14-public/2023 \
            --public-dir artifacts/v14-public/2024 \
            --exact-dir artifacts/v14-exact/2023 \
            --exact-dir artifacts/v14-exact/2024 \
            --evaluation-start 2024-01-01 \
            --evaluation-end 2025-01-01 \
            --output artifacts/v14-oos-2024 \
            2>&1 | tee artifacts-v14-oos.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build OOS summary
        if: always()
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          import pandas as pd
          out = Path('artifacts/v14-oos-2024')
          lines = ['## V14 frozen 2024 OOS', '', f"- run_id: `{os.environ.get('RUN_ID')}`", f"- process exit code: `{os.environ.get('OOS_EXIT_CODE', 'unknown')}`"]
          verdict_path = out / 'verdict.json'
          if verdict_path.exists():
              verdict = json.loads(verdict_path.read_text())
              lines += [f"- status: `{verdict.get('status')}`", f"- promote: `{verdict.get('promote')}`", f"- next step: `{verdict.get('next_step')}`", '']
              metrics = pd.read_csv(out / 'scenario_metrics.csv')
              lines += ['### Cost scenarios', '', metrics.to_markdown(index=False), '']
              symbols = pd.read_csv(out / 'symbol_metrics.csv')
              lines += ['### Symbol contribution', '', symbols.to_markdown(index=False), '']
          else:
              lines += ['- status: `FAILED_BEFORE_VERDICT`', '']
              log = Path('artifacts-v14-oos.log')
              if log.exists():
                  lines += ['```text', '\n'.join(log.read_text(errors='replace').splitlines()[-160:]), '```']
          lines += ['', '_Frozen one-shot OOS. A passing screen still requires exact candidate-day protective-stop replay._']
          comment = Path('artifacts/v14-oos-pr-comment.md')
          comment.parent.mkdir(parents=True, exist_ok=True)
          comment.write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload OOS evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v14-qh-public-state-2024-oos-${{ github.run_id }}
          path: |
            artifacts/v14-oos-2024
            artifacts/v14-public
            artifacts/v14-exact
            artifacts-v14-oos.log
            artifacts/v14-oos-pr-comment.md
            research/v14_qh_public_state_model.py.gz.b64
          if-no-files-found: warn
          retention-days: 30

      - name: Publish OOS summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file artifacts/v14-oos-pr-comment.md --edit-last --create-if-none

      - name: Preserve OOS process failure
        if: always() && steps.oos.outputs.exit_code != '0'
        env:
          OOS_EXIT_CODE: ${{ steps.oos.outputs.exit_code }}
        run: |
          echo "V14 OOS process failed with exit code ${OOS_EXIT_CODE}"
          exit 1
