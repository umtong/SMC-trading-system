name: Depth20 maker toxicity V1

on:
  pull_request:
    branches: [main]
    paths:
      - "research/depth20_maker_toxicity_v1/**"
      - ".github/workflows/depth20-maker-toxicity-v1.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: depth20-maker-toxicity-v1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-day:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        day:
          - "2026-03-05"
          - "2026-03-06"
          - "2026-03-09"
          - "2026-03-11"
          - "2026-03-13"
          - "2026-03-14"
          - "2026-03-15"
          - "2026-03-16"
          - "2026-03-18"
          - "2026-03-19"
          - "2026-03-23"
          - "2026-03-25"
          - "2026-03-26"
          - "2026-03-27"
          - "2026-03-28"
          - "2026-03-29"
          - "2026-03-30"
          - "2026-03-31"
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_ETAG_TIMEOUT: "120"
      HF_HUB_DOWNLOAD_TIMEOUT: "300"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install fixed research environment
        run: >-
          python -m pip install --upgrade
          "numpy==2.1.3" "pandas==2.2.3" "pyarrow==18.1.0"
          "scikit-learn==1.6.1" "huggingface_hub==0.27.1"
          "hf_xet==1.1.10" "orjson==3.10.15"

      - name: Restore and verify frozen research source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p maker-source maker-days/${{ matrix.day }}
          python research/depth20_maker_toxicity_v1/restore.py maker-source/depth20_maker_toxicity_v1.py \
            | tee maker-days/${{ matrix.day }}/restore.log
          python -m py_compile maker-source/depth20_maker_toxicity_v1.py
          python maker-source/depth20_maker_toxicity_v1.py synthetic-test \
            | tee maker-days/${{ matrix.day }}/synthetic-test.json
          sha256sum \
            research/depth20_maker_toxicity_v1/part*.b64 \
            research/depth20_maker_toxicity_v1/restore.py \
            research/depth20_maker_toxicity_v1/preregistration.json \
            maker-source/depth20_maker_toxicity_v1.py \
            > maker-days/${{ matrix.day }}/input_sha256.txt

      - name: Build one checksum-verified causal day
        id: build
        shell: bash
        run: |
          set +e
          set -o pipefail
          python maker-source/depth20_maker_toxicity_v1.py build-day \
            --symbol BTCUSDT \
            --day '${{ matrix.day }}' \
            --cache maker-cache/${{ matrix.day }} \
            --output maker-days/${{ matrix.day }} \
            2>&1 | tee maker-days/${{ matrix.day }}/run.log
          rc=${PIPESTATUS[0]}
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record day hashes
        if: always()
        run: |
          find maker-days/${{ matrix.day }} -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z | xargs -0 sha256sum > maker-days/${{ matrix.day }}/SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: depth20-maker-BTCUSDT-${{ matrix.day }}-${{ github.run_id }}
          path: maker-days/${{ matrix.day }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Preserve failed day status
        if: always() && steps.build.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.build.outputs.exit_code }}
        run: |
          echo "day build failed with exit code ${EXIT_CODE}"
          exit 1

  evaluate:
    needs: build-day
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install fixed evaluation environment
        run: >-
          python -m pip install --upgrade
          "numpy==2.1.3" "pandas==2.2.3" "pyarrow==18.1.0"
          "scikit-learn==1.6.1" "orjson==3.10.15"

      - uses: actions/download-artifact@v4
        with:
          pattern: depth20-maker-BTCUSDT-*-${{ github.run_id }}
          path: maker-input

      - name: Restore frozen evaluator
        run: |
          mkdir -p maker-source maker-results
          python research/depth20_maker_toxicity_v1/restore.py maker-source/depth20_maker_toxicity_v1.py \
            | tee maker-results/restore.log
          python -m py_compile maker-source/depth20_maker_toxicity_v1.py
          python maker-source/depth20_maker_toxicity_v1.py synthetic-test \
            | tee maker-results/synthetic-test.json

      - name: Run frozen selection and validation
        id: evaluate
        shell: bash
        run: |
          set +e
          set -o pipefail
          python maker-source/depth20_maker_toxicity_v1.py evaluate \
            --input maker-input \
            --output maker-results \
            2>&1 | tee maker-results/run.log
          rc=${PIPESTATUS[0]}
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build PR report
        if: always()
        env:
          EXIT_CODE: ${{ steps.evaluate.outputs.exit_code }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          import pandas as pd
          root=Path('maker-results')
          lines=['## Depth20 maker toxicity V1','',f"- process rc: `{os.environ.get('EXIT_CODE','unknown')}`"]
          summary=root/'summary.json'
          if summary.exists():
              s=json.loads(summary.read_text())
              lines += [
                f"- selection candidates: `{s.get('selection_candidates')}`",
                f"- eligible selection candidates: `{s.get('eligible_selection_count')}`",
                f"- validation passed: `{s.get('validation_passed')}`",
                f"- terminal opened: `{s.get('sealed_terminal_opened')}`",
                f"- target 1% daily met: `{s.get('target_1pct_daily_met')}`",
                f"- chosen: `{s.get('chosen_candidates')}`",'',
              ]
              v=root/'validation_fixed.csv'
              if v.exists() and v.stat().st_size:
                  df=pd.read_csv(v)
                  cols=[c for c in ['candidate_id','qmult','cost_bp','attempts','fills','fill_rate','final_multiple','geo_daily','max_drawdown','profit_factor','top10_share','positive_day_fraction'] if c in df]
                  lines += ['### Frozen validation', '', df[cols].to_markdown(index=False), '']
          else:
              lines += ['- status: `FAILED_BEFORE_SUMMARY`']
              log=root/'run.log'
              if log.exists(): lines += ['', '```text', '\n'.join(log.read_text(errors='replace').splitlines()[-180:]), '```']
          lines += ['', '_Research only. Terminal 2026-04-03 through 2026-04-07 remains unopened; no paper/live/order authority._']
          (root/'pr-comment.md').write_text('\n'.join(lines))
          PY

      - name: Publish report to draft PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --body-file maker-results/pr-comment.md --edit-last --create-if-none

      - name: Record result hashes
        if: always()
        run: |
          find maker-results -type f ! -name OUTPUT_SHA256SUMS.txt -print0 \
            | sort -z | xargs -0 sha256sum > maker-results/OUTPUT_SHA256SUMS.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: depth20-maker-toxicity-results-${{ github.run_id }}
          path: maker-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6

      - name: Preserve evaluation failure status
        if: always() && steps.evaluate.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.evaluate.outputs.exit_code }}
        run: |
          echo "evaluation failed with exit code ${EXIT_CODE}"
          exit 1
