name: V2.30 Exact Quarter-Hour Holdout Data

on:
  pull_request:
    branches: [main]
    paths:
      - research/v230_quarter_hour_extract.py
      - .github/workflows/research-v230-quarter-hour-holdout.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v230-quarter-hour-holdout-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - {symbol: BTCUSDT, tag: '2025', start: '2025-01-01', end: '2026-01-01'}
          - {symbol: ETHUSDT, tag: '2025', start: '2025-01-01', end: '2026-01-01'}
          - {symbol: BTCUSDT, tag: '2026H1', start: '2026-01-01', end: '2026-07-01'}
          - {symbol: ETHUSDT, tag: '2026H1', start: '2026-01-01', end: '2026-07-01'}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install isolated extraction dependencies
        run: python -m pip install --upgrade numpy pandas requests

      - name: Compile exact extractor
        run: python -m py_compile research/v230_quarter_hour_extract.py

      - name: Extract checksum-verified first-ten-second events
        shell: bash
        run: |
          set -euo pipefail
          python research/v230_quarter_hour_extract.py \
            --start '${{ matrix.start }}' \
            --end '${{ matrix.end }}' \
            --symbols '${{ matrix.symbol }}' \
            --cache '.cache/v230/${{ matrix.symbol }}-${{ matrix.tag }}' \
            --output 'artifacts/v230/${{ matrix.symbol }}-${{ matrix.tag }}' \
            --workers 3 \
            2>&1 | tee 'v230-${{ matrix.symbol }}-${{ matrix.tag }}.log'

      - name: Verify compact artifact identity
        shell: bash
        env:
          ROOT: artifacts/v230/${{ matrix.symbol }}-${{ matrix.tag }}
          SYMBOL: ${{ matrix.symbol }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          root=Path(os.environ['ROOT'])
          summary=json.loads((root/'summary.json').read_text())
          assert len(summary)==1 and summary[0]['symbol']==os.environ['SYMBOL']
          path=root/f"{os.environ['SYMBOL']}_quarter_hour_10s.csv.gz"
          actual=hashlib.sha256(path.read_bytes()).hexdigest()
          assert actual==summary[0]['sha256']
          assert summary[0]['missing_entry']==0
          print(json.dumps(summary,indent=2))
          PY

      - name: Upload immutable compact holdout features
        uses: actions/upload-artifact@v4
        with:
          name: v230-qh-${{ matrix.symbol }}-${{ matrix.tag }}-${{ github.run_id }}
          path: |
            artifacts/v230/${{ matrix.symbol }}-${{ matrix.tag }}
            v230-${{ matrix.symbol }}-${{ matrix.tag }}.log
            research/v230_quarter_hour_extract.py
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
