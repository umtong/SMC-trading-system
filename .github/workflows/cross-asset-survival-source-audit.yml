name: Cross-asset survival source audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/cross-asset-survival-source-audit.yml'
      - 'research/remote/cross_asset_survival_v2.py.gz.b64.part*'
      - 'research/cross_asset_survival_20260724/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cross-asset-survival-source-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct research source without opening 2025 outcomes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source-audit
          python - <<'PY'
          import base64, gzip, hashlib, json
          from pathlib import Path
          source_root=Path('research/remote')
          out=Path('source-audit')
          encoded=b''.join(
              b''.join((source_root/f'cross_asset_survival_v2.py.gz.b64.part{i:02d}').read_bytes().split())
              for i in range(2)
          )
          compressed=base64.b64decode(encoded,validate=True)
          source=gzip.decompress(compressed)
          (out/'cross_asset_survival_v2.py').write_bytes(source)
          prereg=Path('research/cross_asset_survival_20260724/preregistration_v2.json')
          checkpoint_transport=Path('research/cross_asset_survival_20260724/development_frozen.json.gz.b64')
          (out/'preregistration_v2.json').write_bytes(prereg.read_bytes())
          (out/'development_frozen.json.gz.b64').write_bytes(checkpoint_transport.read_bytes())
          checkpoint=gzip.decompress(base64.b64decode(b''.join(checkpoint_transport.read_bytes().split())))
          (out/'development_frozen.json').write_bytes(checkpoint)
          p=json.loads(prereg.read_text())
          evidence={
            'source_sha256':hashlib.sha256(source).hexdigest(),
            'development_checkpoint_sha256':hashlib.sha256(checkpoint).hexdigest(),
            'declared_development_checkpoint_sha256':p['fixed_base']['development_checkpoint_sha256'],
            'checkpoint_match':hashlib.sha256(checkpoint).hexdigest()==p['fixed_base']['development_checkpoint_sha256'],
            'candidate_pnl_observed_in_audit':False,
            'confirmation_2025_opened_in_audit':False,
            'sealed_2026_opened':False,
            'orders_submitted':False,
            'production_enabled':False,
          }
          (out/'audit.json').write_text(json.dumps(evidence,sort_keys=True,indent=2)+'\n')
          print(json.dumps(evidence,sort_keys=True,indent=2))
          PY
          python -m py_compile source-audit/cross_asset_survival_v2.py
          shasum -a 256 source-audit/* | tee source-audit/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cross-asset-survival-source-audit-${{ github.run_id }}
          path: source-audit
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
