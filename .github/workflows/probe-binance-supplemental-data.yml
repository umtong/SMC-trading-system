name: Probe Binance supplemental research data

on:
  push:
    branches:
      - agent/easychart-fresh-causal-rebuild
    paths:
      - ".github/workflows/probe-binance-supplemental-data.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe official archive paths and inspect samples
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import csv
          import hashlib
          import io
          import json
          import urllib.error
          import urllib.request
          import zipfile
          from pathlib import Path

          candidates = {
              "metrics": [
                  "https://data.binance.vision/data/futures/um/daily/metrics/BTCUSDT/BTCUSDT-metrics-2024-01-01.zip",
              ],
              "bookDepth": [
                  "https://data.binance.vision/data/futures/um/daily/bookDepth/BTCUSDT/BTCUSDT-bookDepth-2024-01-01.zip",
              ],
              "fundingRate": [
                  "https://data.binance.vision/data/futures/um/monthly/fundingRate/BTCUSDT/BTCUSDT-fundingRate-2024-01.zip",
              ],
              "prehistory_1m": [
                  "https://data.binance.vision/data/futures/um/monthly/klines/BTCUSDT/1m/BTCUSDT-1m-2020-01.zip",
                  "https://data.binance.vision/data/futures/um/monthly/klines/ETHUSDT/1m/ETHUSDT-1m-2020-01.zip",
              ],
          }

          output = Path("supplemental-probe")
          output.mkdir(exist_ok=True)
          report: dict[str, object] = {}
          for family, urls in candidates.items():
              family_rows = []
              for url in urls:
                  row: dict[str, object] = {"url": url}
                  try:
                      request = urllib.request.Request(url, headers={"User-Agent": "easychart-research/1.0"})
                      with urllib.request.urlopen(request, timeout=90) as response:
                          payload = response.read()
                      row["http_status"] = 200
                      row["bytes"] = len(payload)
                      row["sha256"] = hashlib.sha256(payload).hexdigest()
                      with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                          members = [name for name in archive.namelist() if not name.endswith("/")]
                          row["members"] = members
                          with archive.open(members[0]) as source:
                              text = io.TextIOWrapper(source, encoding="utf-8", newline="")
                              reader = csv.reader(text)
                              sample = []
                              for _ in range(4):
                                  try:
                                      sample.append(next(reader))
                                  except StopIteration:
                                      break
                              row["sample"] = sample
                  except urllib.error.HTTPError as exc:
                      row["http_status"] = exc.code
                      row["error"] = str(exc)
                  family_rows.append(row)
              report[family] = family_rows
          (output / "probe.json").write_text(json.dumps(report, indent=2), encoding="utf-8")
          print(json.dumps(report, indent=2))
          PY

      - name: Upload probe report
        uses: actions/upload-artifact@v4
        with:
          name: binance-supplemental-probe
          path: supplemental-probe/probe.json
          if-no-files-found: error
          retention-days: 7
