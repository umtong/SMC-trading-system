name: Wave39 official 1m support 2022

on:
  pull_request:
    paths:
      - ".github/workflows/wave39-official-support-2022.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-symbol:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        symbol: [BTCUSDT, ETHUSDT, SOLUSDT, XRPUSDT]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download, verify and normalize official support streams
        env:
          SYMBOL: ${{ matrix.symbol }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p raw output
          python - <<'PY'
          from __future__ import annotations
          import csv
          import gzip
          import hashlib
          import io
          import json
          import os
          import time
          import urllib.request
          import zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          symbol = os.environ["SYMBOL"]
          root = "https://data.binance.vision/data/futures/um/monthly"
          months = [f"2022-{month:02d}" for month in range(1, 13)]
          output = Path("output")
          raw = Path("raw")
          source_manifest = []

          def fetch(url: str, retries: int = 6) -> bytes:
              last = None
              for attempt in range(retries):
                  try:
                      request = urllib.request.Request(url, headers={"User-Agent": "wave39-support/1.0"})
                      with urllib.request.urlopen(request, timeout=180) as response:
                          return response.read()
                  except Exception as exc:
                      last = exc
                      if attempt + 1 == retries:
                          break
                      time.sleep(2 ** attempt)
              raise RuntimeError(f"download failed: {url}") from last

          def checksum(payload: bytes) -> str:
              token = payload.decode("utf-8-sig").split()[0].lower()
              if len(token) != 64:
                  raise RuntimeError("invalid checksum")
              return token

          def archive(kind: str, month: str) -> tuple[bytes, dict]:
              if kind == "klines":
                  name = f"{symbol}-1m-{month}.zip"
                  url = f"{root}/klines/{symbol}/1m/{name}"
              elif kind == "markPriceKlines":
                  name = f"{symbol}-1m-{month}.zip"
                  url = f"{root}/markPriceKlines/{symbol}/1m/{name}"
              elif kind == "fundingRate":
                  name = f"{symbol}-fundingRate-{month}.zip"
                  url = f"{root}/fundingRate/{symbol}/{name}"
              else:
                  raise ValueError(kind)
              expected = checksum(fetch(url + ".CHECKSUM"))
              payload = fetch(url)
              actual = hashlib.sha256(payload).hexdigest()
              if actual != expected:
                  raise RuntimeError(f"checksum mismatch {url}")
              return payload, {"kind": kind, "month": month, "url": url, "sha256": actual, "bytes": len(payload)}

          def rows_from_zip(payload: bytes):
              with zipfile.ZipFile(io.BytesIO(payload)) as z:
                  names = sorted(n for n in z.namelist() if n.lower().endswith(".csv"))
                  if not names:
                      raise RuntimeError("archive contains no CSV")
                  for name in names:
                      with z.open(name) as handle:
                          text = io.TextIOWrapper(handle, encoding="utf-8-sig", newline="")
                          yield from csv.reader(text)

          def epoch_ms(value: str) -> int:
              number = int(float(value))
              if number < 10**11:
                  return number * 1000
              if number < 10**14:
                  return number
              if number < 10**17:
                  return number // 1000
              return number // 1_000_000

          kline_header = [
              "open_time_ms", "open", "high", "low", "close", "volume", "close_time_ms",
              "quote_volume", "trade_count", "taker_buy_base", "taker_buy_quote", "ignore"
          ]
          contract_rows = []
          mark_rows = []
          funding_rows = []
          for month in months:
              for kind in ("klines", "markPriceKlines", "fundingRate"):
                  payload, meta = archive(kind, month)
                  source_manifest.append(meta)
                  parsed = 0
                  for row in rows_from_zip(payload):
                      if not row:
                          continue
                      try:
                          if kind in ("klines", "markPriceKlines"):
                              if len(row) < 12:
                                  raise RuntimeError(f"short kline row {len(row)}")
                              timestamp = epoch_ms(row[0])
                              normalized = [timestamp] + row[1:6] + [epoch_ms(row[6])] + row[7:12]
                              target = contract_rows if kind == "klines" else mark_rows
                              target.append(normalized)
                          else:
                              numeric = None
                              for index in (0, 1):
                                  try:
                                      candidate = epoch_ms(row[index])
                                      if 1_500_000_000_000 <= candidate <= 2_000_000_000_000:
                                          numeric = (index, candidate)
                                          break
                                  except Exception:
                                      pass
                              if numeric is None:
                                  if parsed == 0:
                                      continue
                                  raise RuntimeError("funding timestamp not found")
                              rate = None
                              for index in range(len(row) - 1, -1, -1):
                                  if index == numeric[0]:
                                      continue
                                  try:
                                      value = float(row[index])
                                      if abs(value) < 0.1:
                                          rate = value
                                          break
                                  except Exception:
                                      pass
                              if rate is None:
                                  raise RuntimeError("funding rate not found")
                              funding_rows.append([numeric[1], rate])
                          parsed += 1
                      except ValueError:
                          if parsed == 0:
                              continue
                          raise
                  meta["rows"] = parsed

          def write_kline(rows, path: Path):
              rows.sort(key=lambda item: int(item[0]))
              if len({int(row[0]) for row in rows}) != len(rows):
                  raise RuntimeError(f"duplicate timestamps in {path}")
              expected_start = 1640995200000
              expected_end = 1672531200000
              if int(rows[0][0]) != expected_start or int(rows[-1][0]) != expected_end - 60000:
                  raise RuntimeError(f"unexpected coverage in {path}: {rows[0][0]}..{rows[-1][0]}")
              if len(rows) != 365 * 1440:
                  raise RuntimeError(f"row count {len(rows)} != {365*1440}")
              for left, right in zip(rows, rows[1:]):
                  if int(right[0]) - int(left[0]) != 60000:
                      raise RuntimeError(f"clock gap in {path}")
              with gzip.open(path, "wt", newline="") as handle:
                  writer = csv.writer(handle)
                  writer.writerow(kline_header)
                  writer.writerows(rows)

          write_kline(contract_rows, output / f"{symbol}_contract_1m_2022.csv.gz")
          write_kline(mark_rows, output / f"{symbol}_mark_1m_2022.csv.gz")
          funding_rows.sort(key=lambda item: int(item[0]))
          unique = []
          seen = set()
          for row in funding_rows:
              if int(row[0]) in seen:
                  continue
              seen.add(int(row[0]))
              unique.append(row)
          with gzip.open(output / f"{symbol}_funding_2022.csv.gz", "wt", newline="") as handle:
              writer = csv.writer(handle)
              writer.writerow(["funding_time_ms", "funding_rate"])
              writer.writerows(unique)

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          manifest = {
              "schema": "wave39-official-support-v1",
              "symbol": symbol,
              "year": 2022,
              "sources": source_manifest,
              "outputs": {
                  path.name: {"bytes": path.stat().st_size, "sha256": digest(path)}
                  for path in sorted(output.glob("*.csv.gz"))
              },
              "contract_rows": len(contract_rows),
              "mark_rows": len(mark_rows),
              "funding_rows": len(unique),
              "future_outcomes_in_feature_files": False,
          }
          (output / f"{symbol}_support_manifest.json").write_text(
              json.dumps(manifest, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(manifest, indent=2, sort_keys=True))
          PY

      - name: Upload symbol support panel
        uses: actions/upload-artifact@v4
        with:
          name: wave39-support-2022-${{ matrix.symbol }}
          path: output/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  combine-and-persist:
    needs: build-symbol
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: wave39-support-2022-*
          path: support
          merge-multiple: true

      - name: Verify symbol manifests and persist support data
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib
          import json
          from pathlib import Path

          source = Path("support")
          destination = Path("research/wave39/generated/2022/support")
          destination.mkdir(parents=True, exist_ok=True)
          manifests = []
          for symbol in ("BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT"):
              path = source / f"{symbol}_support_manifest.json"
              if not path.exists():
                  raise RuntimeError(f"missing {path}")
              manifest = json.loads(path.read_text(encoding="utf-8"))
              if manifest["schema"] != "wave39-official-support-v1":
                  raise RuntimeError("schema mismatch")
              for name, record in manifest["outputs"].items():
                  item = source / name
                  if hashlib.sha256(item.read_bytes()).hexdigest() != record["sha256"]:
                      raise RuntimeError(f"output hash mismatch {item}")
                  (destination / name).write_bytes(item.read_bytes())
              (destination / path.name).write_bytes(path.read_bytes())
              manifests.append(manifest)
          combined = {
              "schema": "wave39-official-support-combined-v1",
              "year": 2022,
              "symbols": [item["symbol"] for item in manifests],
              "manifest_hashes": {
                  item["symbol"]: hashlib.sha256(
                      (destination / f"{item['symbol']}_support_manifest.json").read_bytes()
                  ).hexdigest()
                  for item in manifests
              },
          }
          (destination / "manifest.json").write_text(
              json.dumps(combined, indent=2, sort_keys=True), encoding="utf-8"
          )
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/wave39/generated/2022/support
          if ! git diff --cached --quiet; then
            git commit -m "Persist Wave39 official 2022 support panel"
            git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
          fi

      - name: Upload combined support evidence
        uses: actions/upload-artifact@v4
        with:
          name: wave39-official-support-2022-${{ github.run_id }}
          path: research/wave39/generated/2022/support/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
