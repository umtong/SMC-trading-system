name: Research verify USD-M bookTicker schema

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/research-verify-um-bookticker.yml"
      - "research_tools/verify_um_bookticker.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-verify-um-bookticker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python research_tools/verify_um_bookticker.py
      - run: python -m json.tool research_artifact/bookticker_schema/manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: um-bookticker-schema-audit
          path: research_artifact/bookticker_schema/manifest.json
          if-no-files-found: error
          retention-days: 3
