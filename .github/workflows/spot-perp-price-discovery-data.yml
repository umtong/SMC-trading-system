name: Spot-perp price discovery data

on:
  push:
    branches:
      - research/spot-perp-price-discovery-20260724
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas
      - name: Download, verify, and canonicalize official Binance spot data
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/build.py <<'PY'
          from __future__ import annotations
          import hashlib, io, json, urllib.request, zipfile
          from pathlib import Path
          import numpy as np
          import pandas as pd

          BASE='https://data.binance.vision/data/spot/monthly/klines'
          OUT=Path('artifact'); RAW=OUT/'raw'; CAN=OUT/'canonical'
          RAW.mkdir(parents=True,exist_ok=True); CAN.mkdir(parents=True,exist_ok=True)
          symbols=('BTCUSDT','ETHUSDT')
          months=pd.period_range('2024-01','2026-06',freq='M').astype(str)
          columns=['open_time_ms','open','high','low','close','base_volume','close_time_ms','quote_volume','trade_count','taker_buy_base','taker_buy_quote','ignore']
          manifest=[]
          def get(url: str) -> bytes:
              req=urllib.request.Request(url,headers={'User-Agent':'SMC-ICT-research-collector/1.0'})
              with urllib.request.urlopen(req,timeout=120) as r:
                  if r.status!=200: raise RuntimeError((url,r.status))
                  return r.read()
          for symbol in symbols:
              frames=[]
              for month in months:
                  fn=f'{symbol}-1m-{month}.zip'; url=f'{BASE}/{symbol}/1m/{fn}'
                  payload=get(url); checksum=get(url+'.CHECKSUM').decode().strip().split()[0].lower()
                  digest=hashlib.sha256(payload).hexdigest()
                  if digest!=checksum: raise RuntimeError(f'checksum mismatch {fn}')
                  path=RAW/symbol/fn; path.parent.mkdir(parents=True,exist_ok=True); path.write_bytes(payload)
                  with zipfile.ZipFile(io.BytesIO(payload)) as zf:
                      names=[n for n in zf.namelist() if n.lower().endswith('.csv')]
                      if len(names)!=1: raise RuntimeError((fn,names))
                      raw=zf.read(names[0])
                  first=raw.splitlines()[0].decode('utf-8-sig').split(',')[0]
                  df=pd.read_csv(io.BytesIO(raw),header=0 if not first.lstrip('-').isdigit() else None)
                  df=df.iloc[:,:12]; df.columns=columns
                  frames.append(df)
                  manifest.append({'symbol':symbol,'month':month,'url':url,'sha256':digest,'bytes':len(payload),'rows':len(df)})
                  print(symbol,month,len(df),digest,flush=True)
              df=pd.concat(frames,ignore_index=True)
              for c in columns: df[c]=pd.to_numeric(df[c],errors='coerce')
              for c in ('open_time_ms','close_time_ms'):
                  a=df[c].fillna(-1).to_numpy(np.int64); a[a>10**14]//=1000; df[c]=a
              before=len(df); df=df.sort_values('open_time_ms').drop_duplicates('open_time_ms',keep='last')
              req=['open','high','low','close','quote_volume','trade_count','taker_buy_quote']
              finite=np.isfinite(df[req].to_numpy(float)).all(axis=1); df=df.loc[finite].reset_index(drop=True)
              t=df.open_time_ms.to_numpy(np.int64); diff=np.diff(t)
              audit={'symbol':symbol,'rows':len(df),'start_ms':int(t[0]),'end_ms':int(t[-1]),'duplicates_removed':before-len(df),'gaps':int((diff!=60000).sum()),'missing_minutes':int(np.maximum(diff//60000-1,0).sum())}
              arrays={c:df[c].to_numpy(np.int64 if c.endswith('_ms') else np.float64) for c in ['open_time_ms','close_time_ms','open','high','low','close','quote_volume','trade_count','taker_buy_quote']}
              np.savez_compressed(CAN/f'{symbol}_spot_1m.npz',**arrays)
              (CAN/f'{symbol}_AUDIT.json').write_text(json.dumps(audit,indent=2,sort_keys=True)+'\n')
          (OUT/'MANIFEST.json').write_text(json.dumps({'source':'official Binance data.binance.vision spot monthly klines','records':manifest},indent=2,sort_keys=True)+'\n')
          sha={str(p.relative_to(OUT)):hashlib.sha256(p.read_bytes()).hexdigest() for p in sorted(OUT.rglob('*')) if p.is_file()}
          (OUT/'FILES.sha256.json').write_text(json.dumps(sha,indent=2,sort_keys=True)+'\n')
          PY
          python /tmp/build.py
      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: spot-perp-price-discovery-20260724
          path: artifact
          compression-level: 0
          retention-days: 7
