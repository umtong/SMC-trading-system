name: Spot-perp price discovery data

on:
  push:
    branches:
      - research/spot-perp-price-discovery-20260724
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.symbol }}-${{ matrix.year }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        year: ['2024', '2025']
    steps:
      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check numpy==2.1.3 pandas==2.2.3 requests==2.32.4
      - name: Download, verify, and canonicalize official Binance spot data
        env:
          SYMBOL: ${{ matrix.symbol }}
          YEAR: ${{ matrix.year }}
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/build.py <<'PY'
          from __future__ import annotations
          import hashlib, io, json, os, time, zipfile
          from pathlib import Path
          import numpy as np
          import pandas as pd
          import requests

          symbol=os.environ['SYMBOL']; year=int(os.environ['YEAR'])
          roots=(
              'https://data.binance.vision/data/spot/monthly/klines',
              'https://s3-ap-northeast-1.amazonaws.com/data.binance.vision/data/spot/monthly/klines',
          )
          out=Path('artifact'); raw_root=out/'raw'/symbol; canonical=out/'canonical'
          raw_root.mkdir(parents=True,exist_ok=True); canonical.mkdir(parents=True,exist_ok=True)
          columns=['open_time_ms','open','high','low','close','base_volume','close_time_ms','quote_volume','trade_count','taker_buy_base','taker_buy_quote','ignore']
          records=[]; failures=[]; frames=[]

          def get(relative: str) -> tuple[bytes,str]:
              errors=[]
              for root in roots:
                  url=f'{root}/{relative}'
                  for attempt in range(5):
                      try:
                          print('GET',url,'attempt',attempt+1,flush=True)
                          r=requests.get(url,timeout=180,headers={'User-Agent':'SMC-ICT-research-collector/3.0'})
                          if r.status_code==200 and r.content:
                              return r.content,url
                          errors.append(f'{url}:HTTP{r.status_code}')
                          if r.status_code in (403,404): break
                      except Exception as exc:
                          errors.append(f'{url}:{type(exc).__name__}:{exc}')
                      time.sleep(min(20,2**attempt))
              raise RuntimeError('; '.join(errors))

          for month in range(1,13):
              label=f'{year:04d}-{month:02d}'; fn=f'{symbol}-1m-{label}.zip'; rel=f'{symbol}/1m/{fn}'
              try:
                  payload,url=get(rel); chk,chk_url=get(rel+'.CHECKSUM')
                  expected=chk.decode().strip().split()[0].lower(); actual=hashlib.sha256(payload).hexdigest()
                  if expected!=actual: raise RuntimeError(f'checksum mismatch {actual} != {expected}')
                  path=raw_root/fn; path.write_bytes(payload)
                  with zipfile.ZipFile(io.BytesIO(payload)) as zf:
                      names=[n for n in zf.namelist() if n.lower().endswith('.csv')]
                      if len(names)!=1: raise RuntimeError(names)
                      csv_bytes=zf.read(names[0])
                  first=csv_bytes.splitlines()[0].decode('utf-8-sig').split(',')[0].strip(); has_header=not first.lstrip('-').isdigit()
                  frame=pd.read_csv(io.BytesIO(csv_bytes),header=0 if has_header else None)
                  frame=frame.iloc[:,:12]; frame.columns=columns
                  frames.append(frame)
                  records.append({'symbol':symbol,'month':label,'url':url,'checksum_url':chk_url,'sha256':actual,'bytes':len(payload),'rows':len(frame),'status':'downloaded'})
                  print('OK',symbol,label,len(frame),actual,flush=True)
              except Exception as exc:
                  failures.append({'symbol':symbol,'month':label,'status':'failed','error':f'{type(exc).__name__}:{exc}'})
                  print('FAILED',symbol,label,repr(exc),flush=True)

          if len(frames)<10:
              raise RuntimeError(f'insufficient verified months for {symbol}-{year}: {len(frames)}')
          df=pd.concat(frames,ignore_index=True)
          for col in columns: df[col]=pd.to_numeric(df[col],errors='coerce')
          for col in ('open_time_ms','close_time_ms'):
              arr=df[col].fillna(-1).to_numpy(np.int64); arr[arr>10**14]//=1000; df[col]=arr
          before=len(df); df=df.sort_values('open_time_ms').drop_duplicates('open_time_ms',keep='last')
          required=['open','high','low','close','quote_volume','trade_count','taker_buy_quote']
          finite=np.isfinite(df[required].to_numpy(float)).all(axis=1); nonfinite=int((~finite).sum()); df=df.loc[finite].reset_index(drop=True)
          high2=df[['open','high','low','close']].max(axis=1); low2=df[['open','high','low','close']].min(axis=1)
          repairs=int(((high2!=df.high)|(low2!=df.low)).sum()); df['high']=high2; df['low']=low2
          t=df.open_time_ms.to_numpy(np.int64); diff=np.diff(t)
          audit={'symbol':symbol,'year':year,'months':len(frames),'rows':len(df),'start_ms':int(t[0]),'end_ms':int(t[-1]),'duplicates_removed':int(before-len(df)),'nonfinite_removed':nonfinite,'envelope_repairs':repairs,'gaps':int((diff!=60000).sum()),'missing_minutes':int(np.maximum(diff//60000-1,0).sum())}
          arrays={col:df[col].to_numpy(np.int64 if col.endswith('_ms') else np.float64) for col in ['open_time_ms','close_time_ms','open','high','low','close','quote_volume','trade_count','taker_buy_quote']}
          np.savez_compressed(canonical/f'{symbol}_spot_1m_{year}.npz',**arrays)
          (canonical/f'{symbol}_{year}_AUDIT.json').write_text(json.dumps(audit,indent=2,sort_keys=True)+'\n')
          manifest={'source':'official Binance spot monthly klines with official checksum','symbol':symbol,'year':year,'records':records,'failures':failures,'audit':audit}
          (out/'MANIFEST.json').write_text(json.dumps(manifest,indent=2,sort_keys=True)+'\n')
          hashes={str(p.relative_to(out)):hashlib.sha256(p.read_bytes()).hexdigest() for p in sorted(out.rglob('*')) if p.is_file()}
          (out/'FILES.sha256.json').write_text(json.dumps(hashes,indent=2,sort_keys=True)+'\n')
          PY
          python /tmp/build.py
      - name: Upload research artifact
        uses: actions/upload-artifact@v4
        with:
          name: spot-perp-${{ matrix.symbol }}-${{ matrix.year }}
          path: artifact
          compression-level: 0
          retention-days: 7
