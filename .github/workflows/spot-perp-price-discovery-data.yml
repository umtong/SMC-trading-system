name: Spot-perp price discovery data macOS

on:
  push:
    branches:
      - research/spot-perp-price-discovery-macos-20260724
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/spot-perp-price-discovery-data.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Set up fixed Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install fixed Python dependencies
        run: python -m pip install --disable-pip-version-check 'numpy==2.1.3' 'pandas==2.2.3' 'requests==2.32.3'
      - name: Download, verify, and canonicalize official Binance spot data
        id: collect
        shell: bash
        run: |
          set +e
          set -o pipefail
          cat > /tmp/build.py <<'PY'
          from __future__ import annotations
          import hashlib, io, json, time, zipfile
          from pathlib import Path
          import numpy as np
          import pandas as pd
          import requests

          ROOTS=(
              'https://data.binance.vision/data/spot/monthly/klines',
              'https://s3-ap-northeast-1.amazonaws.com/data.binance.vision/data/spot/monthly/klines',
          )
          OUT=Path('artifact'); RAW=OUT/'raw'; CAN=OUT/'canonical'
          RAW.mkdir(parents=True,exist_ok=True); CAN.mkdir(parents=True,exist_ok=True)
          symbols=('BTCUSDT','ETHUSDT')
          months=pd.period_range('2024-01','2026-05',freq='M').astype(str)
          columns=['open_time_ms','open','high','low','close','base_volume','close_time_ms','quote_volume','trade_count','taker_buy_base','taker_buy_quote','ignore']
          records=[]; failures=[]

          def write_partial() -> None:
              manifest={'source':'official Binance data.binance.vision spot monthly klines with official S3 fallback','records':records,'failures':failures}
              (OUT/'MANIFEST.partial.json').write_text(json.dumps(manifest,indent=2,sort_keys=True)+'\n')

          def get(relative: str) -> tuple[bytes,str]:
              errors=[]
              for root in ROOTS:
                  url=f'{root}/{relative}'
                  for attempt in range(4):
                      try:
                          print('GET',url,'attempt',attempt+1,flush=True)
                          response=requests.get(url,timeout=180,headers={'User-Agent':'SMC-ICT-research-collector/2.1'})
                          if response.status_code==200 and response.content:
                              return response.content,url
                          errors.append(f'{url}:HTTP{response.status_code}')
                          if response.status_code in (403,404): break
                      except Exception as exc:
                          errors.append(f'{url}:{type(exc).__name__}:{exc}')
                      time.sleep(2**attempt)
              raise RuntimeError('; '.join(errors))

          try:
              for symbol in symbols:
                  frames=[]
                  for month in months:
                      fn=f'{symbol}-1m-{month}.zip'; relative=f'{symbol}/1m/{fn}'
                      try:
                          payload,url=get(relative)
                          checksum_payload,checksum_url=get(relative+'.CHECKSUM')
                          checksum=checksum_payload.decode().strip().split()[0].lower()
                          digest=hashlib.sha256(payload).hexdigest()
                          if digest!=checksum: raise RuntimeError(f'checksum mismatch {fn}: {digest} != {checksum}')
                          path=RAW/symbol/fn; path.parent.mkdir(parents=True,exist_ok=True); path.write_bytes(payload)
                          with zipfile.ZipFile(io.BytesIO(payload)) as zf:
                              names=[n for n in zf.namelist() if n.lower().endswith('.csv')]
                              if len(names)!=1: raise RuntimeError((fn,names))
                              raw=zf.read(names[0])
                          first=raw.splitlines()[0].decode('utf-8-sig').split(',')[0]
                          df=pd.read_csv(io.BytesIO(raw),header=0 if not first.lstrip('-').isdigit() else None)
                          df=df.iloc[:,:12]; df.columns=columns
                          frames.append(df)
                          records.append({'symbol':symbol,'month':month,'url':url,'checksum_url':checksum_url,'sha256':digest,'bytes':len(payload),'rows':len(df),'status':'downloaded'})
                          print('OK',symbol,month,len(df),digest,flush=True)
                      except Exception as exc:
                          failures.append({'symbol':symbol,'month':month,'status':'failed','error':f'{type(exc).__name__}:{exc}'})
                          print('FAILED',symbol,month,repr(exc),flush=True)
                      write_partial()
                  if len(frames)<24:
                      raise RuntimeError(f'insufficient verified months for {symbol}: {len(frames)}')
                  df=pd.concat(frames,ignore_index=True)
                  for col in columns: df[col]=pd.to_numeric(df[col],errors='coerce')
                  for col in ('open_time_ms','close_time_ms'):
                      arr=df[col].fillna(-1).to_numpy(np.int64); arr[arr>10**14]//=1000; df[col]=arr
                  before=len(df); df=df.sort_values('open_time_ms').drop_duplicates('open_time_ms',keep='last')
                  required=['open','high','low','close','quote_volume','trade_count','taker_buy_quote']
                  finite=np.isfinite(df[required].to_numpy(float)).all(axis=1); df=df.loc[finite].reset_index(drop=True)
                  time_values=df.open_time_ms.to_numpy(np.int64); diff=np.diff(time_values)
                  audit={'symbol':symbol,'rows':len(df),'months':len(frames),'start_ms':int(time_values[0]),'end_ms':int(time_values[-1]),'duplicates_removed':before-len(df),'gaps':int((diff!=60000).sum()),'missing_minutes':int(np.maximum(diff//60000-1,0).sum())}
                  arrays={col:df[col].to_numpy(np.int64 if col.endswith('_ms') else np.float64) for col in ['open_time_ms','close_time_ms','open','high','low','close','quote_volume','trade_count','taker_buy_quote']}
                  np.savez_compressed(CAN/f'{symbol}_spot_1m.npz',**arrays)
                  (CAN/f'{symbol}_AUDIT.json').write_text(json.dumps(audit,indent=2,sort_keys=True)+'\n')
              manifest={'source':'official Binance data.binance.vision spot monthly klines with official S3 fallback','records':records,'failures':failures}
              (OUT/'MANIFEST.json').write_text(json.dumps(manifest,indent=2,sort_keys=True)+'\n')
              hashes={str(path.relative_to(OUT)):hashlib.sha256(path.read_bytes()).hexdigest() for path in sorted(OUT.rglob('*')) if path.is_file()}
              (OUT/'FILES.sha256.json').write_text(json.dumps(hashes,indent=2,sort_keys=True)+'\n')
          finally:
              write_partial()
          PY
          python /tmp/build.py 2>&1 | tee collector.log
          status=${PIPESTATUS[0]}
          echo "$status" | tee collector.exit
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload research artifact and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spot-perp-price-discovery-macos-20260724-${{ github.run_id }}
          path: |
            artifact
            collector.log
            collector.exit
          if-no-files-found: warn
          compression-level: 0
          retention-days: 7
