name: v0.24 microstructure locked research

on:
  push:
    branches:
      - research/v024-microstructure-20260723
    paths:
      - 'research/v024_bundle/**'
      - 'research/v024_bundle_v2/**'
      - '.github/workflows/v024-microstructure.yml'
  pull_request:
    paths:
      - 'research/v024_bundle/**'
      - 'research/v024_bundle_v2/**'
      - '.github/workflows/v024-microstructure.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v024-microstructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnose-transport:
    name: Diagnose locked runner transport only
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact research commit
        uses: actions/checkout@v4

      - name: Reconstruct and inspect repository bytes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p transport-evidence
          count="$(find research/v024_bundle -maxdepth 1 -name 'part-*.b64' | wc -l)"
          printf '%s\n' "$count" | tee transport-evidence/part-count.txt
          test "$count" -eq 16
          cat research/v024_bundle/part-*.b64 | base64 -d > /tmp/v024_repository_bundle.tar.xz
          sha256sum /tmp/v024_repository_bundle.tar.xz | tee transport-evidence/repository-bundle.sha256
          wc -c /tmp/v024_repository_bundle.tar.xz | tee transport-evidence/repository-bundle.size
          xz -t /tmp/v024_repository_bundle.tar.xz
          tar -tJf /tmp/v024_repository_bundle.tar.xz | tee transport-evidence/archive-members.txt

      - name: Upload transport evidence and reconstructed bytes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v024-transport-${{ github.run_id }}
          path: |
            transport-evidence
            /tmp/v024_repository_bundle.tar.xz
          if-no-files-found: warn
          retention-days: 7
