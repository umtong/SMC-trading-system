name: Cross-asset WFV research

on:
  push:
    branches:
      - research/cross-asset-wfv-20260723
    paths:
      - "research/remote/cross_asset_wfv.py.b64.part*"
      - ".github/workflows/cross-asset-wfv-research.yml"
  pull_request:
    branches:
      - main
    paths:
      - "research/remote/cross_asset_wfv.py.b64.part*"
      - ".github/workflows/cross-asset-wfv-research.yml"

concurrency:
  group: cross-asset-wfv-research-20260723
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf_cache
      HF_HUB_DISABLE_TELEMETRY: "1"
      WORK_DIR: ${{ github.workspace }}/research_runs/cross_asset_wfv_20260723
      SCRIPT_PATH: ${{ github.workspace }}/research/remote/cross_asset_wfv.py
      EXPECTED_SHA256: 0e2fe042b6ce7ad29702924190b9e072df0425ffc2ddb3070e9a4f4cb8c575fd
    steps:
      - name: Checkout research branch
        uses: actions/checkout@v4
        with:
          ref: research/cross-asset-wfv-20260723
          fetch-depth: 1

      - name: Reassemble and verify immutable research script
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          cat research/remote/cross_asset_wfv.py.b64.part{00..08} > /tmp/cross_asset_wfv.py.b64
          base64 --decode /tmp/cross_asset_wfv.py.b64 > "$SCRIPT_PATH"
          actual_sha=$(sha256sum "$SCRIPT_PATH" | awk '{print $1}')
          printf 'actual_sha256=%s\nexpected_sha256=%s\n' "$actual_sha" "$EXPECTED_SHA256" | tee "$WORK_DIR/payload_identity.txt"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$SCRIPT_PATH" | sha256sum --check --strict
          python -m py_compile "$SCRIPT_PATH"

      - name: Install fixed research dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "huggingface_hub==0.27.1" \
            "hf_xet==1.1.10"
          python - <<'PY'
          import json, numpy, pandas, pyarrow, huggingface_hub
          from pathlib import Path
          payload = {
              "python": __import__("sys").version,
              "numpy": numpy.__version__,
              "pandas": pandas.__version__,
              "pyarrow": pyarrow.__version__,
              "huggingface_hub": huggingface_hub.__version__,
          }
          root = Path("research_runs/cross_asset_wfv_20260723")
          root.mkdir(parents=True, exist_ok=True)
          (root / "environment.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8"
          )
          print(json.dumps(payload, sort_keys=True))
          PY

      - name: Run causally gated development, selection, and confirmation
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "$WORK_DIR"
          cp "$SCRIPT_PATH" "$WORK_DIR/locked_research_script.py"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$WORK_DIR/locked_research_script.py" > "$WORK_DIR/SCRIPT_SHA256.txt"
          STATUS="$WORK_DIR/run_status.json"
          DEV_FROZEN="$WORK_DIR/development/development_frozen.json"
          SEL_FROZEN="$WORK_DIR/selection/selection_frozen.json"

          development_rc=0
          python "$SCRIPT_PATH" \
            --stage development \
            --work-dir "$WORK_DIR" \
            --cache-dir "$HF_HOME" \
            2>&1 | tee "$WORK_DIR/development.log" || development_rc=$?

          gate_pass=0
          if [[ $development_rc -eq 0 && -f "$DEV_FROZEN" ]]; then
            gate_pass=$(python - "$DEV_FROZEN" <<'PY'
          import json, sys
          print(int(json.load(open(sys.argv[1], encoding="utf-8")).get("gate_pass_count", 0)))
          PY
            )
          fi

          selection_rc=-1
          selected=0
          if [[ $development_rc -eq 0 && $gate_pass -gt 0 ]]; then
            selection_rc=0
            python "$SCRIPT_PATH" \
              --stage selection \
              --work-dir "$WORK_DIR" \
              --cache-dir "$HF_HOME" \
              --predecessor "$DEV_FROZEN" \
              2>&1 | tee "$WORK_DIR/selection.log" || selection_rc=$?
            if [[ $selection_rc -eq 0 && -f "$SEL_FROZEN" ]]; then
              selected=$(python - "$SEL_FROZEN" <<'PY'
          import json, sys
          payload=json.load(open(sys.argv[1], encoding="utf-8"))
          print(len(payload.get("selected", [])))
          PY
              )
            fi
          fi

          confirmation_rc=-1
          if [[ $selection_rc -eq 0 && $selected -gt 0 ]]; then
            confirmation_rc=0
            python "$SCRIPT_PATH" \
              --stage confirmation \
              --work-dir "$WORK_DIR" \
              --cache-dir "$HF_HOME" \
              --predecessor "$SEL_FROZEN" \
              2>&1 | tee "$WORK_DIR/confirmation.log" || confirmation_rc=$?
          fi

          python - "$STATUS" "$development_rc" "$gate_pass" "$selection_rc" "$selected" "$confirmation_rc" <<'PY'
          import json, pathlib, sys
          out = pathlib.Path(sys.argv[1])
          work = out.parent
          payload = {
              "development_rc": int(sys.argv[2]),
              "development_gate_pass_count": int(sys.argv[3]),
              "selection_rc": int(sys.argv[4]),
              "selection_selected_count": int(sys.argv[5]),
              "confirmation_rc": int(sys.argv[6]),
              "orders_submitted": False,
              "paper_or_live_started": False,
              "2026_opened": False,
              "target_gate_1pct_daily": False,
          }
          conf = work / "confirmation" / "confirmation_frozen.json"
          if conf.exists():
              c = json.loads(conf.read_text(encoding="utf-8"))
              payload["confirmation_gate"] = bool(c.get("results", {}).get("confirmation_gate", False))
              payload["target_gate_1pct_daily"] = bool(c.get("results", {}).get("target_gate_1pct_daily", False))
              payload["confirmation_base"] = c.get("results", {}).get("base")
          out.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(payload, sort_keys=True))
          PY
          exit 0

      - name: Record checksums of research outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "$WORK_DIR" ]]; then
            find "$WORK_DIR" -type f -print0 | sort -z | xargs -0 sha256sum > "$WORK_DIR/OUTPUT_SHA256SUMS.txt"
          fi

      - name: Upload research evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-asset-wfv-research-${{ github.sha }}
          path: research_runs/cross_asset_wfv_20260723
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
