name: v0.27.1 comment-dispatched transport audit

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  audit:
    if: github.event_name == 'workflow_dispatch' || (github.event.issue.pull_request && github.event.comment.body == '/run-v027-audit')
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/v027-quarter-hour-20260724
          fetch-depth: 1

      - name: Audit v0.27.1 transported bytes without candidate PnL
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research/results/v0271-transport-audit-main
          python - <<'PY'
          import base64, hashlib, json, lzma, tarfile
          from io import BytesIO
          from pathlib import Path

          root=Path('research/v0271_bundle_v2')
          manifest_path=root/'TRANSPORT_MANIFEST.json'
          out=Path('research/results/v0271-transport-audit-main/audit.json')
          r={'schema_version':1,'study_id':'quarter_hour_component_rotation_v0_27_1','candidate_pnl_observed':False,'terminal_holdout_opened':False,'production_enabled':False,'parts':[]}
          try:
              raw=manifest_path.read_bytes(); m=json.loads(raw)
              r.update({'manifest_sha256':hashlib.sha256(raw).hexdigest(),'declared_archive_sha256':m.get('archive_sha256'),'declared_archive_bytes':m.get('archive_bytes'),'declared_part_count':m.get('part_count')})
              pieces=[]; ok=True
              for item in m.get('parts',[]):
                  p=root/item['name']; b=p.read_bytes() if p.exists() else b''; sha=hashlib.sha256(b).hexdigest()
                  rec={'name':item['name'],'present':p.exists(),'actual_bytes':len(b),'declared_bytes':item.get('bytes'),'actual_characters_without_ascii_whitespace':len(b''.join(b.split())),'declared_characters':item.get('characters'),'actual_sha256':sha,'declared_sha256':item.get('sha256'),'sha_match':sha==item.get('sha256')}
                  r['parts'].append(rec); ok=ok and rec['present'] and rec['sha_match']; pieces.append(b''.join(b.split()))
              r['all_parts_match']=ok; encoded=b''.join(pieces); r['encoded_characters']=len(encoded)
              archive=base64.b64decode(encoded,validate=True); r['base64_decode_ok']=True; r['actual_archive_bytes']=len(archive); r['actual_archive_sha256']=hashlib.sha256(archive).hexdigest(); r['archive_sha_match']=r['actual_archive_sha256']==m.get('archive_sha256'); r['archive_bytes_match']=len(archive)==m.get('archive_bytes')
              decompressed=lzma.decompress(archive); r['xz_decode_ok']=True
              with tarfile.open(fileobj=BytesIO(decompressed),mode='r:') as tf: names=tf.getnames()
              r['tar_read_ok']=True; r['tar_member_count']=len(names); r['tar_first_members']=names[:40]
          except Exception as exc:
              r['error']=repr(exc)
          out.write_text(json.dumps(r,sort_keys=True,indent=2)+'\n')
          print(json.dumps(r,sort_keys=True,indent=2))
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/results/v0271-transport-audit-main/audit.json
          if ! git diff --cached --quiet; then
            git commit -m 'Record v0.27.1 comment-dispatched transport audit'
            git push origin HEAD:research/v027-quarter-hour-20260724
          fi
