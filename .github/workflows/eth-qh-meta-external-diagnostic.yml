name: ETH quarter-hour external selection diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - "research/eth_qh_meta_external_20260724/bundle.tar.gz.b64.part*"
      - ".github/workflows/eth-qh-meta-external-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eth-qh-meta-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-selection:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/eth-qh-meta-external-20260724
          fetch-depth: 1

      - name: Reconstruct immutable source
        shell: bash
        run: |
          set -euo pipefail
          root="$GITHUB_WORKSPACE/research_runs/eth_qh_meta_external_diagnostic"
          mkdir -p "$root/source" "$root/select"
          cat research/eth_qh_meta_external_20260724/bundle.tar.gz.b64.part{00..01} > /tmp/bundle.b64
          base64 --decode /tmp/bundle.b64 > /tmp/bundle.tar.gz
          echo '3328d55269db48d402bc2e510b0851b02e8f1f8e6420f6e4027526807ee39ad8  /tmp/bundle.tar.gz' | sha256sum -c --strict
          tar -xzf /tmp/bundle.tar.gz -C "$root/source"
          echo 'b80c68f264d01920b160bda3c5891a2354380943be5d576281e356693d3e13c9  '"$root/source/eth_qh_external.py" | sha256sum -c --strict
          echo '8e579b10a534df6a5e08d45b785ae3cc636ba82ab5329bb3ba2ab34a3a809291  '"$root/source/test_eth_qh_external.py" | sha256sum -c --strict
          echo '95858a3249af6f87092fe998777da2460218252918da5e7fa8b33261bdb5a83d  '"$root/source/external_selection_primary_frozen.json" | sha256sum -c --strict

      - name: Install fixed environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install "numpy==2.1.3" "pandas==2.2.3" "requests==2.32.4" "pytest==8.3.4"

      - name: Run tests and preserve full selection failure
        shell: bash
        run: |
          set +e
          root="$GITHUB_WORKSPACE/research_runs/eth_qh_meta_external_diagnostic"
          pytest -q "$root/source/test_eth_qh_external.py" > "$root/unit_tests.log" 2>&1
          test_rc=$?
          python "$root/source/eth_qh_external.py" \
            --stage select \
            --frozen "$root/source/external_selection_primary_frozen.json" \
            --work-dir "$root/select" \
            > "$root/select.log" 2>&1
          select_rc=$?
          printf '{"test_rc":%s,"select_rc":%s,"outcomes_opened":false,"2026_opened":false,"orders_submitted":false}\n' "$test_rc" "$select_rc" > "$root/diagnostic_status.json"
          find "$root" -type f ! -name SHA256SUMS.txt -print0 | sort -z | xargs -0 sha256sum > "$root/SHA256SUMS.txt"
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: eth-qh-meta-selection-diagnostic-${{ github.sha }}
          path: research_runs/eth_qh_meta_external_diagnostic
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
