name: Research official Binance USD-M metrics bundle

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/research-binance-metrics-data.yml"
      - "research_tools/binance_metrics_bundle.py"
      - "research_tools/binance_metrics_bundle_v2.py"
      - "research_tools/binance_metrics_bundle_v3.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-binance-metrics-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-data-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build checksum-verified metrics research bundle
        id: build
        shell: bash
        run: |
          mkdir -p research_artifact/binance_um_metrics_5m
          set +e
          python research_tools/binance_metrics_bundle_v3.py \
            --symbols BTCUSDT ETHUSDT \
            --start-date 2023-01-01 \
            --end-date 2026-06-30 \
            --workers 16 \
            --output-dir research_artifact/binance_um_metrics_5m \
            > >(tee research_artifact/binance_um_metrics_5m/build.log) 2>&1
          code=$?
          echo "$code" > research_artifact/binance_um_metrics_5m/build.exit_code
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Inspect outputs
        if: always()
        run: |
          cat research_artifact/binance_um_metrics_5m/build.exit_code
          tail -n 240 research_artifact/binance_um_metrics_5m/build.log || true
          if [ -f research_artifact/binance_um_metrics_5m/manifest.json ]; then
            python -m json.tool research_artifact/binance_um_metrics_5m/manifest.json | tail -n 220
          fi
          sha256sum research_artifact/binance_um_metrics_5m/* || true
          du -h research_artifact/binance_um_metrics_5m/* || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: binance-um-metrics-5m-2023-01_2026-06
          path: research_artifact/binance_um_metrics_5m
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
      - name: Fail after preserving diagnostics
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
