name: Phase35 cross-venue liquidation research
on:
  push:
    branches:
      - research/phase35-crossvenue-liquidation
  pull_request:
    branches:
      - main
    paths:
      - 'research/phase35_crossvenue_liquidation/**'
      - '.github/workflows/phase35_crossvenue_liquidation.yml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install research dependencies
        run: python -m pip install --upgrade pip && python -m pip install numpy pandas pyarrow huggingface_hub numba
      - name: Inventory dataset
        run: python research/phase35_crossvenue_liquidation/inventory.py | tee research/phase35_crossvenue_liquidation/inventory.log
      - name: Generate causal cross-venue panel and candidates
        env:
          HF_HOME: ${{ runner.temp }}/hf
        shell: bash
        run: |
          set -o pipefail
          python research/phase35_crossvenue_liquidation/run_optimized_loader.py 2>&1 | tee research/phase35_crossvenue_liquidation/run.log || {
            test -s research/phase35_crossvenue_liquidation/results/PANEL_1S.parquet
            test -s research/phase35_crossvenue_liquidation/results/CANDIDATES.csv
          }
      - name: Postprocess causal policies
        shell: bash
        run: |
          set -o pipefail
          python research/phase35_crossvenue_liquidation/postprocess.py 2>&1 | tee -a research/phase35_crossvenue_liquidation/run.log
      - name: Commit compact research results
        if: success() && github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/phase35_crossvenue_liquidation/results/*.json research/phase35_crossvenue_liquidation/results/*.csv research/phase35_crossvenue_liquidation/run.log research/phase35_crossvenue_liquidation/inventory.log
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[skip ci] Record Phase35 cross-venue results'
          git push origin HEAD:research/phase35-crossvenue-liquidation
      - name: Upload compact research results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase35-crossvenue-${{ github.run_id }}
          path: |
            research/phase35_crossvenue_liquidation/results/*.json
            research/phase35_crossvenue_liquidation/results/*.csv
            research/phase35_crossvenue_liquidation/run.log
            research/phase35_crossvenue_liquidation/inventory.log
          if-no-files-found: warn
