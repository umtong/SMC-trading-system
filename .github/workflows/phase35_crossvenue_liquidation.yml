name: Phase35 cross-venue liquidation research
on:
  push:
    branches:
      - research/phase35-crossvenue-liquidation
  workflow_dispatch:
permissions:
  contents: write
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install research dependencies
        run: python -m pip install --upgrade pip && python -m pip install numpy pandas pyarrow huggingface_hub
      - name: Run causal cross-venue study
        env:
          HF_HOME: ${{ runner.temp }}/hf
        run: python research/phase35_crossvenue_liquidation/run.py | tee research/phase35_crossvenue_liquidation/run.log
      - name: Commit compact research results
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/phase35_crossvenue_liquidation/results research/phase35_crossvenue_liquidation/run.log
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[skip ci] Record Phase35 cross-venue results'
          git push origin HEAD:research/phase35-crossvenue-liquidation
      - name: Upload research results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase35-crossvenue-${{ github.run_id }}
          path: |
            research/phase35_crossvenue_liquidation/results
            research/phase35_crossvenue_liquidation/run.log
          if-no-files-found: warn
