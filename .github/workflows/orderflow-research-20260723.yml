name: Causal Binance order-flow research 20260723

on:
  push:
    branches:
      - research/binance-flow-20260723
    paths:
      - .github/workflows/orderflow-research-20260723.yml
      - research/orderflow_20260723/registration.json
      - research/orderflow_20260723/run_research.py.zlib.b64
      - research/orderflow_20260723/bootstrap.py
      - research/orderflow_20260723/tests/**

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"
  RESEARCH_DIR: research/orderflow_20260723

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Check out isolated research branch
        uses: actions/checkout@v4
        with:
          ref: research/binance-flow-20260723
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore verified public-data cache
        uses: actions/cache@v4
        with:
          path: research/orderflow_20260723/cache
          key: binance-usdm-btceth-5m-funding-2021-2024-v1

      - name: Install deterministic research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy==2.1.3" "pandas==2.2.3" "pyarrow==18.1.0" "pytest==8.3.4"

      - name: Materialize and verify readable engine
        run: |
          python - <<'PY'
          import base64, hashlib, zlib
          from pathlib import Path
          root = Path("research/orderflow_20260723")
          expected = "80fe8ddfdc739c03e13ddffea130a796882186d33e11d9684bddb7febc3bdfda"
          raw = zlib.decompress(base64.b64decode((root / "run_research.py.zlib.b64").read_text().strip()))
          actual = hashlib.sha256(raw).hexdigest()
          if actual != expected:
              raise SystemExit(f"engine digest mismatch: expected {expected}, got {actual}")
          (root / "run_research.py").write_bytes(raw)
          print({"engine_sha256": actual, "bytes": len(raw)})
          PY
          python -m py_compile "$RESEARCH_DIR/run_research.py"

      - name: Run causal execution tests before data access
        run: python -m pytest -q "$RESEARCH_DIR/tests/test_research.py"

      - name: Download checksum-verified archives and run registered research
        run: python "$RESEARCH_DIR/run_research.py"

      - name: Audit sealed boundaries and result manifests
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("research/orderflow_20260723")
          registration = json.loads((root / "registration.json").read_text())
          freeze = json.loads((root / "results/selection_freeze.json").read_text())
          manifest = json.loads((root / "results/run_manifest.json").read_text())
          assert registration["download_end_month_inclusive"] == "2024-12"
          assert freeze["final_2025_status"] == "SEALED_NOT_DOWNLOADED_OR_READ"
          assert freeze["final_2026_status"] == "SEALED_NOT_DOWNLOADED_OR_READ"
          assert manifest["registration_digest"] == freeze["registration_digest"]
          print({
              "selection_digest": freeze["content_digest"],
              "finalists": len(freeze["finalists"]),
              "frozen_ensembles": len(freeze["frozen_ensembles"]),
          })
          PY

      - name: Commit reproducible engine and compact results to research branch
        run: |
          git config user.name "research-checkpoint-bot"
          git config user.email "research-checkpoint-bot@users.noreply.github.com"
          git add "$RESEARCH_DIR/run_research.py" "$RESEARCH_DIR/results"
          if git diff --cached --quiet; then
            echo "No result changes to commit"
          else
            git commit -m "research: checkpoint Binance order-flow development results [skip ci]"
            git push origin HEAD:research/binance-flow-20260723
          fi

      - name: Upload compact evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: causal-binance-orderflow-20260723-results
          path: |
            research/orderflow_20260723/registration.json
            research/orderflow_20260723/run_research.py
            research/orderflow_20260723/tests
            research/orderflow_20260723/results
          if-no-files-found: error
          retention-days: 7
