name: Wave84 Exact Pre-2024 Stop-State Inputs

on:
  push:
    branches: [research/wave84-exact-pre2024-stop-state-20260724]
    paths:
      - '.github/workflows/wave84-exact-pre2024-stop-state.yml'
      - 'research/wave84_exact_pre2024_stop_state/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/wave84-exact-pre2024-stop-state.yml'
      - 'research/wave84_exact_pre2024_stop_state/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wave84-exact-pre2024-stop-state-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 340
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONHASHSEED: '0'
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
      HF_HOME: ${{ github.workspace }}/.hf_cache_wave84
      HF_HUB_DISABLE_TELEMETRY: '1'
      HF_HUB_ETAG_TIMEOUT: '120'
      HF_HUB_DOWNLOAD_TIMEOUT: '300'
      ROOT: ${{ github.workspace }}/wave84-source
      OUTPUT: ${{ github.workspace }}/wave84-exact-pre2024
      EXPECTED_BASE_SHA256: 66b08521a6136ce26fe1c586dcd915877e874228692b03e312fa834afe9554af
      EXPECTED_EXPERIMENT_SHA256: 8fd640512981ac81f9842a4e63390400b2629b8360dd9e921636ff338c44ad03
      EXPECTED_CHECKPOINT_SHA256: 884015977d01118526227447467960c098a7dae93dd16cfda65b388e7ecccc93
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Reconstruct and verify frozen sources
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ROOT"
          cat research/remote/cross_asset_wfv_v3.py.b64.part{00..06} > /tmp/base.py.b64
          base64 --decode /tmp/base.py.b64 > "$ROOT/locked_base_wfv.py"
          python research/remote/repair_cross_asset_wfv_v3_transfer.py "$ROOT/locked_base_wfv.py"
          printf '%s  %s\n' "$EXPECTED_BASE_SHA256" "$ROOT/locked_base_wfv.py" | sha256sum --check --strict

          cat research/remote/cross_asset_survival_v2.py.gz.b64.part{00..01} > /tmp/experiment.py.gz.b64
          base64 --decode /tmp/experiment.py.gz.b64 > /tmp/experiment.py.gz
          gzip --decompress --stdout /tmp/experiment.py.gz > "$ROOT/locked_experiment.py"
          printf '%s  %s\n' "$EXPECTED_EXPERIMENT_SHA256" "$ROOT/locked_experiment.py" | sha256sum --check --strict

          base64 --decode research/cross_asset_survival_20260724/development_frozen.json.gz.b64 > /tmp/development.json.gz
          gzip --decompress --stdout /tmp/development.json.gz > "$ROOT/development_frozen.json"
          printf '%s  %s\n' "$EXPECTED_CHECKPOINT_SHA256" "$ROOT/development_frozen.json" | sha256sum --check --strict
          python -m py_compile "$ROOT/locked_base_wfv.py" "$ROOT/locked_experiment.py" research/wave84_exact_pre2024_stop_state/export_exact_pre2024.py

      - name: Install fixed research environment
        run: |
          python -m pip install --upgrade 'pip==25.1.1'
          python -m pip install \
            'numpy==2.1.3' \
            'pandas==2.2.3' \
            'pyarrow==18.1.0' \
            'scikit-learn==1.6.1' \
            'huggingface_hub==0.27.1' \
            'hf_xet==1.1.10'

      - uses: actions/cache@v4
        with:
          path: .hf_cache_wave84
          key: wave84-exact-hf-0113be29-v1

      - name: Export exact 2022 and 2023 stop-state inputs
        run: |
          set -euo pipefail
          python research/wave84_exact_pre2024_stop_state/export_exact_pre2024.py \
            --base-script "$ROOT/locked_base_wfv.py" \
            --experiment "$ROOT/locked_experiment.py" \
            --checkpoint "$ROOT/development_frozen.json" \
            --cache-dir "$HF_HOME" \
            --output-dir "$OUTPUT" \
            2>&1 | tee "$ROOT/run.log"
          rm -rf "$OUTPUT/trimmed_source"

      - name: Audit outputs
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool "$OUTPUT/manifest.json"
          find "$OUTPUT" -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | tee "$OUTPUT/OUTPUT_SHA256SUMS.txt"
          test ! -e "$OUTPUT/trimmed_source"

      - uses: actions/upload-artifact@v4
        with:
          name: wave84-exact-pre2024-${{ github.run_id }}
          path: |
            wave84-exact-pre2024
            wave84-source/run.log
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
