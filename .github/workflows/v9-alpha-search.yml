name: V9 Alpha Search

on:
  push:
    branches:
      - "research/v9-alpha-search-20260723"
    paths:
      - "research/v9_alpha_search.py.gz.b64"
      - ".github/workflows/v9-alpha-search.yml"
  pull_request:
    paths:
      - "research/v9_alpha_search.py.gz.b64"
      - ".github/workflows/v9-alpha-search.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alpha-search:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas

      - name: Restore Binance archive cache
        uses: actions/cache@v4
        with:
          path: .cache/xsmc-v9
          key: xsmc-v9-binance-usdm-15m-2019-2026-v1

      - name: Run fixed-candidate chronological alpha search
        shell: bash
        run: |
          set -euo pipefail
          base64 -d research/v9_alpha_search.py.gz.b64 | gzip -d > /tmp/v9_alpha_search.py
          python /tmp/v9_alpha_search.py \
            --start-month 2019-01 \
            --end-month 2026-06 \
            --evaluation-start 2024-01 \
            --evaluation-end 2026-06 \
            --symbols BTCUSDT ETHUSDT \
            --output-dir artifacts/v9-alpha-search \
            2>&1 | tee artifacts-v9.log

      - name: Upload research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v9-alpha-search-${{ github.run_id }}
          path: |
            artifacts/v9-alpha-search
            artifacts-v9.log
          if-no-files-found: error
          retention-days: 14

      - name: Persist successful research outputs on the research branch
        if: success() && github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/v9-alpha-search artifacts-v9.log
          if git diff --cached --quiet; then
            echo "No result changes to commit"
            exit 0
          fi
          git commit -m "Record V9 chronological alpha search results"
          git push origin "HEAD:${GITHUB_REF_NAME}"
