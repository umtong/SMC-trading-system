name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run strategy tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/easychart_v0 -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

  wave7-metrics:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build checksum-verified USD-M metrics
        run: python scripts/wave7_build_metrics.py

      - name: Upload verified metrics data
        uses: actions/upload-artifact@v4
        with:
          name: wave7-usdm-metrics-2021-01_2025-07-${{ github.sha }}
          path: |
            wave7_metrics/BTCUSDT_metrics_5m.csv.gz
            wave7_metrics/ETHUSDT_metrics_5m.csv.gz
            wave7_metrics/manifest.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
