name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run strategy tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/easychart_v0 -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

  v120-alt-taker-flow:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/v120-sol-xrp-flow-data'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - shard: SOLUSDT-2022P
            symbol: SOLUSDT
            start: 2022-04-01
            end: 2023-01-01
          - shard: SOLUSDT-2023
            symbol: SOLUSDT
            start: 2023-01-01
            end: 2024-01-01
          - shard: SOLUSDT-2024
            symbol: SOLUSDT
            start: 2024-01-01
            end: 2025-01-01
          - shard: SOLUSDT-2025
            symbol: SOLUSDT
            start: 2025-01-01
            end: 2026-01-01
          - shard: SOLUSDT-2026H1
            symbol: SOLUSDT
            start: 2026-01-01
            end: 2026-07-01
          - shard: XRPUSDT-2022P
            symbol: XRPUSDT
            start: 2022-04-01
            end: 2023-01-01
          - shard: XRPUSDT-2023
            symbol: XRPUSDT
            start: 2023-01-01
            end: 2024-01-01
          - shard: XRPUSDT-2024
            symbol: XRPUSDT
            start: 2024-01-01
            end: 2025-01-01
          - shard: XRPUSDT-2025
            symbol: XRPUSDT
            start: 2025-01-01
            end: 2026-01-01
          - shard: XRPUSDT-2026H1
            symbol: XRPUSDT
            start: 2026-01-01
            end: 2026-07-01
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download checksum-verified taker-flow shard
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.download_binance_um_1m_flow \
            --symbol '${{ matrix.symbol }}' \
            --start '${{ matrix.start }}' \
            --end '${{ matrix.end }}' \
            --output-dir 'data/v120_1m_flow/${{ matrix.shard }}' \
            2>&1 | tee 'v120-flow-${{ matrix.shard }}.log'

      - name: Validate output hash and row count
        shell: bash
        env:
          SHARD: ${{ matrix.shard }}
          SYMBOL: ${{ matrix.symbol }}
          START: ${{ matrix.start }}
          END: ${{ matrix.end }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          import pandas as pd

          root = Path('data/v120_1m_flow') / os.environ['SHARD']
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          path = root / f"{os.environ['SYMBOL']}_1m_flow.csv.gz"
          expected = int(
              (pd.Timestamp(os.environ['END'], tz='UTC') - pd.Timestamp(os.environ['START'], tz='UTC'))
              / pd.Timedelta(minutes=1)
          )
          if manifest['output']['rows'] != expected:
              raise SystemExit(f"rows={manifest['output']['rows']} expected={expected}")
          if hashlib.sha256(path.read_bytes()).hexdigest() != manifest['output']['sha256']:
              raise SystemExit('normalized SHA-256 mismatch')
          required = {
              'quote_volume', 'trade_count', 'taker_buy_quote',
              'taker_sell_quote', 'signed_quote_volume', 'imbalance_fraction'
          }
          if not required.issubset(set(manifest['output']['columns'])):
              raise SystemExit('missing taker-flow columns')
          print(os.environ['SHARD'], manifest['output'])
          PY

      - name: Upload immutable taker-flow shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v120-1m-flow-${{ matrix.shard }}-${{ github.run_id }}
          path: |
            data/v120_1m_flow/${{ matrix.shard }}
            v120-flow-${{ matrix.shard }}.log
          if-no-files-found: error
          retention-days: 14
