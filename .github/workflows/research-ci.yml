name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install and run strategy tests
        id: pytest
        shell: bash
        run: |
          set -o pipefail
          {
            python -m pip install -e ".[dev]"
            python -m pytest tests/easychart_v0 -q
          } 2>&1 | tee pytest.log

      - name: Upload CI log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Comment failure log on pull request
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'pytest.log';
            const text = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8').slice(-60000)
              : 'pytest.log was not created; failure occurred before the test command.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Research CI failure\n\n\`\`\`text\n${text}\n\`\`\``
            });
