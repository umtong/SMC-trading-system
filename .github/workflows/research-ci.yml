name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run strategy tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/easychart_v0 -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

  v9-alpha-search:
    if: github.event_name == 'pull_request' && github.head_ref == 'research/v9-alpha-search-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Mark V9 run started
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V9 chronological alpha search\n\n- status: \`RUN_STARTED\`\n- run_id: \`${GITHUB_RUN_ID}\`\n- merge_sha: \`${GITHUB_SHA}\`\n\n_Research-only. No paper/live/order/sizing changes._" --edit-last --create-if-none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install alpha-search dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas tabulate

      - name: Restore Binance archive cache
        uses: actions/cache@v4
        with:
          path: .cache/xsmc-v9
          key: xsmc-v9-binance-usdm-15m-2019-2026-v1

      - name: Run fixed-candidate chronological alpha search
        id: alpha
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p artifacts/v9-alpha-search
          base64 -d research/v9_alpha_search.py.gz.b64 | gzip -d > /tmp/v9_alpha_search.py
          decode_status=$?
          if [ "$decode_status" -ne 0 ]; then
            printf 'decode failed with status %s\n' "$decode_status" | tee artifacts-v9.log
            echo "exit_code=$decode_status" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python /tmp/v9_alpha_search.py \
            --start-month 2019-01 \
            --end-month 2026-06 \
            --evaluation-start 2024-01 \
            --evaluation-end 2026-06 \
            --symbols BTCUSDT ETHUSDT \
            --output-dir artifacts/v9-alpha-search \
            2>&1 | tee artifacts-v9.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build PR research summary
        if: always()
        env:
          ALPHA_EXIT_CODE: ${{ steps.alpha.outputs.exit_code }}
          RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import pandas as pd

          out = Path('artifacts/v9-alpha-search')
          comment = Path('artifacts/v9-pr-comment.md')
          exit_code = os.environ.get('ALPHA_EXIT_CODE', 'unknown')
          lines = ['## V9 chronological alpha search', '', f"- run_id: `{os.environ.get('RUN_ID')}`"]
          summary_path = out / 'summary.json'
          if summary_path.exists():
              s = json.loads(summary_path.read_text())
              lines += [
                  f"- process exit code: `{exit_code}`",
                  f"- status: `{'TARGET_MET' if s.get('target_1pct_met') else 'TARGET_NOT_MET'}`",
                  f"- candidates: `{s.get('candidate_count')}`",
                  f"- OOS trades: `{s.get('trades')}`",
                  f"- OOS final multiple: `{s.get('final_multiple')}`",
                  f"- OOS geometric daily net: `{s.get('geo_daily')}`",
                  f"- OOS max drawdown: `{s.get('max_drawdown')}`",
                  f"- positive-month ratio: `{s.get('positive_month_ratio')}`",
                  f"- no-trade months: `{s.get('no_trade_months')}`",
                  '',
              ]
          else:
              lines += [f"- process exit code: `{exit_code}`", '- status: `RUN_FAILED_BEFORE_SUMMARY`', '']
              log_path = Path('artifacts-v9.log')
              if log_path.exists():
                  tail = '\n'.join(log_path.read_text(errors='replace').splitlines()[-120:])
                  lines += ['### Failure log tail', '', '```text', tail, '```', '']
          top_path = out / 'top30_pre2024.csv'
          if top_path.exists():
              top = pd.read_csv(top_path).head(10)
              cols = [c for c in ['candidate_id','family','pre2x_final_multiple','pre_final_multiple','post2024_diag_final_multiple','pre_trades','pre2x_max_drawdown'] if c in top.columns]
              lines += ['### Top pre-2024 diagnostics', '', top[cols].to_markdown(index=False), '']
          months_path = out / 'walkforward_months.csv'
          if months_path.exists():
              months = pd.read_csv(months_path)
              lines += ['### Walk-forward monthly tail', '', months.tail(12).to_markdown(index=False), '']
          lines += ['', '_Research-only. No paper/live/order/sizing changes._']
          comment.write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload V9 research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v9-alpha-search-${{ github.run_id }}
          path: |
            artifacts/v9-alpha-search
            artifacts-v9.log
            artifacts/v9-pr-comment.md
          if-no-files-found: warn
          retention-days: 14

      - name: Publish V9 summary to this draft PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body-file artifacts/v9-pr-comment.md --edit-last --create-if-none

      - name: Preserve alpha-search failure status
        if: always() && steps.alpha.outputs.exit_code != '0'
        env:
          ALPHA_EXIT_CODE: ${{ steps.alpha.outputs.exit_code }}
        shell: bash
        run: |
          echo "V9 alpha search failed with exit code ${ALPHA_EXIT_CODE}"
          exit 1

  v12-liquidity-shock-discovery:
    if: github.event_name == 'pull_request' && github.head_ref == 'research/v12-discovery-20260723'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Restore and verify V12 research source
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode research/v12_liquidity_shock_bundle.tgz.b64 > /tmp/v12_liquidity_shock.tgz
          echo '746509929aeee1bcf1f2f1881a380895fa670d7eab93146e5e57f105966c1d89  /tmp/v12_liquidity_shock.tgz' | sha256sum --check --strict
          tar -xzf /tmp/v12_liquidity_shock.tgz

      - name: Mark V12 run started
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V12 real-data liquidity-shock discovery\n\n- status: \`RUN_STARTED\`\n- run_id: \`${GITHUB_RUN_ID}\`\n- merge_sha: \`${GITHUB_SHA}\`\n- universe: \`BTCUSDT, ETHUSDT\`\n- period: \`2023-01-01 through 2024-01-01 UTC\`\n\n_Research-only. No paper/live/order/sizing changes._" --edit-last --create-if-none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install V12 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas requests pytest tabulate

      - name: Restore checksum-verified Binance archive cache
        uses: actions/cache@v4
        with:
          path: .cache/v12_binance
          key: v12-binance-um-2023-btc-eth-v1

      - name: Run causal core tests
        working-directory: research/v12_liquidity_shock
        run: pytest -q

      - name: Run frozen 2023 BTC/ETH discovery screen
        working-directory: research/v12_liquidity_shock
        shell: bash
        run: |
          set -euo pipefail
          python run_discovery.py \
            --start 2023-01-01 \
            --end 2024-01-01 \
            --cache ../../.cache/v12_binance \
            --output ../../artifacts/v12-liquidity-shock-2023 \
            2>&1 | tee ../../artifacts-v12.log

      - name: Build V12 PR research summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd

          out = Path('artifacts/v12-liquidity-shock-2023')
          comment = Path('artifacts/v12-pr-comment.md')
          lines = ['## V12 real-data liquidity-shock discovery', '']
          verdict_path = out / 'verdict.json'
          if verdict_path.exists():
              verdict = json.loads(verdict_path.read_text())
              lines += [
                  f"- status: `{verdict.get('status')}`",
                  f"- selected families: `{verdict.get('selected_families')}`",
                  f"- next step: `{verdict.get('next_step')}`",
                  '',
              ]
              metrics_path = out / 'grid_metrics.csv'
              if metrics_path.exists():
                  metrics = pd.read_csv(metrics_path)
                  stress = metrics.loc[metrics['cost_bps'].eq(20.0)].copy()
                  cols = [c for c in ['cell_id','candidate_count','trades','net_r','expectancy_r','profit_factor','trades_per_calendar_day','positive_month_ratio'] if c in stress.columns]
                  lines += ['### 20 bp stress grid', '', stress[cols].to_markdown(index=False), '']
              pooled = verdict.get('pooled_metrics')
              if pooled:
                  lines += ['### Selected-family pooled confirmation', '']
                  for key in ['trades','net_r','expectancy_r','profit_factor','terminal_multiple_1pct_risk','max_drawdown_1pct_risk','trades_per_calendar_day','positive_month_ratio']:
                      lines.append(f"- {key}: `{pooled.get(key)}`")
                  lines.append('')
          else:
              lines += ['- status: `RUN_FAILED_BEFORE_VERDICT`', '']
          lines += ['', '_Screening replay only. Exact aggTrade replay is mandatory before validation._']
          comment.parent.mkdir(parents=True, exist_ok=True)
          comment.write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Upload V12 research outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v12-liquidity-shock-2023-${{ github.run_id }}
          path: |
            artifacts/v12-liquidity-shock-2023
            artifacts-v12.log
            artifacts/v12-pr-comment.md
            research/v12_liquidity_shock
          if-no-files-found: warn
          retention-days: 30

      - name: Publish V12 summary to this draft PR
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body-file artifacts/v12-pr-comment.md --edit-last --create-if-none
