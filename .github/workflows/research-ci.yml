name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run strategy tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/easychart_v0 -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Validate hardened research runner
        run: |
          python -m compileall -q src scripts/run_easychart_v08_hardened_random_trials.py
          python scripts/run_easychart_v08_hardened_random_trials.py --help > /dev/null

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Export source snapshot for branch ancestry repair
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-snapshot-${{ github.run_id }}
          path: .
          include-hidden-files: true
          retention-days: 1
