name: Research CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run strategy tests
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests/easychart_v0 -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          exit "$status"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log-${{ github.run_id }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 7

  build-official-binance-data:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/binance-5m-research-data'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install data dependencies
        run: python -m pip install "pandas>=2.2" "pyarrow>=17"

      - name: Download, checksum, normalize and audit
        run: |
          python scripts/download_official_binance_5m.py \
            --output research_data/binance_official_5m \
            --symbols BTCUSDT ETHUSDT \
            --interval 5m \
            --daily-end 2026-07-20 \
            --workers 10

      - name: Upload normalized research data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-binance-5m-2021-2026-${{ github.run_id }}
          path: research_data/binance_official_5m
          if-no-files-found: error
          retention-days: 7

  causal-monthly-walk-forward-v3:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/binance-5m-research-data'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=2.0" "pandas>=2.2" "pyarrow>=17" "numba>=0.61" "lightgbm>=4.5" "scikit-learn>=1.5"

      - name: Materialize pinned causal research script
        run: |
          cat scripts/causal_wf_v3_payload/part*.txt > /tmp/causal_wf_v3.b64
          test "$(wc -c < /tmp/causal_wf_v3.b64)" -eq 16484
          python - <<'PY'
          import base64
          import gzip
          import hashlib
          from pathlib import Path

          payload = Path('/tmp/causal_wf_v3.b64').read_text(encoding='ascii')
          decoded = gzip.decompress(base64.b64decode(payload, validate=True))
          target = Path('scripts/research_causal_wf_v3.py')
          target.write_bytes(decoded)
          print(f'materialized {target} ({len(decoded)} bytes, sha256={hashlib.sha256(decoded).hexdigest()})')
          PY
          test "$(wc -c < scripts/research_causal_wf_v3.py)" -eq 47423
          python -m py_compile scripts/research_causal_wf_v3.py

      - name: Bound the initial full-history baseline
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/research_causal_wf_v3.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'n_estimators=260,': 'n_estimators=110,',
              'n_estimators=220,': 'n_estimators=90,',
              'if len(train_base) > 700_000:': 'if len(train_base) > 300_000:',
              'train_base = train_base.sample(700_000,': 'train_base = train_base.sample(300_000,',
              'if len(train_full) > 850_000:': 'if len(train_full) > 350_000:',
              'train_full = train_full.sample(850_000,': 'train_full = train_full.sample(350_000,',
              'for mode in ("mean", "tail"):': 'for mode in ("mean",):',
              'for lookback in (18, 30, 42):': 'for lookback in (30,):',
              'random_policies(procedures, order_rates, 700)': 'random_policies(procedures, order_rates, 260)',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f'missing patch anchor: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          python -m py_compile scripts/research_causal_wf_v3.py

      - name: Build 2020 causal warm-up history
        run: |
          python scripts/download_official_binance_5m.py \
            --output research_data/binance_2020_5m \
            --symbols BTCUSDT ETHUSDT \
            --interval 5m \
            --monthly-start 2020-01 \
            --monthly-end 2020-12 \
            --no-daily \
            --datasets klines \
            --no-funding \
            --workers 6

      - name: Build 2021-2026 trade, mark and funding history
        run: |
          python scripts/download_official_binance_5m.py \
            --output research_data/binance_2021_2026_5m \
            --symbols BTCUSDT ETHUSDT \
            --interval 5m \
            --monthly-start 2021-01 \
            --monthly-end 2026-06 \
            --no-daily \
            --datasets klines markPriceKlines \
            --workers 8

      - name: Run causal monthly retraining and five-month evaluation
        run: |
          python scripts/research_causal_wf_v3.py \
            --data-dir research_data/binance_2020_5m \
            --data-dir research_data/binance_2021_2026_5m \
            --output research_results/causal_wf_v3

      - name: Upload compact causal reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: causal-wf-v3-reports-${{ github.run_id }}
          path: |
            research_results/causal_wf_v3/*.json
            research_results/causal_wf_v3/*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload causal ledgers
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: causal-wf-v3-ledgers-${{ github.run_id }}
          path: research_results/causal_wf_v3/*.parquet
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
