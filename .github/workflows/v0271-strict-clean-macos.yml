name: v0.27.1 Strict Clean macOS

on:
  push:
    branches: [research/v0271-strict-clean-20260724]
    paths: ['.github/workflows/v0271-strict-clean-macos.yml']
  pull_request:
    branches: [main]
    paths: ['.github/workflows/v0271-strict-clean-macos.yml']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v0271-strict-clean-macos-${{ github.ref }}
  cancel-in-progress: true

env:
  SEALED_REF: research/v027-quarter-hour-20260724
  ARCHIVE_SHA256: e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9
  PLAN_FILE_SHA256: 723245a408b66808b588be329a1a2cb2f563aaedad260455f4d6626f01f559b1
  PLAN_PAYLOAD_SHA256: c0cf8dacfdcc5474fd58f7570bb18a875481371658ed02ade3e2c0a5d2815f8f
  SOURCE_MANIFEST_SHA256: 9de4136de0c0bb74c8bc3d5cdf7ab235040a56e5e81568e3fee1ffd3a4968a11
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'

jobs:
  strict-evaluation:
    runs-on: macos-15
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SEALED_REF }}
          fetch-depth: 1
      - name: Reconstruct exact sealed runner
        shell: bash
        run: |
          set -euo pipefail
          rm -rf v0271 .v0271-data .v0271-raw .v0271-results
          mkdir -p v0271 .v0271-data .v0271-raw .v0271-results
          python - <<'PY'
          import base64, hashlib, json, lzma, tarfile
          from io import BytesIO
          from pathlib import Path
          root=Path('research/v0271_bundle_v2')
          manifest=json.loads((root/'TRANSPORT_MANIFEST.json').read_text(encoding='utf-8'))
          encoded=[]
          for item in manifest['parts']:
              raw=(root/item['name']).read_bytes()
              assert hashlib.sha256(raw).hexdigest()==item['sha256']
              encoded.append(b''.join(raw.split()))
          archive=base64.b64decode(b''.join(encoded),validate=True)
          assert hashlib.sha256(archive).hexdigest()==manifest['archive_sha256']=='e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          with tarfile.open(fileobj=BytesIO(lzma.decompress(archive)),mode='r:') as tf:
              tf.extractall('v0271',filter='data')
          correction={
            'schema_version':1,
            'base_archive_sha256':manifest['archive_sha256'],
            'candidate_pnl_observed_before_correction':False,
            'correction':'replay exact base-admitted signal set unchanged under all cost profiles',
            'terminal_holdout_opened':False,
            'production_enabled':False,
          }
          Path('.v0271-results/strict-correction.json').write_text(json.dumps(correction,sort_keys=True,indent=2)+'\n')
          PY
          echo "${PLAN_FILE_SHA256}  v0271/artifacts/v027/research_plan_locked.json" | shasum -a 256 -c -
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Verify frozen source before observing PnL
        working-directory: v0271
        run: |
          set -euo pipefail
          python -m pip install -r requirements-lock.txt
          python -m pytest -q
          python -m compileall -q research scripts tests
      - name: Build checksum-verified causal panels sequentially
        working-directory: v0271
        shell: bash
        run: |
          set -euo pipefail
          for symbol in BTCUSDT ETHUSDT SOLUSDT XRPUSDT; do
            data="${GITHUB_WORKSPACE}/.v0271-data/${symbol}"
            raw="${GITHUB_WORKSPACE}/.v0271-raw/${symbol}"
            mkdir -p "$data" "$raw"
            python -m research.v027.qh_pipeline build \
              --symbols "$symbol" \
              --data-dir "$data" \
              --cache-dir "$raw" 2>&1 | tee "$data/build.log"
            for suffix in qh_panel 1m mark_1m funding; do
              test -s "$data/${symbol}_${suffix}.csv.gz"
            done
            rm -rf "$raw"
            df -h .
          done
      - name: Run frozen development selection and untouched evaluation
        working-directory: v0271
        shell: bash
        run: |
          set -euo pipefail
          combined="${GITHUB_WORKSPACE}/.v0271-combined"
          output="${GITHUB_WORKSPACE}/.v0271-results"
          mkdir -p "$combined" "$output"
          for symbol in BTCUSDT ETHUSDT SOLUSDT XRPUSDT; do
            cp "${GITHUB_WORKSPACE}/.v0271-data/${symbol}/${symbol}_"*.csv.gz "$combined/"
          done
          COMBINED="$combined" OUTPUT="$output" ARCHIVE_SHA256="$ARCHIVE_SHA256" PLAN_PAYLOAD_SHA256="$PLAN_PAYLOAD_SHA256" SOURCE_MANIFEST_SHA256="$SOURCE_MANIFEST_SHA256" python - <<'PY'
          import json, os
          from pathlib import Path
          from research.v027 import qh_pipeline as q
          original=q.candidate_signal_frame
          def strict_signal_frame(routed,candidate,execution_cost,start,end,entry_delay_minutes=0):
              return original(routed,candidate,q.COSTS['base'],start,end,entry_delay_minutes=entry_delay_minutes)
          q.candidate_signal_frame=strict_signal_frame
          output=Path(os.environ['OUTPUT']);combined=Path(os.environ['COMBINED'])
          result=q.run_evaluation(combined,combined,output)
          audit={
            'schema_version':1,'study_id':q.STUDY_ID,
            'mode':'strict_fixed_base_signal_set_across_cost_profiles',
            'candidate_pnl_observed_before_correction':False,
            'terminal_holdout_opened':False,'production_enabled':False,
            'any_target_met':bool(result['any_target_met']),
            'archive_sha256':os.environ['ARCHIVE_SHA256'],
            'plan_payload_sha256':os.environ['PLAN_PAYLOAD_SHA256'],
            'source_manifest_sha256':os.environ['SOURCE_MANIFEST_SHA256'],
          }
          q.write_json(output/'strict_execution_audit.json',audit)
          print(json.dumps(q.json_safe(audit),indent=2,sort_keys=True))
          PY
          shasum -a 256 "$output"/* v0271/artifacts/v027/research_plan_locked.json > "$output/SHA256SUMS.txt"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v0271-strict-clean-macos-${{ github.run_id }}
          path: |
            .v0271-results
            .v0271-data/*/acquisition_manifest.json
            .v0271-data/*/build.log
            v0271/artifacts/v027/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
