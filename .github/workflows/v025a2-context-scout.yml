name: v0.25A2 causality-locked official context scout

on:
  push:
    branches:
      - research/v025a2-eventtime-20260723
    paths:
      - 'research/v025a2/v025a2_locked_runner.tar.xz'
      - '.github/workflows/v025a2-context-scout.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025a2-context-scout-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  PLAN_FILE_SHA256: db40e4bddeab538a2f3acb2c58ceeffacc5d8c3d4e08c3e26137ba16665cd1cb
  PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  SOURCE_MANIFEST_SHA256: 4857b909b1928bfe11c32daa6eea35f37a30f7a83168891c2432fda41bee9eb0
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  SCOUT_PROFILE_SHA256: c633df6d679edd2264a8e2aad52d8f3f775052c1059664b30a571380ca3b3e5a
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-context
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  scout:
    name: Verify v0.25A2 and measure exact official event-data envelope
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact research commit
        uses: actions/checkout@v4

      - name: Reconstruct SHA-locked research environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p transport-evidence v025a2
          echo "${ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c - | tee transport-evidence/archive-sha256.txt
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C v025a2
          (cd v025a2 && sha256sum -c SOURCE_SHA256SUMS.txt) | tee transport-evidence/source-sha256.txt
          echo "${PLAN_FILE_SHA256}  v025a2/research/v025/research_plan_locked.json" | sha256sum -c -

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v025a2/requirements-lock.txt

      - name: Verify preregistration, source closure, tests, and compile gate
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence
          python - <<'PY' | tee ci-evidence/preregistration-audit.json
          import hashlib, json, os
          from pathlib import Path

          def canonical(payload):
              raw = json.dumps(payload, sort_keys=True, separators=(',', ':'), ensure_ascii=False, allow_nan=False).encode()
              return hashlib.sha256(raw).hexdigest()

          def digest(path):
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          plan = json.loads(Path('research/v025/research_plan_locked.json').read_text())
          assert plan['study_id'] == 'smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert plan['candidate_count'] == 64
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert plan['periods']['terminal_holdout_locked'] is True
          assert plan['production_enabled'] is False
          payload = dict(plan)
          expected_payload = payload.pop('plan_payload_sha256')
          assert canonical(payload) == expected_payload == os.environ['PLAN_PAYLOAD_SHA256']
          assert plan['source_tree_manifest_sha256'] == os.environ['SOURCE_MANIFEST_SHA256']
          assert canonical(plan['source_files']) == plan['source_tree_manifest_sha256']
          for relative, expected in plan['source_files'].items():
              assert digest(relative) == expected, relative
          assert digest('artifacts/v0243/data_acquisition_plan.json') == os.environ['DATA_PLAN_FILE_SHA256']
          assert digest('scout_profile.json') == os.environ['SCOUT_PROFILE_SHA256']
          print(json.dumps({
              'study_id': plan['study_id'],
              'candidate_count': plan['candidate_count'],
              'plan_payload_sha256': expected_payload,
              'source_tree_manifest_sha256': plan['source_tree_manifest_sha256'],
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
          }, sort_keys=True, indent=2))
          PY
          PYTHONPATH=research/v025 python -m pytest -q research/v025 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025 scripts smc_ict_quant
          python scripts/download_binance_um_parallel.py --help > ci-evidence/downloader-help.txt
          python research/v025/v025_pipeline.py --help > ci-evidence/pipeline-help.txt

      - name: Restore checksum-verified official minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v1
          restore-keys: |
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Download exact official preholdout minute and derivatives request set
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          mkdir -p ci-evidence "${DATA_ROOT}" "${WORKSPACE}"
          python scripts/download_binance_um_parallel.py \
            --request-plan artifacts/v0243/data_acquisition_plan.json \
            --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log

      - name: Audit exact request identity and terminal isolation
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/acquisition-audit.json
          import hashlib, json, os
          from pathlib import Path
          root = Path(os.environ['DATA_ROOT'])
          plan = json.loads(Path('artifacts/v0243/data_acquisition_plan.json').read_text())
          manifests = sorted((root / 'manifests').glob('download_*.json'))
          assert manifests
          run_path = manifests[-1]
          run = json.loads(run_path.read_text())
          assert run['request_plan_payload_sha256'] == plan['payload_sha256']
          assert run['completed'] == plan['request_count'] == 3272
          assert run['missing'] == [] and run['failures'] == []
          expected = {str(item['relative_path']) for item in plan['requests']}
          observed = {str(dict(item['request'])['relative_path']) for item in run['records']}
          assert observed == expected
          assert not any(any(token in path for token in ('2025-10', '2025-11', '2025-12', '2026-')) for path in observed)
          print(json.dumps({
              'manifest_sha256': hashlib.sha256(run_path.read_bytes()).hexdigest(),
              'completed': run['completed'],
              'exact_request_set_match': True,
              'terminal_partition_requested': False,
          }, sort_keys=True, indent=2))
          PY

      - name: Build causal contexts without candidate PnL
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context \
            --data-root "${DATA_ROOT}" \
            --data-plan artifacts/v0243/data_acquisition_plan.json \
            --workspace "${WORKSPACE}" 2>&1 | tee ci-evidence/context-build.log
          test -s "${WORKSPACE}/contexts.csv"
          test -s "${WORKSPACE}/event_day_plan.json"
          test -s "${WORKSPACE}/context_summary.json"

      - name: Measure exact official aggTrades compressed envelope
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/event-size-scout.log
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import json, os, re
          from pathlib import Path
          from urllib.request import Request, urlopen

          workspace = Path(os.environ['WORKSPACE'])
          plan = json.loads((workspace / 'event_day_plan.json').read_text())
          assert plan['study_id'] == 'smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert plan['generated_from_candidate_pnl'] is False
          assert plan['terminal_holdout_downloaded'] is False
          requests = list(plan['requests'])
          assert all(str(item['date']) < '2025-10-01' for item in requests)

          def probe(item):
              headers = {'User-Agent': 'smc-ict-v025a2-size-scout/1.0'}
              url = str(item['url'])
              try:
                  with urlopen(Request(url, method='HEAD', headers=headers), timeout=60) as response:
                      value = response.headers.get('Content-Length')
                      return {'relative_path': item['relative_path'], 'bytes': int(value) if value else None, 'method': 'HEAD'}
              except Exception as head_error:
                  try:
                      ranged = dict(headers)
                      ranged['Range'] = 'bytes=0-0'
                      with urlopen(Request(url, headers=ranged), timeout=60) as response:
                          content_range = response.headers.get('Content-Range', '')
                          match = re.search(r'/(\d+)$', content_range)
                          value = int(match.group(1)) if match else response.headers.get('Content-Length')
                          return {'relative_path': item['relative_path'], 'bytes': int(value) if value else None, 'method': 'RANGE', 'head_error': repr(head_error)}
                  except Exception as range_error:
                      return {'relative_path': item['relative_path'], 'bytes': None, 'method': 'FAILED', 'head_error': repr(head_error), 'error': repr(range_error)}

          records = []
          with ThreadPoolExecutor(max_workers=24) as pool:
              futures = [pool.submit(probe, item) for item in requests]
              for index, future in enumerate(as_completed(futures), 1):
                  records.append(future.result())
                  if index % 50 == 0 or index == len(futures):
                      print(f'probed={index}/{len(futures)}', flush=True)
          records.sort(key=lambda item: item['relative_path'])
          known = [int(item['bytes']) for item in records if item.get('bytes') is not None]
          failed = [item for item in records if item.get('bytes') is None]
          assert not failed, failed[:5]
          payload = {
              'schema_version': 1,
              'study_id': plan['study_id'],
              'event_plan_payload_sha256': plan['payload_sha256'],
              'context_count': plan['context_count'],
              'request_count': len(records),
              'known_size_count': len(known),
              'failed_size_count': 0,
              'total_compressed_bytes': sum(known),
              'max_compressed_bytes': max(known) if known else 0,
              'median_compressed_bytes': sorted(known)[len(known)//2] if known else 0,
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
              'records': records,
          }
          (workspace / 'event_size_scout.json').write_text(json.dumps(payload, sort_keys=True, indent=2) + '\n')
          summary = {key: value for key, value in payload.items() if key != 'records'}
          (workspace / 'event_size_summary.json').write_text(json.dumps(summary, sort_keys=True, indent=2) + '\n')
          print(json.dumps(summary, sort_keys=True, indent=2))
          PY

      - name: Persist compact scout status to branch
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p research/results/v025a2-context-scout
          for name in context_summary.json event_size_summary.json; do
            if [ -f "${WORKSPACE}/${name}" ]; then cp "${WORKSPACE}/${name}" "research/results/v025a2-context-scout/${name}"; fi
          done
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          root = Path('research/results/v025a2-context-scout')
          payload = {
              'schema_version': 1,
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'head_sha': os.environ.get('GITHUB_SHA'),
              'job_status': os.environ.get('JOB_STATUS'),
              'context_summary_present': (root / 'context_summary.json').exists(),
              'event_size_summary_present': (root / 'event_size_summary.json').exists(),
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
              'recorded_at_utc': datetime.now(timezone.utc).isoformat(),
          }
          (root / 'status.json').write_text(json.dumps(payload, sort_keys=True, indent=2) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/results/v025a2-context-scout
          if ! git diff --cached --quiet; then
            git commit -m "Record v0.25A2 context scout status"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload compact evidence without raw market archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025a2-context-scout-${{ github.run_id }}
          path: |
            transport-evidence
            v025a2/ci-evidence
            .research-work/v025a2-context/context_summary.json
            .research-work/v025a2-context/contexts.csv
            .research-work/v025a2-context/event_day_plan.json
            .research-work/v025a2-context/event_size_scout.json
            v025a2/research/v025/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
