name: v0.27.1 quarter-hour official data scout

on:
  push:
    branches:
      - research/v027-quarter-hour-20260724
    paths:
      - 'research/v0271_bundle/**'
      - '.github/workflows/v0271-scout.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v0271-scout-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9
  PLAN_FILE_SHA256: 723245a408b66808b588be329a1a2cb2f563aaedad260455f4d6626f01f559b1
  PLAN_PAYLOAD_SHA256: c0cf8dacfdcc5474fd58f7570bb18a875481371658ed02ade3e2c0a5d2815f8f
  SOURCE_MANIFEST_SHA256: 9de4136de0c0bb74c8bc3d5cdf7ab235040a56e5e81568e3fee1ffd3a4968a11
  RESULT_ROOT: ${{ github.workspace }}/research/results/v0271-scout

jobs:
  scout:
    runs-on: ubuntu-slim
    timeout-minutes: 90
    steps:
      - name: Checkout exact research branch
        uses: actions/checkout@v4

      - name: Reconstruct SHA-locked research bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p transport-evidence v0271
          python - <<'PY' | tee transport-evidence/reconstruction.json
          import base64
          import hashlib
          import json
          from pathlib import Path

          root = Path('research/v0271_bundle')
          manifest_path = root / 'TRANSPORT_MANIFEST.json'
          manifest = json.loads(manifest_path.read_text())
          assert manifest['study_id'] == 'quarter_hour_component_rotation_v0_27_1'
          assert manifest['part_count'] == len(manifest['parts'])
          assert manifest['candidate_pnl_observed'] is False
          assert manifest['terminal_holdout_opened'] is False
          assert manifest['production_enabled'] is False

          encoded = []
          evidence = []
          for item in manifest['parts']:
              path = root / item['name']
              raw = path.read_bytes()
              actual = hashlib.sha256(raw).hexdigest()
              assert actual == item['sha256'], (path, actual, item['sha256'])
              text = ''.join(raw.decode('ascii').split())
              assert len(text) == item['characters']
              encoded.append(text)
              evidence.append({'name': item['name'], 'sha256': actual, 'characters': len(text)})

          archive = base64.b64decode(''.join(encoded), validate=True)
          actual_archive = hashlib.sha256(archive).hexdigest()
          assert actual_archive == manifest['archive_sha256']
          assert actual_archive == 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          assert len(archive) == manifest['archive_bytes']
          Path('/tmp/v0271_locked_runner.tar.xz').write_bytes(archive)
          print(json.dumps({'archive_sha256': actual_archive, 'archive_bytes': len(archive), 'parts': evidence}, sort_keys=True, indent=2))
          PY
          echo "${ARCHIVE_SHA256}  /tmp/v0271_locked_runner.tar.xz" | sha256sum -c -
          xz -t /tmp/v0271_locked_runner.tar.xz
          tar -xJf /tmp/v0271_locked_runner.tar.xz -C v0271
          test -f v0271/artifacts/v027/research_plan_locked.json
          test -f v0271/research/v027/qh_pipeline.py

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v0271/requirements-lock.txt

      - name: Verify preregistration, source closure, tests, and compile gate
        shell: bash
        working-directory: v0271
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence
          python - <<'PY' | tee ci-evidence/preregistration-audit.json
          import hashlib
          import json
          import os
          from pathlib import Path

          def canonical(value):
              raw = json.dumps(value, sort_keys=True, separators=(',', ':'), ensure_ascii=False, allow_nan=False).encode()
              return hashlib.sha256(raw).hexdigest()

          def digest(path):
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          path = Path('artifacts/v027/research_plan_locked.json')
          assert digest(path) == os.environ['PLAN_FILE_SHA256']
          plan = json.loads(path.read_text())
          payload = dict(plan)
          declared = payload.pop('plan_payload_sha256')
          assert plan['study_id'] == 'quarter_hour_component_rotation_v0_27_1'
          assert plan['candidate_count'] == 192
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert plan['periods']['terminal_holdout_locked'] is True
          assert plan['production_enabled'] is False
          assert canonical(payload) == declared == os.environ['PLAN_PAYLOAD_SHA256']
          assert canonical(plan['source_files']) == plan['source_tree_manifest_sha256'] == os.environ['SOURCE_MANIFEST_SHA256']
          for name, expected in plan['source_files'].items():
              assert digest(name) == expected, name
          print(json.dumps({
              'study_id': plan['study_id'],
              'candidate_count': plan['candidate_count'],
              'plan_payload_sha256': declared,
              'source_tree_manifest_sha256': plan['source_tree_manifest_sha256'],
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
          }, sort_keys=True, indent=2))
          PY
          python -m pytest -q | tee ci-evidence/pytest.txt
          python -m compileall -q research scripts tests
          python -m research.v027.qh_pipeline --help > ci-evidence/pipeline-help.txt

      - name: Probe official companion checksums and compressed archive envelope
        shell: bash
        working-directory: v0271
        run: |
          set -euo pipefail
          mkdir -p "${RESULT_ROOT}"
          python -m research.v027.qh_pipeline scout \
            --output "${RESULT_ROOT}/scout.json" \
            --symbols BTCUSDT ETHUSDT SOLUSDT XRPUSDT \
            2>&1 | tee "${RESULT_ROOT}/scout.log"

      - name: Persist compact status on the research branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RESULT_ROOT}"
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ['RESULT_ROOT'])
          scout = json.loads((root / 'scout.json').read_text()) if (root / 'scout.json').exists() else {}
          payload = {
              'schema_version': 1,
              'study_id': 'quarter_hour_component_rotation_v0_27_1',
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'head_sha': os.environ.get('GITHUB_SHA'),
              'archive_sha256': os.environ['ARCHIVE_SHA256'],
              'plan_payload_sha256': os.environ['PLAN_PAYLOAD_SHA256'],
              'source_manifest_sha256': os.environ['SOURCE_MANIFEST_SHA256'],
              'scout_completed': bool(scout) and int(scout.get('failure_count', 1)) == 0,
              'request_count': scout.get('request_count'),
              'total_compressed_bytes': scout.get('total_compressed_bytes'),
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
              'recorded_at_utc': datetime.now(timezone.utc).isoformat(),
          }
          (root / 'status.json').write_text(json.dumps(payload, sort_keys=True, indent=2) + '\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/results/v0271-scout
          if ! git diff --cached --quiet; then
            git commit -m 'Record v0.27.1 official data scout'
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload compact scout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0271-scout-${{ github.run_id }}
          path: |
            transport-evidence
            v0271/ci-evidence
            research/results/v0271-scout
            v0271/artifacts/v027/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30
