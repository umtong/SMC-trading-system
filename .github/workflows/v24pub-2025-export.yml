name: V24 Frozen 2025 Public Input Export

on:
  pull_request:
    paths:
      - 'research/v24pub_2025_trigger.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  export-public-2025:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.head_ref == 'research/v24pub-run-20260723')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip pandas requests
      - uses: actions/cache@v4
        with:
          path: .cache/v24pub
          key: v24pub-binance-spot-futures-minute-2025-2026jan-btc-eth-v1
      - name: Export corrected official public inputs
        id: export
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf artifacts/v24pub-2025
          mkdir -p artifacts/v24pub-2025
          python - <<'PY' 2>&1 | tee artifacts-v24pub.log
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from pathlib import Path
          import hashlib, json, re, zipfile
          import pandas as pd
          import requests

          symbols=['BTCUSDT','ETHUSDT']
          months=[f'2025-{m:02d}' for m in range(1,13)]+['2026-01']
          root=Path('.cache/v24pub'); out=Path('artifacts/v24pub-2025'); session=requests.Session()
          def sha(path):
              h=hashlib.sha256()
              with path.open('rb') as f:
                  for chunk in iter(lambda:f.read(1024*1024),b''): h.update(chunk)
              return h.hexdigest()
          def get(url):
              for attempt in range(6):
                  r=session.get(url,timeout=240)
                  if r.status_code==200: return r.content
                  if r.status_code==404: raise FileNotFoundError(url)
                  if attempt==5: r.raise_for_status()
              raise RuntimeError(url)
          def ensure(market,kind,symbol,month):
              name=f'{symbol}-1m-{month}.zip'
              if market=='spot':
                  folder=root/'spot'/symbol
                  url=f'https://data.binance.vision/data/spot/monthly/klines/{symbol}/1m/{name}'
              else:
                  folder=root/'futures'/kind/symbol
                  url=f'https://data.binance.vision/data/futures/um/monthly/{kind}/{symbol}/1m/{name}'
              folder.mkdir(parents=True,exist_ok=True)
              path=folder/name; checksum=folder/f'{name}.CHECKSUM'
              if not checksum.exists(): checksum.write_bytes(get(url+'.CHECKSUM'))
              match=re.search(rb'([0-9a-fA-F]{64})',checksum.read_bytes())
              if not match: raise ValueError(f'bad checksum {checksum}')
              expected=match.group(1).decode().lower()
              if not path.exists() or sha(path)!=expected:
                  tmp=path.with_suffix('.tmp'); tmp.write_bytes(get(url))
                  if sha(tmp)!=expected: raise ValueError(f'checksum mismatch {url}')
                  tmp.replace(path)
              return {'market':market,'kind':kind,'symbol':symbol,'month':month,'url':url,'sha256':expected,'bytes':path.stat().st_size}
          jobs=[(market,kind,symbol,month) for symbol in symbols for month in months for market,kind in [('spot','klines'),('futures','klines'),('futures','markPriceKlines')]]
          manifest=[]
          with ThreadPoolExecutor(max_workers=8) as pool:
              futures=[pool.submit(ensure,*job) for job in jobs]
              for future in as_completed(futures): manifest.append(future.result())
          pd.DataFrame(manifest).sort_values(['market','symbol','month','kind']).to_csv(out/'input_manifest.csv',index=False)
          def read_kline(path):
              with zipfile.ZipFile(path) as archive:
                  members=[n for n in archive.namelist() if not n.endswith('/')]
                  if len(members)!=1: raise ValueError(f'unexpected members {path}')
                  raw=pd.read_csv(archive.open(members[0]),header=None)
              if raw.shape[1]<11: raise ValueError(f'bad schema {path}')
              x=raw.iloc[:,[0,1,2,3,4,7,8,10]].copy()
              x.columns=['raw_time','open','high','low','close','quote_volume','trades','taker_buy_quote']
              ts=pd.to_numeric(x.raw_time,errors='raise').astype('int64')
              unit='us' if float(ts.median())>1e14 else 'ms'
              x['open_time']=pd.to_datetime(ts,unit=unit,utc=True)
              for col in ['open','high','low','close','quote_volume','trades','taker_buy_quote']: x[col]=pd.to_numeric(x[col],errors='raise')
              return x[['open_time','open','high','low','close','quote_volume','trades','taker_buy_quote']]
          summaries=[]
          for symbol in symbols:
              spot_parts=[]; fut_parts=[]
              for month in months:
                  spot_parts.append(read_kline(root/'spot'/symbol/f'{symbol}-1m-{month}.zip'))
                  fut=read_kline(root/'futures'/'klines'/symbol/f'{symbol}-1m-{month}.zip')
                  mark=read_kline(root/'futures'/'markPriceKlines'/symbol/f'{symbol}-1m-{month}.zip')[['open_time','close']].rename(columns={'close':'mark_close'})
                  merged=fut.merge(mark,on='open_time',how='left',validate='one_to_one')
                  merged=merged.loc[merged.mark_close.notna()].copy()
                  if merged.empty: raise ValueError(f'no contract/mark overlap {symbol} {month}')
                  fut_parts.append(merged)
              for kind,frame in [('spot',pd.concat(spot_parts,ignore_index=True)),('fut',pd.concat(fut_parts,ignore_index=True))]:
                  frame=frame.sort_values('open_time',kind='mergesort').reset_index(drop=True)
                  if frame.open_time.duplicated().any(): raise ValueError(f'{symbol} {kind}: duplicate minute')
                  diffs=frame.open_time.diff()
                  frame['segment_id']=(diffs.isna()|diffs.ne(pd.Timedelta(minutes=1))).cumsum().astype('int64')-1
                  path=out/f'{symbol}_{kind}_1m.csv.gz'
                  frame.to_csv(path,index=False,compression={'method':'gzip','compresslevel':6,'mtime':0})
                  summaries.append({'symbol':symbol,'kind':kind,'rows':len(frame),'segments':int(frame.segment_id.nunique()),'first':str(frame.open_time.min()),'last':str(frame.open_time.max()),'sha256':sha(path),'bytes':path.stat().st_size})
          (out/'summary.json').write_text(json.dumps(summaries,indent=2),encoding='utf-8')
          print(json.dumps(summaries,indent=2))
          PY
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v24pub-frozen-2025-${{ github.run_id }}
          path: |
            artifacts/v24pub-2025
            artifacts-v24pub.log
          if-no-files-found: warn
          retention-days: 30
      - name: Publish status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        run: gh pr comment "$PR_NUMBER" --body "## V24 frozen 2025 public input\n\n- run_id: \`${GITHUB_RUN_ID}\`\n- exit code: \`${EXIT_CODE}\`\n- artifact: \`v24pub-frozen-2025-${GITHUB_RUN_ID}\`\n\n_Data only; candidate unchanged._" --edit-last --create-if-none
      - name: Preserve failure
        if: always() && steps.export.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        run: exit "$EXIT_CODE"
