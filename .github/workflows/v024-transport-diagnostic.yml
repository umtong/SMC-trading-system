name: v0.24.1 transport diagnostic

on:
  push:
    branches:
      - research/v024-microstructure-20260723
    paths:
      - '.github/workflows/v024-transport-diagnostic.yml'
  pull_request:
    paths:
      - '.github/workflows/v024-transport-diagnostic.yml'
      - 'research/v024_bundle_v4/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Inspect explicit split transport
        shell: bash
        run: |
          set +e
          set -u
          mkdir -p transport-evidence/parts
          parts=(
            research/v024_bundle_v4/part-000.b64
            research/v024_bundle_v4/part-001a.b64
            research/v024_bundle_v4/part-001b.b64
            research/v024_bundle_v4/part-002.b64
            research/v024_bundle_v4/part-003.b64
            research/v024_bundle_v4/part-004.b64
            research/v024_bundle_v4/part-005.b64
            research/v024_bundle_v4/part-006.b64
            research/v024_bundle_v4/part-007.b64
          )
          : > transport-evidence/part-sha256.txt
          : > transport-evidence/part-sizes.txt
          for part in "${parts[@]}"; do
            sha256sum "$part" >> transport-evidence/part-sha256.txt
            printf '%s %s\n' "$(basename "$part")" "$(wc -c < "$part")" >> transport-evidence/part-sizes.txt
            cp "$part" transport-evidence/parts/
          done
          cat "${parts[@]}" | base64 -d > transport-evidence/reconstructed.tar.xz
          printf '%s\n' "$?" > transport-evidence/base64-status.txt
          sha256sum transport-evidence/reconstructed.tar.xz > transport-evidence/reconstructed.sha256
          wc -c transport-evidence/reconstructed.tar.xz > transport-evidence/reconstructed.size
          xz -t transport-evidence/reconstructed.tar.xz > transport-evidence/xz-test.txt 2>&1
          printf '%s\n' "$?" > transport-evidence/xz-status.txt
          tar -tJf transport-evidence/reconstructed.tar.xz > transport-evidence/archive-members.txt 2> transport-evidence/tar-error.txt
          printf '%s\n' "$?" > transport-evidence/tar-status.txt
          exit 0
      - name: Upload explicit reconstructed bytes and source chunks
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0241-explicit-chunks-${{ github.run_id }}
          path: transport-evidence
          if-no-files-found: error
          retention-days: 7
