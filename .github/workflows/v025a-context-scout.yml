name: v0.25A official context and event-size scout

on:
  push:
    branches:
      - research/v025a-eventtime-20260723
    paths:
      - 'research/v025a_bundle/**'
      - 'research/v025a_support/**'
      - '.github/workflows/v025a-context-scout.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v025a-context-scout-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: bebc0e1277a0b7a471e8447cf667251fda9685700eb8508dacd979f15639a9b1
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  LOCKED_PLAN_FILE_SHA256: 080080a2ab64aff387a08584cb0b220e8f9fc9040025df32729693aa2db375bf
  SUPPORT_INIT_SHA256: 19097e6cc0fc3b6a604adc8b759356866941f2c539304df78f48222a1617c0a1
  SUPPORT_ARCHIVE_SHA256: 3a4e65901ab64ecbc47d65431e31fef7129a74a270a5f4d874f77234248b014a
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a-minute
  WORKSPACE: ${{ github.workspace }}/.research-work/v025a-context
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'

jobs:
  context-scout:
    name: Causal context build and official aggTrades size scout
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact research branch
        uses: actions/checkout@v4

      - name: Reconstruct SHA-locked v0.25A research bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p transport-evidence
          python - <<'PY' | tee transport-evidence/reconstruction.json
          import base64, hashlib, json
          from pathlib import Path

          root = Path('research/v025a_bundle')
          manifest_path = root / 'TRANSPORT_MANIFEST.json'
          manifest = json.loads(manifest_path.read_text())
          parts = []
          evidence = []
          for item in manifest['parts']:
              path = root / item['name']
              raw = path.read_bytes()
              observed = hashlib.sha256(raw).hexdigest()
              assert len(raw) == int(item['bytes']), (path, len(raw), item['bytes'])
              assert observed == item['sha256'], (path, observed, item['sha256'])
              parts.append(raw)
              evidence.append({'name': item['name'], 'bytes': len(raw), 'sha256': observed})
          assert len(parts) == int(manifest['part_count']) == 11
          payload = base64.b64decode(b''.join(parts), validate=True)
          observed_archive = hashlib.sha256(payload).hexdigest()
          assert len(payload) == int(manifest['archive_bytes'])
          assert observed_archive == manifest['archive_sha256']
          assert observed_archive == 'bebc0e1277a0b7a471e8447cf667251fda9685700eb8508dacd979f15639a9b1'
          Path('/tmp/v025a_bundle.tar.xz').write_bytes(payload)
          print(json.dumps({'archive_bytes': len(payload), 'archive_sha256': observed_archive, 'parts': evidence}, sort_keys=True, indent=2))
          PY
          xz -t /tmp/v025a_bundle.tar.xz
          rm -rf v025a
          mkdir -p v025a
          tar -xJf /tmp/v025a_bundle.tar.xz -C v025a
          mkdir -p v025a/smc_ict_quant
          cp research/v025a_support/smc_ict_quant/__init__.py v025a/smc_ict_quant/__init__.py
          cp research/v025a_support/smc_ict_quant/binance_public_data.py v025a/smc_ict_quant/binance_public_data.py
          echo "${SUPPORT_INIT_SHA256}  v025a/smc_ict_quant/__init__.py" | sha256sum -c -
          echo "${SUPPORT_ARCHIVE_SHA256}  v025a/smc_ict_quant/binance_public_data.py" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  v025a/artifacts/v0243/data_acquisition_plan.json" | sha256sum -c -
          echo "${LOCKED_PLAN_FILE_SHA256}  v025a/research/v025/research_plan_locked.json" | sha256sum -c -

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v025a/requirements-lock.txt

      - name: Verify locked code before official data access
        shell: bash
        working-directory: v025a
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence
          sha256sum -c SOURCE_SHA256SUMS.txt | tee ci-evidence/source-sha256.txt
          PYTHONPATH=research/v025 python -m pytest -q research/v025 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025 scripts smc_ict_quant
          python scripts/download_binance_um_parallel.py --help > ci-evidence/downloader-help.txt
          python research/v025/v025_pipeline.py --help > ci-evidence/pipeline-help.txt
          python - <<'PY' | tee ci-evidence/preregistration-audit.json
          import json
          from pathlib import Path
          plan = json.loads(Path('research/v025/research_plan_locked.json').read_text())
          scout = json.loads(Path('scout_profile.json').read_text())
          assert plan['study_id'] == 'smc_event_time_liquidation_exhaustion_v0_25_a'
          assert plan['candidate_count'] == 64
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['periods']['terminal_holdout_locked'] is True
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert scout['candidate_pnl_observed'] is False
          assert scout['terminal_holdout_opened'] is False
          print(json.dumps({
              'study_id': plan['study_id'],
              'plan_payload_sha256': plan['plan_payload_sha256'],
              'source_tree_manifest_sha256': plan['source_tree_manifest_sha256'],
              'candidate_count': plan['candidate_count'],
              'candidate_pnl_observed': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
          }, sort_keys=True, indent=2))
          PY

      - name: Restore checksum-verified official minute archive cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a-minute
          key: v025a-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v1

      - name: Download exact official preholdout minute and derivatives request set
        shell: bash
        working-directory: v025a
        run: |
          set -euo pipefail
          mkdir -p ci-evidence "${DATA_ROOT}" "${WORKSPACE}"
          python scripts/download_binance_um_parallel.py \
            --request-plan artifacts/v0243/data_acquisition_plan.json \
            --output "${DATA_ROOT}" \
            --workers 12 \
            2>&1 | tee ci-evidence/minute-download.log

      - name: Build causal liquidity contexts without candidate PnL
        shell: bash
        working-directory: v025a
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context \
            --data-root "${DATA_ROOT}" \
            --data-plan artifacts/v0243/data_acquisition_plan.json \
            --workspace "${WORKSPACE}" \
            2>&1 | tee ci-evidence/context-build.log
          test -s "${WORKSPACE}/contexts.csv"
          test -s "${WORKSPACE}/event_day_plan.json"
          test -s "${WORKSPACE}/context_summary.json"

      - name: Measure official aggTrades archive envelope without downloading bodies
        shell: bash
        working-directory: v025a
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci-evidence/event-size-scout.log
          from concurrent.futures import ThreadPoolExecutor, as_completed
          import json, re
          from pathlib import Path
          from urllib.request import Request, urlopen
          import os

          plan_path = Path(os.environ['WORKSPACE']) / 'event_day_plan.json'
          plan = json.loads(plan_path.read_text())
          assert plan['generated_from_candidate_pnl'] is False
          assert plan['terminal_holdout_downloaded'] is False
          requests = list(plan['requests'])
          assert all(str(item['date']) < '2025-10-01' for item in requests)

          def probe(item):
              url = str(item['url'])
              headers = {'User-Agent': 'smc-ict-v025a-size-scout/1.0'}
              try:
                  with urlopen(Request(url, method='HEAD', headers=headers), timeout=60) as response:
                      length = response.headers.get('Content-Length')
                      return {'relative_path': item['relative_path'], 'bytes': int(length) if length else None, 'method': 'HEAD', 'status': response.status}
              except Exception as head_error:
                  try:
                      range_headers = dict(headers)
                      range_headers['Range'] = 'bytes=0-0'
                      with urlopen(Request(url, headers=range_headers), timeout=60) as response:
                          content_range = response.headers.get('Content-Range', '')
                          match = re.search(r'/(\d+)$', content_range)
                          length = int(match.group(1)) if match else response.headers.get('Content-Length')
                          return {'relative_path': item['relative_path'], 'bytes': int(length) if length else None, 'method': 'RANGE', 'status': response.status, 'head_error': repr(head_error)}
                  except Exception as range_error:
                      return {'relative_path': item['relative_path'], 'bytes': None, 'method': 'FAILED', 'error': repr(range_error), 'head_error': repr(head_error)}

          records = []
          with ThreadPoolExecutor(max_workers=20) as pool:
              futures = [pool.submit(probe, item) for item in requests]
              for index, future in enumerate(as_completed(futures), 1):
                  records.append(future.result())
                  if index % 50 == 0 or index == len(futures):
                      print(f'probed={index}/{len(futures)}', flush=True)
          records.sort(key=lambda item: item['relative_path'])
          known = [int(item['bytes']) for item in records if item.get('bytes') is not None]
          failed = [item for item in records if item.get('bytes') is None]
          payload = {
              'schema_version': 1,
              'study_id': plan['study_id'],
              'event_plan_payload_sha256': plan['payload_sha256'],
              'context_count': plan['context_count'],
              'request_count': len(records),
              'known_size_count': len(known),
              'failed_size_count': len(failed),
              'total_compressed_bytes_known': sum(known),
              'max_compressed_bytes': max(known) if known else None,
              'median_compressed_bytes': sorted(known)[len(known)//2] if known else None,
              'terminal_holdout_opened': False,
              'candidate_pnl_observed': False,
              'records': records,
          }
          out = Path(os.environ['WORKSPACE']) / 'event_size_scout.json'
          out.write_text(json.dumps(payload, sort_keys=True, indent=2) + '\n')
          print(json.dumps({key: value for key, value in payload.items() if key != 'records'}, sort_keys=True, indent=2))
          PY

      - name: Build compact scout evidence
        if: always()
        shell: bash
        working-directory: v025a
        run: |
          set -euo pipefail
          mkdir -p ci-evidence
          free -h > ci-evidence/memory-final.txt
          df -h > ci-evidence/disk-final.txt
          python - <<'PY'
          import json, os, tarfile
          from pathlib import Path
          workspace = Path(os.environ['WORKSPACE'])
          evidence = Path('ci-evidence')
          selected = [
              workspace / 'context_summary.json',
              workspace / 'contexts.csv',
              workspace / 'event_day_plan.json',
              workspace / 'event_size_scout.json',
              Path('research/v025/research_plan_locked.json'),
              Path('scout_profile.json'),
          ]
          existing = [path for path in selected if path.exists()]
          (evidence / 'output-files.json').write_text(json.dumps([str(path) for path in existing], indent=2) + '\n')
          with tarfile.open('v025a-context-scout.tar.gz', 'w:gz') as archive:
              for path in existing:
                  archive.add(path, arcname=str(path))
              archive.add(evidence, arcname='ci-evidence')
          PY
          sha256sum v025a-context-scout.tar.gz > ci-evidence/results-archive.sha256

      - name: Upload context and event-size evidence without raw market archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025a-context-scout-${{ github.run_id }}
          path: |
            transport-evidence
            v025a/v025a-context-scout.tar.gz
            v025a/ci-evidence
            .research-work/v025a-context/context_summary.json
            .research-work/v025a-context/contexts.csv
            .research-work/v025a-context/event_day_plan.json
            .research-work/v025a-context/event_size_scout.json
            v025a/research/v025/research_plan_locked.json
            v025a/scout_profile.json
          if-no-files-found: warn
          retention-days: 30
