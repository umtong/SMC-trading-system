name: V0.9 Microstructure Research

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Run EasyChart and microstructure tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/easychart_v0 tests/microstructure -q \
            2>&1 | tee v09-pytest.log

      - name: Probe official Binance archive checksum paths
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee v09-archive-probe.log
          import urllib.request
          from scripts.download_binance_um_microstructure import _archive_url, _checksum

          contracts = (
              ("aggTrades", "BTCUSDT", "2024-03"),
              ("fundingRate", "BTCUSDT", "2024-03"),
              ("markPriceKlines", "BTCUSDT", "2024-03"),
          )
          for kind, symbol, month in contracts:
              url = _archive_url(kind, symbol, month) + ".CHECKSUM"
              request = urllib.request.Request(
                  url,
                  headers={"User-Agent": "smc-trading-system-v09-ci/1.0"},
              )
              with urllib.request.urlopen(request, timeout=60) as response:
                  digest = _checksum(response.read())
              print(kind, symbol, month, digest, url)
          PY

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v09-microstructure-${{ github.run_id }}
          path: |
            v09-pytest.log
            v09-archive-probe.log
          if-no-files-found: warn
          retention-days: 14
