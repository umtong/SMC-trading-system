name: Cross-Venue Maker V1

on:
  push:
    branches: [research/crossvenue-maker-v1-20260724]
    paths:
      - research/v196_crossvenue.py
      - research_tools/crossvenue_maker_v1/**
      - .github/workflows/crossvenue-maker-v1.yml
  pull_request:
    branches: [main]
    paths:
      - research/v196_crossvenue.py
      - research_tools/crossvenue_maker_v1/**
      - .github/workflows/crossvenue-maker-v1.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crossvenue-maker-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  day:
    runs-on: macos-14
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - {symbol: BTCUSDT, day: '2022-01-15'}
          - {symbol: ETHUSDT, day: '2022-01-15'}
          - {symbol: BTCUSDT, day: '2022-03-15'}
          - {symbol: ETHUSDT, day: '2022-03-15'}
          - {symbol: BTCUSDT, day: '2022-05-15'}
          - {symbol: ETHUSDT, day: '2022-05-15'}
          - {symbol: BTCUSDT, day: '2022-07-15'}
          - {symbol: ETHUSDT, day: '2022-07-15'}
          - {symbol: BTCUSDT, day: '2022-09-15'}
          - {symbol: ETHUSDT, day: '2022-09-15'}
          - {symbol: BTCUSDT, day: '2022-11-15'}
          - {symbol: ETHUSDT, day: '2022-11-15'}
          - {symbol: BTCUSDT, day: '2023-02-15'}
          - {symbol: ETHUSDT, day: '2023-02-15'}
          - {symbol: BTCUSDT, day: '2023-04-15'}
          - {symbol: ETHUSDT, day: '2023-04-15'}
          - {symbol: BTCUSDT, day: '2023-06-15'}
          - {symbol: ETHUSDT, day: '2023-06-15'}
          - {symbol: BTCUSDT, day: '2023-08-15'}
          - {symbol: ETHUSDT, day: '2023-08-15'}
          - {symbol: BTCUSDT, day: '2023-10-15'}
          - {symbol: ETHUSDT, day: '2023-10-15'}
          - {symbol: BTCUSDT, day: '2023-12-15'}
          - {symbol: ETHUSDT, day: '2023-12-15'}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'numba==0.61.2'
      - name: Reconstruct and verify frozen evaluator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p maker-runtime
          python - <<'PY'
          import base64
          from pathlib import Path
          parts=sorted(Path('research_tools/crossvenue_maker_v1').glob('script.part[0-9][0-9]'))
          if len(parts)!=7: raise SystemExit(f'expected 7 parts, found {len(parts)}')
          encoded=''.join(p.read_text(encoding='utf-8').split() for p in parts)
          Path('maker-runtime/crossvenue_maker_v1.py').write_bytes(base64.b64decode(encoded,validate=True))
          PY
          cp research/v196_crossvenue.py maker-runtime/v196_crossvenue.py
          echo '1a17126396f946743b9627609c999370894b14789432af178d3ed8918b821ad6  maker-runtime/crossvenue_maker_v1.py' | shasum -a 256 -c -
          python -m py_compile maker-runtime/v196_crossvenue.py maker-runtime/crossvenue_maker_v1.py
      - name: Build causal maker panel
        run: |
          python maker-runtime/crossvenue_maker_v1.py day \
            --symbol '${{ matrix.symbol }}' --day '${{ matrix.day }}' \
            --out 'maker-days/${{ matrix.symbol }}-${{ matrix.day }}'
      - name: Audit panel
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import pandas as pd
          s='${{ matrix.symbol }}';d='${{ matrix.day }}';root=Path(f'maker-days/{s}-{d}')
          p=root/f'{s}_{d}_crossvenue_maker.csv.gz';x=pd.read_csv(p)
          assert len(x)>0 and (x.order_time_ms>x.signal_end_ms).all()
          m=json.loads((root/f'{s}_{d}_manifest.json').read_text())
          assert m['rows']==len(x) and not m['orders_submitted']
          print({'rows':len(x),'min_ack_delay_ms':int(x.ack_delay_ms.min())})
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: crossvenue-maker-v1-${{ matrix.symbol }}-${{ matrix.day }}-${{ github.run_id }}
          path: maker-days/${{ matrix.symbol }}-${{ matrix.day }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6

  aggregate:
    needs: day
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3' 'numba==0.61.2'
      - uses: actions/download-artifact@v4
        with:
          pattern: crossvenue-maker-v1-*-${{ github.run_id }}
          path: maker-input
          merge-multiple: true
      - name: Reconstruct identical evaluator
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p maker-runtime
          python - <<'PY'
          import base64
          from pathlib import Path
          parts=sorted(Path('research_tools/crossvenue_maker_v1').glob('script.part[0-9][0-9]'))
          encoded=''.join(p.read_text(encoding='utf-8').split() for p in parts)
          Path('maker-runtime/crossvenue_maker_v1.py').write_bytes(base64.b64decode(encoded,validate=True))
          PY
          cp research/v196_crossvenue.py maker-runtime/v196_crossvenue.py
          echo '1a17126396f946743b9627609c999370894b14789432af178d3ed8918b821ad6  maker-runtime/crossvenue_maker_v1.py' | shasum -a 256 -c -
          python -m py_compile maker-runtime/v196_crossvenue.py maker-runtime/crossvenue_maker_v1.py
          test "$(find maker-input -name '*_crossvenue_maker.csv.gz' -type f | wc -l | tr -d ' ')" = 24
      - name: Run frozen development and validation screen
        run: python maker-runtime/crossvenue_maker_v1.py aggregate --input maker-input --out maker-results
      - name: Inspect result
        run: |
          python -m json.tool maker-results/summary.json
          shasum -a 256 maker-results/*
      - uses: actions/upload-artifact@v4
        with:
          name: crossvenue-maker-v1-results-${{ github.run_id }}
          path: maker-results
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
