name: Research COIN-M liquidation to USD-M tick windows

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/research-cm-liquidation-tick-data.yml"
      - "research_tools/cm_liquidation_tick/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-cm-liquidation-tick-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
        month: [2023-06, 2023-07, 2023-08, 2023-09, 2023-10, 2023-11, 2023-12]
    runs-on: macos-14
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Reconstruct and verify frozen event windows
        shell: bash
        run: |
          cat research_tools/cm_liquidation_tick/windows.part* \
            | tr -d '[:space:]' \
            > /tmp/merged_windows_2023.csv.gz.b64
          printf '\n' >> /tmp/merged_windows_2023.csv.gz.b64
          echo "e8db31f2abe9758b09181da74af76a59c164f4a38b886ee3b48ae2265116a72e  /tmp/merged_windows_2023.csv.gz.b64" | shasum -a 256 -c -
      - name: Extract checksum-verified event windows
        run: |
          python research_tools/cm_liquidation_tick/extract_monthly_aggtrades.py \
            --symbol "${{ matrix.symbol }}" \
            --month "${{ matrix.month }}" \
            --windows-b64 /tmp/merged_windows_2023.csv.gz.b64 \
            --output-dir "research_artifact/${{ matrix.symbol }}/${{ matrix.month }}"
      - name: Inspect extraction
        run: |
          python -m json.tool "research_artifact/${{ matrix.symbol }}/${{ matrix.month }}/manifest_${{ matrix.symbol }}_${{ matrix.month }}.json"
          shasum -a 256 "research_artifact/${{ matrix.symbol }}/${{ matrix.month }}"/*
          du -h "research_artifact/${{ matrix.symbol }}/${{ matrix.month }}"/*
      - uses: actions/upload-artifact@v4
        with:
          name: cm-liquidation-tick-${{ matrix.symbol }}-${{ matrix.month }}
          path: research_artifact/${{ matrix.symbol }}/${{ matrix.month }}
          if-no-files-found: error
          retention-days: 3
          compression-level: 6
