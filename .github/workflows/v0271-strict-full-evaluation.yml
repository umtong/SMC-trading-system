name: v0.27.1 strict fixed-signal full evaluation

on:
  pull_request:
    paths:
      - '.github/workflows/v0271-strict-full-evaluation.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  ARCHIVE_SHA256: e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9
  PLAN_FILE_SHA256: 723245a408b66808b588be329a1a2cb2f563aaedad260455f4d6626f01f559b1
  PLAN_PAYLOAD_SHA256: c0cf8dacfdcc5474fd58f7570bb18a875481371658ed02ade3e2c0a5d2815f8f
  SOURCE_MANIFEST_SHA256: 9de4136de0c0bb74c8bc3d5cdf7ab235040a56e5e81568e3fee1ffd3a4968a11
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'

jobs:
  preflight:
    runs-on: ubuntu-slim
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact sealed runner
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/v0271-preflight
          mkdir -p /tmp/v0271-preflight
          python - <<'PY'
          import base64, hashlib, json, lzma, tarfile
          from io import BytesIO
          from pathlib import Path
          root = Path('research/v0271_bundle_v2')
          manifest = json.loads((root / 'TRANSPORT_MANIFEST.json').read_text(encoding='utf-8'))
          pieces = []
          for item in manifest['parts']:
              raw = (root / item['name']).read_bytes()
              assert hashlib.sha256(raw).hexdigest() == item['sha256']
              pieces.append(b''.join(raw.split()))
          archive = base64.b64decode(b''.join(pieces), validate=True)
          assert hashlib.sha256(archive).hexdigest() == manifest['archive_sha256'] == 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          tar_bytes = lzma.decompress(archive)
          with tarfile.open(fileobj=BytesIO(tar_bytes), mode='r:') as tf:
              tf.extractall('/tmp/v0271-preflight', filter='data')
          PY
          echo "${PLAN_FILE_SHA256}  /tmp/v0271-preflight/artifacts/v027/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: /tmp/v0271-preflight/requirements-lock.txt

      - name: Verify frozen source and strict correction before any PnL
        shell: bash
        working-directory: /tmp/v0271-preflight
        run: |
          set -euo pipefail
          python -m pip install -r requirements-lock.txt
          python -m pytest -q
          python -m compileall -q research scripts tests
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          correction = {
              'schema_version': 1,
              'base_archive_sha256': 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9',
              'candidate_pnl_observed_before_correction': False,
              'correction': 'all development and evaluation cost profiles replay the signal set admitted under the frozen base cost profile; only fills, fees and slippage change',
              'reason': 'prevent robustness tests from improving by cost-dependent signal deletion',
              'terminal_holdout_opened': False,
              'production_enabled': False,
          }
          raw = (json.dumps(correction, sort_keys=True, separators=(',', ':')) + '\n').encode()
          print(json.dumps(correction, indent=2, sort_keys=True))
          print('strict_correction_sha256=' + hashlib.sha256(raw).hexdigest())
          Path('/tmp/strict-correction.json').write_bytes(raw)
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: v0271-strict-preflight-${{ github.run_id }}
          path: /tmp/strict-correction.json
          if-no-files-found: error
          retention-days: 30

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        symbol: [BTCUSDT, ETHUSDT, SOLUSDT, XRPUSDT]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      DATA_DIR: ${{ github.workspace }}/.v0271-data/${{ matrix.symbol }}
      RAW_DIR: ${{ github.workspace }}/.v0271-raw/${{ matrix.symbol }}
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact sealed runner
        shell: bash
        run: |
          set -euo pipefail
          rm -rf v0271
          mkdir -p v0271
          python - <<'PY'
          import base64, hashlib, json, lzma, tarfile
          from io import BytesIO
          from pathlib import Path
          root = Path('research/v0271_bundle_v2')
          manifest = json.loads((root / 'TRANSPORT_MANIFEST.json').read_text(encoding='utf-8'))
          encoded = []
          for item in manifest['parts']:
              raw = (root / item['name']).read_bytes()
              assert hashlib.sha256(raw).hexdigest() == item['sha256']
              encoded.append(b''.join(raw.split()))
          archive = base64.b64decode(b''.join(encoded), validate=True)
          assert hashlib.sha256(archive).hexdigest() == manifest['archive_sha256'] == 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          tar_bytes = lzma.decompress(archive)
          with tarfile.open(fileobj=BytesIO(tar_bytes), mode='r:') as tf:
              tf.extractall('v0271', filter='data')
          PY
          echo "${PLAN_FILE_SHA256}  v0271/artifacts/v027/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v0271/requirements-lock.txt

      - uses: actions/cache@v4
        with:
          path: .v0271-data/${{ matrix.symbol }}
          key: v0271-strict-normalized-${{ matrix.symbol }}-${{ env.PLAN_PAYLOAD_SHA256 }}-v2

      - name: Build checksum-verified causal panel
        shell: bash
        working-directory: v0271
        run: |
          set -euo pipefail
          python -m pip install -r requirements-lock.txt
          mkdir -p "${DATA_DIR}" "${RAW_DIR}"
          /usr/bin/time -v python -m research.v027.qh_pipeline build \
            --symbols "${{ matrix.symbol }}" \
            --data-dir "${DATA_DIR}" \
            --cache-dir "${RAW_DIR}" \
            2>&1 | tee "${DATA_DIR}/build.log"
          for suffix in qh_panel 1m mark_1m funding; do
            test -s "${DATA_DIR}/${{ matrix.symbol }}_${suffix}.csv.gz"
          done
          du -sh "${DATA_DIR}"
          rm -rf "${RAW_DIR}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v0271-strict-build-log-${{ matrix.symbol }}-${{ github.run_id }}
          path: |
            .v0271-data/${{ matrix.symbol }}/acquisition_manifest.json
            .v0271-data/${{ matrix.symbol }}/build.log
          if-no-files-found: warn
          retention-days: 30

  evaluate:
    needs: [preflight, build]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      COMBINED: ${{ github.workspace }}/.v0271-combined
      OUTPUT: ${{ github.workspace }}/.v0271-strict-results
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact sealed runner
        shell: bash
        run: |
          set -euo pipefail
          rm -rf v0271
          mkdir -p v0271
          python - <<'PY'
          import base64, hashlib, json, lzma, tarfile
          from io import BytesIO
          from pathlib import Path
          root = Path('research/v0271_bundle_v2')
          manifest = json.loads((root / 'TRANSPORT_MANIFEST.json').read_text(encoding='utf-8'))
          encoded = []
          for item in manifest['parts']:
              raw = (root / item['name']).read_bytes()
              assert hashlib.sha256(raw).hexdigest() == item['sha256']
              encoded.append(b''.join(raw.split()))
          archive = base64.b64decode(b''.join(encoded), validate=True)
          assert hashlib.sha256(archive).hexdigest() == manifest['archive_sha256'] == 'e827d8cdb5de2760f322749de9fad4934327eaeecb817a520e09653792905da9'
          tar_bytes = lzma.decompress(archive)
          with tarfile.open(fileobj=BytesIO(tar_bytes), mode='r:') as tf:
              tf.extractall('v0271', filter='data')
          PY
          echo "${PLAN_FILE_SHA256}  v0271/artifacts/v027/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v0271/requirements-lock.txt

      - uses: actions/cache@v4
        with:
          path: .v0271-data/BTCUSDT
          key: v0271-strict-normalized-BTCUSDT-${{ env.PLAN_PAYLOAD_SHA256 }}-v2
          fail-on-cache-miss: true
      - uses: actions/cache@v4
        with:
          path: .v0271-data/ETHUSDT
          key: v0271-strict-normalized-ETHUSDT-${{ env.PLAN_PAYLOAD_SHA256 }}-v2
          fail-on-cache-miss: true
      - uses: actions/cache@v4
        with:
          path: .v0271-data/SOLUSDT
          key: v0271-strict-normalized-SOLUSDT-${{ env.PLAN_PAYLOAD_SHA256 }}-v2
          fail-on-cache-miss: true
      - uses: actions/cache@v4
        with:
          path: .v0271-data/XRPUSDT
          key: v0271-strict-normalized-XRPUSDT-${{ env.PLAN_PAYLOAD_SHA256 }}-v2
          fail-on-cache-miss: true

      - name: Run strict frozen selection and untouched preholdout evaluation
        shell: bash
        working-directory: v0271
        run: |
          set -euo pipefail
          python -m pip install -r requirements-lock.txt
          python -m pytest -q
          mkdir -p "${COMBINED}" "${OUTPUT}"
          for symbol in BTCUSDT ETHUSDT SOLUSDT XRPUSDT; do
            cp "${GITHUB_WORKSPACE}/.v0271-data/${symbol}/${symbol}_"*.csv.gz "${COMBINED}/"
          done
          /usr/bin/time -v python - <<'PY' 2>&1 | tee "${OUTPUT}/evaluation.log"
          import json
          from pathlib import Path
          from research.v027 import qh_pipeline as q

          original_signal_frame = q.candidate_signal_frame
          def strict_fixed_signal_frame(routed, candidate, execution_cost, start, end, entry_delay_minutes=0):
              return original_signal_frame(
                  routed, candidate, q.COSTS['base'], start, end,
                  entry_delay_minutes=entry_delay_minutes,
              )
          q.candidate_signal_frame = strict_fixed_signal_frame

          output = Path('${OUTPUT}')
          result = q.run_evaluation(Path('${COMBINED}'), Path('${COMBINED}'), output)
          audit = {
              'schema_version': 1,
              'study_id': q.STUDY_ID,
              'mode': 'strict_fixed_base_signal_set_across_cost_profiles',
              'candidate_pnl_observed_before_correction': False,
              'terminal_holdout_opened': False,
              'production_enabled': False,
              'any_target_met': bool(result['any_target_met']),
              'archive_sha256': '${ARCHIVE_SHA256}',
              'plan_payload_sha256': '${PLAN_PAYLOAD_SHA256}',
              'source_manifest_sha256': '${SOURCE_MANIFEST_SHA256}',
          }
          q.write_json(output / 'strict_execution_audit.json', audit)
          print(json.dumps(q.json_safe(audit), indent=2, sort_keys=True))
          PY

      - name: Upload complete research evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0271-strict-full-evaluation-${{ github.run_id }}
          path: |
            .v0271-strict-results
            v0271/artifacts/v027/research_plan_locked.json
          if-no-files-found: error
          retention-days: 30
