name: v0.25B2 locked absorption evaluation

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025b2-evaluate-${{ github.ref }}
  cancel-in-progress: false

env:
  A2_ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  A2_PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  B2_OVERLAY_SHA256: 6958f4439317e00dea5db4b8769340f7c3fe9b64ff687d91d0bf16e3fc3d90e4
  B2_PLAN_FILE_SHA256: a17efc3496e50dc96e1291881d939114ace5019fc117bf2bd458e1e1f9e1636c
  B2_PLAN_PAYLOAD_SHA256: af4d29254282037fd151b7d8447491139866859da6e0c5962ac0b2f6c3a43f63
  B2_SOURCE_MANIFEST_SHA256: f102c08073911fef99199c8041b355f079c01e4fa6d8d08378d5a0cf9fe58e90
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  EVENT_ROOT: ${{ github.workspace }}/.research-data/v025a2-event
  A2_WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-for-b2
  B2_WORKSPACE: ${{ github.workspace }}/.research-work/v025b2
  B2_OUTPUT: ${{ github.workspace }}/.research-results/v025b2
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  evaluate:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruct exact A2 base and locked B2 overlay
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p b2 transport-evidence
          echo "${A2_ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c -
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C b2
          base64 -d research/v025b2/v025b2_overlay.tar.xz.b64 > /tmp/v025b2_overlay.tar.xz
          echo "${B2_OVERLAY_SHA256}  /tmp/v025b2_overlay.tar.xz" | sha256sum -c -
          xz -t /tmp/v025b2_overlay.tar.xz
          tar -xJf /tmp/v025b2_overlay.tar.xz -C b2
          echo "${B2_PLAN_FILE_SHA256}  b2/research/v025b/research_plan_locked.json" | sha256sum -c -

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: b2/requirements-lock.txt

      - name: Verify frozen identity and regression gates
        shell: bash
        working-directory: b2
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence "${A2_WORKSPACE}" "${B2_WORKSPACE}" "${B2_OUTPUT}" "${EVENT_ROOT}"
          python - <<'PY' | tee ci-evidence/preregistration.json
          import hashlib, json, os
          from pathlib import Path
          def digest(path): return hashlib.sha256(Path(path).read_bytes()).hexdigest()
          def canonical(value): return hashlib.sha256(json.dumps(value,sort_keys=True,separators=(',',':'),ensure_ascii=False,allow_nan=False).encode()).hexdigest()
          p=json.loads(Path('research/v025b/research_plan_locked.json').read_text())
          q=dict(p); declared=q.pop('plan_payload_sha256')
          assert p['study_id']=='smc_event_time_impact_efficiency_collapse_v0_25_b2'
          assert p['candidate_count']==64
          assert canonical(q)==declared==os.environ['B2_PLAN_PAYLOAD_SHA256']
          assert p['source_tree_manifest_sha256']==os.environ['B2_SOURCE_MANIFEST_SHA256']
          assert canonical(p['source_files'])==p['source_tree_manifest_sha256']
          for relative, expected in p['source_files'].items(): assert digest(relative)==expected, relative
          assert p['a2_event_cache_reuse']['source_plan_payload_sha256']==os.environ['A2_PLAN_PAYLOAD_SHA256']
          assert p['a2_event_cache_reuse']['candidate_pnl_from_A2_consumed'] is False
          assert p['candidate_pnl_observed_before_plan'] is False
          assert p['terminal_holdout_opened_before_plan'] is False
          assert p['production_enabled'] is False
          print(json.dumps({'study_id':p['study_id'],'candidate_count':64,'A2_performance_consumed':False,'terminal_holdout_opened':False,'production_enabled':False},sort_keys=True,indent=2))
          PY
          PYTHONPATH=research/v025b:research/v025 python -m pytest -q research/v025b | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025b research/v025

      - name: Restore official minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v1
          restore-keys: |
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Restore performance-independent A2 event cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-event
          key: v025a2-binance-usdm-event-${{ env.A2_PLAN_PAYLOAD_SHA256 }}-v1

      - name: Rebuild exact A2 contexts and event plan
        shell: bash
        working-directory: b2
        run: |
          set -euo pipefail
          python scripts/download_binance_um_parallel.py --request-plan artifacts/v0243/data_acquisition_plan.json --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context --data-root "${DATA_ROOT}" --data-plan artifacts/v0243/data_acquisition_plan.json --workspace "${A2_WORKSPACE}" 2>&1 | tee ci-evidence/a2-context.log
          test -s "${A2_WORKSPACE}/event_day_plan.json"
          python - <<'PY'
          import json, os
          from pathlib import Path
          p=json.loads((Path(os.environ['A2_WORKSPACE'])/'event_day_plan.json').read_text())
          assert p['study_id']=='smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert p['generated_from_candidate_pnl'] is False
          assert p['terminal_holdout_downloaded'] is False
          PY

      - name: Materialize exact filtered A2 event cache when absent
        shell: bash
        working-directory: b2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py events --event-plan "${A2_WORKSPACE}/event_day_plan.json" --output "${EVENT_ROOT}" --workers 4 2>&1 | tee ci-evidence/event-cache.log

      - name: Build strict-subset B2 contexts and frozen signals
        shell: bash
        working-directory: b2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025b:research/v025 python research/v025b/v025b_pipeline.py context --a2-workspace "${A2_WORKSPACE}" --a2-event-plan "${A2_WORKSPACE}/event_day_plan.json" --workspace "${B2_WORKSPACE}" 2>&1 | tee ci-evidence/b2-context.log
          PYTHONPATH=research/v025b:research/v025 python research/v025b/v025b_pipeline.py signals --workspace "${B2_WORKSPACE}" --a2-event-root "${EVENT_ROOT}" 2>&1 | tee ci-evidence/b2-signals.log
          python - <<'PY' | tee ci-evidence/signal-audit.json
          import json, os
          from pathlib import Path
          import pandas as pd
          w=Path(os.environ['B2_WORKSPACE']); s=pd.read_csv(w/'signals.csv')
          if len(s):
              for col in ('signal_time','context_available_time','entry_time'): s[col]=pd.to_datetime(s[col],utc=True)
              assert (s['entry_time']>s[['signal_time','context_available_time']].max(axis=1)).all()
              assert (s['entry_time']<pd.Timestamp('2025-10-01T00:00:00Z')).all()
          summary=json.loads((w/'context_summary.json').read_text())
          assert summary['coverage_mode']=='strict_subset_of_performance_independent_A2_windows'
          print(json.dumps({'signals':int(len(s)),'strict_subset_coverage':True,'terminal_signal':False},sort_keys=True,indent=2))
          PY

      - name: Run B2 frozen development selection and untouched evaluation
        shell: bash
        working-directory: b2
        run: |
          set -uo pipefail
          set +e
          /usr/bin/time -v env PYTHONPATH=research/v025b:research/v025 python research/v025b/v025b_pipeline.py evaluate --workspace "${B2_WORKSPACE}" --output "${B2_OUTPUT}" 2>&1 | tee ci-evidence/evaluation.log
          status=${PIPESTATUS[0]}
          set -e
          test "$status" -eq 0 -o "$status" -eq 1
          printf '%s\n' "$status" > ci-evidence/scientific-exit-code.txt

      - name: Persist compact B2 result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root='research/results/v025b2-evaluation'
          mkdir -p "$root"
          for name in study_results.json selected_candidate.json research_gate.json development_leaderboard.csv; do
            if [ -f "${B2_OUTPUT}/${name}" ]; then cp "${B2_OUTPUT}/${name}" "$root/${name}"; fi
          done
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          r=Path('research/results/v025b2-evaluation'); result={}
          if (r/'study_results.json').exists(): result=json.loads((r/'study_results.json').read_text())
          p={'schema_version':1,'study_id':'smc_event_time_impact_efficiency_collapse_v0_25_b2','scientific_run_completed':bool(result.get('scientific_run_completed',False)),'target_met':bool(result.get('target_met',False)),'A2_performance_consumed':False,'terminal_holdout_opened':False,'production_enabled':False,'recorded_at_utc':datetime.now(timezone.utc).isoformat()}
          (r/'status.json').write_text(json.dumps(p,sort_keys=True,indent=2)+'\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$root"
          if ! git diff --cached --quiet; then git commit -m 'Record v0.25B2 frozen preholdout evaluation'; git push origin "HEAD:${GITHUB_REF_NAME}"; fi

      - name: Upload evidence without raw market data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025b2-evaluation-${{ github.run_id }}
          path: |
            transport-evidence
            b2/ci-evidence
            .research-work/v025b2/context_summary.json
            .research-work/v025b2/signals.csv
            .research-results/v025b2
            b2/research/v025b/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30

      - name: Preserve target-miss status after evidence
        if: always()
        shell: bash
        run: |
          if [ -f "${B2_OUTPUT}/research_gate.json" ]; then
            python - <<'PY'
          import json, os
          from pathlib import Path
          g=json.loads((Path(os.environ['B2_OUTPUT'])/'research_gate.json').read_text())
          raise SystemExit(0 if g.get('target_met') else 1)
          PY
          else
            exit 2
          fi
