name: research-bybit-tick-schema

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/research-bybit-tick-schema.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Inspect public Bybit trade archive schema
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import csv, gzip, hashlib, io, json, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          targets = [
              ("BTCUSDT", "2022-01-01"),
              ("ETHUSDT", "2022-01-01"),
              ("BTCUSDT", "2023-01-01"),
              ("ETHUSDT", "2023-01-01"),
          ]
          output = Path("research_data/bybit_tick_schema")
          output.mkdir(parents=True, exist_ok=True)
          records = []

          for symbol, day in targets:
              url = f"https://public.bybit.com/trading/{symbol}/{symbol}{day}.csv.gz"
              request = urllib.request.Request(url, headers={"User-Agent": "SMC-ICT-schema-audit/1.0"})
              with urllib.request.urlopen(request, timeout=120) as response:
                  payload = response.read()
                  headers = dict(response.headers.items())
              digest = hashlib.sha256(payload).hexdigest()
              text = gzip.decompress(payload).decode("utf-8-sig")
              reader = csv.reader(io.StringIO(text))
              header = next(reader)
              first_rows = []
              last_rows = []
              row_count = 0
              for row in reader:
                  row_count += 1
                  if len(first_rows) < 5:
                      first_rows.append(row)
                  last_rows.append(row)
                  if len(last_rows) > 5:
                      last_rows.pop(0)
              record = {
                  "venue": "bybit",
                  "symbol": symbol,
                  "day": day,
                  "url": url,
                  "download_bytes": len(payload),
                  "download_sha256": digest,
                  "response_headers": headers,
                  "header": header,
                  "row_count": row_count,
                  "first_rows": first_rows,
                  "last_rows": last_rows,
              }
              records.append(record)
              print(json.dumps({k: record[k] for k in ("symbol", "day", "download_bytes", "download_sha256", "header", "row_count")}), flush=True)

          manifest = {
              "schema_version": 1,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "credentials_used": False,
              "orders_submitted": False,
              "records": records,
          }
          path = output / "schema_probe.json"
          path.write_text(json.dumps(manifest, indent=2, sort_keys=True), encoding="utf-8")
          (output / "schema_probe.sha256").write_text(
              f"{hashlib.sha256(path.read_bytes()).hexdigest()}  schema_probe.json\n",
              encoding="utf-8",
          )
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: bybit-tick-schema-${{ github.run_id }}
          path: research_data/bybit_tick_schema
          if-no-files-found: error
          retention-days: 7
