name: DVOL State V2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/dvol-state-v2.yml'
      - 'research/dvol_state_v2.py'
  push:
    branches: [agent/deribit-dvol-data-20260724]
    paths:
      - '.github/workflows/dvol-state-v2.yml'
      - 'research/dvol_state_v2.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dvol-state-v2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - run: python -m py_compile research/dvol_state_v2.py
      - run: python research/dvol_state_v2.py --output-dir dvol-state-v2-results
      - if: always()
        run: |
          test -f dvol-state-v2-results/summary.json && python -m json.tool dvol-state-v2-results/summary.json || true
          find dvol-state-v2-results -type f -maxdepth 1 -print0 | sort -z | xargs -0 shasum -a 256 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dvol-state-v2-${{ github.run_id }}
          path: dvol-state-v2-results
          if-no-files-found: warn
          retention-days: 30
          compression-level: 6
