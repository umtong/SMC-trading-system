name: V2.41 Official BookDepth State Screen

on:
  pull_request:
    branches: [main]
    paths:
      - research/v241_bookdepth_state_screen.py
      - .github/workflows/v241-bookdepth-state-screen.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: v241-bookdepth-${{ github.ref }}
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install isolated dependencies
        run: python -m pip install --upgrade numpy pandas
      - name: Run checksum-verified book-depth state screen
        shell: bash
        run: |
          set -euo pipefail
          python research/v241_bookdepth_state_screen.py --out v241-results
      - name: Upload complete research evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v241-bookdepth-state-${{ github.run_id }}
          path: v241-results
          if-no-files-found: warn
          retention-days: 30
      - name: Publish summary
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          if test -f v241-results/summary.json; then
            body="$(python - <<'PY'
          import json
          x=json.load(open('v241-results/summary.json'))
          print('## V2.41 official book-depth state screen\n')
          for k in ('status','rows','eligible','target_met'):
              if k in x: print(f'- {k}: `{x[k]}`')
          print('\n_Research-only. No paper/live orders or risk changes._')
          PY
          )"
            gh pr comment "$PR_NUMBER" --body "$body"
          fi