name: V0.10 Multi-Year One-Minute Panel

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v10-1m-panel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - shard: BTCUSDT-2022
            symbol: BTCUSDT
            start: 2022-01-01
            end: 2023-01-01
          - shard: BTCUSDT-2023
            symbol: BTCUSDT
            start: 2023-01-01
            end: 2024-01-01
          - shard: BTCUSDT-2024
            symbol: BTCUSDT
            start: 2024-01-01
            end: 2025-01-01
          - shard: BTCUSDT-2025
            symbol: BTCUSDT
            start: 2025-01-01
            end: 2026-01-01
          - shard: BTCUSDT-2026H1
            symbol: BTCUSDT
            start: 2026-01-01
            end: 2026-07-01
          - shard: ETHUSDT-2022
            symbol: ETHUSDT
            start: 2022-01-01
            end: 2023-01-01
          - shard: ETHUSDT-2023
            symbol: ETHUSDT
            start: 2023-01-01
            end: 2024-01-01
          - shard: ETHUSDT-2024
            symbol: ETHUSDT
            start: 2024-01-01
            end: 2025-01-01
          - shard: ETHUSDT-2025
            symbol: ETHUSDT
            start: 2025-01-01
            end: 2026-01-01
          - shard: ETHUSDT-2026H1
            symbol: ETHUSDT
            start: 2026-01-01
            end: 2026-07-01
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Download and verify one-minute shard
        shell: bash
        run: |
          set -o pipefail
          python -m scripts.download_binance_um_1m_range \
            --symbols '${{ matrix.symbol }}' \
            --start '${{ matrix.start }}' \
            --end '${{ matrix.end }}' \
            --output-dir 'data/v10_1m_panel/${{ matrix.shard }}' \
            2>&1 | tee 'v10-1m-panel-${{ matrix.shard }}.log'

      - name: Validate immutable output
        shell: bash
        env:
          SHARD: ${{ matrix.shard }}
          SYMBOL: ${{ matrix.symbol }}
          START: ${{ matrix.start }}
          END: ${{ matrix.end }}
        run: |
          python - <<'PY'
          import hashlib, json, os
          from pathlib import Path
          import pandas as pd

          root = Path('data/v10_1m_panel') / os.environ['SHARD']
          manifest_path = root / 'v10_1m_data_manifest.json'
          data_path = root / f"{os.environ['SYMBOL']}_1m.csv.gz"
          if not manifest_path.is_file() or not data_path.is_file():
              raise SystemExit('missing one-minute shard output')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          expected = int(
              (pd.Timestamp(os.environ['END'], tz='UTC') - pd.Timestamp(os.environ['START'], tz='UTC'))
              / pd.Timedelta(minutes=1)
          )
          output = next(row for row in manifest['outputs'] if row['symbol'] == os.environ['SYMBOL'])
          if output['rows'] != expected:
              raise SystemExit(f"rows={output['rows']} expected={expected}")
          actual = hashlib.sha256(data_path.read_bytes()).hexdigest()
          if actual != output['sha256']:
              raise SystemExit('normalized SHA-256 mismatch')
          print(os.environ['SHARD'], output)
          PY

      - name: Upload immutable one-minute shard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v10-1m-panel-${{ matrix.shard }}-${{ github.run_id }}
          path: |
            data/v10_1m_panel/${{ matrix.shard }}
            v10-1m-panel-${{ matrix.shard }}.log
          if-no-files-found: error
          retention-days: 14
