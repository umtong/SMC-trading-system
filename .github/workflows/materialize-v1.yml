name: Materialize EasyChart V1

on:
  push:
    branches:
      - agent/easychart-v1-robust-growth-gate
    paths:
      - ".github/v1-bundle/**"
      - ".github/workflows/materialize-v1.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/v1-bundle/**"
      - ".github/workflows/materialize-v1.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-easychart-v1
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'agent/easychart-v1-robust-growth-gate' || github.ref_name == 'agent/easychart-v1-robust-growth-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/easychart-v1-robust-growth-gate

      - name: Decode, salvage, audit, and extract V1 bundle
        id: extract
        shell: bash
        run: |
          set +e
          diagnostic=/tmp/v1-bundle-diagnostic.txt
          : > "$diagnostic"
          part_count="$(find .github/v1-bundle -maxdepth 1 -type f -name 'part-*' | wc -l)"
          echo "part_count=$part_count" >> "$diagnostic"
          find .github/v1-bundle -maxdepth 1 -type f -name 'part-*' -print0 \
            | sort -z \
            | xargs -0 wc -c >> "$diagnostic" 2>&1
          if test "$part_count" -ne 4; then
            echo "expected exactly four bundle parts" >> "$diagnostic"
            exit 10
          fi
          cat .github/v1-bundle/part-* > /tmp/easychart-v1.tar.gz.b64
          echo "combined_base64_bytes=$(wc -c < /tmp/easychart-v1.tar.gz.b64)" >> "$diagnostic"
          base64 --decode /tmp/easychart-v1.tar.gz.b64 > /tmp/easychart-v1.tar.gz 2>> "$diagnostic"
          decode_status=$?
          echo "base64_decode_status=$decode_status" >> "$diagnostic"
          echo "decoded_bytes=$(wc -c < /tmp/easychart-v1.tar.gz)" >> "$diagnostic"
          if test -s /tmp/easychart-v1.tar.gz; then
            sha256sum /tmp/easychart-v1.tar.gz >> "$diagnostic" 2>&1
          fi
          if test "$decode_status" -ne 0; then
            cat "$diagnostic"
            exit "$decode_status"
          fi

          # The original staging transfer has a corrupt gzip CRC/length trailer.
          # GNU gzip still emits the complete decompressed payload before returning
          # status 1. The tar container is therefore the second independent
          # integrity boundary: only a valid tar with every required path is used.
          gzip -dc /tmp/easychart-v1.tar.gz > /tmp/easychart-v1.tar 2>> "$diagnostic"
          gzip_stream_status=$?
          echo "gzip_stream_status=$gzip_stream_status" >> "$diagnostic"
          echo "raw_tar_bytes=$(wc -c < /tmp/easychart-v1.tar)" >> "$diagnostic"
          tar -tf /tmp/easychart-v1.tar > /tmp/easychart-v1-files.txt 2>> "$diagnostic"
          status=$?
          echo "raw_tar_list_status=$status" >> "$diagnostic"
          if test "$status" -eq 0; then
            for required in \
              src/ictbt/easychart_v1/strategy.py \
              src/ictbt/easychart_v1/backtest.py \
              src/ictbt/easychart_v1/validation.py \
              tests/easychart_v1/test_backtest.py; do
              grep -qx "$required" /tmp/easychart-v1-files.txt || status=20
            done
            echo "required_paths_status=$status" >> "$diagnostic"
          fi
          if test "$status" -eq 0; then
            tar -xf /tmp/easychart-v1.tar 2>> "$diagnostic"
            status=$?
            echo "raw_tar_extract_status=$status" >> "$diagnostic"
          fi
          if test "$status" -eq 0; then
            actual_sha="$(sha256sum /tmp/easychart-v1.tar.gz | awk '{print $1}')"
            mkdir -p artifacts/strategy_composition_2026_07_20
            printf '%s  transferred-easychart-v1.tar.gz\n' "$actual_sha" > artifacts/strategy_composition_2026_07_20/MATERIALIZED_BUNDLE_SHA256.txt
            printf 'gzip_stream_status=%s\nraw_tar_verified=true\n' "$gzip_stream_status" >> artifacts/strategy_composition_2026_07_20/MATERIALIZED_BUNDLE_SHA256.txt
          fi
          cat "$diagnostic"
          exit "$status"

      - name: Upload bundle diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v1-bundle-diagnostic-${{ github.run_id }}
          path: |
            /tmp/v1-bundle-diagnostic.txt
            /tmp/easychart-v1.tar
          if-no-files-found: warn
          retention-days: 7

      - name: Test materialized tree
        id: materialized_tests
        if: steps.extract.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          status=0
          python -m pip install -e ".[dev]" || status=$?
          if test "$status" -eq 0; then
            python -m pytest tests/easychart_v0 tests/easychart_v1 -q || status=$?
          fi
          if test "$status" -eq 0; then
            python -m ictbt.easychart_v1 required-edge --trades 141 280 || status=$?
          fi
          if test "$status" -eq 0; then
            easychart-v1 --help >/dev/null || status=$?
          fi
          printf '%s\n' "$status" > /tmp/v1-materialized-test-status
          exit "$status"

      - name: Commit materialized sources
        if: ${{ always() && steps.extract.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/v1-bundle
          git rm .github/workflows/materialize-v1.yml
          git add -A
          git diff --cached --check
          git commit -m "Materialize EasyChart V1 robust growth research core"
          git push origin HEAD:agent/easychart-v1-robust-growth-gate

      - name: Preserve materialization test failure
        if: ${{ always() && steps.extract.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          status="$(cat /tmp/v1-materialized-test-status 2>/dev/null || echo 1)"
          if test "$status" -ne 0; then
            echo "Materialized source was committed for repair, but its test suite failed with status $status."
            exit "$status"
          fi
