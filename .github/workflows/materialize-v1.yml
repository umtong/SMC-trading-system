name: Materialize EasyChart V1

on:
  push:
    branches:
      - agent/easychart-v1-robust-growth-gate
    paths:
      - ".github/v1-bundle/**"
      - ".github/workflows/materialize-v1.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/v1-bundle/**"
      - ".github/workflows/materialize-v1.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-easychart-v1
  cancel-in-progress: false

jobs:
  materialize:
    if: github.head_ref == 'agent/easychart-v1-robust-growth-gate' || github.ref_name == 'agent/easychart-v1-robust-growth-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/easychart-v1-robust-growth-gate

      - name: Decode, audit, and extract V1 bundle
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          part_count="$(find .github/v1-bundle -maxdepth 1 -type f -name 'part-*' | wc -l)"
          test "$part_count" -eq 4
          cat .github/v1-bundle/part-* > /tmp/easychart-v1.tar.gz.b64
          base64 --decode /tmp/easychart-v1.tar.gz.b64 > /tmp/easychart-v1.tar.gz
          actual_sha="$(sha256sum /tmp/easychart-v1.tar.gz | awk '{print $1}')"
          echo "materialized_bundle_sha256=$actual_sha"
          gzip -t /tmp/easychart-v1.tar.gz
          tar -tzf /tmp/easychart-v1.tar.gz > /tmp/easychart-v1-files.txt
          grep -qx 'src/ictbt/easychart_v1/strategy.py' /tmp/easychart-v1-files.txt
          grep -qx 'src/ictbt/easychart_v1/backtest.py' /tmp/easychart-v1-files.txt
          grep -qx 'src/ictbt/easychart_v1/validation.py' /tmp/easychart-v1-files.txt
          grep -qx 'tests/easychart_v1/test_backtest.py' /tmp/easychart-v1-files.txt
          tar -xzf /tmp/easychart-v1.tar.gz
          mkdir -p artifacts/strategy_composition_2026_07_20
          printf '%s  easychart-v1.tar.gz\n' "$actual_sha" > artifacts/strategy_composition_2026_07_20/MATERIALIZED_BUNDLE_SHA256.txt

      - name: Test materialized tree
        id: materialized_tests
        if: steps.extract.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          status=0
          python -m pip install -e ".[dev]" || status=$?
          if test "$status" -eq 0; then
            python -m pytest tests/easychart_v0 tests/easychart_v1 -q || status=$?
          fi
          if test "$status" -eq 0; then
            python -m ictbt.easychart_v1 required-edge --trades 141 280 || status=$?
          fi
          if test "$status" -eq 0; then
            easychart-v1 --help >/dev/null || status=$?
          fi
          printf '%s\n' "$status" > /tmp/v1-materialized-test-status
          exit "$status"

      - name: Commit materialized sources
        if: ${{ always() && steps.extract.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .github/v1-bundle
          git rm .github/workflows/materialize-v1.yml
          git add -A
          git diff --cached --check
          git commit -m "Materialize EasyChart V1 robust growth research core"
          git push origin HEAD:agent/easychart-v1-robust-growth-gate

      - name: Preserve materialization test failure
        if: ${{ always() && steps.extract.outcome == 'success' }}
        shell: bash
        run: |
          set -euo pipefail
          status="$(cat /tmp/v1-materialized-test-status 2>/dev/null || echo 1)"
          if test "$status" -ne 0; then
            echo "Materialized source was committed for repair, but its test suite failed with status $status."
            exit "$status"
          fi
