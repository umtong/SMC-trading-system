name: Verify growth hypotheses

on:
  push:
    branches:
      - agent/verify-growth-hypotheses
  workflow_dispatch:

permissions:
  contents: read

jobs:
  committed-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run current EasyChart test suite
        run: python -m pytest tests/easychart_v0 -q

      - name: Recompute committed portfolio evidence
        run: >-
          python scripts/verify_growth_hypotheses.py
          --output-dir results/verification_growth_hypotheses

      - name: Publish verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: committed-growth-evidence
          path: results/verification_growth_hypotheses
          if-no-files-found: warn

  public-data-reproduction:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        market:
          - um_futures
          - spot
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Download public 5m candles
        run: >-
          python scripts/download_binance_5m_windows.py
          --market "${{ matrix.market }}"
          --output-dir "results/reproduction/${{ matrix.market }}/data"

      - name: Re-run V0.7 portfolio comparison
        run: >-
          python scripts/compare_easychart_v07_scene_families.py
          --data-dir "results/reproduction/${{ matrix.market }}/data"
          --output-dir "results/reproduction/${{ matrix.market }}/run"

      - name: Compare with committed benchmark
        run: >-
          python scripts/compare_reproduction_summaries.py
          --reference results/easychart_v07_scene_families/summary.json
          --candidate "${{ matrix.market }}=results/reproduction/${{ matrix.market }}/run/summary.json"
          --output "results/reproduction/${{ matrix.market }}/comparison.json"

      - name: Publish reproduction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "public-data-reproduction-${{ matrix.market }}"
          path: "results/reproduction/${{ matrix.market }}"
          if-no-files-found: warn
