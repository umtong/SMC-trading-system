name: Verify growth hypotheses

on:
  push:
    branches:
      - agent/verify-growth-hypotheses
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  committed-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run current EasyChart test suite
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p results/verification_growth_hypotheses
          set -o pipefail
          python -m pytest tests/easychart_v0 -q 2>&1 \
            | tee results/verification_growth_hypotheses/pytest.log

      - name: Recompute committed portfolio evidence
        id: evidence
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/verify_growth_hypotheses.py \
            --output-dir results/verification_growth_hypotheses 2>&1 \
            | tee results/verification_growth_hypotheses/recompute.log

      - name: Publish verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: committed-growth-evidence
          path: results/verification_growth_hypotheses
          if-no-files-found: warn

      - name: Enforce verification status
        if: always()
        shell: bash
        run: |
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.evidence.outcome }}" = "success"

  public-data-reproduction:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        market:
          - um_futures
          - spot
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Download public 5m candles
        run: >-
          python scripts/download_binance_5m_windows.py
          --market "${{ matrix.market }}"
          --output-dir "results/reproduction/${{ matrix.market }}/data"

      - name: Re-run V0.7 portfolio comparison
        id: replay
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/compare_easychart_v07_scene_families.py \
            --data-dir "results/reproduction/${{ matrix.market }}/data" \
            --output-dir "results/reproduction/${{ matrix.market }}/run" 2>&1 \
            | tee "results/reproduction/${{ matrix.market }}/replay.log"

      - name: Compare with committed benchmark
        id: compare
        if: steps.replay.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/compare_reproduction_summaries.py \
            --reference results/easychart_v07_scene_families/summary.json \
            --candidate "${{ matrix.market }}=results/reproduction/${{ matrix.market }}/run/summary.json" \
            --output "results/reproduction/${{ matrix.market }}/comparison.json" 2>&1 \
            | tee "results/reproduction/${{ matrix.market }}/comparison.log"

      - name: Publish reproduction evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "public-data-reproduction-${{ matrix.market }}"
          path: "results/reproduction/${{ matrix.market }}"
          if-no-files-found: warn

      - name: Enforce reproduction status
        if: always()
        shell: bash
        run: |
          test "${{ steps.replay.outcome }}" = "success"
          test "${{ steps.compare.outcome }}" = "success"

  research-universe-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package dependencies
        run: python -m pip install -e .

      - name: Download fixed liquid research universe
        shell: bash
        run: |
          mkdir -p results/research_universe
          set -o pipefail
          python scripts/download_binance_research_universe.py \
            --output-dir results/research_universe/data 2>&1 \
            | tee results/research_universe/download.log

      - name: Publish research universe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-research-universe
          path: results/research_universe
          if-no-files-found: error
