name: Causal Monthly Walk-Forward V3

on:
  push:
    branches:
      - agent/binance-5m-research-data
    paths:
      - scripts/research_causal_wf_v3.py
      - .github/workflows/causal-wf-v3.yml
      - scripts/download_official_binance_5m.py
  workflow_dispatch:

permissions:
  contents: read

jobs:
  causal-walk-forward:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy>=2.0" "pandas>=2.2" "pyarrow>=17" "numba>=0.61" "lightgbm>=4.5" "scikit-learn>=1.5"

      - name: Build 2020 causal warm-up history
        run: |
          python scripts/download_official_binance_5m.py \
            --output research_data/binance_2020_5m \
            --symbols BTCUSDT ETHUSDT \
            --interval 5m \
            --monthly-start 2020-01 \
            --monthly-end 2020-12 \
            --no-daily \
            --datasets klines \
            --no-funding \
            --workers 6

      - name: Build 2021-2026 trade, mark and funding history
        run: |
          python scripts/download_official_binance_5m.py \
            --output research_data/binance_2021_2026_5m \
            --symbols BTCUSDT ETHUSDT \
            --interval 5m \
            --monthly-start 2021-01 \
            --monthly-end 2026-06 \
            --no-daily \
            --datasets klines markPriceKlines \
            --workers 8

      - name: Run leak-resistant monthly retraining and five-month evaluation
        run: |
          python scripts/research_causal_wf_v3.py \
            --data-dir research_data/binance_2020_5m \
            --data-dir research_data/binance_2021_2026_5m \
            --output research_results/causal_wf_v3

      - name: Upload compact reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: causal-wf-v3-reports-${{ github.run_id }}
          path: |
            research_results/causal_wf_v3/*.json
            research_results/causal_wf_v3/*.csv
          if-no-files-found: warn
          retention-days: 14

      - name: Upload candidate and prediction ledgers
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: causal-wf-v3-ledgers-${{ github.run_id }}
          path: research_results/causal_wf_v3/*.parquet
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
