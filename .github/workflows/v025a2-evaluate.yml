name: v0.25A2 locked official event-time evaluation

on:
  push:
    branches:
      - research/v025a2-eventtime-20260723
    paths:
      - 'research/results/v025a2-context-scout/status.json'
      - 'research/results/v025a2-context-scout/context_summary.json'
      - 'research/results/v025a2-context-scout/event_size_summary.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: v025a2-evaluate-${{ github.ref }}
  cancel-in-progress: false

env:
  ARCHIVE_SHA256: 67468fcd7195481a0f2bd2f067f698e727a13dd6d2c01b12e5d34c08f7360f79
  PLAN_FILE_SHA256: db40e4bddeab538a2f3acb2c58ceeffacc5d8c3d4e08c3e26137ba16665cd1cb
  PLAN_PAYLOAD_SHA256: 0c2a63b95aeaafee05a6ef8027f1e8ec46f75d98860cf031845307e3f6e1c152
  SOURCE_MANIFEST_SHA256: 4857b909b1928bfe11c32daa6eea35f37a30f7a83168891c2432fda41bee9eb0
  DATA_PLAN_FILE_SHA256: 9874d8042af578586bba0310e76f376873077be6c32e1d49408d3e15be5fd496
  DATA_ROOT: ${{ github.workspace }}/.research-data/v025a2-minute
  EVENT_ROOT: ${{ github.workspace }}/.research-data/v025a2-event
  WORKSPACE: ${{ github.workspace }}/.research-work/v025a2-evaluation
  OUTPUT: ${{ github.workspace }}/.research-results/v025a2
  PYTHONUNBUFFERED: '1'
  PYTHONHASHSEED: '0'
  OMP_NUM_THREADS: '1'
  OPENBLAS_NUM_THREADS: '1'
  MKL_NUM_THREADS: '1'
  NUMEXPR_NUM_THREADS: '1'
  MALLOC_ARENA_MAX: '2'

jobs:
  evaluate:
    name: Official checksum event extraction and frozen evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout exact research branch
        uses: actions/checkout@v4

      - name: Reconstruct and verify locked runner
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p v025a2 transport-evidence
          echo "${ARCHIVE_SHA256}  research/v025a2/v025a2_locked_runner.tar.xz" | sha256sum -c - | tee transport-evidence/archive-sha256.txt
          xz -t research/v025a2/v025a2_locked_runner.tar.xz
          tar -xJf research/v025a2/v025a2_locked_runner.tar.xz -C v025a2
          (cd v025a2 && sha256sum -c SOURCE_SHA256SUMS.txt) | tee transport-evidence/source-sha256.txt
          echo "${PLAN_FILE_SHA256}  v025a2/research/v025/research_plan_locked.json" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  v025a2/artifacts/v0243/data_acquisition_plan.json" | sha256sum -c -

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v025a2/requirements-lock.txt

      - name: Re-run preregistration and regression gates
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci-evidence "${WORKSPACE}" "${OUTPUT}" "${EVENT_ROOT}"
          python - <<'PY' | tee ci-evidence/preregistration-audit.json
          import hashlib, json, os
          from pathlib import Path
          def canonical(x):
              return hashlib.sha256(json.dumps(x, sort_keys=True, separators=(',', ':'), ensure_ascii=False, allow_nan=False).encode()).hexdigest()
          plan = json.loads(Path('research/v025/research_plan_locked.json').read_text())
          assert plan['study_id'] == 'smc_event_time_liquidation_exhaustion_v0_25_a2'
          assert plan['candidate_count'] == 64
          payload = dict(plan); declared = payload.pop('plan_payload_sha256')
          assert canonical(payload) == declared == os.environ['PLAN_PAYLOAD_SHA256']
          assert plan['source_tree_manifest_sha256'] == os.environ['SOURCE_MANIFEST_SHA256']
          assert plan['candidate_pnl_observed_before_plan'] is False
          assert plan['terminal_holdout_opened_before_plan'] is False
          assert plan['periods']['terminal_holdout_locked'] is True
          assert plan['production_enabled'] is False
          print(json.dumps({'study_id': plan['study_id'], 'candidate_count': 64, 'terminal_holdout_opened': False, 'production_enabled': False}, sort_keys=True, indent=2))
          PY
          PYTHONPATH=research/v025 python -m pytest -q research/v025 | tee ci-evidence/pytest.txt
          python -m compileall -q research/v025 scripts smc_ict_quant

      - name: Restore checksum-verified minute cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-minute
          key: v025a2-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-v1
          restore-keys: |
            v025a1-binance-usdm-minute-${{ env.DATA_PLAN_FILE_SHA256 }}-
            v0241-patched-binance-usdm-

      - name: Restore filtered event cache
        uses: actions/cache@v4
        with:
          path: .research-data/v025a2-event
          key: v025a2-binance-usdm-event-${{ env.PLAN_PAYLOAD_SHA256 }}-v1

      - name: Re-materialize exact official minute request set and causal contexts
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          python scripts/download_binance_um_parallel.py \
            --request-plan artifacts/v0243/data_acquisition_plan.json \
            --output "${DATA_ROOT}" --workers 16 2>&1 | tee ci-evidence/minute-download.log
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py context \
            --data-root "${DATA_ROOT}" --data-plan artifacts/v0243/data_acquisition_plan.json \
            --workspace "${WORKSPACE}" 2>&1 | tee ci-evidence/context-build.log
          python - <<'PY' | tee ci-evidence/context-identity.json
          import hashlib, json, os
          from pathlib import Path
          branch = Path('../research/results/v025a2-context-scout')
          current = Path(os.environ['WORKSPACE'])
          status = json.loads((branch/'status.json').read_text())
          assert status['candidate_pnl_observed'] is False
          assert status['terminal_holdout_opened'] is False
          assert status['production_enabled'] is False
          def digest(p): return hashlib.sha256(Path(p).read_bytes()).hexdigest()
          branch_summary = json.loads((branch/'context_summary.json').read_text())
          current_summary = json.loads((current/'context_summary.json').read_text())
          assert branch_summary == current_summary
          size = json.loads((branch/'event_size_summary.json').read_text())
          assert size['candidate_pnl_observed'] is False and size['terminal_holdout_opened'] is False
          assert size['event_plan_payload_sha256'] == json.loads((current/'event_day_plan.json').read_text())['payload_sha256']
          assert int(size['total_compressed_bytes']) <= 80_000_000_000, size['total_compressed_bytes']
          print(json.dumps({'context_summary_sha256': digest(current/'context_summary.json'), 'event_plan_sha256': size['event_plan_payload_sha256'], 'event_request_count': size['request_count'], 'event_compressed_bytes': size['total_compressed_bytes'], 'candidate_pnl_observed': False}, sort_keys=True, indent=2))
          PY

      - name: Download, checksum-verify, filter, and discard official daily aggTrades
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py events \
            --event-plan "${WORKSPACE}/event_day_plan.json" --output "${EVENT_ROOT}" --workers 4 \
            2>&1 | tee ci-evidence/event-download.log
          du -sh "${EVENT_ROOT}" | tee ci-evidence/event-filtered-size.txt
          df -h | tee ci-evidence/disk-after-event.txt

      - name: Generate frozen event-time signals
        shell: bash
        working-directory: v025a2
        run: |
          set -euo pipefail
          PYTHONPATH=research/v025 python research/v025/v025_pipeline.py signals \
            --workspace "${WORKSPACE}" --event-root "${EVENT_ROOT}" 2>&1 | tee ci-evidence/signal-generation.log
          python - <<'PY' | tee ci-evidence/signal-audit.json
          import json, os
          from pathlib import Path
          import pandas as pd
          p = Path(os.environ['WORKSPACE'])/'signals.csv'
          f = pd.read_csv(p)
          if len(f):
              f['signal_time'] = pd.to_datetime(f['signal_time'], utc=True)
              f['context_available_time'] = pd.to_datetime(f['context_available_time'], utc=True)
              f['entry_time'] = pd.to_datetime(f['entry_time'], utc=True)
              assert (f['entry_time'] > f[['signal_time','context_available_time']].max(axis=1)).all()
              assert (f['entry_time'] < pd.Timestamp('2025-10-01T00:00:00Z')).all()
          print(json.dumps({'signals': int(len(f)), 'candidate_count': int(f.candidate_id.nunique()) if len(f) else 0, 'terminal_signal': False}, sort_keys=True, indent=2))
          PY

      - name: Run frozen development selection and untouched evaluation
        id: scientific
        shell: bash
        working-directory: v025a2
        run: |
          set -uo pipefail
          set +e
          /usr/bin/time -v env PYTHONPATH=research/v025 python research/v025/v025_pipeline.py evaluate \
            --workspace "${WORKSPACE}" --output "${OUTPUT}" 2>&1 | tee ci-evidence/evaluation.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" | tee ci-evidence/scientific-exit-code.txt
          python - "$status" <<'PY' | tee ci-evidence/scientific-status.json
          import json, sys
          code=int(sys.argv[1])
          assert code in (0,1), code
          print(json.dumps({'scientific_run_completed': True, 'target_met': code==0, 'terminal_holdout_opened': False, 'production_enabled': False}, sort_keys=True, indent=2))
          PY

      - name: Persist compact result and evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          root='research/results/v025a2-evaluation'
          mkdir -p "$root"
          for name in study_results.json selected_candidate.json research_gate.json development_leaderboard.csv; do
            if [ -f "${OUTPUT}/${name}" ]; then cp "${OUTPUT}/${name}" "$root/${name}"; fi
          done
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          root=Path('research/results/v025a2-evaluation')
          result={}
          if (root/'study_results.json').exists(): result=json.loads((root/'study_results.json').read_text())
          payload={'schema_version':1,'study_id':'smc_event_time_liquidation_exhaustion_v0_25_a2','scientific_run_completed':bool(result.get('scientific_run_completed',False)),'target_met':bool(result.get('target_met',False)),'terminal_holdout_opened':False,'production_enabled':False,'head_sha':os.environ.get('GITHUB_SHA'),'recorded_at_utc':datetime.now(timezone.utc).isoformat()}
          (root/'status.json').write_text(json.dumps(payload,sort_keys=True,indent=2)+'\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$root"
          if ! git diff --cached --quiet; then
            git commit -m 'Record v0.25A2 frozen preholdout evaluation'
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload scientific evidence without raw market data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v025a2-evaluation-${{ github.run_id }}
          path: |
            transport-evidence
            v025a2/ci-evidence
            .research-work/v025a2-evaluation/context_summary.json
            .research-work/v025a2-evaluation/event_day_plan.json
            .research-work/v025a2-evaluation/signals.csv
            .research-results/v025a2
            v025a2/research/v025/research_plan_locked.json
          if-no-files-found: warn
          retention-days: 30

      - name: Preserve target-miss status after evidence is saved
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "${OUTPUT}/research_gate.json" ]; then
            python - <<'PY'
          import json, os
          from pathlib import Path
          gate=json.loads((Path(os.environ['OUTPUT'])/'research_gate.json').read_text())
          raise SystemExit(0 if gate.get('target_met') else 1)
          PY
          else
            exit 2
          fi
