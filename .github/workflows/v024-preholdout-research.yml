name: v0.24.1 official preholdout research

on:
  pull_request:
    paths:
      - 'research/v024_bundle_v4/**'
      - '.github/workflows/v024-preholdout-research.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v0241-official-preholdout-${{ github.ref }}
  cancel-in-progress: false

env:
  RUNNER_ARCHIVE_SHA256: cd9424d230bc5095bd8b867f5e30c05ff05b26cdc6c4f65b49a99551b3c0d2d8
  PLAN_FILE_SHA256: dc7b24fe72f9d98373ff765e0bae7698cf78b01cbcfc90560ed5eccb613154bf
  PLAN_PAYLOAD_SHA256: e424afcf20ac04673b6d4f7de24042545c581a753e9cee18f46543b367593094
  SOURCE_MANIFEST_SHA256: 683735f7c13f20fb457c2f137a23012660999168b0f53ede100b85294addb92d
  DATA_PLAN_FILE_SHA256: 156e9755446f4cd737f9b987ad46f50e38a0fd4a19b9e226f40b6bf6bfd51ad1
  DATA_PLAN_PAYLOAD_SHA256: 12e4c72b4a05c3719d2c2cbc7b7ca06563ad3829f5460277f1655d2a483d43a6

jobs:
  preholdout-research:
    name: Official checksum data and locked chronological evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DATA_ROOT: ${{ github.workspace }}/.research-data/v0241-binance-public
      PYTHONUNBUFFERED: '1'
      PYTHONHASHSEED: '0'
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
      MALLOC_ARENA_MAX: '2'
    steps:
      - name: Checkout exact PR merge commit
        uses: actions/checkout@v4

      - name: Reconstruct and verify exact locked runner
        shell: bash
        run: |
          set -euo pipefail
          count="$(find research/v024_bundle_v4 -maxdepth 1 -name 'part-*.b64' | wc -l)"
          test "$count" -eq 8
          cat research/v024_bundle_v4/part-*.b64 | base64 -d > /tmp/v0241_locked_runner.tar.xz
          echo "${RUNNER_ARCHIVE_SHA256}  /tmp/v0241_locked_runner.tar.xz" | sha256sum -c -
          xz -t /tmp/v0241_locked_runner.tar.xz
          tar -xJf /tmp/v0241_locked_runner.tar.xz
          echo "${PLAN_FILE_SHA256}  v024/artifacts/microstructure_liquidity_v0_24/research_plan_locked.json" | sha256sum -c -
          echo "${DATA_PLAN_FILE_SHA256}  v024/artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json" | sha256sum -c -

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: v024/requirements-lock.txt

      - name: Install and re-run full integrity gate
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          mkdir -p ci_evidence
          python -m pytest -q | tee ci_evidence/pytest.txt
          python -m compileall -q smc_ict_quant scripts tests
          python - <<'PY' | tee ci_evidence/preregistration-audit.json
          import json, os
          from pathlib import Path
          plan = json.loads(Path('artifacts/microstructure_liquidity_v0_24/research_plan_locked.json').read_text())
          acquisition = json.loads(Path('artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json').read_text())
          assert plan['plan_payload_sha256'] == os.environ['PLAN_PAYLOAD_SHA256']
          assert plan['source_tree_manifest_sha256'] == os.environ['SOURCE_MANIFEST_SHA256']
          assert plan['candidate_count'] == 64
          assert plan['evaluation_period']['start_inclusive'] == '2021-12-02T00:00:00+00:00'
          assert plan['evaluation_period']['terminal_holdout_locked'] is True
          assert acquisition['payload_sha256'] == os.environ['DATA_PLAN_PAYLOAD_SHA256']
          assert acquisition['request_count'] == 3272
          assert len(acquisition['requests']) == 3272
          assert acquisition['terminal_holdout_download_prohibited_by_default'] is True
          print(json.dumps({
              'plan_payload_sha256': plan['plan_payload_sha256'],
              'source_tree_manifest_sha256': plan['source_tree_manifest_sha256'],
              'data_plan_payload_sha256': acquisition['payload_sha256'],
              'request_count': acquisition['request_count'],
              'terminal_holdout_locked': plan['evaluation_period']['terminal_holdout_locked'],
              'production_enabled': plan['production_enabled'],
          }, sort_keys=True, indent=2))
          PY

      - name: Restore official preholdout archive cache
        uses: actions/cache@v4
        with:
          path: .research-data/v0241-binance-public
          key: v0241-binance-usdm-preholdout-${{ env.DATA_PLAN_PAYLOAD_SHA256 }}-v1

      - name: Record resource envelope
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          uname -a | tee ci_evidence/uname.txt
          free -h | tee ci_evidence/memory-before.txt
          df -h | tee ci_evidence/disk-before.txt
          python --version | tee ci_evidence/python-version.txt

      - name: Download exact checksum-verified preholdout request set
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          python scripts/download_binance_um_parallel.py \
            --request-plan artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json \
            --output "${DATA_ROOT}" \
            --workers 12 \
            2>&1 | tee ci_evidence/download.log

      - name: Audit exact acquisition identity and completeness
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          python - <<'PY' | tee ci_evidence/acquisition-audit.json
          import hashlib, json, os
          from pathlib import Path

          root = Path(os.environ['DATA_ROOT'])
          plan_path = Path('artifacts/microstructure_liquidity_v0_24/data_acquisition_plan.json')
          request_plan = json.loads(plan_path.read_text())
          manifests = sorted((root / 'manifests').glob('download_2021-11-01_2025-09-30_*.json'))
          assert manifests, 'download manifest missing'
          path = manifests[-1]
          payload = json.loads(path.read_text())

          assert payload['request_plan_payload_sha256'] == os.environ['DATA_PLAN_PAYLOAD_SHA256']
          assert payload['start_inclusive'] == '2021-11-01'
          assert payload['end_inclusive'] == '2025-09-30'
          assert payload['completed'] == 3272, payload['completed']
          assert payload['missing'] == [], payload['missing'][:10]
          assert payload['failures'] == [], payload['failures'][:10]
          assert len(payload['records']) == 3272

          expected = {str(item['relative_path']) for item in request_plan['requests']}
          observed = {
              str(dict(record.get('request', {})).get('relative_path', ''))
              for record in payload['records']
          }
          assert observed == expected, {
              'unexpected': sorted(observed - expected)[:10],
              'missing': sorted(expected - observed)[:10],
          }
          forbidden = [
              relative for relative in observed
              if any(token in relative for token in ('2025-10', '2025-11', '2025-12', '2026-'))
          ]
          assert not forbidden, forbidden[:10]

          zip_count = sum(1 for _ in root.rglob('*.zip'))
          checksum_count = sum(1 for _ in root.rglob('*.zip.CHECKSUM'))
          assert zip_count == 3272, zip_count
          assert checksum_count == 3272, checksum_count

          print(json.dumps({
              'manifest': str(path),
              'manifest_sha256': hashlib.sha256(path.read_bytes()).hexdigest(),
              'request_plan_file_sha256': hashlib.sha256(plan_path.read_bytes()).hexdigest(),
              'request_plan_payload_sha256': payload['request_plan_payload_sha256'],
              'completed': payload['completed'],
              'missing': len(payload['missing']),
              'failures': len(payload['failures']),
              'zip_count': zip_count,
              'checksum_count': checksum_count,
              'exact_request_set_match': True,
              'terminal_partition_requested': False,
          }, sort_keys=True, indent=2))
          PY
          du -sh "${DATA_ROOT}" | tee ci_evidence/data-size.txt
          free -h | tee ci_evidence/memory-after-download.txt
          df -h | tee ci_evidence/disk-after-download.txt

      - name: Run point-in-time data readiness gate
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          python scripts/run_microstructure_liquidity_v0_24.py \
            --data-root "${DATA_ROOT}" \
            --readiness-only \
            2>&1 | tee ci_evidence/readiness.log

      - name: Run locked chronological preholdout research
        shell: bash
        working-directory: v024
        run: |
          set -uo pipefail
          set +e
          /usr/bin/time -v python scripts/run_microstructure_liquidity_v0_24.py \
            --data-root "${DATA_ROOT}" \
            2>&1 | tee ci_evidence/preholdout-research.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" | tee ci_evidence/research-exit-code.txt
          python - "$status" <<'PY' | tee ci_evidence/research-execution-status.json
          import json, sys
          status = int(sys.argv[1])
          print(json.dumps({
              'exit_code': status,
              'scientific_run_completed': status in (0, 1),
              'preholdout_gate_passed': status == 0,
              'terminal_holdout_requested': False,
              'production_enabled': False,
          }, sort_keys=True, indent=2))
          PY
          if [ "$status" -ne 0 ] && [ "$status" -ne 1 ]; then
            exit "$status"
          fi

      - name: Build compact evidence package
        if: always()
        shell: bash
        working-directory: v024
        run: |
          set -euo pipefail
          mkdir -p ci_evidence
          free -h | tee ci_evidence/memory-after-research.txt
          df -h | tee ci_evidence/disk-after-research.txt
          python - <<'PY'
          import json, tarfile
          from pathlib import Path
          out = Path('artifacts/microstructure_liquidity_v0_24')
          evidence = Path('ci_evidence')
          files = []
          for root in (out, evidence):
              if root.exists():
                  files.extend(str(path) for path in root.rglob('*') if path.is_file())
          (evidence / 'output-files.json').write_text(json.dumps(sorted(files), indent=2) + '\n')
          with tarfile.open('v0241-preholdout-results.tar.gz', 'w:gz') as archive:
              if out.exists():
                  archive.add(out, arcname=str(out))
              archive.add(evidence, arcname='ci_evidence')
          PY
          sha256sum v0241-preholdout-results.tar.gz | tee ci_evidence/results-archive.sha256

      - name: Upload results without raw market archives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0241-preholdout-results-${{ github.run_id }}
          path: |
            v024/v0241-preholdout-results.tar.gz
            v024/ci_evidence
            v024/artifacts/microstructure_liquidity_v0_24
          if-no-files-found: warn
          retention-days: 30
