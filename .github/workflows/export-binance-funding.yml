name: Export Binance USD-M Funding Research Data

on:
  push:
    branches:
      - agent/binance-data-export-20260724
    paths:
      - ".github/workflows/export-binance-funding.yml"
  pull_request:
    paths:
      - ".github/workflows/export-binance-funding.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-funding:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download, checksum, normalize monthly funding archives
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import csv, hashlib, io, json, urllib.request, zipfile
          from datetime import datetime, timezone
          from pathlib import Path

          SYMBOLS=("BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT")
          START=(2025,1); END=(2026,6)
          BASE="https://data.binance.vision/data/futures/um/monthly/fundingRate"
          OUT=Path("research_data/binance_um_funding")
          OUT.mkdir(parents=True,exist_ok=True)

          def months(start,end):
              y,m=start
              while (y,m)<=end:
                  yield f"{y:04d}-{m:02d}"
                  y,m=(y+1,1) if m==12 else (y,m+1)

          def get(url):
              req=urllib.request.Request(url,headers={"User-Agent":"smc-funding-archive-export/2.0"})
              with urllib.request.urlopen(req,timeout=120) as r:
                  return r.read()

          def sha(data): return hashlib.sha256(data).hexdigest()

          manifest={"generated_at_utc":datetime.now(timezone.utc).isoformat(),
                    "source":"Binance public USD-M monthly fundingRate archives",
                    "start_month":"2025-01","end_month":"2026-06","symbols":{}}

          for symbol in SYMBOLS:
              rows=[]; sources=[]; header_seen=None
              for month in months(START,END):
                  fn=f"{symbol}-fundingRate-{month}.zip"
                  url=f"{BASE}/{symbol}/{fn}"
                  archive=get(url)
                  checksum=get(url+".CHECKSUM").decode("utf-8").strip().split()[0].lower()
                  actual=sha(archive)
                  if actual!=checksum:
                      raise RuntimeError(f"checksum mismatch {fn}: {actual} != {checksum}")
                  with zipfile.ZipFile(io.BytesIO(archive)) as zf:
                      members=[n for n in zf.namelist() if not n.endswith("/")]
                      if len(members)!=1: raise RuntimeError(f"unexpected members {fn}: {members}")
                      text=io.TextIOWrapper(zf.open(members[0]),encoding="utf-8-sig",newline="")
                      data=list(csv.reader(text))
                  if not data: raise RuntimeError(f"empty archive {fn}")
                  first=data[0]
                  has_header=not first[0].lstrip("-").isdigit()
                  header=[x.strip().lower() for x in first] if has_header else [f"c{i}" for i in range(len(first))]
                  body=data[1:] if has_header else data
                  if header_seen is None: header_seen=header
                  time_idx=next((i for i,n in enumerate(header) if n in {"calc_time","funding_time","fundingtime","time"}),0)
                  rate_idx=next((i for i,n in enumerate(header) if "rate" in n and "interval" not in n),len(header)-1)
                  interval_idx=next((i for i,n in enumerate(header) if "interval" in n),None)
                  month_n=0
                  for r in body:
                      if not r or not r[time_idx].lstrip("-").isdigit(): continue
                      t=int(r[time_idx]); rate=float(r[rate_idx]); interval=float(r[interval_idx]) if interval_idx is not None and r[interval_idx] else 8.0
                      rows.append((t,interval,rate)); month_n+=1
                  sources.append({"month":month,"url":url,"official_sha256":checksum,"archive_bytes":len(archive),"rows":month_n,"source_header":header})
              rows=sorted(rows,key=lambda x:x[0])
              times=[r[0] for r in rows]
              if len(times)!=len(set(times)) or any(b<=a for a,b in zip(times,times[1:])):
                  raise RuntimeError(f"non-unique/non-monotonic funding times for {symbol}")
              out=OUT/f"{symbol}_funding_2025-01_2026-06.csv"
              with out.open("w",newline="",encoding="utf-8") as f:
                  w=csv.writer(f);w.writerow(("symbol","calc_time","funding_interval_hours","funding_rate"))
                  for t,interval,rate in rows:w.writerow((symbol,t,interval,rate))
              manifest["symbols"][symbol]={"rows":len(rows),"first_time":times[0] if times else None,"last_time":times[-1] if times else None,"output":out.as_posix(),"output_sha256":sha(out.read_bytes()),"sources":sources}
              print(symbol,len(rows),times[0] if times else None,times[-1] if times else None,flush=True)
          mp=OUT/"manifest.json";mp.write_text(json.dumps(manifest,indent=2,sort_keys=True),encoding="utf-8")
          PY
      - name: Upload verified funding research data
        uses: actions/upload-artifact@v4
        with:
          name: binance-um-funding-2025-01_2026-06
          path: research_data/binance_um_funding
          if-no-files-found: error
          retention-days: 2
