name: Export Binance USD-M Funding Research Data

on:
  pull_request:
    paths:
      - ".github/workflows/export-binance-funding.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-funding:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download and validate funding history
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import csv, hashlib, json, time, urllib.parse, urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          SYMBOLS=("BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT")
          START=1735689600000
          END=1782863999999
          OUT=Path("research_data/binance_um_funding")
          OUT.mkdir(parents=True,exist_ok=True)
          manifest={"generated_at_utc":datetime.now(timezone.utc).isoformat(),"source":"Binance USD-M REST /fapi/v1/fundingRate","start_ms":START,"end_ms":END,"symbols":{}}

          def get_json(url:str):
              req=urllib.request.Request(url,headers={"User-Agent":"smc-research-funding-export/1.0"})
              with urllib.request.urlopen(req,timeout=60) as r:
                  return json.loads(r.read().decode("utf-8"))

          for symbol in SYMBOLS:
              rows=[]; cursor=START
              while cursor<=END:
                  q=urllib.parse.urlencode({"symbol":symbol,"startTime":cursor,"endTime":END,"limit":1000})
                  batch=get_json("https://fapi.binance.com/fapi/v1/fundingRate?"+q)
                  if not batch: break
                  rows.extend(batch)
                  nxt=int(batch[-1]["fundingTime"])+1
                  if nxt<=cursor: raise RuntimeError("non-advancing funding cursor")
                  cursor=nxt
                  if len(batch)<1000: break
                  time.sleep(0.15)
              rows=sorted(rows,key=lambda x:int(x["fundingTime"]))
              times=[int(x["fundingTime"]) for x in rows]
              if len(times)!=len(set(times)) or any(b<=a for a,b in zip(times,times[1:])):
                  raise RuntimeError(f"bad funding timestamps for {symbol}")
              path=OUT/f"{symbol}_funding_2025-01_2026-06.csv"
              with path.open("w",newline="",encoding="utf-8") as f:
                  w=csv.writer(f); w.writerow(("symbol","funding_time","funding_rate","mark_price"))
                  for x in rows:
                      w.writerow((symbol,int(x["fundingTime"]),x["fundingRate"],x.get("markPrice","")))
              sha=hashlib.sha256(path.read_bytes()).hexdigest()
              manifest["symbols"][symbol]={"rows":len(rows),"first_time":times[0] if times else None,"last_time":times[-1] if times else None,"output":path.as_posix(),"sha256":sha}
              print(symbol,len(rows),times[0] if times else None,times[-1] if times else None,sha,flush=True)
          mp=OUT/"manifest.json"; mp.write_text(json.dumps(manifest,indent=2,sort_keys=True),encoding="utf-8")
          PY
      - name: Upload funding research data
        uses: actions/upload-artifact@v4
        with:
          name: binance-um-funding-2025-01_2026-06
          path: research_data/binance_um_funding
          if-no-files-found: error
          retention-days: 2
