name: Export multimarket 5m prehistory

on:
  push:
    branches: [agent/easychart-fresh-causal-rebuild]
    paths: ['.github/workflows/export-multimarket-prehistory.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download checksum-verified 5m archives
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import csv, hashlib, io, json, urllib.error, urllib.request, zipfile
          from pathlib import Path
          symbols=('BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT')
          out=Path('multimarket-prehistory'); out.mkdir()
          manifest=[]
          header=('open_time','open','high','low','close','volume','close_time','quote_volume','trade_count','taker_buy_base_volume','taker_buy_quote_volume','ignore')
          for symbol in symbols:
            rows=[]
            for year in (2020,2021):
              for month in range(1,13):
                name=f'{symbol}-5m-{year:04d}-{month:02d}.zip'
                base=f'https://data.binance.vision/data/futures/um/monthly/klines/{symbol}/5m/{name}'
                try:
                  req=urllib.request.Request(base,headers={'User-Agent':'easychart-research/1.0'})
                  payload=urllib.request.urlopen(req,timeout=90).read()
                  checksum=urllib.request.urlopen(base+'.CHECKSUM',timeout=90).read().decode().split()[0].lower()
                except urllib.error.HTTPError as exc:
                  if exc.code==404: continue
                  raise
                actual=hashlib.sha256(payload).hexdigest()
                if actual!=checksum: raise RuntimeError(f'checksum mismatch {name}')
                with zipfile.ZipFile(io.BytesIO(payload)) as zf:
                  members=[n for n in zf.namelist() if not n.endswith('/')]
                  if len(members)!=1: raise RuntimeError(f'unexpected members {name}: {members}')
                  with zf.open(members[0]) as src:
                    reader=csv.reader(io.TextIOWrapper(src,encoding='utf-8'))
                    for row in reader:
                      if not row or row[0]=='open_time': continue
                      if len(row)!=12: raise RuntimeError(f'bad width {name}')
                      rows.append(row)
                manifest.append({'symbol':symbol,'archive':name,'sha256':actual,'rows':len(rows)})
            rows.sort(key=lambda r:int(r[0]))
            path=out/f'{symbol}_5m_2020_2021.csv'
            with path.open('w',newline='',encoding='utf-8') as fh:
              w=csv.writer(fh); w.writerow(header); w.writerows(rows)
            times=[int(r[0]) for r in rows]
            for a,b in zip(times,times[1:]):
              if b-a!=300_000: raise RuntimeError(f'non-contiguous {symbol}: {a}->{b}')
            print(symbol,len(rows),times[0] if times else None,times[-1] if times else None)
          (out/'manifest.json').write_text(json.dumps(manifest,indent=2),encoding='utf-8')
          PY
      - name: Package
        run: |
          tar -caf multimarket-5m-prehistory.tar.zst multimarket-prehistory
          sha256sum multimarket-5m-prehistory.tar.zst > multimarket-5m-prehistory.tar.zst.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: multimarket-5m-prehistory
          path: |
            multimarket-5m-prehistory.tar.zst
            multimarket-5m-prehistory.tar.zst.sha256
          compression-level: 0
          retention-days: 30
