name: V1.98 Maker Queue Calibration macOS

on:
  push:
    branches:
      - research/phase20-maker-calibration-20260723
    paths:
      - '.github/workflows/phase20-maker-calibration-macos.yml'
      - 'research/phase20_maker_calibration.py'
      - 'research/phase20_depletion_alpha.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase20-maker-calibration-macos.yml'
      - 'research/phase20_maker_calibration.py'
      - 'research/phase20_depletion_alpha.py'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v198-maker-queue-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calibrate:
    runs-on: macos-14
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        symbol: [BTCUSDT, ETHUSDT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - name: Download and verify frozen public inputs
        env:
          SYMBOL: ${{ matrix.symbol }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "queue-input/${SYMBOL}"
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json, os, urllib.request
          from pathlib import Path
          S=os.environ['SYMBOL']
          DAYS=('2023-05-16','2023-06-10','2023-08-18','2023-11-09')
          ROOT='https://data.binance.vision/data/futures/um/daily'
          out=Path('queue-input')/S
          rec=[]
          for day in DAYS:
              for dtype in ('bookTicker','aggTrades'):
                  name=f'{S}-{dtype}-{day}.zip'; url=f'{ROOT}/{dtype}/{S}/{name}'
                  def get(u):
                      req=urllib.request.Request(u,headers={'User-Agent':'smc-v198-maker-calibration/1.0'})
                      with urllib.request.urlopen(req,timeout=600) as r:return r.read()
                  check=get(url+'.CHECKSUM').decode('utf-8-sig').strip()
                  expected=check.split()[0].lower(); payload=get(url); actual=hashlib.sha256(payload).hexdigest()
                  if actual!=expected: raise ValueError(f'checksum mismatch {name}')
                  (out/name).write_bytes(payload); (out/(name+'.CHECKSUM')).write_text(check+'\n')
                  rec.append({'day':day,'type':dtype,'url':url,'sha256':actual,'bytes':len(payload)})
          (out/'MANIFEST.json').write_text(json.dumps({'symbol':S,'days':list(DAYS),'sources':rec,'credentials_used':False,'orders_submitted':False},indent=2)+'\n')
          PY
      - name: Run preregistered queue and markout calibration
        run: |
          python research/phase20_maker_calibration.py \
            --symbol "${{ matrix.symbol }}" \
            --root "queue-input/${{ matrix.symbol }}" \
            --output "queue-results/${{ matrix.symbol }}"
      - name: Run frozen depletion and replenishment alpha validation
        run: |
          python research/phase20_depletion_alpha.py \
            --symbol "${{ matrix.symbol }}" \
            --root "queue-input/${{ matrix.symbol }}" \
            --output "depletion-results/${{ matrix.symbol }}"
      - name: Inspect results
        run: |
          python -m json.tool "queue-results/${{ matrix.symbol }}/${{ matrix.symbol }}_SUMMARY.json"
          python -m json.tool "depletion-results/${{ matrix.symbol }}/${{ matrix.symbol }}_DEPLETION_ALPHA_VERDICT.json"
          shasum -a 256 "queue-input/${{ matrix.symbol }}/MANIFEST.json" "queue-results/${{ matrix.symbol }}"/* "depletion-results/${{ matrix.symbol }}"/*
      - uses: actions/upload-artifact@v4
        with:
          name: v198-maker-queue-${{ matrix.symbol }}-${{ github.run_id }}
          path: |
            queue-input/${{ matrix.symbol }}/MANIFEST.json
            queue-results/${{ matrix.symbol }}
            depletion-results/${{ matrix.symbol }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 6
