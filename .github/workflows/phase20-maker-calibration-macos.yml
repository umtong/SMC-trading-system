name: V25P Frozen 2025 Public Inputs macOS

on:
  push:
    branches:
      - research/phase20-maker-calibration-20260723
    paths:
      - '.github/workflows/phase20-maker-calibration-macos.yml'
      - 'research/v25p_public_export.py'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/phase20-maker-calibration-macos.yml'
      - 'research/v25p_public_export.py'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: v25p-public-2025-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  export:
    runs-on: macos-14
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade 'numpy==2.1.3' 'pandas==2.2.3'
      - uses: actions/cache@v4
        with:
          path: .cache/v25p-public
          key: v25p-binance-public-2025-2026jan-btc-eth-sol-xrp-v1
      - name: Run frozen input exporter
        id: export
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf v25p-public-2025
          python research/v25p_public_export.py \
            --cache .cache/v25p-public \
            --output v25p-public-2025 \
            --workers 10 2>&1 | tee v25p-public-export.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Hash outputs
        if: always()
        run: find v25p-public-2025 -type f -print0 | sort -z | xargs -0 shasum -a 256 | tee v25p-public-2025/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v25p-frozen-public-2025-${{ github.run_id }}
          path: |
            v25p-public-2025
            v25p-public-export.log
            research/v25p_public_export.py
          if-no-files-found: warn
          retention-days: 14
          compression-level: 6
      - name: Publish run locator
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        run: gh pr comment 63 --repo umtong/SMC-trading-system --body "## V25P frozen 2025 public input export\n\n- run_id: \`${GITHUB_RUN_ID}\`\n- exit_code: \`${EXIT_CODE}\`\n- artifact: \`v25p-frozen-public-2025-${GITHUB_RUN_ID}\`\n- candidate: \`923f011998e16836f30c8853b23d84a55103b68013785978b134ec4a414b5ff6\`\n\n_Data only; no strategy or order authority changes._"
      - name: Preserve failure
        if: always() && steps.export.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        run: exit "$EXIT_CODE"
