name: BTC state WFV 20260724

on:
  pull_request:
    branches: [main]
    paths:
      - "research/remote/btc_state_wfv_20260724.py.gz.b64"
      - "research/remote/repair_btc_state_source_revision.py"
      - ".github/workflows/btc-state-wfv-20260724.yml"

permissions:
  contents: read

concurrency:
  group: btc-state-wfv-20260724-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  research:
    runs-on: macos-14
    timeout-minutes: 350
    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf_cache_btc_state
      HF_HUB_DISABLE_TELEMETRY: "1"
      WORK_DIR: ${{ github.workspace }}/research_runs/btc_state_wfv_20260724
      SCRIPT_PATH: ${{ github.workspace }}/research/remote/btc_state_wfv_20260724.py
      EXPECTED_SHA256: 267de8407188c1e650f795fba28c90cc2dfbdcfa0f74011b6c4d0e028358ab67

    steps:
      - name: Checkout isolated research branch
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: research/btc-state-wfv-20260724
          fetch-depth: 1

      - name: Set up locked Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Reassemble and verify immutable research script
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          source = Path("research/remote/btc_state_wfv_20260724.py.gz.b64")
          target = Path(os.environ["SCRIPT_PATH"])
          target.write_bytes(gzip.decompress(base64.b64decode(source.read_text(encoding="ascii"))))
          PY
          python research/remote/repair_btc_state_source_revision.py "$SCRIPT_PATH"
          actual_sha=$(shasum -a 256 "$SCRIPT_PATH" | awk '{print $1}')
          printf 'actual_sha256=%s\nexpected_sha256=%s\n' "$actual_sha" "$EXPECTED_SHA256" | tee "$WORK_DIR/payload_identity.txt"
          test "$actual_sha" = "$EXPECTED_SHA256"
          python -m py_compile "$SCRIPT_PATH"
          cp "$SCRIPT_PATH" "$WORK_DIR/locked_research_script.py"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$WORK_DIR/locked_research_script.py" > "$WORK_DIR/SCRIPT_SHA256.txt"

      - name: Install fixed research environment
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade "pip==25.1.1"
          python -m pip install \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0" \
            "scikit-learn==1.6.1" \
            "numba==0.61.2" \
            "huggingface_hub==0.27.1" \
            "hf_xet==1.1.10"
          python -m pip freeze | sort > "$WORK_DIR/pip-freeze.txt"
          python - <<'PY'
          import json, platform, sys
          import numpy, pandas, pyarrow, sklearn, numba, huggingface_hub
          from pathlib import Path
          root = Path("research_runs/btc_state_wfv_20260724")
          root.mkdir(parents=True, exist_ok=True)
          payload = {
              "python": sys.version,
              "platform": platform.platform(),
              "machine": platform.machine(),
              "numpy": numpy.__version__,
              "pandas": pandas.__version__,
              "pyarrow": pyarrow.__version__,
              "scikit_learn": sklearn.__version__,
              "numba": numba.__version__,
              "huggingface_hub": huggingface_hub.__version__,
              "orders_submitted": False,
              "paper_or_live_started": False,
              "opened_2026": False,
          }
          (root / "runner_environment.json").write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(payload, sort_keys=True))
          PY

      - name: Run development then gated selection and confirmation
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "$WORK_DIR"
          DEV="$WORK_DIR/development/development_frozen.json"
          SEL="$WORK_DIR/selection/selection_frozen.json"
          CONF="$WORK_DIR/confirmation/confirmation_frozen.json"
          STATUS="$WORK_DIR/run_status.json"

          development_rc=0
          python "$SCRIPT_PATH" \
            --stage development \
            --work-dir "$WORK_DIR" \
            --cache-dir "$HF_HOME" \
            2>&1 | tee "$WORK_DIR/development.log" || development_rc=$?

          development_pass=0
          representatives=0
          if [[ $development_rc -eq 0 && -f "$DEV" ]]; then
            read development_pass representatives < <(python - "$DEV" <<'PY'
          import json, sys
          p=json.load(open(sys.argv[1], encoding="utf-8"))
          print(int(p.get("gate_pass_count", 0)), len(p.get("representatives", [])))
          PY
            )
          fi

          selection_rc=-1
          selection_pass=0
          selected=0
          if [[ $development_rc -eq 0 && $development_pass -gt 0 && $representatives -gt 0 ]]; then
            selection_rc=0
            python "$SCRIPT_PATH" \
              --stage selection \
              --work-dir "$WORK_DIR" \
              --cache-dir "$HF_HOME" \
              --predecessor "$DEV" \
              2>&1 | tee "$WORK_DIR/selection.log" || selection_rc=$?
            if [[ $selection_rc -eq 0 && -f "$SEL" ]]; then
              read selection_pass selected < <(python - "$SEL" <<'PY'
          import json, sys
          p=json.load(open(sys.argv[1], encoding="utf-8"))
          print(int(p.get("gate_pass_count", 0)), len(p.get("selected", [])))
          PY
              )
            fi
          fi

          confirmation_rc=-1
          if [[ $selection_rc -eq 0 && $selection_pass -gt 0 && $selected -gt 0 ]]; then
            confirmation_rc=0
            python "$SCRIPT_PATH" \
              --stage confirmation \
              --work-dir "$WORK_DIR" \
              --cache-dir "$HF_HOME" \
              --predecessor "$SEL" \
              2>&1 | tee "$WORK_DIR/confirmation.log" || confirmation_rc=$?
          fi

          python - "$STATUS" "$development_rc" "$development_pass" "$representatives" "$selection_rc" "$selection_pass" "$selected" "$confirmation_rc" <<'PY'
          import json, pathlib, sys
          out=pathlib.Path(sys.argv[1])
          root=out.parent
          payload={
              "development_rc": int(sys.argv[2]),
              "development_gate_pass_count": int(sys.argv[3]),
              "development_representatives": int(sys.argv[4]),
              "selection_rc": int(sys.argv[5]),
              "selection_gate_pass_count": int(sys.argv[6]),
              "selection_selected_count": int(sys.argv[7]),
              "confirmation_rc": int(sys.argv[8]),
              "orders_submitted": False,
              "paper_or_live_started": False,
              "opened_2026": False,
              "target_gate_1pct_daily": False,
          }
          conf=root / "confirmation" / "confirmation_frozen.json"
          if conf.exists():
              c=json.loads(conf.read_text(encoding="utf-8"))
              r=c.get("results", {})
              payload["confirmation_gate"] = bool(r.get("confirmation_gate", False))
              payload["target_gate_1pct_daily"] = bool(r.get("target_gate_1pct_daily", False))
              payload["confirmation_base"] = r.get("base")
              payload["confirmation_stress15"] = r.get("stress15")
              payload["confirmation_stress20"] = r.get("stress20")
          out.write_text(json.dumps(payload, indent=2, sort_keys=True), encoding="utf-8")
          print(json.dumps(payload, sort_keys=True))
          PY
          exit 0

      - name: Record evidence checksums
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$WORK_DIR"
          find "$WORK_DIR" -type f -print0 | sort -z | xargs -0 shasum -a 256 > "$WORK_DIR/OUTPUT_SHA256SUMS.txt"

      - name: Upload research evidence only
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: btc-state-wfv-${{ github.sha }}
          path: research_runs/btc_state_wfv_20260724
          if-no-files-found: error
          retention-days: 7
          compression-level: 6
