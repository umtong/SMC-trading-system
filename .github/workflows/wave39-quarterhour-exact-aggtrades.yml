name: Wave39 exact quarter-hour aggTrades panel

on:
  pull_request:
    paths:
      - ".github/workflows/wave39-quarterhour-exact-aggtrades.yml"
      - "scripts/wave39_build_qh_exact_aggtrades.py"

permissions:
  contents: read

jobs:
  build-panel:
    name: ${{ matrix.symbol }} ${{ matrix.label }} exact flow
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix:
        include:
          - symbol: BTCUSDT
            label: 2022H1
            start: 2022-01-01
            end: 2022-07-01
          - symbol: BTCUSDT
            label: 2022H2
            start: 2022-07-01
            end: 2023-01-01
          - symbol: BTCUSDT
            label: 2023H1
            start: 2023-01-01
            end: 2023-07-01
          - symbol: BTCUSDT
            label: 2023H2
            start: 2023-07-01
            end: 2024-01-01
          - symbol: XRPUSDT
            label: 2022H1
            start: 2022-01-01
            end: 2022-07-01
          - symbol: XRPUSDT
            label: 2022H2
            start: 2022-07-01
            end: 2023-01-01
          - symbol: XRPUSDT
            label: 2023H1
            start: 2023-01-01
            end: 2023-07-01
          - symbol: XRPUSDT
            label: 2023H2
            start: 2023-07-01
            end: 2024-01-01

    steps:
      - name: Checkout exact research branch
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install locked data dependencies
        run: |
          python -m pip install --upgrade \
            "numpy==2.1.3" \
            "pandas==2.2.3" \
            "pyarrow==18.1.0"

      - name: Compile and run synthetic causality audit
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile scripts/wave39_build_qh_exact_aggtrades.py
          python - <<'PY'
          from pathlib import Path
          import importlib.util
          import tempfile
          import zipfile
          import pandas as pd

          path = Path("scripts/wave39_build_qh_exact_aggtrades.py")
          spec = importlib.util.spec_from_file_location("wave39", path)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          start = pd.Timestamp("2022-01-01", tz="UTC")
          end = start + pd.Timedelta(minutes=30)
          state = module.empty_state(2)
          rows = [
              [1, 100, 2, 10, 11, int(start.timestamp() * 1000) + 1000, False],
              [2, 101, 1, 12, 12, int(start.timestamp() * 1000) + 11000, True],
              [3, 102, 3, 13, 15, int(start.timestamp() * 1000) + 35000, False],
              [4, 103, 1, 16, 16, int(start.timestamp() * 1000) + 65000, False],
          ]
          with tempfile.TemporaryDirectory() as directory:
              archive_path = Path(directory) / "synthetic.zip"
              with zipfile.ZipFile(archive_path, "w") as archive:
                  archive.writestr(
                      "synthetic.csv",
                      "\n".join(",".join(map(str, row)) for row in rows) + "\n",
                  )
              module.process_zip(
                  archive_path,
                  state=state,
                  start_ms=int(start.timestamp() * 1000),
                  end_ms=int(end.timestamp() * 1000),
                  chunk_rows=2,
                  previous_id=None,
                  previous_timestamp=None,
              )
          output = module.build_output(state, start, end, "TEST")
          assert output.loc[0, "signed_trade_quote_10s"] == 200
          assert output.loc[0, "signed_trade_quote_30s"] == 99
          assert output.loc[0, "signed_trade_quote_60s"] == 405
          assert output.loc[0, "entry_after_10s_price"] == 101
          assert output.loc[0, "entry_after_30s_price"] == 102
          assert output.loc[0, "entry_after_60s_price"] == 103
          print("synthetic causality audit passed")
          PY

      - name: Download, checksum, aggregate, and hash official archives
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "wave39-output/${{ matrix.symbol }}/${{ matrix.label }}"
          python scripts/wave39_build_qh_exact_aggtrades.py \
            --symbol "${{ matrix.symbol }}" \
            --start "${{ matrix.start }}" \
            --end "${{ matrix.end }}" \
            --output-dir "wave39-output/${{ matrix.symbol }}/${{ matrix.label }}" \
            2>&1 | tee "wave39-output/${{ matrix.symbol }}/${{ matrix.label }}/run.log"

      - name: Upload compact immutable panel
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wave39-qh-exact-${{ matrix.symbol }}-${{ matrix.label }}-${{ github.run_id }}
          path: wave39-output/${{ matrix.symbol }}/${{ matrix.label }}/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
