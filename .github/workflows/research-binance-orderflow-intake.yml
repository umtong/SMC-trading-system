name: research-binance-orderflow-intake

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/research-binance-orderflow-intake.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-binance-orderflow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acquire:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install isolated intake dependencies
        run: python -m pip install --upgrade pandas pyarrow huggingface_hub hf_xet

      - name: Download pinned public Binance mirror and seal 2026
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          import pandas as pd
          from huggingface_hub import HfApi, hf_hub_download

          REPO_ID = "linxy/USDT-M_Perpetual_Futures"
          SYMBOLS = ("BTCUSDT", "ETHUSDT")
          CUTOFF = pd.Timestamp("2026-01-01T00:00:00Z")
          OUTPUT = Path("research_data/binance_usdm_orderflow_2020_2025")
          CACHE = Path(".hf-intake-cache")
          OUTPUT.mkdir(parents=True, exist_ok=True)

          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  while chunk := handle.read(1024 * 1024):
                      digest.update(chunk)
              return digest.hexdigest()

          def as_utc(series: pd.Series) -> pd.Series:
              if pd.api.types.is_integer_dtype(series) or pd.api.types.is_float_dtype(series):
                  numeric = pd.to_numeric(series, errors="raise")
                  magnitude = float(numeric.dropna().abs().median()) if numeric.notna().any() else 0.0
                  unit = "ns" if magnitude > 1e17 else "us" if magnitude > 1e14 else "ms" if magnitude > 1e11 else "s"
                  return pd.to_datetime(numeric, unit=unit, utc=True)
              return pd.to_datetime(series, utc=True, errors="raise")

          info = HfApi().dataset_info(REPO_ID)
          revision = info.sha
          records = []

          for symbol in SYMBOLS:
              requested = {
                  "klines_5m": f"{symbol}/{symbol}_5m.parquet",
                  "metrics": f"{symbol}/{symbol}_metrics.parquet",
                  "funding": f"{symbol}/{symbol}_fundingRate.parquet",
                  "info": f"{symbol}/{symbol}_info.json",
              }
              symbol_dir = OUTPUT / symbol
              symbol_dir.mkdir(parents=True, exist_ok=True)

              for kind, filename in requested.items():
                  source = Path(hf_hub_download(
                      repo_id=REPO_ID,
                      repo_type="dataset",
                      filename=filename,
                      revision=revision,
                      cache_dir=CACHE,
                  ))
                  if kind == "info":
                      target = symbol_dir / source.name
                      target.write_bytes(source.read_bytes())
                      records.append({
                          "symbol": symbol,
                          "kind": kind,
                          "source_path": filename,
                          "output_path": str(target),
                          "rows": None,
                          "sha256": sha256(target),
                      })
                      continue

                  frame = pd.read_parquet(source)
                  time_column = {
                      "klines_5m": "open_time",
                      "metrics": "create_time",
                      "funding": "calc_time",
                  }[kind]
                  if time_column not in frame.columns:
                      raise RuntimeError(f"missing {time_column} in {filename}: {list(frame.columns)}")
                  frame[time_column] = as_utc(frame[time_column])
                  frame = frame.loc[frame[time_column] < CUTOFF].copy()
                  frame = frame.sort_values(time_column, kind="stable")
                  duplicates = int(frame[time_column].duplicated().sum())
                  frame = frame.drop_duplicates(time_column, keep="last").reset_index(drop=True)

                  if kind == "klines_5m":
                      expected = pd.Timedelta(minutes=5)
                      deltas = frame[time_column].diff().dropna()
                      missing_intervals = int(((deltas / expected) - 1).clip(lower=0).round().sum())
                      numeric_columns = [
                          "open", "high", "low", "close", "volume", "quote_volume",
                          "count", "taker_buy_volume", "taker_buy_quote_volume",
                      ]
                      for column in numeric_columns:
                          if column in frame.columns:
                              frame[column] = pd.to_numeric(frame[column], errors="raise")
                      if not frame.empty:
                          if (frame["high"] < frame[["open", "close"]].max(axis=1)).any():
                              raise RuntimeError(f"OHLC high invariant failed for {symbol}")
                          if (frame["low"] > frame[["open", "close"]].min(axis=1)).any():
                              raise RuntimeError(f"OHLC low invariant failed for {symbol}")
                          if (frame["taker_buy_quote_volume"] > frame["quote_volume"] + 1e-7).any():
                              raise RuntimeError(f"taker volume invariant failed for {symbol}")
                  else:
                      missing_intervals = None

                  target = symbol_dir / f"{symbol}_{kind}_through_2025.parquet"
                  frame.to_parquet(target, index=False, compression="zstd")
                  records.append({
                      "symbol": symbol,
                      "kind": kind,
                      "source_path": filename,
                      "source_sha256": sha256(source),
                      "output_path": str(target),
                      "rows": int(len(frame)),
                      "start": None if frame.empty else frame[time_column].min().isoformat(),
                      "end": None if frame.empty else frame[time_column].max().isoformat(),
                      "duplicates_removed": duplicates,
                      "missing_intervals": missing_intervals,
                      "sha256": sha256(target),
                  })

          manifest = {
              "schema_version": 1,
              "created_at_utc": datetime.now(timezone.utc).isoformat(),
              "source_repository": REPO_ID,
              "source_revision": revision,
              "source_description": "Parquet mirror generated from Binance official data.binance.vision archives",
              "symbols": list(SYMBOLS),
              "sealed_cutoff_exclusive": CUTOFF.isoformat(),
              "sealed_2026_status": "REMOVED_BEFORE_ARTIFACT",
              "credentials_used": False,
              "orders_submitted": False,
              "records": records,
          }
          payload = json.dumps(manifest, sort_keys=True, separators=(",", ":")).encode()
          manifest["content_digest"] = hashlib.sha256(payload).hexdigest()
          manifest_path = OUTPUT / "MANIFEST.json"
          manifest_path.write_text(json.dumps(manifest, indent=2, sort_keys=True), encoding="utf-8")
          (OUTPUT / "MANIFEST.sha256").write_text(f"{sha256(manifest_path)}  MANIFEST.json\n", encoding="utf-8")
          print(json.dumps({
              "source_revision": revision,
              "record_count": len(records),
              "manifest": str(manifest_path),
              "content_digest": manifest["content_digest"],
          }, indent=2))
          PY

      - name: Upload sealed research dataset
        uses: actions/upload-artifact@v4
        with:
          name: binance-usdm-orderflow-through-2025-${{ github.run_id }}
          path: research_data/binance_usdm_orderflow_2020_2025
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
