name: Export Binance positioning research data

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/export-positioning-research-data.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download and normalize official Binance prehistory, metrics, and funding
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import csv
          import gzip
          import hashlib
          import io
          import json
          import time
          import urllib.error
          import urllib.request
          import zipfile
          from datetime import date, timedelta
          from pathlib import Path

          ROOT = Path("positioning-data")
          CACHE = ROOT / "archives"
          OUTPUT = ROOT / "normalized"
          CACHE.mkdir(parents=True, exist_ok=True)
          OUTPUT.mkdir(parents=True, exist_ok=True)
          SYMBOLS = ("BTCUSDT", "ETHUSDT")
          BASE = "https://data.binance.vision/data/futures/um"
          USER_AGENT = "easychart-causal-research/1.0"

          def fetch(url: str, *, allow_missing: bool = False) -> bytes | None:
              error: Exception | None = None
              for attempt in range(7):
                  try:
                      request = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
                      with urllib.request.urlopen(request, timeout=90) as response:
                          return response.read()
                  except urllib.error.HTTPError as exc:
                      if exc.code == 404 and allow_missing:
                          return None
                      error = exc
                  except Exception as exc:  # noqa: BLE001
                      error = exc
                  time.sleep(min(45, 2**attempt))
              raise RuntimeError(f"failed to download {url}: {error}")

          def verified_archive(url: str, *, allow_missing: bool = False) -> tuple[bytes, str] | None:
              payload = fetch(url, allow_missing=allow_missing)
              if payload is None:
                  return None
              checksum_payload = fetch(url + ".CHECKSUM", allow_missing=allow_missing)
              if checksum_payload is None:
                  raise RuntimeError(f"archive exists but checksum is missing: {url}")
              expected = checksum_payload.decode("utf-8").split()[0].lower()
              actual = hashlib.sha256(payload).hexdigest()
              if actual != expected:
                  raise RuntimeError(f"checksum mismatch for {url}: {expected} != {actual}")
              return payload, actual

          def months(start_year: int, start_month: int, end_year: int, end_month: int):
              year, month = start_year, start_month
              while (year, month) <= (end_year, end_month):
                  yield year, month
                  month += 1
                  if month == 13:
                      month = 1
                      year += 1

          manifest: dict[str, object] = {
              "source": "Binance Public Data USD-M",
              "symbols": list(SYMBOLS),
              "prehistory": [],
              "metrics": [],
              "funding": [],
          }

          # 2020-2021 one-minute klines provide strictly prior history for a model frozen on 2022-01-01.
          def prehistory_job(item: tuple[str, int, int]):
              symbol, year, month = item
              name = f"{symbol}-1m-{year:04d}-{month:02d}.zip"
              url = f"{BASE}/monthly/klines/{symbol}/1m/{name}"
              result = verified_archive(url)
              assert result is not None
              payload, digest = result
              return item, payload, digest, url

          prehistory_jobs = [
              (symbol, year, month)
              for symbol in SYMBOLS
              for year, month in months(2020, 1, 2021, 12)
          ]
          prehistory_payloads: dict[tuple[str, int, int], tuple[bytes, str, str]] = {}
          with concurrent.futures.ThreadPoolExecutor(max_workers=10) as executor:
              for item, payload, digest, url in executor.map(prehistory_job, prehistory_jobs):
                  prehistory_payloads[item] = (payload, digest, url)

          for symbol in SYMBOLS:
              path = OUTPUT / f"{symbol}_1m_2020_2021.csv.gz"
              rows = 0
              previous: int | None = None
              with gzip.open(path, "wt", encoding="utf-8", newline="") as target:
                  writer = csv.writer(target)
                  writer.writerow((
                      "open_time", "open", "high", "low", "close", "volume",
                      "close_time", "quote_volume", "trade_count",
                      "taker_buy_base_volume", "taker_buy_quote_volume", "ignore",
                  ))
                  for year, month in months(2020, 1, 2021, 12):
                      payload, digest, url = prehistory_payloads[(symbol, year, month)]
                      with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                          member = [name for name in archive.namelist() if not name.endswith("/")][0]
                          with archive.open(member) as source:
                              reader = csv.reader(io.TextIOWrapper(source, encoding="utf-8", newline=""))
                              for row in reader:
                                  if not row or row[0] == "open_time":
                                      continue
                                  timestamp = int(row[0])
                                  if previous is not None and timestamp - previous != 60_000:
                                      raise RuntimeError(f"non-contiguous prehistory for {symbol}: {previous} -> {timestamp}")
                                  previous = timestamp
                                  writer.writerow(row)
                                  rows += 1
                      manifest["prehistory"].append({
                          "symbol": symbol, "year": year, "month": month,
                          "url": url, "sha256": digest,
                      })
              manifest[f"{symbol}_prehistory_normalized"] = {
                  "path": str(path), "rows": rows,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          # Five-minute positioning metrics. Missing early days are recorded rather than fabricated.
          start_day = date(2020, 1, 1)
          end_day = date(2026, 6, 30)
          day_count = (end_day - start_day).days + 1
          metric_jobs = [
              (symbol, start_day + timedelta(days=offset))
              for symbol in SYMBOLS
              for offset in range(day_count)
          ]

          def metric_job(item: tuple[str, date]):
              symbol, day = item
              stamp = day.isoformat()
              name = f"{symbol}-metrics-{stamp}.zip"
              url = f"{BASE}/daily/metrics/{symbol}/{name}"
              result = verified_archive(url, allow_missing=True)
              return item, result, url

          metric_payloads: dict[tuple[str, date], tuple[bytes, str, str] | None] = {}
          with concurrent.futures.ThreadPoolExecutor(max_workers=20) as executor:
              for item, result, url in executor.map(metric_job, metric_jobs):
                  metric_payloads[item] = None if result is None else (result[0], result[1], url)

          for symbol in SYMBOLS:
              path = OUTPUT / f"{symbol}_metrics_5m.csv.gz"
              rows = 0
              missing: list[str] = []
              header: list[str] | None = None
              previous: str | None = None
              with gzip.open(path, "wt", encoding="utf-8", newline="") as target:
                  writer = csv.writer(target)
                  for offset in range(day_count):
                      day = start_day + timedelta(days=offset)
                      entry = metric_payloads[(symbol, day)]
                      if entry is None:
                          missing.append(day.isoformat())
                          continue
                      payload, digest, url = entry
                      with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                          member = [name for name in archive.namelist() if not name.endswith("/")][0]
                          with archive.open(member) as source:
                              reader = csv.reader(io.TextIOWrapper(source, encoding="utf-8", newline=""))
                              current_header = next(reader)
                              if header is None:
                                  header = current_header
                                  writer.writerow(header)
                              elif current_header != header:
                                  raise RuntimeError(f"metrics schema drift for {symbol} {day}: {current_header}")
                              for row in reader:
                                  if previous is not None and row[0] <= previous:
                                      raise RuntimeError(f"non-increasing metrics timestamp for {symbol}: {previous} -> {row[0]}")
                                  previous = row[0]
                                  writer.writerow(row)
                                  rows += 1
                      manifest["metrics"].append({
                          "symbol": symbol, "date": day.isoformat(),
                          "url": url, "sha256": digest,
                      })
              manifest[f"{symbol}_metrics_normalized"] = {
                  "path": str(path), "rows": rows, "missing_dates": missing,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          # Funding-rate history.
          def funding_job(item: tuple[str, int, int]):
              symbol, year, month = item
              name = f"{symbol}-fundingRate-{year:04d}-{month:02d}.zip"
              url = f"{BASE}/monthly/fundingRate/{symbol}/{name}"
              result = verified_archive(url, allow_missing=True)
              return item, result, url

          funding_jobs = [
              (symbol, year, month)
              for symbol in SYMBOLS
              for year, month in months(2020, 1, 2026, 6)
          ]
          funding_payloads: dict[tuple[str, int, int], tuple[bytes, str, str] | None] = {}
          with concurrent.futures.ThreadPoolExecutor(max_workers=12) as executor:
              for item, result, url in executor.map(funding_job, funding_jobs):
                  funding_payloads[item] = None if result is None else (result[0], result[1], url)

          for symbol in SYMBOLS:
              path = OUTPUT / f"{symbol}_funding.csv.gz"
              rows = 0
              header: list[str] | None = None
              missing: list[str] = []
              with gzip.open(path, "wt", encoding="utf-8", newline="") as target:
                  writer = csv.writer(target)
                  for year, month in months(2020, 1, 2026, 6):
                      entry = funding_payloads[(symbol, year, month)]
                      if entry is None:
                          missing.append(f"{year:04d}-{month:02d}")
                          continue
                      payload, digest, url = entry
                      with zipfile.ZipFile(io.BytesIO(payload)) as archive:
                          member = [name for name in archive.namelist() if not name.endswith("/")][0]
                          with archive.open(member) as source:
                              reader = csv.reader(io.TextIOWrapper(source, encoding="utf-8", newline=""))
                              current_header = next(reader)
                              if header is None:
                                  header = current_header
                                  writer.writerow(header)
                              elif current_header != header:
                                  raise RuntimeError(f"funding schema drift for {symbol}: {current_header}")
                              for row in reader:
                                  writer.writerow(row)
                                  rows += 1
                      manifest["funding"].append({
                          "symbol": symbol, "year": year, "month": month,
                          "url": url, "sha256": digest,
                      })
              manifest[f"{symbol}_funding_normalized"] = {
                  "path": str(path), "rows": rows, "missing_months": missing,
                  "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
              }

          manifest_path = ROOT / "manifest.json"
          manifest_path.write_text(json.dumps(manifest, indent=2), encoding="utf-8")
          print(json.dumps({
              key: value for key, value in manifest.items()
              if key.endswith("_normalized")
          }, indent=2))
          PY

      - name: Package normalized research data
        shell: bash
        run: |
          set -euo pipefail
          tar -C positioning-data -caf easychart-positioning-data.tar.zst normalized manifest.json
          sha256sum easychart-positioning-data.tar.zst > easychart-positioning-data.tar.zst.sha256
          ls -lh easychart-positioning-data.tar.zst positioning-data/normalized/*

      - name: Upload positioning research data
        uses: actions/upload-artifact@v4
        with:
          name: easychart-positioning-data
          path: |
            easychart-positioning-data.tar.zst
            easychart-positioning-data.tar.zst.sha256
            positioning-data/manifest.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
