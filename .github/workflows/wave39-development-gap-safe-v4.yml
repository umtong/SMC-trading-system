name: Wave39 corrected gap-safe development 2022

on:
  pull_request:
    paths:
      - ".github/workflows/wave39-development-gap-safe-v4.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: wave39-frozen-orchestrator-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  develop:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      HEAD_BRANCH: research/wave39-quarterhour-exact-aggtrades-20260723
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave39-quarterhour-exact-aggtrades-20260723
          fetch-depth: 0

      - name: Await immutable exact-flow and gap-preserving support runs
        id: await
        shell: bash
        run: |
          set -euo pipefail
          successful_run() {
            gh api -H 'Accept: application/vnd.github+json' \
              "/repos/${REPOSITORY}/actions/runs?branch=${HEAD_BRANCH}&per_page=100" \
            | python -c 'import json,sys; n=sys.argv[1]; runs=json.load(sys.stdin).get("workflow_runs",[]); print(next((str(r["id"]) for r in runs if r.get("name")==n and r.get("status")=="completed" and r.get("conclusion")=="success"),""))' "$1"
          }
          for attempt in $(seq 1 270); do
            exact_id="$(successful_run 'Wave39 exact quarter-hour aggTrades 2022 v2')"
            support_id="$(successful_run 'Wave39 official 1m support 2022 v3')"
            echo "attempt=${attempt} exact=${exact_id:-none} support=${support_id:-none}"
            if [[ -n "${exact_id}" && -n "${support_id}" ]]; then
              echo "exact_run_id=${exact_id}" >> "$GITHUB_OUTPUT"
              echo "support_run_id=${support_id}" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 60
          done
          grep -q '^exact_run_id=' "$GITHUB_OUTPUT"
          grep -q '^support_run_id=' "$GITHUB_OUTPUT"

      - name: Reconstruct the 2022 feature/execution data root from artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p exact support data2022/support
          gh run download "${{ steps.await.outputs.exact_run_id }}" --repo "${REPOSITORY}" \
            --name "wave39-exact-boundary-2022-v2-${{ steps.await.outputs.exact_run_id }}" --dir exact
          gh run download "${{ steps.await.outputs.support_run_id }}" --repo "${REPOSITORY}" \
            --name "wave39-official-support-2022-v3-${{ steps.await.outputs.support_run_id }}" --dir support
          python - <<'PY'
          import json,shutil
          from pathlib import Path
          def locate(root,schema):
              found=[]
              for path in Path(root).rglob('manifest.json'):
                  try: data=json.loads(path.read_text(encoding='utf-8'))
                  except Exception: continue
                  if data.get('schema')==schema: found.append(path)
              if len(found)!=1: raise RuntimeError(f'{schema}: {found}')
              return found[0]
          exact=locate('exact','wave39-quarterhour-exact-aggtrades-year-v1')
          support=locate('support','wave39-official-support-combined-v3')
          target=Path('data2022')
          for path in exact.parent.glob('*'):
              if path.is_file(): shutil.copy2(path,target/path.name)
          for path in support.parent.glob('*'):
              if path.is_file(): shutil.copy2(path,target/'support'/path.name)
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run locked tests and execute the registered screen
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade \
            "numpy==2.1.3" "pandas==2.2.3" "numba==0.61.2" "pytest==8.3.5"
          python -m pytest \
            research/wave39/test_wave39_engine.py \
            research/wave39/test_wave39_engine_v3.py \
            research/wave39/test_wave39_engine_v4.py -q
          python -m compileall -q research/wave39
          rm -rf output
          mkdir -p output/development output/frozen
          python -m research.wave39.run_wave39_development_v4 \
            --data-root data2022 \
            --output-dir output/development \
            --registration research/wave39/WAVE39_PRE_RESULT_REGISTRATION.json \
            2>&1 | tee output/development/run.log
          python -m research.wave39.finalize_development \
            --result-dir output/development \
            --data-root data2022 \
            --freeze-dir output/frozen \
            --registration research/wave39/WAVE39_PRE_RESULT_REGISTRATION.json \
            2>&1 | tee output/finalize.log

      - name: Independently verify candidate registry, hashes and split locks
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          import pandas as pd
          root=Path('output/development')
          manifest=json.loads((root/'manifest.json').read_text(encoding='utf-8'))
          candidates=pd.read_csv(root/'wave39_all_candidates_2022.csv.gz')
          if len(candidates)!=manifest['candidate_count']: raise RuntimeError('candidate count mismatch')
          if candidates['candidate_id'].duplicated().any(): raise RuntimeError('candidate ID collision')
          if int(candidates['development_gate'].astype(bool).sum())!=manifest['development_gate_count']:
              raise RuntimeError('gate count mismatch')
          if manifest['2023_opened'] or manifest['2024_opened'] or manifest['sealed_terminal_oos_opened']:
              raise RuntimeError('future split opened')
          if manifest['risk_or_leverage_optimized']: raise RuntimeError('risk/leverage optimized')
          for name,record in manifest['results'].items():
              path=root/name
              if hashlib.sha256(path.read_bytes()).hexdigest()!=record['sha256']:
                  raise RuntimeError(f'hash mismatch: {name}')
          freeze=Path('output/frozen/WAVE39_CANDIDATE_BEFORE_2023.json')
          blocked=root/'BLOCKED.json'
          if freeze.exists()==blocked.exists():
              raise RuntimeError('exactly one freeze/block result is required')
          print(json.dumps({
              'candidate_count':len(candidates),
              'development_gate_count':manifest['development_gate_count'],
              'frozen':freeze.exists(),'blocked':blocked.exists(),
          },indent=2,sort_keys=True))
          PY

      - name: Commit durable checkpoint with conflict-safe retry
        shell: bash
        run: |
          set -euo pipefail
          destination="research/wave39/results/development_2022_gap_safe"
          rm -rf "${destination}" research/wave39/frozen
          mkdir -p "${destination}"
          cp -a output/development/. "${destination}/"
          if [[ -f output/frozen/WAVE39_CANDIDATE_BEFORE_2023.json ]]; then
            mkdir -p research/wave39/frozen
            cp output/frozen/WAVE39_CANDIDATE_BEFORE_2023.json research/wave39/frozen/
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${destination}" research/wave39/frozen || true
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record corrected gap-safe Wave39 development"
          for attempt in 1 2 3 4 5 6; do
            if git push origin "HEAD:${HEAD_BRANCH}"; then exit 0; fi
            git fetch origin "${HEAD_BRANCH}"
            git rebase "origin/${HEAD_BRANCH}"
            sleep $((attempt*8))
          done
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wave39-corrected-gap-safe-development-2022-${{ github.run_id }}
          path: |
            output/**
            data2022/manifest.json
            data2022/support/manifest.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
