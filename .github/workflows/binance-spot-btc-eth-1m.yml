name: Binance Spot BTC ETH Full 1m Data

on:
  workflow_dispatch:
  pull_request:
    paths:
      - scripts/download_binance_spot_btc_eth_1m.py
      - .github/workflows/binance-spot-btc-eth-1m.yml
  push:
    branches:
      - agent/long-lived-research-cycle
    paths:
      - scripts/download_binance_spot_btc_eth_1m.py
      - .github/workflows/binance-spot-btc-eth-1m.yml

permissions:
  contents: read

jobs:
  fetch-spot-1m:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install "pandas>=2.2" "requests>=2.32" "pyarrow>=17"
      - name: Compile downloader
        run: python -m py_compile scripts/download_binance_spot_btc_eth_1m.py
      - name: Download checksum-verified spot history
        run: |
          python scripts/download_binance_spot_btc_eth_1m.py \
            --symbols BTCUSDT ETHUSDT \
            --start-month 2020-01 \
            --end-month 2026-06 \
            --daily-start 2026-07-01 \
            --daily-end 2026-07-22 \
            --workers 12 \
            --output artifacts/binance_spot_btc_eth_1m
      - name: Export deterministic portable gzip CSV
        run: |
          python - <<'PY'
          import hashlib, json
          from pathlib import Path
          import pandas as pd
          root=Path('artifacts/binance_spot_btc_eth_1m')
          out=Path('artifacts/binance_spot_btc_eth_1m_csv'); out.mkdir(parents=True,exist_ok=True)
          manifest=json.loads((root/'manifest.json').read_text())
          exported={}
          for symbol,info in sorted(manifest['datasets'].items()):
              src=root/info['path']; frame=pd.read_parquet(src)
              target=out/f'{symbol}_spot_1m.csv.gz'
              frame.to_csv(target,index=False,compression={'method':'gzip','compresslevel':6,'mtime':0},float_format='%.12g')
              exported[symbol]={'path':target.name,'rows':len(frame),'bytes':target.stat().st_size,'sha256':hashlib.sha256(target.read_bytes()).hexdigest()}
          payload={'source':manifest,'exported':exported}
          (out/'portable_manifest.json').write_text(json.dumps(payload,indent=2))
          print(json.dumps(exported,indent=2))
          PY
      - name: Upload portable spot snapshot
        uses: actions/upload-artifact@v4
        with:
          name: binance-spot-btc-eth-full-1m-csv-${{ github.sha }}
          path: artifacts/binance_spot_btc_eth_1m_csv
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
