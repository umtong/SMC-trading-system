name: Phase31 L1 state-first research

on:
  push:
    branches:
      - research/phase31-l1-state-first
    paths:
      - '.github/workflows/phase31_l1_state_first.yml'
      - 'research/phase31_l1_state_first/**'
  pull_request:
    paths:
      - '.github/workflows/phase31_l1_state_first.yml'
      - 'research/phase31_l1_state_first/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install research dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pandas pyarrow datasets lightgbm scikit-learn
      - name: Run causal L1 study
        env:
          HF_HOME: ${{ runner.temp }}/hf
        run: |
          set -o pipefail
          python research/phase31_l1_state_first/l1_state_first.py | tee research/phase31_l1_state_first/run.log
      - name: Upload compact results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase31-l1-state-first-${{ github.run_id }}
          path: |
            research/phase31_l1_state_first/results
            research/phase31_l1_state_first/run.log
          if-no-files-found: error
          retention-days: 7
