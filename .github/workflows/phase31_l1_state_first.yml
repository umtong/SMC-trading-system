name: Phase31 L1 state-first research
on:
  push:
    branches:
      - research/phase31-l1-state-first
  workflow_dispatch:
permissions:
  contents: write
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install numpy pandas pyarrow datasets lightgbm scikit-learn
      - name: Run causal L1 study
        env:
          HF_HOME: ${{ runner.temp }}/hf
        run: python research/phase31_l1_state_first/l1_state_first.py | tee research/phase31_l1_state_first/run.log
      - name: Commit compact results
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add research/phase31_l1_state_first/results research/phase31_l1_state_first/run.log
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[skip ci] Record Phase31 L1 state-first results'
          git push origin HEAD:research/phase31-l1-state-first
