name: V24 Spot Quarter-Hour AggTrade Export

on:
  pull_request:
    paths:
      - 'research/v24_spot_flow_trigger.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  export-spot-flow-2023-2024:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.head_ref == 'research/v20-run-20260723')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Restore and verify spot extractor
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 --retry-all-errors \
            https://raw.githubusercontent.com/umtong/SMC-trading-system/37dac126da9341c78238ab9a90b0e1c501303720/research/v14_quarter_hour_aggtrade_plain.py \
            -o /tmp/v24_spot_quarter_hour_aggtrade.py
          echo '94d8d10dd2495d349be56606c7dbc4d42429e69f502ae07a1732f1af5faaf600  /tmp/v24_spot_quarter_hour_aggtrade.py' | sha256sum --check --strict
          sed -i 's#data/futures/um/monthly/aggTrades#data/spot/monthly/aggTrades#' /tmp/v24_spot_quarter_hour_aggtrade.py
          echo '50cfc79042b4eafa33b4041198e8774766b8c4a9b353f8d940e678c675ad47c9  /tmp/v24_spot_quarter_hour_aggtrade.py' | sha256sum --check --strict
          python -m py_compile /tmp/v24_spot_quarter_hour_aggtrade.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy pandas requests

      - name: Restore Binance spot aggTrade cache
        uses: actions/cache@v4
        with:
          path: .cache/v24_spot_aggtrades
          key: v24-binance-spot-aggtrades-2023-2024-btc-eth-v1

      - name: Export exact spot first-10-second flow
        id: export
        shell: bash
        run: |
          set +e
          set -o pipefail
          rm -rf artifacts/v24-spot-quarter-hour-2023-2024
          python /tmp/v24_spot_quarter_hour_aggtrade.py \
            --start 2023-01-01 --end 2025-01-01 \
            --symbols BTCUSDT ETHUSDT \
            --cache .cache/v24_spot_aggtrades \
            --output artifacts/v24-spot-quarter-hour-2023-2024 \
            --workers 4 \
            2>&1 | tee artifacts-v24-spot-flow.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload exact spot-flow evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v24-spot-quarter-hour-2023-2024-${{ github.run_id }}
          path: |
            artifacts/v24-spot-quarter-hour-2023-2024
            artifacts-v24-spot-flow.log
          if-no-files-found: warn
          retention-days: 30

      - name: Publish status
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        shell: bash
        run: |
          gh pr comment "$PR_NUMBER" --body "## V24 exact spot-flow export\n\n- run_id: \`${GITHUB_RUN_ID}\`\n- exit code: \`${EXIT_CODE}\`\n- period: \`2023-01-01 through 2025-01-01 UTC\`\n\n_Checksum-verified data artifact only._"

      - name: Preserve failure
        if: always() && steps.export.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.export.outputs.exit_code }}
        run: exit "$EXIT_CODE"
