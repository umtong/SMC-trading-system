name: Wave39 official 1m support 2022 v2

on:
  push:
    branches:
      - research/wave39-quarterhour-exact-aggtrades-20260723
    paths:
      - ".github/workflows/wave39-official-support-2022-v2.yml"
      - "research/wave39v2/build_support_year.py"
  pull_request:
    paths:
      - ".github/workflows/wave39-official-support-2022-v2.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-symbol:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        symbol: [BTCUSDT, ETHUSDT, SOLUSDT, XRPUSDT]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave39-quarterhour-exact-aggtrades-20260723

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build checksum-verified support stream
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          python research/wave39v2/build_support_year.py \
            --symbol "${{ matrix.symbol }}" \
            --year 2022 \
            --output-dir output \
            --retries 8 \
            2>&1 | tee "output/${{ matrix.symbol }}_support_build.log"

      - name: Verify support manifest independently
        env:
          SYMBOL: ${{ matrix.symbol }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json, os
          from pathlib import Path
          symbol=os.environ['SYMBOL']
          root=Path('output')
          manifest_path=root/f'{symbol}_support_manifest.json'
          manifest=json.loads(manifest_path.read_text(encoding='utf-8'))
          if manifest.get('schema')!='wave39-official-support-v2':
              raise RuntimeError('unexpected schema')
          if manifest.get('year')!=2022 or manifest.get('symbol')!=symbol:
              raise RuntimeError('identity mismatch')
          if manifest.get('future_outcomes_included') is not False:
              raise RuntimeError('future outcome isolation violated')
          if manifest.get('strategy_results_included') is not False:
              raise RuntimeError('strategy result isolation violated')
          for name, record in manifest['outputs'].items():
              path=root/name
              digest=hashlib.sha256(path.read_bytes()).hexdigest()
              if digest!=record['sha256'] or path.stat().st_size!=record['bytes']:
                  raise RuntimeError(f'output integrity mismatch: {name}')
          print(json.dumps({
              'symbol':symbol,
              'contract_rows':manifest['contract_rows'],
              'funding_rows':manifest['funding_rows'],
          },sort_keys=True))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: wave39-support-v2-2022-${{ matrix.symbol }}
          path: output/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  combine-persist:
    needs: build-symbol
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: research/wave39-quarterhour-exact-aggtrades-20260723
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: wave39-support-v2-2022-*
          path: support-download
          merge-multiple: true

      - name: Reverify and assemble immutable support panel
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations
          import hashlib, json
          from pathlib import Path

          source=Path('support-download')
          destination=Path('research/wave39/generated/2022/support')
          destination.mkdir(parents=True,exist_ok=True)
          symbols=('BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT')
          combined={
              'schema':'wave39-official-support-combined-v2',
              'year':2022,
              'symbols':{},
              'future_outcomes_included':False,
              'strategy_results_included':False,
          }
          for symbol in symbols:
              manifest_path=source/f'{symbol}_support_manifest.json'
              if not manifest_path.exists():
                  raise RuntimeError(f'missing {manifest_path}')
              manifest=json.loads(manifest_path.read_text(encoding='utf-8'))
              if manifest['schema']!='wave39-official-support-v2':
                  raise RuntimeError(f'{symbol}: schema mismatch')
              output_records={}
              for name,record in manifest['outputs'].items():
                  path=source/name
                  digest=hashlib.sha256(path.read_bytes()).hexdigest()
                  if digest!=record['sha256']:
                      raise RuntimeError(f'{symbol}: hash mismatch {name}')
                  target=destination/name
                  target.write_bytes(path.read_bytes())
                  output_records[name]={
                      'bytes':target.stat().st_size,
                      'sha256':hashlib.sha256(target.read_bytes()).hexdigest(),
                  }
              target_manifest=destination/manifest_path.name
              target_manifest.write_bytes(manifest_path.read_bytes())
              combined['symbols'][symbol]={
                  'contract_rows':manifest['contract_rows'],
                  'funding_rows':manifest['funding_rows'],
                  'outputs':output_records,
                  'manifest_sha256':hashlib.sha256(target_manifest.read_bytes()).hexdigest(),
              }
          (destination/'manifest.json').write_text(
              json.dumps(combined,indent=2,sort_keys=True),encoding='utf-8'
          )
          print(json.dumps(combined,indent=2,sort_keys=True))
          PY

      - name: Commit with conflict-safe retry
        shell: bash
        run: |
          set -euo pipefail
          branch="research/wave39-quarterhour-exact-aggtrades-20260723"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research/wave39/generated/2022/support
          if git diff --cached --quiet; then
            echo "identical support panel already persisted"
            exit 0
          fi
          git commit -m "Persist Wave39 official 2022 support panel v2"
          for attempt in 1 2 3 4 5 6; do
            if git push origin "HEAD:${branch}"; then
              exit 0
            fi
            git fetch origin "${branch}"
            git rebase "origin/${branch}"
            sleep $((attempt*8))
          done
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wave39-official-support-2022-v2-${{ github.run_id }}
          path: research/wave39/generated/2022/support/**
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
